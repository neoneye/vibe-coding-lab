<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Synth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a2a1a 0%, #0d1b2a 50%, #1b2838 100%);
    color: #e0e8d0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 24px 16px 8px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #b8d4a0;
  }

  header p {
    font-size: 0.85rem;
    color: #7a9a6a;
    margin-top: 4px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Visualizer */
  .viz-panel {
    background: #0a1510;
    border: 1px solid #2a4a2a;
    border-radius: 12px;
    padding: 0;
    overflow: hidden;
    position: relative;
  }

  canvas#waveform {
    width: 100%;
    height: 120px;
    display: block;
  }

  .viz-label {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 0.7rem;
    color: #4a7a4a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Presets */
  .preset-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .preset-btn {
    flex: 1;
    min-width: 120px;
    padding: 12px 16px;
    background: #1a2e1a;
    border: 1px solid #2a4a2a;
    border-radius: 8px;
    color: #b8d4a0;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .preset-btn:hover {
    background: #243824;
    border-color: #4a8a4a;
  }

  .preset-btn.active {
    background: #2a4a2a;
    border-color: #6aba6a;
    box-shadow: 0 0 12px rgba(106, 186, 106, 0.15);
  }

  .preset-btn .icon {
    font-size: 1.4rem;
    display: block;
    margin-bottom: 4px;
  }

  .preset-btn .name {
    font-size: 0.75rem;
    opacity: 0.7;
  }

  /* Sing buttons */
  .action-row {
    display: flex;
    gap: 8px;
  }

  .sing-btn {
    flex: 1;
    padding: 16px;
    border-radius: 10px;
    border: 2px solid;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .sing-btn.primary {
    background: linear-gradient(135deg, #2a6a2a, #3a8a3a);
    border-color: #4a9a4a;
    color: #e0ffd0;
  }

  .sing-btn.primary:hover {
    background: linear-gradient(135deg, #3a7a3a, #4a9a4a);
    box-shadow: 0 0 20px rgba(74, 154, 74, 0.3);
  }

  .sing-btn.primary:active {
    transform: scale(0.98);
  }

  .sing-btn.reply {
    background: linear-gradient(135deg, #2a4a6a, #3a5a8a);
    border-color: #4a7aaa;
    color: #d0e8ff;
  }

  .sing-btn.reply:hover {
    background: linear-gradient(135deg, #3a5a7a, #4a6a9a);
    box-shadow: 0 0 20px rgba(74, 122, 170, 0.3);
  }

  .sing-btn.reply:active {
    transform: scale(0.98);
  }

  .sing-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Controls panels */
  .panel {
    background: #111e14;
    border: 1px solid #2a4a2a;
    border-radius: 12px;
    padding: 16px;
  }

  .panel-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #5a8a5a;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a2e1a;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  .control {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control label {
    font-size: 0.75rem;
    color: #8aba8a;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .control label .val {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: #6a9a6a;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #1a2e1a;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6aba6a;
    border: 2px solid #8ada8a;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 8px rgba(106, 186, 106, 0.5);
  }

  /* Phrase editor */
  .phrase-display {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
    min-height: 40px;
    padding: 10px;
    background: #0a1510;
    border-radius: 8px;
    align-items: flex-end;
    margin-bottom: 10px;
  }

  .note-bar {
    width: 18px;
    min-height: 8px;
    background: linear-gradient(0deg, #3a8a3a, #6aba6a);
    border-radius: 3px 3px 0 0;
    transition: height 0.2s, opacity 0.15s;
    opacity: 0.7;
  }

  .note-bar.playing {
    opacity: 1;
    background: linear-gradient(0deg, #5aba5a, #aafaaa);
    box-shadow: 0 0 8px rgba(106, 250, 106, 0.4);
  }

  .phrase-actions {
    display: flex;
    gap: 6px;
  }

  .phrase-actions button {
    padding: 6px 12px;
    background: #1a2e1a;
    border: 1px solid #2a4a2a;
    border-radius: 6px;
    color: #8aba8a;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .phrase-actions button:hover {
    background: #243824;
    border-color: #4a8a4a;
  }

  /* Waveform selector */
  .wave-selector {
    display: flex;
    gap: 4px;
  }

  .wave-btn {
    flex: 1;
    padding: 6px 4px;
    background: #1a2e1a;
    border: 1px solid #2a4a2a;
    border-radius: 6px;
    color: #6a9a6a;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .wave-btn.active {
    background: #2a4a2a;
    border-color: #6aba6a;
    color: #b8d4a0;
  }

  .wave-btn:hover {
    border-color: #4a8a4a;
  }

  /* Dialogue log */
  .log {
    max-height: 100px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: #5a8a5a;
    padding: 8px;
    background: #0a1510;
    border-radius: 8px;
    margin-top: 8px;
  }

  .log div { padding: 1px 0; }
  .log .you { color: #6aba6a; }
  .log .bird { color: #6a9aba; }

  footer {
    text-align: center;
    padding: 16px;
    font-size: 0.7rem;
    color: #3a5a3a;
  }

  @media (max-width: 500px) {
    .controls-grid { grid-template-columns: 1fr 1fr; }
    .preset-btn { min-width: 80px; padding: 10px 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>Bird Synth</h1>
  <p>Sing with the birds in your garden</p>
</header>

<div class="container">

  <!-- Waveform visualizer -->
  <div class="viz-panel">
    <span class="viz-label">waveform</span>
    <canvas id="waveform"></canvas>
  </div>

  <!-- Bird presets -->
  <div class="preset-row" id="presets">
    <button class="preset-btn active" data-preset="blackbird">
      <span class="icon">&#x1F426;&#x200D;&#x2B1B;</span>
      <span class="name">Blackbird</span>
    </button>
    <button class="preset-btn" data-preset="robin">
      <span class="icon">&#x1F426;</span>
      <span class="name">Robin</span>
    </button>
    <button class="preset-btn" data-preset="beeper">
      <span class="icon">&#x1F425;</span>
      <span class="name">Beeper</span>
    </button>
    <button class="preset-btn" data-preset="nightingale">
      <span class="icon">&#x1F3B6;</span>
      <span class="name">Nightingale</span>
    </button>
  </div>

  <!-- Sing / Reply -->
  <div class="action-row">
    <button class="sing-btn primary" id="singBtn">Sing</button>
    <button class="sing-btn reply" id="replyBtn" disabled>Reply (varied)</button>
  </div>

  <!-- Phrase visualizer -->
  <div class="panel">
    <div class="panel-title">Phrase</div>
    <div class="phrase-display" id="phraseDisplay"></div>
    <div class="phrase-actions">
      <button id="newPhraseBtn">New phrase</button>
      <button id="mutatePhraseBtn">Mutate</button>
      <button id="longerBtn">Longer</button>
      <button id="shorterBtn">Shorter</button>
    </div>
  </div>

  <!-- Tone controls -->
  <div class="panel">
    <div class="panel-title">Tone</div>
    <div class="controls-grid">
      <div class="control">
        <label>Base Pitch <span class="val" id="pitchVal"></span></label>
        <input type="range" id="pitch" min="400" max="5000" value="2200" step="10">
      </div>
      <div class="control">
        <label>Pitch Range <span class="val" id="rangeVal"></span></label>
        <input type="range" id="pitchRange" min="0.1" max="2" value="0.8" step="0.05">
      </div>
      <div class="control">
        <label>Vibrato Speed <span class="val" id="vibSpeedVal"></span></label>
        <input type="range" id="vibSpeed" min="0" max="30" value="8" step="0.5">
      </div>
      <div class="control">
        <label>Vibrato Depth <span class="val" id="vibDepthVal"></span></label>
        <input type="range" id="vibDepth" min="0" max="100" value="25" step="1">
      </div>
    </div>
  </div>

  <!-- Envelope controls -->
  <div class="panel">
    <div class="panel-title">Envelope &amp; Timing</div>
    <div class="controls-grid">
      <div class="control">
        <label>Attack <span class="val" id="attackVal"></span></label>
        <input type="range" id="attack" min="0.002" max="0.1" value="0.01" step="0.002">
      </div>
      <div class="control">
        <label>Decay <span class="val" id="decayVal"></span></label>
        <input type="range" id="decay" min="0.01" max="0.3" value="0.08" step="0.005">
      </div>
      <div class="control">
        <label>Note Duration <span class="val" id="durationVal"></span></label>
        <input type="range" id="duration" min="0.03" max="0.5" value="0.12" step="0.01">
      </div>
      <div class="control">
        <label>Gap <span class="val" id="gapVal"></span></label>
        <input type="range" id="gap" min="0" max="0.3" value="0.06" step="0.005">
      </div>
      <div class="control">
        <label>Glide <span class="val" id="glideVal"></span></label>
        <input type="range" id="glide" min="0" max="1" value="0.3" step="0.05">
      </div>
      <div class="control">
        <label>Volume <span class="val" id="volumeVal"></span></label>
        <input type="range" id="volume" min="0" max="1" value="0.5" step="0.01">
      </div>
    </div>
  </div>

  <!-- Waveform selector -->
  <div class="panel">
    <div class="panel-title">Oscillator Shape</div>
    <div class="wave-selector" id="waveSelector">
      <button class="wave-btn active" data-wave="sine">Sine</button>
      <button class="wave-btn" data-wave="triangle">Triangle</button>
      <button class="wave-btn" data-wave="square">Square</button>
      <button class="wave-btn" data-wave="sawtooth">Sawtooth</button>
    </div>
  </div>

  <!-- Dialogue log -->
  <div class="panel">
    <div class="panel-title">Dialogue</div>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>Click "Sing" to start &mdash; Click "Reply" to hear a varied response</footer>

<script>
// ---- Audio context ----
let ctx = null;
let analyser = null;
let masterGain = null;

function ensureAudio() {
  if (ctx) return;
  ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  masterGain = ctx.createGain();
  masterGain.connect(analyser);
  analyser.connect(ctx.destination);
}

// ---- State ----
let currentPhrase = [];
let lastPhrase = [];
let isPlaying = false;
let waveType = 'sine';
let activePreset = 'blackbird';

// ---- Presets ----
const presets = {
  blackbird: {
    pitch: 2200, pitchRange: 0.8, vibSpeed: 8, vibDepth: 25,
    attack: 0.01, decay: 0.08, duration: 0.12, gap: 0.06,
    glide: 0.3, volume: 0.5, wave: 'sine',
    phraseLen: [6, 14], noteStyle: 'melodic'
  },
  robin: {
    pitch: 3200, pitchRange: 0.5, vibSpeed: 12, vibDepth: 15,
    attack: 0.008, decay: 0.06, duration: 0.08, gap: 0.04,
    glide: 0.15, volume: 0.45, wave: 'sine',
    phraseLen: [8, 18], noteStyle: 'quick'
  },
  beeper: {
    pitch: 3800, pitchRange: 0.15, vibSpeed: 0, vibDepth: 0,
    attack: 0.005, decay: 0.03, duration: 0.07, gap: 0.12,
    glide: 0, volume: 0.4, wave: 'sine',
    phraseLen: [2, 5], noteStyle: 'beep'
  },
  nightingale: {
    pitch: 1800, pitchRange: 1.2, vibSpeed: 6, vibDepth: 40,
    attack: 0.015, decay: 0.12, duration: 0.2, gap: 0.08,
    glide: 0.6, volume: 0.5, wave: 'triangle',
    phraseLen: [5, 10], noteStyle: 'sweep'
  }
};

// ---- Controls ----
const sliders = {
  pitch: document.getElementById('pitch'),
  pitchRange: document.getElementById('pitchRange'),
  vibSpeed: document.getElementById('vibSpeed'),
  vibDepth: document.getElementById('vibDepth'),
  attack: document.getElementById('attack'),
  decay: document.getElementById('decay'),
  duration: document.getElementById('duration'),
  gap: document.getElementById('gap'),
  glide: document.getElementById('glide'),
  volume: document.getElementById('volume')
};

const valLabels = {
  pitch: document.getElementById('pitchVal'),
  pitchRange: document.getElementById('rangeVal'),
  vibSpeed: document.getElementById('vibSpeedVal'),
  vibDepth: document.getElementById('vibDepthVal'),
  attack: document.getElementById('attackVal'),
  decay: document.getElementById('decayVal'),
  duration: document.getElementById('durationVal'),
  gap: document.getElementById('gapVal'),
  glide: document.getElementById('glideVal'),
  volume: document.getElementById('volumeVal')
};

const units = {
  pitch: ' Hz', pitchRange: 'x', vibSpeed: ' Hz', vibDepth: '',
  attack: ' s', decay: ' s', duration: ' s', gap: ' s', glide: '', volume: ''
};

function getVal(name) { return parseFloat(sliders[name].value); }

function updateLabels() {
  for (const key in sliders) {
    valLabels[key].textContent = parseFloat(sliders[key].value).toFixed(
      key === 'pitch' ? 0 : (key === 'vibDepth' ? 0 : 2)
    ) + (units[key] || '');
  }
}

for (const key in sliders) {
  sliders[key].addEventListener('input', updateLabels);
}
updateLabels();

// ---- Waveform selector ----
document.getElementById('waveSelector').addEventListener('click', e => {
  const btn = e.target.closest('.wave-btn');
  if (!btn) return;
  document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  waveType = btn.dataset.wave;
});

// ---- Presets ----
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePreset = btn.dataset.preset;
  applyPreset(presets[activePreset]);
});

function applyPreset(p) {
  sliders.pitch.value = p.pitch;
  sliders.pitchRange.value = p.pitchRange;
  sliders.vibSpeed.value = p.vibSpeed;
  sliders.vibDepth.value = p.vibDepth;
  sliders.attack.value = p.attack;
  sliders.decay.value = p.decay;
  sliders.duration.value = p.duration;
  sliders.gap.value = p.gap;
  sliders.glide.value = p.glide;
  sliders.volume.value = p.volume;
  waveType = p.wave;
  document.querySelectorAll('.wave-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.wave === p.wave);
  });
  updateLabels();
  currentPhrase = generatePhrase(p.noteStyle);
  renderPhrase();
}

// ---- Phrase generation ----
function generatePhrase(style) {
  const p = presets[activePreset] || presets.blackbird;
  const len = randInt(p.phraseLen[0], p.phraseLen[1]);
  const notes = [];

  for (let i = 0; i < len; i++) {
    switch (style || p.noteStyle) {
      case 'melodic': {
        // Blackbird: mix of held notes, quick runs, and swoops
        const r = Math.random();
        if (r < 0.3) {
          // held note
          notes.push({ pitch: 0.5 + Math.random() * 0.5, durMul: 1.5 + Math.random(), glide: 0 });
        } else if (r < 0.6) {
          // quick note
          notes.push({ pitch: Math.random(), durMul: 0.4 + Math.random() * 0.4, glide: 0 });
        } else {
          // swooping note
          notes.push({ pitch: Math.random(), durMul: 0.8 + Math.random() * 0.8, glide: 0.5 + Math.random() * 0.5 });
        }
        break;
      }
      case 'quick': {
        // Robin: rapid short notes
        notes.push({
          pitch: 0.3 + Math.random() * 0.7,
          durMul: 0.3 + Math.random() * 0.7,
          glide: Math.random() * 0.3
        });
        break;
      }
      case 'beep': {
        // Beeper: same pitch, steady rhythm
        const basePitch = 0.4 + Math.random() * 0.2;
        notes.push({
          pitch: basePitch + (Math.random() - 0.5) * 0.1,
          durMul: 0.8 + Math.random() * 0.4,
          glide: 0
        });
        break;
      }
      case 'sweep': {
        // Nightingale: long sweeping notes with wide range
        notes.push({
          pitch: Math.random(),
          durMul: 0.6 + Math.random() * 1.5,
          glide: 0.3 + Math.random() * 0.7
        });
        break;
      }
    }
  }
  return notes;
}

function mutatePhrase(phrase, amount = 0.15) {
  return phrase.map(note => ({
    pitch: clamp(note.pitch + (Math.random() - 0.5) * amount * 2, 0, 1),
    durMul: Math.max(0.2, note.durMul + (Math.random() - 0.5) * amount),
    glide: clamp(note.glide + (Math.random() - 0.5) * amount, 0, 1)
  }));
}

// ---- Phrase display ----
const phraseDisplay = document.getElementById('phraseDisplay');

function renderPhrase(playingIndex = -1) {
  phraseDisplay.innerHTML = '';
  currentPhrase.forEach((note, i) => {
    const bar = document.createElement('div');
    bar.className = 'note-bar' + (i === playingIndex ? ' playing' : '');
    bar.style.height = (8 + note.pitch * 50) + 'px';
    bar.style.opacity = i === playingIndex ? '1' : '0.5';
    const hue = 90 + note.pitch * 40;
    bar.style.background = `linear-gradient(0deg, hsl(${hue},50%,30%), hsl(${hue},60%,50%))`;
    phraseDisplay.appendChild(bar);
  });
}

// ---- Sound synthesis ----
function playPhrase(phrase, onDone) {
  ensureAudio();
  if (ctx.state === 'suspended') ctx.resume();

  const basePitch = getVal('pitch');
  const range = getVal('pitchRange');
  const vibSpeed = getVal('vibSpeed');
  const vibDepth = getVal('vibDepth');
  const attackTime = getVal('attack');
  const decayTime = getVal('decay');
  const baseDur = getVal('duration');
  const baseGap = getVal('gap');
  const glideAmount = getVal('glide');
  const vol = getVal('volume');

  masterGain.gain.setValueAtTime(vol, ctx.currentTime);

  let t = ctx.currentTime + 0.05;
  let prevFreq = null;

  const noteTimings = [];

  phrase.forEach((note, i) => {
    const freq = basePitch * (1 + (note.pitch - 0.5) * range);
    const dur = baseDur * note.durMul;
    const noteGlide = glideAmount * note.glide;

    // Main oscillator
    const osc = ctx.createOscillator();
    osc.type = waveType;

    // Start frequency (glide from previous note)
    const startFreq = (prevFreq && noteGlide > 0)
      ? prevFreq + (freq - prevFreq) * (1 - noteGlide)
      : freq;

    osc.frequency.setValueAtTime(startFreq, t);
    if (startFreq !== freq) {
      osc.frequency.exponentialRampToValueAtTime(freq, t + dur * 0.3);
    }

    // Vibrato LFO
    if (vibSpeed > 0 && vibDepth > 0) {
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.value = vibSpeed;
      lfoGain.gain.value = vibDepth;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start(t);
      lfo.stop(t + dur + decayTime);
    }

    // Envelope
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.0001, t);
    env.gain.exponentialRampToValueAtTime(0.3, t + attackTime);
    env.gain.setValueAtTime(0.3, t + dur - decayTime);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

    // Second harmonic for richness
    const osc2 = ctx.createOscillator();
    osc2.type = waveType;
    osc2.frequency.setValueAtTime(startFreq * 2, t);
    if (startFreq !== freq) {
      osc2.frequency.exponentialRampToValueAtTime(freq * 2, t + dur * 0.3);
    }
    const harm2Gain = ctx.createGain();
    harm2Gain.gain.value = 0.08;

    osc.connect(env);
    osc2.connect(harm2Gain);
    harm2Gain.connect(env);
    env.connect(masterGain);

    osc.start(t);
    osc.stop(t + dur + 0.01);
    osc2.start(t);
    osc2.stop(t + dur + 0.01);

    noteTimings.push({ time: t, index: i });
    prevFreq = freq;
    t += dur + baseGap;
  });

  // Animate the phrase display
  isPlaying = true;
  const startTime = ctx.currentTime;

  function animateNotes() {
    if (!isPlaying) return;
    const now = ctx.currentTime;
    let activeIdx = -1;
    for (const nt of noteTimings) {
      if (now >= nt.time) activeIdx = nt.index;
    }
    renderPhrase(activeIdx);
    if (now < t) {
      requestAnimationFrame(animateNotes);
    } else {
      isPlaying = false;
      renderPhrase(-1);
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(animateNotes);

  return t - ctx.currentTime;
}

// ---- Dialogue log ----
const logEl = document.getElementById('log');
let turnCount = 0;

function logPhrase(who, phrase) {
  turnCount++;
  const contour = phrase.map(n => {
    const h = Math.round(n.pitch * 8);
    return ['_', '.', '-', '~', '^', '*', "'", '"', '`'][Math.min(h, 8)];
  }).join('');
  const div = document.createElement('div');
  div.className = who;
  div.textContent = `${who === 'you' ? 'You' : 'Bird'} #${turnCount}: ${contour}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

// ---- Button actions ----
const singBtn = document.getElementById('singBtn');
const replyBtn = document.getElementById('replyBtn');

singBtn.addEventListener('click', () => {
  if (isPlaying) return;
  ensureAudio();
  singBtn.disabled = true;
  replyBtn.disabled = true;
  logPhrase('you', currentPhrase);
  lastPhrase = [...currentPhrase];
  const totalDur = playPhrase(currentPhrase, () => {
    singBtn.disabled = false;
    replyBtn.disabled = false;
  });
});

replyBtn.addEventListener('click', () => {
  if (isPlaying || lastPhrase.length === 0) return;
  ensureAudio();
  singBtn.disabled = true;
  replyBtn.disabled = true;

  // Bird "replies" with a mutated version
  const reply = mutatePhrase(lastPhrase, 0.2);
  // Occasionally add or remove a note
  if (Math.random() < 0.3 && reply.length > 2) {
    reply.splice(randInt(0, reply.length - 1), 1);
  } else if (Math.random() < 0.3) {
    const ins = { pitch: Math.random(), durMul: 0.5 + Math.random(), glide: Math.random() * 0.5 };
    reply.splice(randInt(0, reply.length), 0, ins);
  }

  currentPhrase = reply;
  renderPhrase();
  logPhrase('bird', reply);
  lastPhrase = [...reply];

  playPhrase(reply, () => {
    singBtn.disabled = false;
    replyBtn.disabled = false;
  });
});

document.getElementById('newPhraseBtn').addEventListener('click', () => {
  if (isPlaying) return;
  currentPhrase = generatePhrase();
  renderPhrase();
});

document.getElementById('mutatePhraseBtn').addEventListener('click', () => {
  if (isPlaying) return;
  currentPhrase = mutatePhrase(currentPhrase, 0.2);
  renderPhrase();
});

document.getElementById('longerBtn').addEventListener('click', () => {
  if (isPlaying) return;
  const p = presets[activePreset] || presets.blackbird;
  const extra = generatePhrase(p.noteStyle);
  currentPhrase.push(extra[randInt(0, extra.length - 1)]);
  renderPhrase();
});

document.getElementById('shorterBtn').addEventListener('click', () => {
  if (isPlaying || currentPhrase.length <= 1) return;
  currentPhrase.pop();
  renderPhrase();
});

// ---- Waveform visualizer ----
const canvas = document.getElementById('waveform');
const canvasCtx = canvas.getContext('2d');

function drawWaveform() {
  requestAnimationFrame(drawWaveform);

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
  }

  const w = canvas.width;
  const h = canvas.height;
  canvasCtx.fillStyle = '#0a1510';
  canvasCtx.fillRect(0, 0, w, h);

  if (!analyser) {
    // Draw flat line
    canvasCtx.strokeStyle = '#1a3a1a';
    canvasCtx.lineWidth = dpr;
    canvasCtx.beginPath();
    canvasCtx.moveTo(0, h / 2);
    canvasCtx.lineTo(w, h / 2);
    canvasCtx.stroke();
    return;
  }

  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);

  // Center line
  canvasCtx.strokeStyle = '#1a2a1a';
  canvasCtx.lineWidth = dpr;
  canvasCtx.beginPath();
  canvasCtx.moveTo(0, h / 2);
  canvasCtx.lineTo(w, h / 2);
  canvasCtx.stroke();

  // Waveform
  canvasCtx.strokeStyle = '#6aba6a';
  canvasCtx.lineWidth = 2 * dpr;
  canvasCtx.beginPath();
  const sliceWidth = w / bufLen;
  let x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) canvasCtx.moveTo(x, y);
    else canvasCtx.lineTo(x, y);
    x += sliceWidth;
  }
  canvasCtx.stroke();

  // Glow effect
  canvasCtx.strokeStyle = 'rgba(106, 186, 106, 0.2)';
  canvasCtx.lineWidth = 6 * dpr;
  canvasCtx.beginPath();
  x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) canvasCtx.moveTo(x, y);
    else canvasCtx.lineTo(x, y);
    x += sliceWidth;
  }
  canvasCtx.stroke();
}

drawWaveform();

// ---- Utility ----
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ---- Initial phrase ----
currentPhrase = generatePhrase();
renderPhrase();
</script>
