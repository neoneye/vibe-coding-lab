<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Geo Guess</title>
</head>
<body>
<script id="country-data">window.COUNTRIES = [];</script>
<script id="shared-code">
// ---- Test harness (used by test.mjs via GeoTests.run) ----
const GeoTests = (() => {
  const tests = [];
  let cur = '';
  function add(name, fn) { tests.push({ name, fn }); }
  function assert(cond, msg) { if (!cond) throw new Error(msg || ('assertion failed in ' + cur)); }
  function assertApprox(a, b, eps, msg) {
    if (Math.abs(a - b) > (eps == null ? 1e-6 : eps))
      throw new Error((msg ? msg + ': ' : '') + 'expected ' + b + ' got ' + a);
  }
  function run() {
    let pass = 0, fail = 0;
    for (const t of tests) {
      cur = t.name;
      try { t.fn(); pass++; console.log('  ok   -', t.name); }
      catch (e) { fail++; console.error('  FAIL -', t.name + ':', e.message); }
    }
    console.log('\n' + pass + ' passed, ' + fail + ' failed');
    return fail === 0;
  }
  return { add, run, assert, assertApprox };
})();

// ---- projection: orthographic globe (math coords, y up, unit sphere) ----
const DEG = Math.PI / 180;

function project(lon, lat, rot) {
  const a = (lon + rot.lambda) * DEG;
  const b = lat * DEG;
  const cx = Math.cos(b) * Math.sin(a);
  const cy = Math.sin(b);
  const cz = Math.cos(b) * Math.cos(a);
  const p = rot.phi * DEG;
  const ty = cy * Math.cos(p) - cz * Math.sin(p);
  const tz = cy * Math.sin(p) + cz * Math.cos(p);
  return { x: cx, y: ty, visible: tz > 0 };
}

function unproject(x, y, rot) {
  const r2 = x * x + y * y;
  if (r2 > 1) return null;
  const tz = Math.sqrt(1 - r2);
  const ty = y;
  const p = rot.phi * DEG;
  const cy = ty * Math.cos(p) + tz * Math.sin(p);
  const cz = -ty * Math.sin(p) + tz * Math.cos(p);
  const cx = x;
  const lat = Math.asin(Math.max(-1, Math.min(1, cy))) / DEG;
  let lon = Math.atan2(cx, cz) / DEG - rot.lambda;
  lon = ((lon + 180) % 360 + 360) % 360 - 180;
  return { lon, lat };
}

GeoTests.add('project center at zero rotation maps to origin', () => {
  const r = project(0, 0, { lambda: 0, phi: 0 });
  GeoTests.assertApprox(r.x, 0, 1e-9, 'x');
  GeoTests.assertApprox(r.y, 0, 1e-9, 'y');
  GeoTests.assert(r.visible, 'should be visible');
});

GeoTests.add('project/unproject round-trip on near hemisphere', () => {
  const rot = { lambda: 20, phi: -10 };
  for (const [lon, lat] of [[0, 0], [45, 30], [10, -25], [-15, 5]]) {
    const p = project(lon, lat, rot);
    GeoTests.assert(p.visible, lon + ',' + lat + ' should be visible');
    const u = unproject(p.x, p.y, rot);
    GeoTests.assertApprox(u.lon, lon, 1e-6, 'lon');
    GeoTests.assertApprox(u.lat, lat, 1e-6, 'lat');
  }
});

GeoTests.add('unproject outside the disk returns null', () => {
  GeoTests.assert(unproject(0.99, 0.99, { lambda: 0, phi: 0 }) === null, 'should be null');
});

GeoTests.add('back hemisphere point is not visible', () => {
  const r = project(180, 0, { lambda: 0, phi: 0 });
  GeoTests.assert(!r.visible, 'antipode should be hidden');
});

// ---- geo: distances and polygon hit-testing ----
function greatCircleKm(a, b) {
  const R = 6371;
  const dLat = (b[1] - a[1]) * DEG, dLon = (b[0] - a[0]) * DEG;
  const la1 = a[1] * DEG, la2 = b[1] * DEG;
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
}

function pointInPolygon(lon, lat, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
    const intersect = ((yi > lat) !== (yj > lat)) &&
      (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function distanceToCountryKm(lon, lat, country) {
  for (const ring of country.rings) if (pointInPolygon(lon, lat, ring)) return 0;
  let min = Infinity;
  for (const ring of country.rings)
    for (const v of ring) {
      const d = greatCircleKm([lon, lat], v);
      if (d < min) min = d;
    }
  return min;
}

GeoTests.add('greatCircleKm NYC to London ~5570km', () => {
  const d = greatCircleKm([-74.006, 40.7128], [-0.1276, 51.5074]);
  GeoTests.assertApprox(d, 5570, 60, 'distance');
});

GeoTests.add('pointInPolygon inside and outside a square', () => {
  const sq = [[0, 0], [0, 10], [10, 10], [10, 0], [0, 0]];
  GeoTests.assert(pointInPolygon(5, 5, sq), 'center inside');
  GeoTests.assert(!pointInPolygon(20, 5, sq), 'east outside');
  GeoTests.assert(!pointInPolygon(-1, -1, sq), 'sw outside');
});

GeoTests.add('distanceToCountryKm is 0 inside, >0 outside', () => {
  const country = { rings: [[[0, 0], [0, 10], [10, 10], [10, 0], [0, 0]]] };
  GeoTests.assert(distanceToCountryKm(5, 5, country) === 0, 'inside is 0');
  GeoTests.assert(distanceToCountryKm(40, 5, country) > 1000, 'far away is large');
});

// ---- flags: ISO 3166-1 alpha-2 -> regional-indicator emoji ----
function iso2ToEmoji(iso2) {
  if (typeof iso2 !== 'string' || iso2.length !== 2) return '';
  const s = iso2.toUpperCase();
  if (!/^[A-Z]{2}$/.test(s)) return '';
  return String.fromCodePoint(
    0x1F1E6 + (s.charCodeAt(0) - 65),
    0x1F1E6 + (s.charCodeAt(1) - 65)
  );
}

GeoTests.add('iso2ToEmoji maps FR to the French flag', () => {
  GeoTests.assert(iso2ToEmoji('FR') === '\u{1F1EB}\u{1F1F7}', 'FR flag');
  GeoTests.assert(iso2ToEmoji('fr') === '\u{1F1EB}\u{1F1F7}', 'lowercase ok');
});

GeoTests.add('iso2ToEmoji returns empty for invalid input', () => {
  GeoTests.assert(iso2ToEmoji('') === '', 'empty');
  GeoTests.assert(iso2ToEmoji('-99') === '', 'too long');
  GeoTests.assert(iso2ToEmoji('1A') === '', 'non-letter');
});
</script>
</body>
</html>
