<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text N-gram Analyzer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
  h1 { text-align: center; margin-bottom: 24px; color: #fff; }
  h2 { margin-bottom: 12px; color: #ccc; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }

  .drop-zone {
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #888;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 24px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #7b68ee;
    background: rgba(123, 104, 238, 0.08);
  }
  .drop-zone input { display: none; }

  .files-section { margin-bottom: 24px; }
  .file-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .file-chip {
    display: flex; align-items: center; gap: 6px;
    background: #2a2a4a; border: 1px solid #3a3a5a;
    border-radius: 8px; padding: 6px 12px; font-size: 0.9rem;
    cursor: pointer; user-select: none; transition: background 0.15s, border-color 0.15s;
  }
  .file-chip:hover { background: #333360; }
  .file-chip.active { border-color: #7b68ee; background: #2e2e5a; }
  .file-chip input { accent-color: #7b68ee; cursor: pointer; }
  .file-chip .remove-btn {
    background: none; border: none; color: #888; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0 2px; margin-left: 4px;
  }
  .file-chip .remove-btn:hover { color: #e55; }

  .spreadsheet-wrapper {
    background: #22223a;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: auto;
    max-height: 80vh;
  }

  .spreadsheet { width: 100%; border-collapse: collapse; border-spacing: 0; }
  .spreadsheet th, .spreadsheet td { padding: 4px 8px; font-size: 0.85rem; white-space: nowrap; }
  .spreadsheet thead th {
    position: sticky; top: 0; z-index: 2;
    background: #2a2a4a; color: #ccc; text-align: center;
    border-bottom: 1px solid #444;
  }
  .spreadsheet td { border-bottom: 1px solid #2a2a3a; }
  .spreadsheet tbody tr:hover td { background: rgba(123, 104, 238, 0.06); }
  .col-rank { color: #666; text-align: right; width: 30px; }
  .col-ngram { font-family: 'SF Mono', 'Fira Code', monospace; }
  .col-count { text-align: right; color: #999; width: 50px; }
  .col-bar { width: 80px; }
  .bar {
    height: 12px;
    background: linear-gradient(90deg, #7b68ee, #5a4fcf);
    border-radius: 2px;
  }
  .col-sep { width: 2px; padding: 0; background: #333; }
  .empty-state { color: #666; text-align: center; padding: 40px 20px; font-style: italic; }

  .mode-section { margin-bottom: 24px; }
  .mode-section label { color: #aaa; font-size: 0.9rem; margin-right: 12px; }
  .mode-top-row { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
  .mode-buttons { display: flex; gap: 0; }
  .mode-btn {
    background: #2a2a4a; border: 1px solid #3a3a5a; color: #ccc;
    padding: 7px 16px; font-size: 0.9rem; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .mode-btn:first-child { border-radius: 8px 0 0 8px; }
  .mode-btn:last-child { border-radius: 0 8px 8px 0; }
  .mode-btn:not(:first-child) { border-left: none; }
  .mode-btn.active { background: #7b68ee; border-color: #7b68ee; color: #fff; }
  .mode-btn:hover:not(.active) { background: #333360; }
  .mode-desc { color: #777; font-size: 0.85rem; margin-top: 8px; }
</style>
</head>
<body>

<h1>Text N-gram Analyzer</h1>

<div class="drop-zone" id="dropZone">
  <p>Drop text files here or click to browse</p>
  <input type="file" id="fileInput" multiple accept=".txt,.text,.csv,.log,.md,.json,.xml,.html,.js,.py,.rs,.c,.h,.java,.rb,.go,.ts,.css,.toml,.yaml,.yml">
  <div class="files-section" id="filesSection" style="display:none;">
    <h2>Loaded Files</h2>
    <div class="file-list" id="fileList"></div>
  </div>
</div>

<div class="mode-section">
  <div class="mode-top-row">
  <label>Tokenize by:</label>
  <div class="mode-buttons" id="modeButtons">
    <button class="mode-btn active" data-mode="word-lower">Words (lowercase)</button>
    <button class="mode-btn" data-mode="word-case">Words (preserve case)</button>
    <button class="mode-btn" data-mode="word-class">Word class</button>
    <button class="mode-btn" data-mode="word-len">Word length</button>
    <button class="mode-btn" data-mode="word-pop">Word (popularity)</button>
    <button class="mode-btn" data-mode="symbols">Symbols</button>
    <button class="mode-btn" data-mode="char1">1 Character</button>
    <button class="mode-btn" data-mode="char2">2 Characters</button>
    <button class="mode-btn" data-mode="char3">3 Characters</button>
    <button class="mode-btn" data-mode="byte">Bytes</button>
  </div>
  </div>
  <div class="mode-desc" id="modeDesc"></div>
</div>

<div class="spreadsheet-wrapper">
  <div id="spreadsheetContent"><div class="empty-state">Load text files to see n-grams</div></div>
</div>

<script>
const files = []; // { name, text, bytes, active }
let tokenMode = 'word-lower';
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const filesSection = document.getElementById('filesSection');
const fileList = document.getElementById('fileList');

const modeDescriptions = {
  'word-lower': 'Each word lowercased. "The Cat" becomes "the cat".',
  'word-case': 'Each word with original casing preserved. "The Cat" stays "The Cat".',
  'word-class': 'Each word replaced by its class: "a-z" (letters), "0-9" (digits), or "a-z0-9" (mixed).',
  'word-len': 'Each word replaced by its character length. "hello" becomes "5".',
  'word-pop': 'Each word replaced by its frequency tier: \u25A0 (most frequent 33%), \u2591 (middle 33%), \u25A1 (least frequent 33%).',
  'symbols': 'Consecutive runs of punctuation/symbols. Words and whitespace are ignored.',
  'char1': 'Every single character is a token.',
  'char2': 'Characters grouped in pairs, stepping by 2. "abcd" becomes "ab", "cd".',
  'char3': 'Characters grouped in triples, stepping by 3. "abcdef" becomes "abc", "def".',
  'byte': 'Raw bytes shown as hex values with ASCII preview.',
};
const modeDesc = document.getElementById('modeDesc');

function updateModeDesc() {
  modeDesc.textContent = modeDescriptions[tokenMode] || '';
}

document.getElementById('modeButtons').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tokenMode = btn.dataset.mode;
  updateModeDesc();
  updateNgrams();
});

updateModeDesc();

dropZone.addEventListener('click', e => {
  if (e.target.closest('.file-chip')) return;
  fileInput.click();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => { handleFiles(e.target.files); e.target.value = ''; });

function handleFiles(fileObjs) {
  for (const f of fileObjs) {
    const textReader = new FileReader();
    const byteReader = new FileReader();
    const entry = { name: f.name, text: '', bytes: null, active: true };
    let loaded = 0;
    function onPart() { if (++loaded === 2) { files.push(entry); renderFileList(); updateNgrams(); } }
    textReader.onload = e => { entry.text = e.target.result; onPart(); };
    byteReader.onload = e => { entry.bytes = new Uint8Array(e.target.result); onPart(); };
    textReader.readAsText(f);
    byteReader.readAsArrayBuffer(f);
  }
}

function renderFileList() {
  filesSection.style.display = files.length ? '' : 'none';
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'file-chip' + (f.active ? ' active' : '');
    chip.innerHTML = `<input type="checkbox" ${f.active ? 'checked' : ''}><span>${f.name}</span><button class="remove-btn" title="Remove">&times;</button>`;
    const checkbox = chip.querySelector('input');
    chip.addEventListener('click', e => {
      if (e.target.closest('.remove-btn')) return;
      if (e.target !== checkbox) {
        checkbox.checked = !checkbox.checked;
      }
      f.active = checkbox.checked;
      chip.classList.toggle('active', f.active);
      updateNgrams();
    });
    chip.querySelector('.remove-btn').addEventListener('click', e => {
      e.stopPropagation();
      files.splice(i, 1);
      renderFileList();
      updateNgrams();
    });
    fileList.appendChild(chip);
  });
}

function tokenizeWords(text, lowercase) {
  const words = text.match(/[a-zA-Z0-9'-]+/g) || [];
  return lowercase ? words.map(w => w.toLowerCase()) : words;
}

function tokenizeChars(text) {
  return [...text];
}

function tokenizeBytes(bytes) {
  return Array.from(bytes);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatGram(items, mode) {
  if (mode === 'word-lower' || mode === 'word-case' || mode === 'word-class' || mode === 'word-len' || mode === 'word-pop' || mode === 'symbols') return escapeHtml(items.join(' '));
  if (mode === 'char1' || mode === 'char2' || mode === 'char3') {
    function fmtChar(ch) {
      const cp = ch.codePointAt(0);
      if (cp === 0x20) return '<span title="U+0020 SPACE" style="color:#888">\u2423</span>';
      if (cp === 0x0A) return '<span title="U+000A LF" style="color:#888">\\n</span>';
      if (cp === 0x0D) return '<span title="U+000D CR" style="color:#888">\\r</span>';
      if (cp === 0x09) return '<span title="U+0009 TAB" style="color:#888">\\t</span>';
      if (cp < 0x20 || (cp >= 0x7F && cp <= 0x9F)) return '<span title="U+' + cp.toString(16).padStart(4, '0').toUpperCase() + '" style="color:#888">\u2022</span>';
      return escapeHtml(ch);
    }
    return items.map(token => [...token].map(fmtChar).join('')).join(' ');
  }
  // byte mode: hex codes followed by ASCII preview
  const hex = items.map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
  const ascii = items.map(b => (b >= 0x21 && b <= 0x7E) ? escapeHtml(String.fromCharCode(b)) : '\u00B7').join('');
  return hex + '  <span style="color:#888">' + ascii + '</span>';
}

function tokenizeWordClass(text) {
  const words = text.match(/[a-zA-Z0-9'-]+/g) || [];
  return words.map(w => {
    const hasLetters = /[a-zA-Z]/.test(w);
    const hasDigits = /[0-9]/.test(w);
    if (hasLetters && hasDigits) return 'a-z0-9';
    if (hasDigits) return '0-9';
    return 'a-z';
  });
}

function tokenizeWordLength(text) {
  const words = text.match(/[a-zA-Z0-9'-]+/g) || [];
  return words.map(w => String(w.length));
}

function tokenizeWordPopularity() {
  // Count word frequencies across all active files
  const freq = new Map();
  for (const f of files) {
    if (!f.active) continue;
    const words = tokenizeWords(f.text, true);
    for (const w of words) {
      freq.set(w, (freq.get(w) || 0) + 1);
    }
  }
  // Rank unique words by frequency descending
  const ranked = [...freq.entries()].sort((a, b) => b[1] - a[1]);
  const total = ranked.length;
  const tier = new Map();
  ranked.forEach(([word], i) => {
    if (i < total / 3) tier.set(word, '\u25A0');
    else if (i < total * 2 / 3) tier.set(word, '\u2591');
    else tier.set(word, '\u25A1');
  });
  // Return tokenized texts with popularity labels
  return (text) => {
    const words = tokenizeWords(text, true);
    return words.map(w => tier.get(w) || '\u25A1');
  };
}

function tokenizeSymbols(text) {
  // Consecutive runs of non-alphanumeric, non-whitespace, non-underscore characters
  return text.match(/[^\sa-zA-Z0-9_]+/g) || [];
}

function isWordMode() { return tokenMode === 'word-lower' || tokenMode === 'word-case' || tokenMode === 'word-class' || tokenMode === 'word-len' || tokenMode === 'word-pop' || tokenMode === 'symbols'; }
function isCharMode() { return tokenMode === 'char1' || tokenMode === 'char2' || tokenMode === 'char3'; }

function tokenizeCharN(text, n) {
  const chars = [...text];
  const tokens = [];
  for (let i = 0; i + n - 1 < chars.length; i += n) {
    tokens.push(chars.slice(i, i + n).join(''));
  }
  return tokens;
}

let _popTokenizer = null;

function getTokens(f) {
  if (tokenMode === 'word-lower') return tokenizeWords(f.text, true);
  if (tokenMode === 'word-case') return tokenizeWords(f.text, false);
  if (tokenMode === 'word-class') return tokenizeWordClass(f.text);
  if (tokenMode === 'word-len') return tokenizeWordLength(f.text);
  if (tokenMode === 'word-pop') return _popTokenizer(f.text);
  if (tokenMode === 'symbols') return tokenizeSymbols(f.text);
  if (tokenMode === 'char1') return tokenizeChars(f.text);
  if (tokenMode === 'char2') return tokenizeCharN(f.text, 2);
  if (tokenMode === 'char3') return tokenizeCharN(f.text, 3);
  return tokenizeBytes(f.bytes);
}

function joinGram(items) {
  if (isWordMode()) return items.join(' ');
  if (isCharMode()) return items.join('\0');
  return items.join(',');
}

function sortEntries(entries) {
  return entries.sort((a, b) => {
    if (b[1] !== a[1]) return b[1] - a[1];
    if (tokenMode === 'byte') {
      const ab = a[0].split(',').map(Number);
      const bb = b[0].split(',').map(Number);
      for (let i = 0; i < Math.min(ab.length, bb.length); i++) {
        if (ab[i] !== bb[i]) return ab[i] - bb[i];
      }
      return ab.length - bb.length;
    }
    return a[0].localeCompare(b[0]);
  });
}

function computeSkipgrams(skip) {
  const counts = new Map();
  for (const f of files) {
    if (!f.active) continue;
    const tokens = getTokens(f);
    for (let i = 0; i + skip + 1 < tokens.length; i++) {
      const gram = joinGram([tokens[i], tokens[i + skip + 1]]);
      counts.set(gram, (counts.get(gram) || 0) + 1);
    }
  }
  return sortEntries([...counts.entries()])
    .slice(0, 200);
}

function computeTriSkipgrams() {
  const counts = new Map();
  for (const f of files) {
    if (!f.active) continue;
    const tokens = getTokens(f);
    for (let i = 0; i + 4 < tokens.length; i++) {
      const gram = joinGram([tokens[i], tokens[i + 2], tokens[i + 4]]);
      counts.set(gram, (counts.get(gram) || 0) + 1);
    }
  }
  return sortEntries([...counts.entries()])
    .slice(0, 200);
}

function computeNgrams(n) {
  const counts = new Map();
  for (const f of files) {
    if (!f.active) continue;
    const tokens = getTokens(f);
    for (let i = 0; i <= tokens.length - n; i++) {
      const gram = joinGram(tokens.slice(i, i + n));
      counts.set(gram, (counts.get(gram) || 0) + 1);
    }
  }
  return sortEntries([...counts.entries()])
    .slice(0, 200);
}

function parseGram(gram) {
  if (isWordMode()) return gram.split(' ');
  if (isCharMode()) return gram.split('\0');
  return gram.split(',').map(Number);
}

const WILDCARD = '<span style="color:#555">*</span>';

function formatDisplay(gram, skipPattern) {
  const items = parseGram(gram);
  if (skipPattern) {
    const sep = isWordMode() ? ' ' : (tokenMode === 'byte' ? ' ' : '');
    const parts = items.map(item => formatGram([item], tokenMode));
    let result = '';
    for (let j = 0; j < parts.length; j++) {
      if (j > 0) {
        const wildcards = Array(skipPattern[j - 1]).fill(WILDCARD).join(tokenMode === 'byte' ? ' ' : '');
        result += sep + wildcards + sep;
      }
      result += parts[j];
    }
    return result;
  }
  return formatGram(items, tokenMode);
}

function updateNgrams() {
  if (tokenMode === 'word-pop') _popTokenizer = tokenizeWordPopularity();
  const container = document.getElementById('spreadsheetContent');
  const columns = [
    { label: 'Unigrams', sub: 'a', data: computeNgrams(1), skip: null },
    { label: 'Bigrams', sub: 'ab', data: computeNgrams(2), skip: null },
    { label: 'Trigrams', sub: 'abc', data: computeNgrams(3), skip: null },
    { label: 'Skip-1', sub: 'a*b', data: computeSkipgrams(1), skip: [1] },
    { label: 'Skip-2', sub: 'a**b', data: computeSkipgrams(2), skip: [2] },
    { label: 'Tri-skip', sub: 'a*b*c', data: computeTriSkipgrams(), skip: [1, 1] },
  ];

  const maxRows = Math.max(...columns.map(c => c.data.length));
  if (maxRows === 0) {
    container.innerHTML = '<div class="empty-state">No data — load or enable files</div>';
    return;
  }

  let html = '<table class="spreadsheet"><thead><tr>';
  html += '<th class="col-rank">#</th><th class="col-sep"></th>';
  columns.forEach((col, ci) => {
    if (ci > 0) html += '<th class="col-sep"></th>';
    html += `<th>${col.label} <span style="color:#888;font-weight:normal;font-size:0.8rem">(${col.sub})</span></th>`;
    html += '<th class="col-count">n</th>';
  });
  html += '</tr></thead><tbody>';

  for (let row = 0; row < maxRows; row++) {
    html += `<tr><td class="col-rank">${row + 1}</td><td class="col-sep"></td>`;
    columns.forEach((col, ci) => {
      if (ci > 0) html += '<td class="col-sep"></td>';
      if (row < col.data.length) {
        const [gram, count] = col.data[row];
        const maxCount = col.data[0][1];
        const pct = maxCount > 1 ? (Math.log(count) / Math.log(maxCount) * 100).toFixed(1) : '100';
        const display = formatDisplay(gram, col.skip);
        html += `<td class="col-ngram">${display}</td>`;
        html += `<td class="col-count">${count}</td>`;
      } else {
        html += '<td></td><td></td>';
      }
    });
    html += '</tr>';
  }

  html += '</tbody></table>';
  container.innerHTML = html;
}

// Load this HTML file itself on startup
function addTextEntry(name, text) {
  const encoder = new TextEncoder();
  const bytes = encoder.encode(text);
  files.push({ name, text, bytes: new Uint8Array(bytes), active: true });
  renderFileList();
  updateNgrams();
}

const selfHtml = document.documentElement.outerHTML;
addTextEntry('this file.html', selfHtml);
</script>
</body>
</html>
