<!DOCTYPE html>

<title>Colosseum Dash</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1c1611;
    display: flex; align-items: center; justify-content: center;

  }

<body>
<canvas id="game"></canvas>

<script id="shared-code">
"use strict";
// ============================================================================
// Colosseum Dash engine — pure JS, no DOM, deterministic (no Math.random).
// Classic Boulder Dash cell simulation: single top-to-bottom left-to-right
// scan per tick, falling/rolling objects, wall-following beasts, 3x3
// explosions. Theme: gladiator digs arena sand for gold; lions = fireflies
// (turn left, explode to space), elephants = butterflies (turn right,
// explode to gold).
// ============================================================================

const T = {
  EMPTY: 0, SAND: 1, STEEL: 2, BRICK: 3, STONE: 4, GOLD: 5,
  PLAYER: 6, LION: 7, ELEPHANT: 8, EXIT: 9, BOOM: 10,
};

const CHAR2TYPE = {
  " ": T.EMPTY, ".": T.SAND, "#": T.STEEL, "+": T.BRICK, "o": T.STONE,
  "$": T.GOLD, "@": T.PLAYER, "L": T.LION, "E": T.ELEPHANT, "X": T.EXIT,
};
const TYPE2CHAR = {};
for (const [c, t] of Object.entries(CHAR2TYPE)) TYPE2CHAR[t] = c;
TYPE2CHAR[T.BOOM] = "!";

// Directions: 0=up 1=right 2=down 3=left
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3, NONE: -1 };

const TICK_MS = 150;
const BOOM_TICKS = 3;

// Objects a stone/gold will roll off when resting on them.
function isRounded(t) { return t === T.STONE || t === T.GOLD || t === T.BRICK; }

const LEVELS = [
  {
    name: "Training Grounds", numeral: "I", quota: 10, time: 100,
    map: [
      "##########################",
      "#......o........o......$.#",
      "#..$.....................#",
      "#....++++++......o....o..#",
      "#....+$..o+..............#",
      "#....+.o..+....$....++++.#",
      "#....+.++++.........+$$..#",
      "#..o................++++.#",
      "#..........o$............#",
      "#...$....................#",
      "#.@..........o...o.....$.#",
      "#.....$..o...........o...#",
      "#..o.......$....$........#",
      "#........................#",
      "###################X######",
    ],
  },
  {
    name: "The Lions' Den", numeral: "II", quota: 12, time: 120,
    map: [
      "##########################",
      "#.@...................$$.#",
      "#...o.....o......o.......#",
      "#..++++++++....++++++++..#",
      "#..+  L   +....+  L   +..#",
      "#..+ .... +....+ .... +..#",
      "#..+ .$$. +....+ .$$. +..#",
      "#..+ .... +....+ .... +..#",
      "#..+      +....+      +..#",
      "#..++++.+++....+++.++++..#",
      "#.....o......$..o........#",
      "#.$....o...$......o....$.#",
      "#....o.......o......o..$.#",
      "#.$..................o.$.#",
      "#############X############",
    ],
  },
  {
    name: "Elephant March", numeral: "III", quota: 18, time: 130,
    map: [
      "##########################",
      "#.@......o.......o.......#",
      "#...$..................$.#",
      "#.....+++ +++++++ +++....#",
      "#.....+  E          +....#",
      "#.....+ ..o$...$o.. +....#",
      "#.....+ ........... +....#",
      "#.....+ ...$...$... +....#",
      "#.....+ ........... +....#",
      "#.....+         E   +....#",
      "#.....+++++++++++++++....#",
      "#..$...................$.#",
      "#......o....$....o......$#",
      "#...$.................$..#",
      "#############X############",
    ],
  },
  {
    name: "The Emperor's Games", numeral: "IV", quota: 15, time: 90,
    map: [
      "##########################",
      "#.@...o....o.....o....o.$#",
      "#........................#",
      "#.++++++++....++++++++++.#",
      "#.+  L   +....+$.o$..o.+.#",
      "#.+ .$$. +....+.o$..$..+.#",
      "#.+      +....+++++.++++.#",
      "#.++++.+++......o........#",
      "#....$.....o........o..$.#",
      "#....o......++++ +++++++.#",
      "#...........+  E       +.#",
      "#.$...o.o...+          +.#",
      "#...o...$...++++++++++++.#",
      "#.$....o.................#",
      "#############X############",
    ],
  },
];

function makeGame(level, levelIndex) {
  const rows = level.map;
  const h = rows.length;
  const w = rows[0].length;
  for (let y = 0; y < h; y++) {
    if (rows[y].length !== w) {
      throw new Error(`ragged map row ${y}: len ${rows[y].length}, expected ${w}`);
    }
  }
  const n = w * h;
  const g = {
    w, h, level, levelIndex: levelIndex ?? -1,
    type: new Uint8Array(n),
    falling: new Uint8Array(n),
    dir: new Uint8Array(n),
    boomStage: new Uint8Array(n),
    boomInto: new Uint8Array(n),
    scanned: new Uint8Array(n),
    px: -1, py: -1, exitX: -1, exitY: -1, exitOpen: false,
    collected: 0, quota: level.quota, timeLimit: level.time,
    ticks: 0, state: "playing", cause: null,
    moves: [], events: [],
  };
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const c = rows[y][x];
      const t = CHAR2TYPE[c];
      if (t === undefined) throw new Error(`bad map char '${c}' at ${x},${y}`);
      const i = y * w + x;
      g.type[i] = t;
      if (t === T.PLAYER) { g.px = x; g.py = y; }
      if (t === T.EXIT) { g.exitX = x; g.exitY = y; }
      if (t === T.LION) g.dir[i] = DIR.LEFT;
      if (t === T.ELEPHANT) g.dir[i] = DIR.RIGHT;
    }
  }
  if (g.px < 0) throw new Error("map has no player");
  return g;
}

function createGame(levelIndex) {
  return makeGame(LEVELS[levelIndex], levelIndex);
}

function timeLeft(g) {
  return Math.max(0, g.timeLimit - Math.floor(g.ticks * TICK_MS / 1000));
}

function explode(g, cx, cy, into, cause) {
  g.events.push(into === T.GOLD ? "goldboom" : "boom");
  let killed = false;
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const x = cx + dx, y = cy + dy;
      if (x < 0 || y < 0 || x >= g.w || y >= g.h) continue;
      const i = y * g.w + x;
      const t = g.type[i];
      if (t === T.STEEL || t === T.EXIT) continue;
      if (t === T.PLAYER) killed = true;
      g.type[i] = T.BOOM;
      g.boomStage[i] = BOOM_TICKS;
      g.boomInto[i] = into;
      g.falling[i] = 0;
      g.scanned[i] = 1;
    }
  }
  if (killed) {
    g.state = "dead";
    g.cause = cause || "crushed";
    g.events.push("death");
  }
}

function moveCell(g, from, to, type) {
  g.type[to] = type;
  g.dir[to] = g.dir[from];
  g.falling[to] = g.falling[from];
  g.type[from] = T.EMPTY;
  g.falling[from] = 0;
  g.scanned[to] = 1;
  g.moves.push({
    fx: from % g.w, fy: (from / g.w) | 0,
    tx: to % g.w, ty: (to / g.w) | 0, type,
  });
}

function movePlayer(g, d) {
  const nx = g.px + DX[d], ny = g.py + DY[d];
  if (nx < 0 || ny < 0 || nx >= g.w || ny >= g.h) return;
  const from = g.py * g.w + g.px;
  const to = ny * g.w + nx;
  const t = g.type[to];
  if (t === T.EMPTY || t === T.SAND || t === T.GOLD) {
    if (t === T.SAND) g.events.push("dig");
    if (t === T.GOLD) {
      g.collected++;
      g.events.push("gold");
      if (!g.exitOpen && g.collected >= g.quota) {
        g.exitOpen = true;
        g.events.push("exit-open");
      }
    }
    g.dir[from] = d;
    moveCell(g, from, to, T.PLAYER);
    g.px = nx; g.py = ny;
  } else if (t === T.STONE && (d === DIR.LEFT || d === DIR.RIGHT) && !g.falling[to]) {
    const beyond = to + (d === DIR.RIGHT ? 1 : -1);
    if (g.type[beyond] === T.EMPTY) {
      g.moves.push({ fx: nx, fy: ny, tx: nx + DX[d], ty: ny, type: T.STONE });
      g.type[beyond] = T.STONE;
      g.falling[beyond] = 0;
      g.scanned[beyond] = 1;
      g.type[to] = T.EMPTY;
      g.dir[from] = d;
      moveCell(g, from, to, T.PLAYER);
      g.px = nx; g.py = ny;
      g.events.push("push");
    }
  } else if (t === T.EXIT && g.exitOpen) {
    g.moves.push({ fx: g.px, fy: g.py, tx: nx, ty: ny, type: T.PLAYER });
    g.type[from] = T.EMPTY;
    g.px = nx; g.py = ny;
    g.state = "won";
    g.events.push("win");
  }
}

function updateFalling(g, x, y, i) {
  const below = i + g.w;
  const bt = g.type[below];
  if (bt === T.EMPTY) {
    g.falling[i] = 1;
    moveCell(g, i, below, g.type[i]);
    return;
  }
  if (g.falling[i]) {
    if (bt === T.PLAYER) { explode(g, x, y + 1, T.EMPTY, "crushed"); return; }
    if (bt === T.LION) { explode(g, x, y + 1, T.EMPTY, null); return; }
    if (bt === T.ELEPHANT) { explode(g, x, y + 1, T.GOLD, null); return; }
  }
  if (isRounded(bt)) {
    const li = i - 1, ri = i + 1;
    if (g.type[li] === T.EMPTY && g.type[li + g.w] === T.EMPTY) {
      g.falling[i] = 1;
      moveCell(g, i, li, g.type[i]);
      return;
    }
    if (g.type[ri] === T.EMPTY && g.type[ri + g.w] === T.EMPTY) {
      g.falling[i] = 1;
      moveCell(g, i, ri, g.type[i]);
      return;
    }
  }
  if (g.falling[i]) {
    g.falling[i] = 0;
    g.events.push("thud");
  }
}

function updateBeast(g, x, y, i) {
  const isLion = g.type[i] === T.LION;
  // Explode when touching the gladiator (4-neighborhood).
  for (let d = 0; d < 4; d++) {
    const nx = x + DX[d], ny = y + DY[d];
    if (nx < 0 || ny < 0 || nx >= g.w || ny >= g.h) continue;
    if (g.type[ny * g.w + nx] === T.PLAYER) {
      explode(g, x, y, isLion ? T.EMPTY : T.GOLD, "beast");
      return;
    }
  }
  const d = g.dir[i];
  // Lions hug the left wall (try left turn first); elephants the right.
  const first = isLion ? (d + 3) % 4 : (d + 1) % 4;
  const canGo = (dd) => {
    const nx = x + DX[dd], ny = y + DY[dd];
    if (nx < 0 || ny < 0 || nx >= g.w || ny >= g.h) return false;
    return g.type[ny * g.w + nx] === T.EMPTY;
  };
  if (canGo(first)) {
    g.dir[i] = first;
    moveCell(g, i, (y + DY[first]) * g.w + (x + DX[first]), g.type[i]);
  } else if (canGo(d)) {
    moveCell(g, i, (y + DY[d]) * g.w + (x + DX[d]), g.type[i]);
  } else {
    g.dir[i] = isLion ? (d + 1) % 4 : (d + 3) % 4;
  }
}

// One simulation step. inputDir: DIR.* or DIR.NONE. Returns the game.
// Keeps ticking explosions while state === "dead" so death animates.
function tick(g, inputDir = DIR.NONE) {
  if (g.state !== "playing" && g.state !== "dead") return g;
  g.moves = [];
  g.events = [];
  g.scanned.fill(0);
  if (g.state === "playing") {
    g.ticks++;
    if (timeLeft(g) <= 0) {
      explode(g, g.px, g.py, T.EMPTY, "time");
    } else if (inputDir >= 0) {
      movePlayer(g, inputDir);
    }
  }
  for (let y = 0; y < g.h; y++) {
    for (let x = 0; x < g.w; x++) {
      const i = y * g.w + x;
      if (g.scanned[i]) continue;
      const t = g.type[i];
      if (t === T.BOOM) {
        if (--g.boomStage[i] <= 0) {
          g.type[i] = g.boomInto[i];
          g.falling[i] = 0;
        }
      } else if (t === T.STONE || t === T.GOLD) {
        updateFalling(g, x, y, i);
      } else if (t === T.LION || t === T.ELEPHANT) {
        updateBeast(g, x, y, i);
      }
    }
  }
  return g;
}

function serialize(g) {
  const out = [];
  for (let y = 0; y < g.h; y++) {
    let row = "";
    for (let x = 0; x < g.w; x++) row += TYPE2CHAR[g.type[y * g.w + x]];
    out.push(row);
  }
  return out.join("\n");
}

// ============================================================================
// Input — held-direction stack plus a queue of press edges. The simulation
// samples input only once per TICK_MS, so presses that land between samples
// would vanish if we only looked at what is held now; the queue replays each
// press on its own tick. Capped so a long backlog can't rubber-band the
// player: past the cap the oldest press is dropped, keeping newest intent.
// ============================================================================

const PRESS_QUEUE_MAX = 3;

function createInput() {
  return { held: [], presses: [] };
}

// isRepeat marks an OS auto-repeat keydown. Normally ignored — the held
// stack already tracks the key — but when the initial keydown was never
// delivered (key already down as the window gained focus), the repeat
// re-registers the key so holding it moves the player again.
function inputPress(inp, d, isRepeat = false) {
  const i = inp.held.indexOf(d);
  if (isRepeat && i >= 0) return;
  if (i >= 0) inp.held.splice(i, 1);
  inp.held.push(d);
  inp.presses.push(d);
  if (inp.presses.length > PRESS_QUEUE_MAX) inp.presses.shift();
}

function inputRelease(inp, d) {
  const i = inp.held.indexOf(d);
  if (i >= 0) inp.held.splice(i, 1);
}

function inputClear(inp) {
  inp.held.length = 0;
  inp.presses.length = 0;
}

// Direction for the tick that is about to run: the oldest unreplayed press
// edge wins, then the most recently held key, else NONE.
function inputConsume(inp) {
  if (inp.presses.length) return inp.presses.shift();
  return inp.held.length ? inp.held[inp.held.length - 1] : DIR.NONE;
}

// ============================================================================
// Tests — run via `node test.mjs` (extracts this block).
// ============================================================================

const ColosseumTests = {
  fixture(rows, opts = {}) {
    return makeGame({ name: "fixture", numeral: "T", quota: opts.quota ?? 99, time: opts.time ?? 999, map: rows });
  },

  run() {
    const results = [];
    const test = (name, fn) => {
      try { fn(); results.push([name, null]); }
      catch (e) { results.push([name, e]); }
    };
    const assert = (cond, msg) => { if (!cond) throw new Error(msg || "assertion failed"); };
    const assertGrid = (g, rows, msg) => {
      const got = serialize(g);
      const want = rows.join("\n");
      if (got !== want) throw new Error(`${msg || "grid mismatch"}\nwant:\n${want}\ngot:\n${got}`);
    };
    const F = (rows, opts) => this.fixture(rows, opts);

    test("stone falls through empty and rests on sand", () => {
      const g = F([
        "#####",
        "# o #",
        "#   #",
        "#..@#",
        "#####",
      ]);
      tick(g);
      assertGrid(g, ["#####", "#   #", "# o #", "#..@#", "#####"], "after 1 tick");
      assert(g.falling[2 * 5 + 2] === 1, "stone marked falling");
      tick(g);
      assertGrid(g, ["#####", "#   #", "# o #", "#..@#", "#####"], "resting on sand");
      assert(g.falling[2 * 5 + 2] === 0, "stone no longer falling");
      assert(g.events.includes("thud"), "thud event on landing");
    });

    test("gold falls like a stone", () => {
      const g = F([
        "#####",
        "# $ #",
        "#   #",
        "#..@#",
        "#####",
      ]);
      tick(g);
      assert(serialize(g).split("\n")[2] === "# $ #", "gold fell one cell");
    });

    test("stone rolls off a rounded object", () => {
      const g = F([
        "#####",
        "# o #",
        "# o #",
        "#..@#",
        "#####",
      ]);
      tick(g); // top stone rolls left off the lower stone
      assertGrid(g, ["#####", "#o  #", "# o #", "#..@#", "#####"], "rolled left");
      tick(g); // and falls down the gap
      assertGrid(g, ["#####", "#   #", "#oo #", "#..@#", "#####"], "fell after roll");
      tick(g);
      assert(serialize(g).split("\n")[2] === "#oo #", "both settled side by side");
    });

    test("stone does not roll when sides blocked", () => {
      const g = F([
        "#####",
        "#+o+#",
        "#+o+#",
        "#..@#",
        "#####",
      ]);
      tick(g);
      assertGrid(g, ["#####", "#+o+#", "#+o+#", "#..@#", "#####"], "stack stays");
    });

    test("falling stone crushes lion into empty explosion", () => {
      const g = F([
        "#######",
        "#  o  #",
        "#     #",
        "#..L..#",
        "#.....#",
        "#..@..#",
        "#######",
      ]);
      tick(g); // stone falls to row 2, falling=1
      tick(g); // stone lands on lion -> explosion
      assert(serialize(g).includes("!"), "explosion cells present");
      for (let k = 0; k < BOOM_TICKS; k++) tick(g);
      const s = serialize(g).split("\n");
      assert(!serialize(g).includes("L"), "lion gone");
      assert(!serialize(g).includes("!"), "explosion cleared");
      assert(s[3] === "#.   .#", "explosion left empty space");
    });

    test("falling stone crushes elephant into gold", () => {
      const g = F([
        "#######",
        "#  o  #",
        "#     #",
        "#..E..#",
        "#.....#",
        "#..@..#",
        "#######",
      ]);
      tick(g);
      tick(g);
      for (let k = 0; k < BOOM_TICKS; k++) tick(g);
      const s = serialize(g);
      assert(!s.includes("E"), "elephant gone");
      assert((s.match(/\$/g) || []).length >= 6, `gold rains from elephant, got:\n${s}`);
    });

    test("falling stone kills the gladiator", () => {
      const g = F([
        "#####",
        "# o #",
        "#   #",
        "# @ #",
        "#####",
      ]);
      tick(g);
      tick(g);
      assert(g.state === "dead", "player dead");
      assert(g.cause === "crushed", "cause is crushed");
    });

    test("stationary stone on head does not kill", () => {
      const g = F([
        "#####",
        "# o #",
        "# @ #",
        "# . #",
        "#####",
      ]);
      tick(g);
      assert(g.state === "playing", "stone never fell, player alive");
    });

    test("lion follows left-hand wall around a ring", () => {
      const g = F([
        "#######",
        "#L    #",
        "# ### #",
        "#     #",
        "#######",
        "#.@...#",
        "#######",
      ]);
      // Ring corridor is the empty cells; lion should loop and revisit start.
      const start = serialize(g).indexOf("L");
      const positions = new Set();
      let returned = false;
      for (let k = 0; k < 40; k++) {
        tick(g);
        const p = serialize(g).indexOf("L");
        positions.add(p);
        if (k > 2 && p === start) { returned = true; break; }
      }
      assert(returned, "lion returned to start (loops)");
      assert(positions.size >= 6, `lion visited ${positions.size} cells`);
    });

    test("lion adjacent to gladiator explodes and kills", () => {
      const g = F([
        "#####",
        "#@L #",
        "#...#",
        "#...#",
        "#####",
      ]);
      tick(g);
      assert(g.state === "dead", "player dead from lion");
      assert(g.cause === "beast", "cause is beast");
    });

    test("collecting quota opens exit; entering wins", () => {
      const g = F([
        "#####",
        "#@$X#",
        "#####",
      ], { quota: 1 });
      tick(g, DIR.RIGHT);
      assert(g.collected === 1, "gold collected");
      assert(g.exitOpen, "exit open at quota");
      assert(g.events.includes("exit-open"), "exit-open event");
      tick(g, DIR.RIGHT);
      assert(g.state === "won", "entered exit and won");
    });

    test("closed exit blocks the gladiator", () => {
      const g = F([
        "#####",
        "#@X$#",
        "#####",
      ], { quota: 1 });
      tick(g, DIR.RIGHT);
      assert(g.px === 1 && g.state === "playing", "blocked by closed exit");
    });

    test("push stone into empty; refuse when blocked", () => {
      const g = F([
        "######",
        "#@o .#",
        "######",
      ]);
      tick(g, DIR.RIGHT);
      assert(serialize(g).split("\n")[1] === "# @o.#", "stone pushed right");
      const g2 = F([
        "#####",
        "#@o##",
        "#####",
      ]);
      tick(g2, DIR.RIGHT);
      assert(g2.px === 1, "push refused when blocked");
    });

    test("timer runs out kills player", () => {
      const g = F([
        "####",
        "#@X#",
        "####",
      ], { time: 1 });
      const need = Math.ceil(1000 / TICK_MS) + 1;
      for (let k = 0; k < need + BOOM_TICKS + 1; k++) tick(g);
      assert(g.state === "dead" && g.cause === "time", "died from timeout");
    });

    test("input: a tap released before the next tick still moves once", () => {
      const inp = createInput();
      inputPress(inp, DIR.RIGHT);
      inputRelease(inp, DIR.RIGHT); // full tap inside one tick window
      assert(inputConsume(inp) === DIR.RIGHT, "buffered tap consumed");
      assert(inputConsume(inp) === DIR.NONE, "tap consumed only once");
    });

    test("input: held key moves every tick; most recent press wins", () => {
      const inp = createInput();
      inputPress(inp, DIR.RIGHT);
      assert(inputConsume(inp) === DIR.RIGHT, "first tick");
      assert(inputConsume(inp) === DIR.RIGHT, "still held on later ticks");
      inputPress(inp, DIR.UP);
      assert(inputConsume(inp) === DIR.UP, "newer press wins");
      assert(inputConsume(inp) === DIR.UP, "newer hold persists");
      inputRelease(inp, DIR.UP);
      assert(inputConsume(inp) === DIR.RIGHT, "falls back to older held key");
      inputRelease(inp, DIR.RIGHT);
      assert(inputConsume(inp) === DIR.NONE, "nothing held");
    });

    test("input: two taps inside one tick window give two moves", () => {
      const inp = createInput();
      inputPress(inp, DIR.UP); inputRelease(inp, DIR.UP);
      inputPress(inp, DIR.UP); inputRelease(inp, DIR.UP);
      assert(inputConsume(inp) === DIR.UP, "first tap replayed");
      assert(inputConsume(inp) === DIR.UP, "second tap replayed");
      assert(inputConsume(inp) === DIR.NONE, "no phantom third move");
    });

    test("input: alternating quick taps replay in press order", () => {
      const inp = createInput();
      inputPress(inp, DIR.LEFT); inputRelease(inp, DIR.LEFT);
      inputPress(inp, DIR.RIGHT); inputRelease(inp, DIR.RIGHT);
      assert(inputConsume(inp) === DIR.LEFT, "first press first");
      assert(inputConsume(inp) === DIR.RIGHT, "second press second");
      assert(inputConsume(inp) === DIR.NONE, "queue drained");
    });

    test("input: OS auto-repeat of a tracked key adds no extra moves", () => {
      const inp = createInput();
      inputPress(inp, DIR.RIGHT);
      assert(inputConsume(inp) === DIR.RIGHT, "initial press");
      inputPress(inp, DIR.RIGHT, true);
      inputPress(inp, DIR.RIGHT, true);
      inputRelease(inp, DIR.RIGHT);
      assert(inputConsume(inp) === DIR.NONE, "repeats queued nothing");
    });

    test("input: auto-repeat heals a missed initial keydown", () => {
      const inp = createInput();
      inputPress(inp, DIR.LEFT, true); // browser only delivered repeats
      assert(inputConsume(inp) === DIR.LEFT, "moves despite missed keydown");
      assert(inputConsume(inp) === DIR.LEFT, "now tracked as held");
      inputRelease(inp, DIR.LEFT);
      assert(inputConsume(inp) === DIR.NONE, "released cleanly");
    });

    test("input: press backlog is capped at 3, newest kept", () => {
      const inp = createInput();
      for (const d of [DIR.UP, DIR.RIGHT, DIR.DOWN, DIR.LEFT, DIR.UP]) {
        inputPress(inp, d); inputRelease(inp, d);
      }
      assert(inputConsume(inp) === DIR.DOWN, "oldest overflow dropped");
      assert(inputConsume(inp) === DIR.LEFT, "order preserved");
      assert(inputConsume(inp) === DIR.UP, "newest kept");
      assert(inputConsume(inp) === DIR.NONE, "then empty");
    });

    test("input: clear drops held keys and buffered taps", () => {
      const inp = createInput();
      inputPress(inp, DIR.LEFT);
      inputClear(inp);
      assert(inputConsume(inp) === DIR.NONE, "cleared on blur");
    });

    test("deterministic: identical input scripts give identical states", () => {
      const script = [];
      const dirs = [DIR.DOWN, DIR.RIGHT, DIR.RIGHT, DIR.DOWN, DIR.LEFT, DIR.UP];
      for (let k = 0; k < 300; k++) script.push(dirs[k % dirs.length]);
      const runOnce = () => {
        const g = createGame(0);
        for (const d of script) tick(g, d);
        return serialize(g) + `|${g.collected}|${g.state}`;
      };
      assert(runOnce() === runOnce(), "two runs identical");
    });

    test("all shipped levels are valid and winnable on paper", () => {
      for (let li = 0; li < LEVELS.length; li++) {
        const g = createGame(li); // throws on ragged rows / bad chars
        if (g.exitX < 0) throw new Error(`level ${li} has no exit`);
        let gold = 0, elephants = 0;
        for (let i = 0; i < g.w * g.h; i++) {
          if (g.type[i] === T.GOLD) gold++;
          if (g.type[i] === T.ELEPHANT) elephants++;
        }
        const potential = gold + elephants * 9;
        if (potential < LEVELS[li].quota) {
          throw new Error(`level ${li} quota ${LEVELS[li].quota} > potential gold ${potential}`);
        }
      }
    });

    test("level 1 is winnable: scripted walkthrough reaches the exit", () => {
      const U = DIR.UP, R = DIR.RIGHT, D = DIR.DOWN, L = DIR.LEFT;
      const script = [
        U, R, R,                            // gold at (4,9)
        D, D, R, R,                         // gold at (6,11)
        D, R, R, R, R, R,                   // gold at (11,12)
        R, R, R, R, R,                      // gold at (16,12)
        R, R, R, U, U, R, R, R, R,          // gold at (23,10)
        U, R, U, U, U, L, L, L,             // pocket gold at (22,6) and (21,6)
        R, R, R, U, U, U, U, U, L,          // gold at (23,1)
        D, D, D, L, L, L, L, L, L, L, D, L, // gold at (15,5)
        D, D, D, L, L, L,                   // gold at (12,8) -> quota reached
        D, D, D, D, D,                      // descend clear of the stone at (13,10)
        R, R, R, R, R, R, R, D,             // walk to the portcullis
      ];
      const g = createGame(0);
      for (const d of script) {
        tick(g, d);
        if (g.state !== "playing") break;
      }
      assert(g.collected >= g.quota, `collected ${g.collected}/${g.quota}`);
      assert(g.state === "won", `expected won, got ${g.state} (${g.cause || "-"})`);
    });

    test("levels are stable: 300 idle ticks kill nobody", () => {
      for (let li = 0; li < LEVELS.length; li++) {
        const g = createGame(li);
        const beasts0 = serialize(g).split("").filter((c) => c === "L" || c === "E").length;
        for (let k = 0; k < 300; k++) tick(g);
        assert(g.state === "playing", `level ${li}: player died idle (${g.cause})`);
        const beasts1 = serialize(g).split("").filter((c) => c === "L" || c === "E").length;
        assert(beasts1 === beasts0, `level ${li}: beasts died without player action`);
      }
    });

    let ok = true;
    for (const [name, err] of results) {
      if (err) {
        ok = false;
        console.error(`FAIL  ${name}\n      ${err.message.split("\n").join("\n      ")}`);
      } else {
        console.log(`ok    ${name}`);
      }
    }
    console.log(ok ? `\n${results.length} tests passed` : `\nFAILURES`);
    return ok;
  },
};
</script>

<script>
"use strict";
// ============================================================================
// Presentation: canvas renderer, Colosseum stands with animated audience,
// procedural pixel-art sprites, WebAudio sfx, input and game flow.
// ============================================================================

(() => {
  const TILE = 24;
  const PF_TW = 26, PF_TH = 15;           // playfield in tiles (all levels)
  const PF_W = PF_TW * TILE, PF_H = PF_TH * TILE;
  const STAND = 84;                        // stands margin on all sides
  const HUD_H = 30;
  const CW = PF_W + STAND * 2;             // 792
  const CH = PF_H + STAND * 2 + HUD_H;     // 558
  const PF_X = STAND, PF_Y = STAND + HUD_H;

  const canvas = document.getElementById("game");
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext("2d");

  function fitCanvas() {
    const s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
    canvas.style.width = `${Math.floor(CW * s)}px`;
    canvas.style.height = `${Math.floor(CH * s)}px`;
  }
  window.addEventListener("resize", fitCanvas);
  fitCanvas();

  // ---- deterministic hash for per-cell texture variation ----
  function hash(x, y, salt = 0) {
    let h = (x * 374761393 + y * 668265263 + salt * 1442695041) | 0;
    h = (h ^ (h >> 13)) * 1274126177 | 0;
    return ((h ^ (h >> 16)) >>> 0) / 4294967296;
  }

  // ==========================================================================
  // Sprites — each drawn procedurally into an offscreen canvas, some with
  // multiple animation frames.
  // ==========================================================================
  function sprite(draw, frames = 1) {
    const cvs = [];
    for (let f = 0; f < frames; f++) {
      const c = document.createElement("canvas");
      c.width = TILE; c.height = TILE;
      const g = c.getContext("2d");
      draw(g, f);
      cvs.push(c);
    }
    return cvs;
  }
  function px(g, x, y, w, h, color) { g.fillStyle = color; g.fillRect(x, y, w, h); }

  const SPR = {};

  SPR.sand = sprite((g) => {
    px(g, 0, 0, TILE, TILE, "#c9a25e");
    for (let k = 0; k < 26; k++) {
      const x = Math.floor(hash(k, 7) * TILE), y = Math.floor(hash(3, k) * TILE);
      px(g, x, y, 2, 2, hash(k, k) < 0.5 ? "#b78d4c" : "#dcb772");
    }
    px(g, 0, 0, TILE, 2, "#d8b26c");
  });

  SPR.empty = sprite((g) => {
    px(g, 0, 0, TILE, TILE, "#6b5636");
    for (let k = 0; k < 10; k++) {
      const x = Math.floor(hash(k, 31) * TILE), y = Math.floor(hash(17, k) * TILE);
      px(g, x, y, 2, 1, "#61492e");
    }
  });

  SPR.steel = sprite((g) => {
    px(g, 0, 0, TILE, TILE, "#7d7668");
    px(g, 0, 0, TILE, 11, "#877f70");
    px(g, 0, 11, TILE, 2, "#5a5347");
    px(g, 0, 23, TILE, 1, "#5a5347");
    px(g, 11, 2, 2, 9, "#5a5347");
    px(g, 4, 13, 2, 10, "#5a5347");
    px(g, 18, 13, 2, 10, "#5a5347");
    px(g, 0, 0, TILE, 2, "#9a9181");
  });

  SPR.brick = sprite((g) => {
    px(g, 0, 0, TILE, TILE, "#b56a42");
    px(g, 0, 0, TILE, 1, "#cf8657");
    px(g, 0, 7, TILE, 2, "#7e4526");
    px(g, 0, 15, TILE, 2, "#7e4526");
    px(g, 0, 23, TILE, 1, "#7e4526");
    px(g, 8, 0, 2, 7, "#7e4526");
    px(g, 16, 9, 2, 6, "#7e4526");
    px(g, 6, 17, 2, 6, "#7e4526");
  });

  SPR.stone = sprite((g) => {
    // column drum seen from above: fluted disc
    px(g, 0, 0, TILE, TILE, "rgba(0,0,0,0)");
    g.fillStyle = "rgba(40,28,14,0.35)";
    g.beginPath(); g.ellipse(13, 14, 10, 9, 0, 0, 7); g.fill();
    g.fillStyle = "#cfc6b6";
    g.beginPath(); g.arc(12, 11, 10, 0, 7); g.fill();
    g.fillStyle = "#e6ded0";
    g.beginPath(); g.arc(10, 9, 7, 0, 7); g.fill();
    g.strokeStyle = "#a99f8d"; g.lineWidth = 1;
    for (let a = 0; a < 8; a++) {
      const ang = a * Math.PI / 4 + 0.3;
      g.beginPath();
      g.moveTo(12 + Math.cos(ang) * 4, 11 + Math.sin(ang) * 4);
      g.lineTo(12 + Math.cos(ang) * 9.5, 11 + Math.sin(ang) * 9.5);
      g.stroke();
    }
    g.strokeStyle = "#8e8371";
    g.beginPath(); g.arc(12, 11, 9.6, 0, 7); g.stroke();
    g.fillStyle = "#f4eee2";
    g.beginPath(); g.arc(9, 8, 2.4, 0, 7); g.fill();
  });

  SPR.gold = sprite((g, f) => {
    const coin = (x, y, r) => {
      g.fillStyle = "#8a5a12";
      g.beginPath(); g.arc(x + 1, y + 1, r, 0, 7); g.fill();
      g.fillStyle = "#f5c93c";
      g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
      g.fillStyle = "#ffe98a";
      g.beginPath(); g.arc(x - r * 0.3, y - r * 0.3, r * 0.45, 0, 7); g.fill();
      g.strokeStyle = "#c79a1e";
      g.beginPath(); g.arc(x, y, r * 0.7, 0, 7); g.stroke();
    };
    coin(8, 17, 5); coin(16, 17, 5); coin(12, 10, 6);
    // sparkle rotates through frames
    const sx = [5, 19, 12, 8][f], sy = [7, 9, 4, 14][f];
    px(g, sx - 1, sy - 4, 2, 8, "#ffffff");
    px(g, sx - 4, sy - 1, 8, 2, "#ffffff");
  }, 4);

  SPR.exitClosed = sprite((g) => {
    px(g, 0, 0, TILE, TILE, "#2a2118");
    g.fillStyle = "#6f675a";
    for (let x = 2; x < TILE; x += 5) px(g, x, 0, 2, TILE, "#6f675a");
    for (let y = 3; y < TILE; y += 6) px(g, 0, y, TILE, 2, "#7d7668");
    px(g, 0, 0, TILE, 2, "#9a9181");
  });

  SPR.exitOpen = sprite((g, f) => {
    px(g, 0, 0, TILE, TILE, f ? "#ffd54a" : "#b8860b");
    px(g, 3, 3, TILE - 6, TILE - 6, f ? "#fff3b0" : "#ffd54a");
    px(g, 0, 0, TILE, 3, "#6f675a");
    for (let x = 2; x < TILE; x += 5) px(g, x, 0, 2, 5, "#6f675a");
  }, 2);

  SPR.player = sprite((g, f) => {
    const legL = f === 0 ? 2 : 4, legR = f === 0 ? 4 : 2;
    // legs
    px(g, 8, 24 - legL, 3, legL, "#8a5a3a");
    px(g, 13, 24 - legR, 3, legR, "#8a5a3a");
    // tunic
    px(g, 6, 12, 12, 9, "#a32222");
    px(g, 6, 12, 12, 2, "#c33a3a");
    // belt
    px(g, 6, 17, 12, 2, "#e0b64c");
    // arms: shield (left), sword (right)
    px(g, 2, 12, 4, 7, "#3f6ea5");   // shield
    px(g, 3, 13, 2, 5, "#6f9cd0");
    px(g, 18, 9, 2, 9, "#c8c8c8");   // sword blade
    px(g, 17, 16, 4, 2, "#8a5a12");  // hilt
    // head + helmet with crest
    px(g, 8, 5, 8, 7, "#e0a878");
    px(g, 7, 3, 10, 4, "#b08d2a");
    px(g, 7, 3, 10, 1, "#d8b64c");
    px(g, 10, 0, 4, 4, "#c22");      // crest
    px(g, 9, 8, 2, 2, "#442");       // eyes
    px(g, 13, 8, 2, 2, "#442");
  }, 2);

  SPR.lion = sprite((g, f) => {
    // body
    px(g, 3, 11, 15, 8, "#c9913c");
    px(g, 3, 11, 15, 2, "#dba852");
    // legs
    const o = f ? 1 : 0;
    px(g, 4 + o, 19, 3, 4, "#b07c2e");
    px(g, 13 - o, 19, 3, 4, "#b07c2e");
    // tail with tuft
    px(g, 1, 9 + o, 2, 6, "#b07c2e");
    px(g, 0, 7 + o, 3, 3, "#7a4d16");
    // mane
    g.fillStyle = "#8a5514";
    g.beginPath(); g.arc(17, 11, 7, 0, 7); g.fill();
    // face
    g.fillStyle = "#dba852";
    g.beginPath(); g.arc(17, 11, 4.5, 0, 7); g.fill();
    px(g, 15, 9, 2, 2, "#301c05");
    px(g, 19, 9, 2, 2, "#301c05");
    px(g, 17, 12, 2, 2, "#5a3a0e");
    // ears
    px(g, 12, 4, 3, 3, "#8a5514");
    px(g, 19, 4, 3, 3, "#8a5514");
  }, 2);

  SPR.elephant = sprite((g, f) => {
    const o = f ? 1 : 0;
    // body
    px(g, 2, 8, 16, 11, "#8f959e");
    px(g, 2, 8, 16, 2, "#a6acb5");
    // legs
    px(g, 3 + o, 19, 4, 5, "#7c828b");
    px(g, 12 - o, 19, 4, 5, "#7c828b");
    // head
    px(g, 14, 5, 9, 10, "#8f959e");
    // ear
    g.fillStyle = "#767c85";
    g.beginPath(); g.arc(15, 10, 5, 0, 7); g.fill();
    // trunk
    px(g, 21, 12, 3, 8 + o, "#8f959e");
    px(g, 20, 18 + o, 3, 3, "#8f959e");
    // tusk
    px(g, 19, 14, 2, 4, "#f2ead6");
    // eye
    px(g, 19, 8, 2, 2, "#26262c");
  }, 2);

  SPR.boomA = sprite((g) => {
    g.fillStyle = "#ff9a2a";
    g.beginPath(); g.arc(12, 12, 11, 0, 7); g.fill();
    g.fillStyle = "#ffd54a";
    g.beginPath(); g.arc(12, 12, 8, 0, 7); g.fill();
    g.fillStyle = "#fff7d0";
    g.beginPath(); g.arc(12, 12, 4, 0, 7); g.fill();
  });
  SPR.boomB = sprite((g) => {
    g.strokeStyle = "#ff9a2a"; g.lineWidth = 3;
    g.beginPath(); g.arc(12, 12, 9, 0, 7); g.stroke();
    g.strokeStyle = "#b3541e"; g.lineWidth = 2;
    g.beginPath(); g.arc(12, 12, 11.2, 0, 7); g.stroke();
  });

  // ==========================================================================
  // Audience — spectators generated once, animated every frame.
  // ==========================================================================
  const TUNICS = ["#b8433a", "#3e6fa3", "#c2953a", "#5d8a48", "#8a5aa0",
                  "#c26f3a", "#4a8a86", "#a04a6a", "#7a7a4a", "#4a5aa0"];
  const SKINS = ["#e8b98a", "#c9955e", "#a06a3c", "#7c4c28"];
  const spectators = [];
  const WINE_STALL = { x: CW - 168, y: CH - 58 };
  (function buildAudience() {
    let id = 0;
    const add = (x, y, depth, axis = "x") => {
      const i = id++;
      if (hash(i, 7) < 0.12) return;   // empty seat: off for a bathroom break
      // keep the wine stall corner clear
      if (x > WINE_STALL.x - 12 && x < WINE_STALL.x + 64 && y > WINE_STALL.y - 14) return;
      spectators.push({
        x: x + (hash(i, 5) - 0.5) * 7,       // nobody sits exactly on the mark
        y: y + (hash(i, 6) - 0.5) * 4,
        depth,
        tunic: TUNICS[Math.floor(hash(i, 1) * TUNICS.length)],
        skin: SKINS[Math.floor(hash(i, 2) * SKINS.length)],
        phase: hash(i, 3) * Math.PI * 2,
        zeal: 0.5 + hash(i, 4),              // how eagerly they cheer
        walker: hash(i, 8) < 0.06,           // off to fetch wine
        axis,
        wspeed: 0.03 + hash(i, 9) * 0.04,
        wrange: 40 + hash(i, 10) * 70,
      });
    };
    // top stands: 3 tiers above playfield (leave gap for emperor box)
    for (let tier = 0; tier < 3; tier++) {
      const y = PF_Y - 16 - tier * 22;
      for (let x = PF_X - STAND + 14 + (tier % 2) * 7; x < PF_X + PF_W + STAND - 14; x += 14) {
        if (Math.abs(x - CW / 2) < 64 && tier < 2) continue; // emperor box
        add(x, y, tier);
      }
    }
    // bottom stands: 3 tiers
    for (let tier = 0; tier < 3; tier++) {
      const y = PF_Y + PF_H + 22 + tier * 22;
      for (let x = PF_X - STAND + 14 + (tier % 2) * 7; x < PF_X + PF_W + STAND - 14; x += 14) {
        add(x, y, tier);
      }
    }
    // side stands: 3 columns each
    for (let tier = 0; tier < 3; tier++) {
      for (let y = PF_Y + 18 + (tier % 2) * 8; y < PF_Y + PF_H - 6; y += 17) {
        add(PF_X - 16 - tier * 22, y, tier, "y");
        add(PF_X + PF_W + 16 + tier * 22, y, tier, "y");
      }
    }
  })();

  // marble column: base, fluted shaft, capital
  function drawColumn(x, yTop, h, w = 8) {
    px(ctx, x - w / 2 - 2, yTop, w + 4, 4, "#d6cfc0");           // capital
    px(ctx, x - w / 2 - 1, yTop + 3, w + 2, 2, "#b3ac9b");
    px(ctx, x - w / 2, yTop + 4, w, h - 8, "#e9e4d8");           // shaft
    px(ctx, x - w / 2 + 1, yTop + 4, 2, h - 8, "#f6f2e8");       // fluting
    px(ctx, x - 1, yTop + 4, 1, h - 8, "#d5cfc0");
    px(ctx, x + w / 2 - 2, yTop + 4, 2, h - 8, "#c6bfae");
    px(ctx, x - w / 2 - 2, yTop + h - 4, w + 4, 4, "#d6cfc0");   // base
    px(ctx, x - w / 2 - 1, yTop + h - 5, w + 2, 1, "#b3ac9b");
  }

  // slanted terracotta roof band: lit ridge, tile lines, eave shadow
  function drawRoofBand(x, y, w, h, vertical) {
    px(ctx, x, y, w, h, "#a34a30");
    if (vertical) {
      px(ctx, x, y, 3, h, "#c96a48");
      px(ctx, x + w - 2, y, 2, h, "#6f2f1e");
      for (let k = y + 4; k < y + h; k += 8) px(ctx, x + 2, k, w - 4, 1, "#8a3c28");
    } else {
      px(ctx, x, y, w, 3, "#c96a48");
      px(ctx, x, y + h - 2, w, 2, "#6f2f1e");
      for (let k = x + 4; k < x + w; k += 8) px(ctx, k, y + 2, 1, h - 4, "#8a3c28");
    }
  }

  function drawStandsBase() {
    // full backdrop
    px(ctx, 0, 0, CW, CH, "#2b241c");
    // tier steps (concentric rectangles)
    const tiers = [
      { pad: 0, c: "#4a4033" },
      { pad: 26, c: "#564a3a" },
      { pad: 52, c: "#635543" },
    ];
    for (const t of tiers) {
      px(ctx, t.pad, HUD_H + t.pad, CW - t.pad * 2, CH - HUD_H - t.pad * 2, t.c);
    }
    // portico roof running around the outer rim
    drawRoofBand(0, HUD_H, CW, 12, false);
    drawRoofBand(0, CH - 12, CW, 12, false);
    drawRoofBand(0, HUD_H + 12, 12, CH - HUD_H - 24, true);
    drawRoofBand(CW - 12, HUD_H + 12, 12, CH - HUD_H - 24, true);
    // marble colonnade supporting the portico
    for (let x = 30; x < CW - 20; x += 64) {
      if (Math.abs(x - CW / 2) < 84) continue;               // temple box zone
      drawColumn(x, HUD_H + 12, 22);
    }
    for (let x = 30; x < CW - 20; x += 64) drawColumn(x, CH - 34, 22);
    for (let y = HUD_H + 46; y < CH - 46; y += 64) {
      drawColumn(16, y, 22);
      drawColumn(CW - 16, y, 22);
    }
    // wine stall in the bottom stands (where the walkers are headed)
    const wsx = WINE_STALL.x, wsy = WINE_STALL.y;
    px(ctx, wsx, wsy + 4, 3, 26, "#6a4a2a");            // awning posts
    px(ctx, wsx + 49, wsy + 4, 3, 26, "#6a4a2a");
    px(ctx, wsx - 2, wsy - 4, 56, 8, "#a32a2a");        // striped awning
    for (let k = 4; k < 56; k += 10) px(ctx, wsx - 2 + k, wsy - 4, 5, 8, "#e0d6c2");
    // vendor behind the counter
    px(ctx, wsx + 22, wsy + 10, 9, 12, "#ece6da");
    ctx.fillStyle = "#c9955e";
    ctx.beginPath(); ctx.arc(wsx + 26.5, wsy + 7, 3.5, 0, 7); ctx.fill();
    px(ctx, wsx + 23, wsy + 2, 8, 3, "#3a2a1a");
    px(ctx, wsx, wsy + 22, 52, 12, "#6a4a2a");          // counter
    px(ctx, wsx, wsy + 22, 52, 3, "#8a6a3a");
    // amphorae of wine
    for (const ax of [wsx + 8, wsx + 42]) {
      ctx.fillStyle = "#b56a42";
      ctx.beginPath(); ctx.ellipse(ax, wsy + 18, 4, 6, 0, 0, 7); ctx.fill();
      px(ctx, ax - 2, wsy + 9, 4, 4, "#b56a42");
      px(ctx, ax - 3, wsy + 8, 6, 2, "#8a4a2a");
    }
    // arena wall ring just outside the playfield
    px(ctx, PF_X - 8, PF_Y - 8, PF_W + 16, PF_H + 16, "#8a8071");
    px(ctx, PF_X - 8, PF_Y - 8, PF_W + 16, 3, "#a39a89");
    px(ctx, PF_X - 4, PF_Y - 4, PF_W + 8, PF_H + 8, "#3a3128");
  }

  function drawAudience(t, cheer, thumb) {
    for (const s of spectators) {
      const excited = Math.min(1, cheer * s.zeal);
      const bob = Math.sin(crowdPhase * (0.8 + s.zeal * 0.3) + s.phase);
      let wx = s.x, wy = s.y + bob * (1 + excited * 2.5);
      let hasCup = false, walking = false;
      if (s.walker) {
        // pacing to the wine seller and back (triangle wave along the row)
        const u = (crowdPhase * s.wspeed + s.phase) % 2;
        const tri = u < 1 ? u : 2 - u;
        const off = (tri - 0.5) * s.wrange;
        if (s.axis === "x") wx += off; else wy = s.y + off;
        wy += Math.sin(crowdPhase * 6 + s.phase) * 0.8; // footsteps
        hasCup = u >= 1;                                // returning with wine
        walking = true;
      }
      // body
      ctx.fillStyle = s.tunic;
      ctx.fillRect(wx - 4, wy - 3, 8, 7);
      // head
      ctx.fillStyle = s.skin;
      ctx.beginPath(); ctx.arc(wx, wy - 6, 3, 0, 7); ctx.fill();
      if (hasCup) {
        px(ctx, wx + 4, wy - 3, 3, 3, "#8a2a3a");   // cup of wine
        px(ctx, wx + 4, wy - 4, 3, 1, "#e0b64c");
      }
      // arms up when cheering (walkers have their hands full)
      if (!walking && excited > 0.45 && bob > -0.2) {
        ctx.strokeStyle = s.skin; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(wx - 4, wy - 2); ctx.lineTo(wx - 7, wy - 9);
        ctx.moveTo(wx + 4, wy - 2); ctx.lineTo(wx + 7, wy - 9);
        ctx.stroke();
      }
    }
    // emperor's temple box, top center
    ctx.save();
    ctx.translate(CW / 2, HUD_H + 30);
    drawImperialBox(t, cheer, thumb, thumb < 0);
    ctx.restore();
  }

  // Caesar's temple box with Cleopatra and servants. Drawn around (0,0) so it
  // can be translated/scaled (the death screens show it enlarged).
  // grin: smug imperial smile.
  function drawImperialBox(t, cheer, thumb, grin) {
    // platform
    px(ctx, -58, -14, 116, 46, "#57306b");
    px(ctx, -58, -14, 116, 5, "#e0b64c");
    px(ctx, -58, 28, 116, 4, "#e0b64c");
    // marble columns carrying the pediment
    drawColumn(-63, -14, 46);
    drawColumn(63, -14, 46);
    // slanted temple roof (pediment)
    ctx.fillStyle = "#e9e4d8";
    ctx.beginPath();
    ctx.moveTo(-72, -14); ctx.lineTo(72, -14); ctx.lineTo(0, -30);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#b3ac9b"; ctx.lineWidth = 1.5;
    ctx.stroke();
    px(ctx, -72, -16, 144, 3, "#c96a48");                 // raking terracotta edge
    ctx.fillStyle = "#e0b64c";                            // medallion
    ctx.beginPath(); ctx.arc(0, -21, 3, 0, 7); ctx.fill();
    // female servants: two with palm fans flanking the box, one tray bearer
    const servant = (sx, phase, dress, fanTilt) => {
      const bob = Math.sin(t * 0.004 + phase) * (1 + cheer);
      const sy = 8 + bob;
      if (fanTilt) {
        // long palm fan swaying over the royals
        const ang = fanTilt * (0.3 + Math.sin(t * 0.0035 + phase) * 0.2);
        ctx.save();
        ctx.translate(sx + fanTilt * 4, sy + 4);
        ctx.rotate(ang);
        ctx.strokeStyle = "#8a5a2a"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -26); ctx.stroke();
        ctx.fillStyle = "#5d8a48";
        ctx.beginPath(); ctx.ellipse(0, -30, 6, 9, 0, 0, 7); ctx.fill();
        ctx.fillStyle = "#7fac68";
        ctx.beginPath(); ctx.ellipse(0, -30, 3, 6, 0, 0, 7); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = dress;
      ctx.fillRect(sx - 4, sy, 9, 16);
      ctx.fillStyle = "#c9955e";
      ctx.beginPath(); ctx.arc(sx, sy - 4, 4, 0, 7); ctx.fill();
      ctx.fillStyle = "#2a201a";
      ctx.fillRect(sx - 4, sy - 8, 9, 4);
      ctx.fillRect(sx - 5, sy - 6, 2, 5);
      ctx.fillRect(sx + 3, sy - 6, 2, 5);
      if (!fanTilt) {
        // tray with a gold jug
        px(ctx, sx - 6, sy + 5, 12, 2, "#8a5a2a");
        px(ctx, sx - 2, sy + 1, 4, 4, "#e0b64c");
      }
    };
    servant(-48, 0.5, "#c9705e", 1);
    servant(30, 2.1, "#5d8a9c", 0);
    servant(48, 3.7, "#a06a8a", -1);

    // Cleopatra at Caesar's side: white-and-gold dress, black bob, diadem
    const cx = -28, cbob = Math.sin(t * 0.003) * 0.8;
    ctx.fillStyle = "#f2ead6";
    ctx.fillRect(cx - 6, 2 + cbob, 12, 22);
    px(ctx, cx - 6, 20 + cbob, 12, 3, "#e0b64c");
    px(ctx, cx - 5, 2 + cbob, 10, 4, "#e0b64c");
    ctx.fillStyle = "#dba876";
    ctx.beginPath(); ctx.arc(cx, -2 + cbob, 5.5, 0, 7); ctx.fill();
    ctx.fillStyle = "#1c1614";
    ctx.fillRect(cx - 6, -9 + cbob, 12, 5);
    ctx.fillRect(cx - 8, -5 + cbob, 3, 9);
    ctx.fillRect(cx + 5, -5 + cbob, 3, 9);
    px(ctx, cx - 6, -5 + cbob, 12, 2, "#e0b64c");
    px(ctx, cx - 1, -8 + cbob, 2, 3, "#3fae9c");
    px(ctx, cx - 3, -2 + cbob, 2, 2, "#3a2418");   // eyes
    px(ctx, cx + 1, -2 + cbob, 2, 2, "#3a2418");
    if (thumb > 0) {
      // she celebrates the victory with a raised hand
      ctx.strokeStyle = "#dba876"; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(cx - 6, 8);
      ctx.lineTo(cx - 12, -7);
      ctx.stroke();
      px(ctx, cx - 15, -11, 4, 4, "#dba876");
    }

    // emperor: white toga with purple sash, laurel crown
    ctx.fillStyle = "#ece6da";
    ctx.fillRect(-7, 2, 14, 22);
    ctx.fillStyle = "#7a3aa0";
    ctx.fillRect(-7, 2, 4, 22);
    const headLift = thumb < 0 ? 3 : 0; // arrogant chin-up when the crowd got blood
    ctx.fillStyle = "#e8b98a";
    ctx.beginPath(); ctx.arc(0, -2 - headLift, 6, 0, 7); ctx.fill();
    if (thumb < 0) px(ctx, 4, -4 - headLift, 4, 2, "#e8b98a"); // nose in the air
    ctx.strokeStyle = "#6d8a3a"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, -3 - headLift, 6.5, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
    px(ctx, -4, -5 - headLift, 2, 2, "#5a3a2a");   // eyes
    px(ctx, 1, -5 - headLift, 2, 2, "#5a3a2a");
    if (grin) {
      // wide smug grin
      ctx.fillStyle = "#fff6e8";
      ctx.beginPath(); ctx.arc(0, -1 - headLift, 3.4, 0, Math.PI); ctx.fill();
      ctx.strokeStyle = "#5a3a2a"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, -1 - headLift, 3.4, 0, Math.PI); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-3.4, -1 - headLift); ctx.lineTo(3.4, -1 - headLift);
      ctx.stroke();
    }
    ctx.strokeStyle = "#e8b98a"; ctx.lineWidth = 3;
    if (thumb > 0) {
      // triumphant: thumbs-up fist plus an arm waving to the crowd
      const wave = Math.sin(t * 0.012);
      ctx.beginPath();
      ctx.moveTo(7, 8);
      ctx.lineTo(16, -2);
      ctx.moveTo(-7, 8);
      ctx.lineTo(-15 - wave * 4, -7 - Math.abs(wave) * 5);
      ctx.stroke();
      px(ctx, 13, -9, 7, 7, "#e0b64c");                                   // fist
      px(ctx, 15, -13, 3, 5, "#e8b98a");                                  // thumb up
      px(ctx, -19 - wave * 4, -12 - Math.abs(wave) * 5, 5, 5, "#e8b98a"); // waving hand
    } else if (thumb < 0) {
      // arrogant: hand on hip, slow dismissive thumbs-down flick
      const flick = Math.sin(t * 0.006) * 3;
      ctx.beginPath();
      ctx.moveTo(-7, 8);
      ctx.lineTo(-13, 12);
      ctx.lineTo(-7, 16);
      ctx.moveTo(7, 8);
      ctx.lineTo(17, 11 + flick);
      ctx.stroke();
      px(ctx, 14, 9 + flick, 7, 7, "#e0b64c");   // fist
      px(ctx, 16, 16 + flick, 3, 6, "#e8b98a");  // thumb down
    }
  }

  // fallen gladiator pixel art for the death screens (lying on his back,
  // helmet and sword scattered, rats helping themselves)
  function drawFallenGladiator(cxp, cyp, s, t) {
    ctx.save();
    ctx.translate(cxp, cyp);
    ctx.scale(s, s);
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath(); ctx.ellipse(0, 8, 24, 4, 0, 0, 7); ctx.fill();
    px(ctx, -8, -1, 14, 8, "#a32222");            // tunic torso
    px(ctx, -8, -1, 14, 2, "#c33a3a");
    px(ctx, -2, -1, 2, 8, "#e0b64c");             // belt
    px(ctx, 6, 0, 9, 3, "#8a5a3a");               // legs
    px(ctx, 6, 5, 9, 3, "#8a5a3a");
    px(ctx, 15, -1, 3, 4, "#5a4a3a");             // sandals
    px(ctx, 15, 5, 3, 4, "#5a4a3a");
    px(ctx, -7, -6, 3, 6, "#e0a878");             // arm flung upward
    px(ctx, 0, 7, 7, 3, "#e0a878");               // arm along the ground
    ctx.fillStyle = "#e0a878";                    // head, tilted back
    ctx.beginPath(); ctx.arc(-12, 2, 4.5, 0, 7); ctx.fill();
    ctx.strokeStyle = "#442"; ctx.lineWidth = 1;  // X eyes
    for (const ex of [-14, -10]) {
      ctx.beginPath();
      ctx.moveTo(ex - 1, 0); ctx.lineTo(ex + 1, 2);
      ctx.moveTo(ex + 1, 0); ctx.lineTo(ex - 1, 2);
      ctx.stroke();
    }
    px(ctx, -24, 3, 7, 5, "#b08d2a");             // helmet rolled away
    px(ctx, -24, 1, 7, 2, "#c22");                // its crest
    px(ctx, -26, 6, 2, 2, "#8a6d1e");
    px(ctx, 8, -8, 12, 2, "#c8c8c8");             // dropped sword
    px(ctx, 6, -9, 3, 4, "#8a5a12");
    px(ctx, 18, 4, 6, 8, "#3f6ea5");              // shield on the sand
    px(ctx, 19, 6, 4, 4, "#6f9cd0");
    // rats gnawing at the body; head points -x unless flipped, and each one
    // lunges toward the corpse in its own rhythm
    const rat = (rx, ry, flip, phase, fur) => {
      const nib = Math.max(0, Math.sin(t * 0.02 + phase)) * 1.6;
      ctx.save();
      ctx.translate(rx, ry);
      if (flip) ctx.scale(-1, 1);
      ctx.translate(-nib, 0);
      ctx.strokeStyle = "#b58b7a"; ctx.lineWidth = 0.8;   // tail
      ctx.beginPath(); ctx.moveTo(5, 1); ctx.quadraticCurveTo(9, 0.5, 10.5, -2); ctx.stroke();
      ctx.fillStyle = fur;                                 // body
      ctx.beginPath(); ctx.ellipse(2, 0, 3.6, 2.1, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-2.2, 0.4, 2.1, 1.4, 0, 0, 7); ctx.fill(); // head
      ctx.fillStyle = "#8a7c70";                           // ear
      ctx.beginPath(); ctx.arc(-1.2, -1.6, 1, 0, 7); ctx.fill();
      px(ctx, -3.4, -0.6, 0.9, 0.9, "#1a1412");            // eye
      px(ctx, -4.6, 0.5, 1.1, 0.9, "#c9958a");             // nose
      ctx.restore();
    };
    rat(8, -5, false, 0, "#6e6258");     // on the chest, from above
    rat(0, 11, false, 2.2, "#5c5148");   // at the belly, from below
    rat(19, 9, false, 4.1, "#6e6258");   // nibbling a sandal
    rat(-21, 10, true, 1.3, "#79695c");  // sneaking in past the helmet
    ctx.restore();
  }

  // ==========================================================================
  // Audio — WebAudio synth sfx, lazy context.
  // ==========================================================================
  let ac = null, muted = false, noiseBuf = null, crowdGain = null;
  function audio() {
    if (!ac) {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      noiseBuf = ac.createBuffer(1, ac.sampleRate, ac.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      // ambient crowd roar: looping noise whose volume follows the cheer level
      const src = ac.createBufferSource();
      src.buffer = noiseBuf; src.loop = true;
      const f = ac.createBiquadFilter();
      f.type = "bandpass"; f.frequency.value = 650; f.Q.value = 0.5;
      crowdGain = ac.createGain(); crowdGain.gain.value = 0;
      src.connect(f).connect(crowdGain).connect(ac.destination);
      src.start();
    }
    if (ac.state === "suspended") ac.resume();
    return ac;
  }
  // scattered hand-claps from the stands
  function applause(strength = 1) {
    if (muted) return;
    const a = audio(), t0 = a.currentTime;
    const claps = 10 + Math.floor(strength * 12);
    for (let i = 0; i < claps; i++) {
      const t = t0 + Math.random() * (0.4 + strength * 0.5);
      const src = a.createBufferSource();
      src.buffer = noiseBuf;
      src.playbackRate.value = 0.8 + Math.random() * 0.6;
      const f = a.createBiquadFilter();
      f.type = "bandpass";
      f.frequency.value = 1600 + Math.random() * 1600;
      f.Q.value = 1.5;
      const g = a.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.05 + 0.06 * strength, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05 + Math.random() * 0.04);
      src.connect(f).connect(g).connect(a.destination);
      src.start(t); src.stop(t + 0.12);
    }
  }
  function env(gainNode, t0, peak, dur) {
    gainNode.gain.setValueAtTime(0.0001, t0);
    gainNode.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  }
  function blip(freq, dur, type = "square", peak = 0.12, slide = 0) {
    if (muted) return;
    const a = audio(), t0 = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t0 + dur);
    env(g, t0, peak, dur);
    o.connect(g).connect(a.destination);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  function noise(dur, filterFreq, peak = 0.2, sweepTo = 0) {
    if (muted) return;
    const a = audio(), t0 = a.currentTime;
    const src = a.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
    const f = a.createBiquadFilter(); f.type = "lowpass";
    f.frequency.setValueAtTime(filterFreq, t0);
    if (sweepTo) f.frequency.exponentialRampToValueAtTime(sweepTo, t0 + dur);
    const g = a.createGain();
    env(g, t0, peak, dur);
    src.connect(f).connect(g).connect(a.destination);
    src.start(t0); src.stop(t0 + dur + 0.05);
  }
  const SFX = {
    dig: () => noise(0.08, 900, 0.10),
    gold: () => { blip(880, 0.09, "sine", 0.10); setTimeout(() => blip(1320, 0.14, "sine", 0.10), 60); },
    push: () => noise(0.12, 300, 0.12),
    thud: () => { blip(90, 0.12, "sine", 0.16, -40); noise(0.09, 220, 0.10); },
    boom: () => { noise(0.5, 1600, 0.25, 120); blip(60, 0.4, "sawtooth", 0.10, -30); },
    goldboom: () => { noise(0.4, 1600, 0.2, 200); setTimeout(() => SFX.gold(), 160); },
    "exit-open": () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.16, "triangle", 0.12), i * 110)),
    win: () => [523, 659, 784, 1047, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.2, "triangle", 0.13), i * 130)),
    death: () => [400, 300, 220, 150].forEach((f, i) => setTimeout(() => blip(f, 0.2, "sawtooth", 0.10), i * 140)),
    cheer: () => noise(0.9, 2500, 0.14, 600),
    boo: () => { noise(1.1, 240, 0.2, 90); blip(170, 0.8, "sawtooth", 0.07, -80); },
    tick: () => blip(1200, 0.05, "square", 0.06),
  };

  // ==========================================================================
  // Game flow
  // ==========================================================================
  let mode = "title";       // title | intro | play | deathwait | gameover | victory
  let game = null;
  let levelIndex = 0;
  let lives = 3;
  let score = 0;
  let cheer = 0;             // 0..1 crowd excitement
  let crowdPhase = 0;        // accumulated sway phase; speeds up smoothly with cheer
  let thumb = 0;             // emperor: -1 down, 0 none, 1 up
  let modeTimer = 0;
  let deathTicks = 0;
  let acc = 0, lastTs = 0;

  // input: held-direction stack + one-tick press buffer (see engine block)
  const input = createInput();
  const KEYD = {
    ArrowUp: DIR.UP, ArrowRight: DIR.RIGHT, ArrowDown: DIR.DOWN, ArrowLeft: DIR.LEFT,
    w: DIR.UP, d: DIR.RIGHT, s: DIR.DOWN, a: DIR.LEFT,
    W: DIR.UP, D: DIR.RIGHT, S: DIR.DOWN, A: DIR.LEFT,
  };
  window.addEventListener("keydown", (e) => {
    const d = KEYD[e.key];
    if (d !== undefined) {
      e.preventDefault();
      inputPress(input, d, e.repeat);
    } else if (e.repeat) {
      return;
    } else if (e.key === "Enter") {
      advance();
    } else if (e.key === "r" || e.key === "R") {
      if (mode === "play") loseLife("retreat");
    } else if (e.key === "m" || e.key === "M") {
      muted = !muted;
    } else if (e.key === "p" || e.key === "P") {
      if (mode === "play") mode = "pause";
      else if (mode === "pause") mode = "play";
    }
    audio();
  });
  window.addEventListener("keyup", (e) => {
    const d = KEYD[e.key];
    if (d !== undefined) inputRelease(input, d);
  });
  // keyups can be swallowed while the tab is unfocused (cmd-tab, etc.);
  // drop everything so no direction sticks.
  window.addEventListener("blur", () => inputClear(input));

  function startLevel() {
    game = createGame(levelIndex);
    mode = "intro";
    modeTimer = 0;
    thumb = 0;
    deathTicks = 0;
  }

  function advance() {
    if (mode === "title") { levelIndex = 0; lives = 3; score = 0; startLevel(); }
    else if (mode === "intro") { mode = "play"; }
    else if (mode === "deathwait") { startLevel(); }
    else if (mode === "gameover" || mode === "victory") { mode = "title"; }
  }

  function loseLife(cause) {
    lives--;
    thumb = -1;
    SFX.death();
    if (lives <= 0) {
      mode = "gameover";
    } else {
      mode = "deathwait";
    }
    modeTimer = 0;
  }

  function handleEvents(evts) {
    for (const ev of evts) {
      if (ev === "gold") { score += 10; cheer = Math.min(1, cheer + 0.35); SFX.gold(); applause(0.6); }
      else if (ev === "goldboom") { score += 25; cheer = 1; SFX.goldboom(); applause(1); SFX.cheer(); }
      else if (ev === "boom") { SFX.boom(); cheer = Math.min(1, cheer + 0.5); applause(0.8); }
      else if (ev === "dig") SFX.dig();
      else if (ev === "push") SFX.push();
      else if (ev === "thud") SFX.thud();
      else if (ev === "exit-open") { SFX["exit-open"](); cheer = 1; applause(1); SFX.cheer(); }
      else if (ev === "win") { score += 100 + timeLeft(game) * 2; thumb = 1; cheer = 1; SFX.win(); applause(1.2); SFX.cheer(); }
      else if (ev === "death") { cheer = 1; SFX.boo(); applause(0.9); }
    }
  }

  // ==========================================================================
  // Rendering
  // ==========================================================================
  function tileSprite(t, i, frame) {
    switch (t) {
      case T.SAND: return SPR.sand[0];
      case T.STEEL: return SPR.steel[0];
      case T.BRICK: return SPR.brick[0];
      case T.STONE: return SPR.stone[0];
      case T.GOLD: return SPR.gold[frame % 4];
      case T.PLAYER: return SPR.player[frame % 2];
      case T.LION: return SPR.lion[frame % 2];
      case T.ELEPHANT: return SPR.elephant[frame % 2];
      default: return null;
    }
  }

  function drawBeastSprite(t, sxp, syp, frame, dirv) {
    // flip horizontally when facing left
    const s = tileSprite(t, 0, frame);
    if (dirv === DIR.LEFT) {
      ctx.save();
      ctx.translate(sxp + TILE, syp);
      ctx.scale(-1, 1);
      ctx.drawImage(s, 0, 0);
      ctx.restore();
    } else {
      ctx.drawImage(s, sxp, syp);
    }
  }

  function drawPlayfield(g, alpha, t) {
    const frame = Math.floor(t / 160) % 4;
    const walkFrame = Math.floor(t / 120) % 2;
    // cells that moved this tick get drawn interpolated instead
    const movedTargets = new Set();
    for (const m of g.moves) movedTargets.add(m.ty * g.w + m.tx);

    for (let y = 0; y < g.h; y++) {
      for (let x = 0; x < g.w; x++) {
        const i = y * g.w + x;
        const sx = PF_X + x * TILE, sy = PF_Y + y * TILE;
        const tt = g.type[i];
        ctx.drawImage(SPR.empty[0], sx, sy);
        if (tt === T.EMPTY || movedTargets.has(i)) continue;
        if (tt === T.BOOM) {
          ctx.drawImage((g.boomStage[i] >= 2 ? SPR.boomA : SPR.boomB)[0], sx, sy);
        } else if (tt === T.EXIT) {
          ctx.drawImage(g.exitOpen ? SPR.exitOpen[frame % 2] : SPR.exitClosed[0], sx, sy);
        } else if (tt === T.PLAYER || tt === T.LION || tt === T.ELEPHANT) {
          drawBeastSprite(tt, sx, sy, walkFrame, g.dir[i]);
        } else {
          const s = tileSprite(tt, 0, frame);
          if (s) ctx.drawImage(s, sx, sy);
        }
      }
    }
    // interpolated movers on top
    for (const m of g.moves) {
      const ix = PF_X + (m.fx + (m.tx - m.fx) * alpha) * TILE;
      const iy = PF_Y + (m.fy + (m.ty - m.fy) * alpha) * TILE;
      if (m.type === T.PLAYER || m.type === T.LION || m.type === T.ELEPHANT) {
        const dv = m.type === T.PLAYER
          ? g.dir[g.py * g.w + g.px]
          : g.dir[m.ty * g.w + m.tx];
        drawBeastSprite(m.type, ix, iy, walkFrame, dv);
      } else {
        const s = tileSprite(m.type, 0, frame);
        if (s) ctx.drawImage(s, ix, iy);
      }
    }
  }

  function roman(n) {
    const table = [[10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]];
    let out = "";
    for (const [v, sym] of table) while (n >= v) { out += sym; n -= v; }
    return out;
  }

  function drawHUD(g) {
    px(ctx, 0, 0, CW, HUD_H, "#171310");
    ctx.fillStyle = "#e0b64c";
    ctx.font = "bold 16px Georgia, serif";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    const goldStr = `${g.collected}/${g.quota}`;
    // coin icon
    ctx.beginPath(); ctx.arc(16, HUD_H / 2, 7, 0, 7); ctx.fillStyle = "#f5c93c"; ctx.fill();
    ctx.strokeStyle = "#8a5a12"; ctx.stroke();
    ctx.fillStyle = g.collected >= g.quota ? "#7ce07c" : "#f0e6d2";
    ctx.fillText(goldStr, 30, HUD_H / 2 + 1);
    // level name carved into a small stone plaque
    const hudTitle = `${LEVELS[levelIndex].name.toUpperCase()}  ·  LEVEL ${LEVELS[levelIndex].numeral}`;
    ctx.font = "bold 15px Georgia, serif";
    const tw = ctx.measureText(hudTitle).width + 26;
    drawStonePlaque(CW / 2 - tw / 2, 2, tw, HUD_H - 4, levelIndex + 3);
    carveText(hudTitle, CW / 2, HUD_H / 2 + 1, "bold 15px Georgia, serif");
    ctx.font = "bold 16px Georgia, serif";
    ctx.textAlign = "right";
    const tl = timeLeft(g);
    ctx.fillStyle = tl <= 10 ? "#ff6a5a" : "#f0e6d2";
    ctx.fillText(`⌛ ${tl}`, CW - 150, HUD_H / 2 + 1);
    // lives as little shields
    for (let k = 0; k < lives; k++) {
      const x = CW - 130 + k * 14;
      px(ctx, x, 8, 9, 11, "#3f6ea5");
      px(ctx, x + 2, 10, 5, 7, "#6f9cd0");
      px(ctx, x + 4, 8, 1, 11, "#2c4d74");
    }
    ctx.fillStyle = "#f0e6d2";
    ctx.fillText(`${score}`, CW - 14, HUD_H / 2 + 1);
  }

  function overlay(alpha = 0.65) {
    ctx.fillStyle = `rgba(12,8,4,${alpha})`;
    ctx.fillRect(PF_X - 8, PF_Y - 8, PF_W + 16, PF_H + 16);
  }

  // weathered travertine slab with deterministic mottling and cracks
  function drawStonePlaque(x0, y0, w, h, seed) {
    ctx.fillStyle = "#a89d8a";
    ctx.fillRect(x0, y0, w, h);
    // beveled slab edges
    ctx.fillStyle = "rgba(255,250,235,0.55)";
    ctx.fillRect(x0, y0, w, 2);
    ctx.fillRect(x0, y0, 2, h);
    ctx.fillStyle = "rgba(20,14,8,0.5)";
    ctx.fillRect(x0, y0 + h - 2, w, 2);
    ctx.fillRect(x0 + w - 2, y0, 2, h);
    // mottled stone grain
    for (let k = 0; k < w / 5; k++) {
      const sx = x0 + hash(k, seed + 21) * w, sy = y0 + hash(seed + 21, k) * h;
      ctx.fillStyle = hash(k, seed + 22) < 0.5 ? "rgba(60,50,35,0.16)" : "rgba(255,255,240,0.2)";
      ctx.fillRect(sx, sy, 2 + hash(k, seed + 23) * 3, 1.5);
    }
    // cracks wandering down the face
    ctx.strokeStyle = "rgba(30,20,10,0.55)";
    ctx.lineWidth = 1;
    const cracks = 2 + (seed % 2);
    for (let c = 0; c < cracks; c++) {
      let cxp = x0 + (0.12 + 0.76 * hash(c, seed * 7 + 3)) * w;
      let cyp = y0 + 1;
      ctx.beginPath();
      ctx.moveTo(cxp, cyp);
      for (let seg = 0; cyp < y0 + h - 2 && seg < 14; seg++) {
        cxp += (hash(c * 31 + seg, seed + 77) - 0.5) * 11;
        cyp += 3 + hash(seg, c * 13 + seed + 5) * 6;
        ctx.lineTo(cxp, Math.min(cyp, y0 + h - 1));
        // occasional side branch
        if (hash(seg, c + seed + 40) < 0.2) {
          const bx2 = cxp + (hash(seg, c + seed + 41) - 0.5) * 16;
          ctx.moveTo(cxp, Math.min(cyp, y0 + h - 1));
          ctx.lineTo(bx2, Math.min(cyp + 3, y0 + h - 1));
          ctx.moveTo(cxp, Math.min(cyp, y0 + h - 1));
        }
      }
      ctx.stroke();
    }
  }

  // letters incised INTO the stone: deep shadow on the upper-left groove
  // wall, sunlit lower-right edge, dark recessed face
  function carveText(text, x, y, font) {
    ctx.font = font;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(255,250,228,0.85)";   // lit groove edge
    ctx.fillText(text, x + 2.2, y + 2.2);
    ctx.fillStyle = "rgba(12,8,4,0.9)";         // groove-wall shadow
    ctx.fillText(text, x - 1.8, y - 1.8);
    ctx.fillStyle = "#514738";                  // recessed face
    ctx.fillText(text, x, y);
  }

  // stone tablet with carved lines: [[text, font], ...]; returns nothing
  function carvedTablet(cx2, yTop, lines, seed) {
    let w = 0, h = 16;
    const sizes = [];
    for (const [text, font] of lines) {
      ctx.font = font;
      const m = parseInt(font.match(/(\d+)px/)[1], 10);
      w = Math.max(w, ctx.measureText(text).width);
      sizes.push(m);
      h += m + 14;
    }
    w += 56;
    drawStonePlaque(cx2 - w / 2, yTop, w, h, seed);
    let y = yTop + 8;
    for (let i = 0; i < lines.length; i++) {
      carveText(lines[i][0], cx2, y + sizes[i] / 2 + 7, lines[i][1]);
      y += sizes[i] + 14;
    }
  }

  function centerText(lines, y0) {
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    let y = y0;
    for (const [text, font, color, gap] of lines) {
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.fillText(text.toUpperCase(), CW / 2, y); // Rome writes in capitals
      y += gap;
    }
  }

  function drawTitle(t) {
    drawStandsBase();
    drawAudience(t, 0.25, 0);
    overlay(0.5);
    // big sprites flanking the title
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(SPR.player[Math.floor(t / 300) % 2], CW / 2 - 300, HUD_H + 66, 72, 72);
    ctx.drawImage(SPR.lion[Math.floor(t / 300) % 2], CW / 2 + 228, HUD_H + 66, 72, 72);
    ctx.restore();
    centerText([
      ["COLOSSEVM DASH", "bold 44px Georgia, serif", "#e0b64c", 40],
      ["A Boulder Dash tale of the Roman arena", "16px Georgia, serif", "#cbb794", 90],
      ["Dig the sand · gather the gold · beware lions and elephants", "15px Georgia, serif", "#f0e6d2", 26],
      ["Crush an elephant and it bursts into gold", "15px Georgia, serif", "#f0e6d2", 56],
      ["ARROWS / WASD move · R retreat · P pause · M mute", "14px Georgia, serif", "#9a8c72", 30],
      [Math.floor(t / 500) % 2 ? "PRESS ENTER" : " ", "bold 20px Georgia, serif", "#7ce07c", 0],
    ], HUD_H + 96);
  }

  function render(t, alpha) {
    if (mode === "title") { drawTitle(t); return; }
    drawStandsBase();
    drawAudience(t, cheer, thumb);
    if (game) {
      drawPlayfield(game, mode === "play" ? alpha : 1, t);
      drawHUD(game);
    }
    if (mode === "intro") {
      overlay();
      carvedTablet(CW / 2, HUD_H + 96, [
        [`LEVEL ${LEVELS[levelIndex].numeral}`, "bold 36px Georgia, serif"],
        [LEVELS[levelIndex].name.toUpperCase(), "bold 26px Georgia, serif"],
      ], levelIndex);
      centerText([
        [`Gather ${LEVELS[levelIndex].quota} gold to raise the gate`, "16px Georgia, serif", "#cbb794", 30],
        [`${LEVELS[levelIndex].time} seconds · ${lives} ${lives === 1 ? "life" : "lives"}`, "16px Georgia, serif", "#cbb794", 62],
        [Math.floor(t / 500) % 2 ? "PRESS ENTER" : " ", "bold 18px Georgia, serif", "#7ce07c", 0],
      ], HUD_H + 254);
    } else if (mode === "pause") {
      overlay();
      centerText([["PAVSA", "bold 34px Georgia, serif", "#e0b64c", 40],
                  ["press P to resume", "16px Georgia, serif", "#cbb794", 0]], CH / 2 - 30);
    } else if (mode === "deathwait") {
      overlay(0.55);
      // Caesar and his entourage loom large, grinning at your demise
      ctx.save();
      ctx.translate(CW / 2, 188);
      ctx.scale(2.2, 2.2);
      drawImperialBox(t, cheer, -1, true);
      ctx.restore();
      const causeText = {
        crushed: "Crushed beneath the stone",
        beast: "The beasts of the arena prevail",
        time: "The emperor grew impatient",
        retreat: "A tactical retreat",
      }[game.cause] || "Slain";
      centerText([
        ["THE CROWD ROARS", "bold 26px Georgia, serif", "#ff6a5a", 34],
        [causeText, "17px Georgia, serif", "#f0e6d2", 28],
        [`${lives} ${lives === 1 ? "life" : "lives"} remaining`, "15px Georgia, serif", "#cbb794", 26],
        [Math.floor(t / 500) % 2 ? "PRESS ENTER" : " ", "bold 16px Georgia, serif", "#7ce07c", 0],
      ], 300);
      drawFallenGladiator(CW / 2, 438, 3, t);
    } else if (mode === "gameover") {
      overlay();
      ctx.save();
      ctx.translate(CW / 2, 188);
      ctx.scale(2.2, 2.2);
      drawImperialBox(t, cheer, -1, true);
      ctx.restore();
      centerText([
        ["POLLICE VERSO", "bold 30px Georgia, serif", "#ff6a5a", 34],
        ["The emperor turns his thumb. Game over.", "16px Georgia, serif", "#f0e6d2", 28],
        [`Final score: ${score}`, "16px Georgia, serif", "#e0b64c", 34],
        [Math.floor(t / 500) % 2 ? "PRESS ENTER" : " ", "bold 18px Georgia, serif", "#7ce07c", 0],
      ], 292);
      drawFallenGladiator(CW / 2, 430, 3, t);
    } else if (mode === "victory") {
      overlay();
      centerText([
        ["RVDIS DONATVS", "bold 36px Georgia, serif", "#e0b64c", 42],
        ["You are granted the wooden sword — freedom!", "17px Georgia, serif", "#f0e6d2", 30],
        ["All four games of the Colosseum are won.", "16px Georgia, serif", "#cbb794", 40],
        [`Final score: ${score}`, "18px Georgia, serif", "#e0b64c", 60],
        [Math.floor(t / 500) % 2 ? "PRESS ENTER" : " ", "bold 18px Georgia, serif", "#7ce07c", 0],
      ], CH / 2 - 90);
    }
  }

  // ==========================================================================
  // Main loop
  // ==========================================================================
  function frame(ts) {
    if (!lastTs) lastTs = ts;
    const dt = Math.min(100, ts - lastTs);
    lastTs = ts;
    cheer = Math.max(0, cheer - dt / 2500);
    crowdPhase += dt * (0.004 + cheer * 0.0035);
    if (crowdGain) crowdGain.gain.setTargetAtTime(muted ? 0 : cheer * 0.16, ac.currentTime, 0.15);

    if (mode === "play") {
      acc += dt;
      while (acc >= TICK_MS) {
        acc -= TICK_MS;
        tick(game, inputConsume(input));
        handleEvents(game.events);
        if (game.state === "dead") {
          deathTicks++;
          if (deathTicks > BOOM_TICKS + 2) loseLife(game.cause);
        } else if (game.state === "won") {
          mode = "won-wait";
          modeTimer = 0;
        }
        const tl = timeLeft(game);
        if (game.state === "playing" && tl <= 10 && tl !== lastTickWarn) {
          lastTickWarn = tl;
          SFX.tick();
        }
      }
    } else if (mode === "won-wait") {
      modeTimer += dt;
      // keep the crowd going wild
      cheer = 1;
      if (modeTimer > 1600) {
        levelIndex++;
        if (levelIndex >= LEVELS.length) { mode = "victory"; }
        else startLevel();
      }
    }
    // deathwait has no timeout: it waits for Enter

    render(ts, Math.min(1, acc / TICK_MS));
    requestAnimationFrame(frame);
  }
  let lastTickWarn = -1;

  // Debug/screenshot hook: drive the game synchronously (rAF does not
  // advance under headless virtual time; see repo notes).
  window.__colosseum = {
    start(li) {
      muted = true;
      levelIndex = li; lives = 3; score = 0;
      startLevel();
      mode = "play";
    },
    step(n = 1, dir = DIR.NONE) { for (let k = 0; k < n; k++) tick(game, dir); },
    setCheer(c) { cheer = c; },
    setThumb(v) { thumb = v; },
    setMode(m) { mode = m; },
    draw(t = 1000) { render(t, 1); },
    game: () => game,
    consumeInput: () => inputConsume(input),
  };

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
