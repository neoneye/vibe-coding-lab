<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forward-Forward Char LM</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #11141a; color: #e6e9ef; }
</style>
</head>
<body>
<div id="app"></div>

<script id="shared-code">
"use strict";

// --- Seeded RNG (mulberry32) ---
function makeRng(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// --- Vocab & Encoder ---
function buildVocab(text, capN) {
  const counts = new Map();
  for (const ch of text) counts.set(ch, (counts.get(ch) || 0) + 1);
  const sorted = [...counts.entries()].sort((a, b) =>
    b[1] - a[1] || a[0].charCodeAt(0) - b[0].charCodeAt(0));
  const chars = [""];
  for (const [ch] of sorted) {
    if (chars.length >= capN) break;
    chars.push(ch);
  }
  const index = new Map();
  chars.forEach((ch, i) => index.set(ch, i));
  return { chars, index, size: chars.length, unkIndex: 0 };
}

function charToIndex(vocab, ch) {
  const i = vocab.index.get(ch);
  return i === undefined ? vocab.unkIndex : i;
}

function inputDim(vocab, K) { return (K + 1) * vocab.size; }

function encode(vocab, contextIndices, candidateIndex) {
  const S = vocab.size;
  const x = new Float64Array((contextIndices.length + 1) * S);
  for (let p = 0; p < contextIndices.length; p++) x[p * S + contextIndices[p]] = 1;
  x[contextIndices.length * S + candidateIndex] = 1;
  return x;
}

function padContextIndices(indices, K, padIndex) {
  if (indices.length === K) return indices.slice();
  if (indices.length > K) return indices.slice(indices.length - K);
  const pad = new Array(K - indices.length).fill(padIndex);
  return pad.concat(indices);
}

// --- Sigmoid ---
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

// --- FFLayer ---
class FFLayer {
  constructor(inDim, outDim, rng) {
    this.inDim = inDim; this.outDim = outDim;
    this.W = new Float64Array(inDim * outDim);
    this.b = new Float64Array(outDim);
    const scale = Math.sqrt(2 / inDim); // He init
    for (let i = 0; i < this.W.length; i++) this.W[i] = (rng() * 2 - 1) * scale;
    // Adam state
    this.mW = new Float64Array(this.W.length); this.vW = new Float64Array(this.W.length);
    this.mb = new Float64Array(outDim); this.vb = new Float64Array(outDim);
    this.t = 0;
    this.dW = new Float64Array(this.W.length); this.db = new Float64Array(outDim);
    this.count = 0;
  }
  forward(x) {
    const { inDim, outDim, W, b } = this;
    const a = new Float64Array(outDim);
    for (let j = 0; j < outDim; j++) {
      let z = b[j]; const base = j * inDim;
      for (let k = 0; k < inDim; k++) z += W[base + k] * x[k];
      a[j] = z > 0 ? z : 0;
    }
    return a;
  }
  goodness(a) { let g = 0; for (let j = 0; j < a.length; j++) g += a[j] * a[j]; return g; }
  zeroGrad() { this.dW.fill(0); this.db.fill(0); this.count = 0; }
  accumulate(x, isPositive, theta) {
    const a = this.forward(x);
    const g = this.goodness(a);
    const s = sigmoid(g - theta);
    const factor = isPositive ? (s - 1) : s;
    const loss = isPositive ? Math.log(1 + Math.exp(-(g - theta))) : Math.log(1 + Math.exp(g - theta));
    const { inDim, dW, db } = this;
    for (let j = 0; j < this.outDim; j++) {
      const gj = factor * 2 * a[j];
      if (gj === 0) continue;
      db[j] += gj; const base = j * inDim;
      for (let k = 0; k < inDim; k++) dW[base + k] += gj * x[k];
    }
    this.count++;
    return { a, g, loss };
  }
  step(lr) {
    if (this.count === 0) return;
    const b1 = 0.9, b2 = 0.999, eps = 1e-8, n = this.count;
    this.t++;
    const bc1 = 1 - Math.pow(b1, this.t), bc2 = 1 - Math.pow(b2, this.t);
    for (let i = 0; i < this.W.length; i++) {
      const g = this.dW[i] / n;
      this.mW[i] = b1 * this.mW[i] + (1 - b1) * g;
      this.vW[i] = b2 * this.vW[i] + (1 - b2) * g * g;
      this.W[i] -= lr * (this.mW[i] / bc1) / (Math.sqrt(this.vW[i] / bc2) + eps);
    }
    for (let j = 0; j < this.outDim; j++) {
      const g = this.db[j] / n;
      this.mb[j] = b1 * this.mb[j] + (1 - b1) * g;
      this.vb[j] = b2 * this.vb[j] + (1 - b2) * g * g;
      this.b[j] -= lr * (this.mb[j] / bc1) / (Math.sqrt(this.vb[j] / bc2) + eps);
    }
    this.zeroGrad();
  }
}

// --- Normalization & Softmax ---
function l2normalize(a) {
  let n = 0; for (let i = 0; i < a.length; i++) n += a[i] * a[i];
  n = Math.sqrt(n) + 1e-8;
  const out = new Float64Array(a.length);
  for (let i = 0; i < a.length; i++) out[i] = a[i] / n;
  return out;
}

function softmax(arr) {
  let max = -Infinity; for (const x of arr) if (x > max) max = x;
  const out = new Float64Array(arr.length); let sum = 0;
  for (let i = 0; i < arr.length; i++) { out[i] = Math.exp(arr[i] - max); sum += out[i]; }
  for (let i = 0; i < out.length; i++) out[i] /= sum;
  return out;
}

// --- FFNet (stack of FFLayers) ---
class FFNet {
  constructor({ inDim, layerSizes, rng }) {
    this.inDim = inDim;
    this.layers = [];
    let prev = inDim;
    for (const w of layerSizes) { this.layers.push(new FFLayer(prev, w, rng)); prev = w; }
  }
  forwardAll(x) {
    const acts = [], goods = [];
    let input = x;
    for (let i = 0; i < this.layers.length; i++) {
      const a = this.layers[i].forward(input);
      acts.push(a); goods.push(this.layers[i].goodness(a));
      input = l2normalize(a);
    }
    return { acts, goods };
  }
  totalGoodness(x, excludeFirst = true) {
    const { goods } = this.forwardAll(x);
    let g = 0;
    for (let i = excludeFirst ? 1 : 0; i < goods.length; i++) g += goods[i];
    return g;
  }
  predictDistribution(vocab, contextIndices, opts = {}) {
    const temp = opts.temp || 1, excludeFirst = opts.excludeFirst !== false;
    const scores = new Float64Array(vocab.size);
    for (let c = 0; c < vocab.size; c++) {
      const x = encode(vocab, contextIndices, c);
      scores[c] = this.totalGoodness(x, excludeFirst) / temp;
    }
    return softmax(scores);
  }
  sample(vocab, contextIndices, opts, rng) {
    const dist = this.predictDistribution(vocab, contextIndices, opts);
    let r = rng(), acc = 0;
    for (let c = 0; c < dist.length; c++) { acc += dist[c]; if (r <= acc) return c; }
    return dist.length - 1;
  }
}

// --- Test harness (engine tests appended in later tasks) ---
const FFTests = {
  _tests: [],
  add(name, fn) { this._tests.push({ name, fn }); },
  assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); },
  approx(a, b, eps, msg) { if (Math.abs(a - b) > (eps || 1e-9)) throw new Error((msg || "approx") + ` (${a} vs ${b})`); },
  run() {
    let pass = 0, fail = 0;
    for (const t of this._tests) {
      try { t.fn(); pass++; console.log("ok   - " + t.name); }
      catch (e) { fail++; console.log("FAIL - " + t.name + ": " + e.message); }
    }
    console.log(`\n${pass} passed, ${fail} failed`);
    return fail === 0;
  }
};

FFTests.add("rng is deterministic", () => {
  const r1 = makeRng(42), r2 = makeRng(42);
  FFTests.assert(r1() === r2(), "same seed must produce same sequence");
});

FFTests.add("buildVocab caps size and reserves UNK at 0", () => {
  const v = buildVocab("aaaabbbccd", 3);
  FFTests.assert(v.size === 3, "size should equal cap");
  FFTests.assert(v.unkIndex === 0, "UNK at index 0");
  FFTests.assert(v.chars[1] === "a", "most frequent char first after UNK");
  FFTests.assert(charToIndex(v, "z") === 0, "unknown char -> UNK");
  FFTests.assert(charToIndex(v, "a") === 1, "known char -> its index");
});

FFTests.add("encode produces one-hots of correct dimension", () => {
  const v = buildVocab("abcabc", 4); // UNK + a,b,c => size 4
  const K = 2;
  const x = encode(v, [charToIndex(v, "a"), charToIndex(v, "b")], charToIndex(v, "c"));
  FFTests.assert(x.length === inputDim(v, K), "input length = (K+1)*size");
  let ones = 0; for (const xi of x) ones += xi;
  FFTests.assert(ones === 3, "exactly K+1 ones total");
});

FFTests.add("padContextIndices fixes length", () => {
  FFTests.assert(padContextIndices([1, 2, 3], 2, 0).join(",") === "2,3", "truncate oldest");
  FFTests.assert(padContextIndices([5], 3, 0).join(",") === "0,0,5", "left pad");
});

FFTests.add("FFLayer goodness rises on positive, falls on negative after updates", () => {
  const rng = makeRng(7);
  const layer = new FFLayer(6, 8, rng);
  const xPos = Float64Array.from([1, 0, 0, 1, 0, 1]);
  const theta = 8;
  const g0 = layer.goodness(layer.forward(xPos));
  for (let i = 0; i < 60; i++) { layer.zeroGrad(); layer.accumulate(xPos, true, theta); layer.step(0.05); }
  const g1 = layer.goodness(layer.forward(xPos));
  FFTests.assert(g1 > g0, `positive goodness should rise (${g0} -> ${g1})`);

  const xNeg = Float64Array.from([0, 1, 1, 0, 1, 0]);
  const n0 = layer.goodness(layer.forward(xNeg));
  for (let i = 0; i < 60; i++) { layer.zeroGrad(); layer.accumulate(xNeg, false, theta); layer.step(0.05); }
  const n1 = layer.goodness(layer.forward(xNeg));
  FFTests.assert(n1 < n0, `negative goodness should fall (${n0} -> ${n1})`);
});

FFTests.add("FFLayer.forward applies ReLU (no negatives)", () => {
  const layer = new FFLayer(4, 5, makeRng(1));
  const a = layer.forward(Float64Array.from([1, -1, 1, 0]));
  for (const v of a) FFTests.assert(v >= 0, "ReLU output must be >= 0");
});

FFTests.add("softmax sums to 1 and is non-negative", () => {
  const p = softmax([2, 1, 0, -3]);
  let s = 0; for (const x of p) { FFTests.assert(x >= 0, "non-negative"); s += x; }
  FFTests.approx(s, 1, 1e-9, "sums to 1");
});

FFTests.add("FFNet.predictDistribution returns a valid distribution over vocab", () => {
  const v = buildVocab("hello world", 8);
  const K = 3;
  const net = new FFNet({ inDim: inputDim(v, K), layerSizes: [16, 16], rng: makeRng(3) });
  const ctx = padContextIndices([charToIndex(v, "l")], K, v.unkIndex);
  const dist = net.predictDistribution(v, ctx, { temp: 1, excludeFirst: true });
  FFTests.assert(dist.length === v.size, "distribution length = vocab size");
  let s = 0; for (const x of dist) s += x;
  FFTests.approx(s, 1, 1e-9, "distribution sums to 1");
});

FFTests.add("l2normalize yields unit length", () => {
  const u = l2normalize(Float64Array.from([3, 4]));
  FFTests.approx(Math.hypot(u[0], u[1]), 1, 1e-6, "unit length");
});

// --- Trainer ---
class Trainer {
  constructor(cfg) {
    this.K = cfg.K; this.theta = cfg.theta; this.lr = cfg.lr;
    this.batchSize = cfg.batchSize; this.negPerPos = cfg.negPerPos;
    this.seed = cfg.seed; this.rng = makeRng(cfg.seed);
    this.vocab = buildVocab(cfg.text, cfg.vocabCap);
    const idx = [...cfg.text].map(ch => charToIndex(this.vocab, ch));
    const split = Math.max(this.K + 1, Math.floor(idx.length * (1 - cfg.valFraction)));
    this.trainStream = idx.slice(0, split);
    this.valStream = idx.slice(Math.max(0, split - this.K)); // keep K context before val region
    this.net = new FFNet({ inDim: inputDim(this.vocab, this.K), layerSizes: cfg.layerSizes, rng: this.rng });
    this.examplesSeen = 0;
  }
  sampleContextAt(stream, pos) {
    const contextIndices = stream.slice(pos - this.K, pos);
    return { contextIndices, trueIndex: stream[pos] };
  }
  _accumPath(x, isPositive) {
    // run accumulate through all layers along one forward path; return per-layer goodness + total loss
    const goods = []; let loss = 0; let input = x;
    for (let i = 0; i < this.net.layers.length; i++) {
      const r = this.net.layers[i].accumulate(input, isPositive, this.theta);
      goods.push(r.g); loss += r.loss;
      input = l2normalize(r.a);
    }
    return { goods, loss };
  }
  stepBatch() {
    const L = this.net.layers.length;
    for (const layer of this.net.layers) layer.zeroGrad();
    const gPos = new Array(L).fill(0), gNeg = new Array(L).fill(0);
    let lossPos = 0, lossNeg = 0, nPos = 0, nNeg = 0;
    for (let s = 0; s < this.batchSize; s++) {
      const pos = this.K + Math.floor(this.rng() * (this.trainStream.length - this.K));
      const { contextIndices, trueIndex } = this.sampleContextAt(this.trainStream, pos);
      const xPos = encode(this.vocab, contextIndices, trueIndex);
      const rp = this._accumPath(xPos, true);
      for (let i = 0; i < L; i++) gPos[i] += rp.goods[i]; lossPos += rp.loss; nPos++;
      for (let n = 0; n < this.negPerPos; n++) {
        let negIdx = 1 + Math.floor(this.rng() * (this.vocab.size - 1)); // avoid UNK(0)
        if (negIdx === trueIndex) negIdx = negIdx === this.vocab.size - 1 ? 1 : negIdx + 1;
        const xNeg = encode(this.vocab, contextIndices, negIdx);
        const rn = this._accumPath(xNeg, false);
        for (let i = 0; i < L; i++) gNeg[i] += rn.goods[i]; lossNeg += rn.loss; nNeg++;
      }
    }
    for (const layer of this.net.layers) layer.step(this.lr);
    this.examplesSeen += this.batchSize;
    for (let i = 0; i < L; i++) { gPos[i] /= nPos; gNeg[i] /= nNeg; }
    return { lossPos: lossPos / nPos, lossNeg: lossNeg / nNeg, gPos, gNeg };
  }
  evalAccuracy(sampleCount) {
    if (this.valStream.length <= this.K + 1) return 0;
    let correct = 0, total = 0;
    for (let s = 0; s < sampleCount; s++) {
      const pos = this.K + Math.floor(this.rng() * (this.valStream.length - this.K));
      const { contextIndices, trueIndex } = this.sampleContextAt(this.valStream, pos);
      const dist = this.net.predictDistribution(this.vocab, contextIndices, { temp: 1, excludeFirst: true });
      let best = 0; for (let c = 1; c < dist.length; c++) if (dist[c] > dist[best]) best = c;
      if (best === trueIndex) correct++; total++;
    }
    return total ? correct / total : 0;
  }
}

function generate(net, vocab, seedText, length, temp, rng, K) {
  let ctx = padContextIndices([...seedText].map(ch => charToIndex(vocab, ch)), K, vocab.unkIndex);
  let out = seedText;
  for (let i = 0; i < length; i++) {
    let idx = net.sample(vocab, ctx, { temp, excludeFirst: true }, rng);
    let tries = 0;
    while (idx === vocab.unkIndex && tries < 5) { idx = net.sample(vocab, ctx, { temp, excludeFirst: true }, rng); tries++; }
    if (idx === vocab.unkIndex) idx = 1;
    out += vocab.chars[idx];
    ctx = padContextIndices(ctx.concat(idx), K, vocab.unkIndex);
  }
  return out;
}

FFTests.add("Trainer overfits a trivial repeating pattern above chance", () => {
  const text = "abcabcabcabcabcabcabcabcabcabcabcabcabcabcabcabc";
  const tr = new Trainer({
    text, K: 3, layerSizes: [24, 24], theta: 24, lr: 0.02,
    batchSize: 16, negPerPos: 1, valFraction: 0.25, vocabCap: 8, seed: 11
  });
  const chance = 1 / (tr.vocab.size - 1); // exclude UNK roughly
  const before = tr.evalAccuracy(20);
  for (let i = 0; i < 200; i++) tr.stepBatch();
  const after = tr.evalAccuracy(20);
  FFTests.assert(tr.examplesSeen === 200 * 16, "examplesSeen tracked");
  FFTests.assert(after > before || after > chance * 1.5,
    `accuracy should rise (chance≈${chance.toFixed(2)}, before=${before.toFixed(2)}, after=${after.toFixed(2)})`);
});

FFTests.add("generate returns a string of the requested length", () => {
  const text = "abcabcabcabcabcabc";
  const tr = new Trainer({ text, K: 3, layerSizes: [16], theta: 16, lr: 0.02,
    batchSize: 8, negPerPos: 1, valFraction: 0.2, vocabCap: 6, seed: 5 });
  for (let i = 0; i < 50; i++) tr.stepBatch();
  const out = generate(tr.net, tr.vocab, "ab", 10, 0.8, makeRng(2), tr.K);
  FFTests.assert(out.startsWith("ab"), "starts with seed");
  FFTests.assert(out.length === "ab".length + 10, "seed + length chars");
});

if (typeof module !== "undefined" && module.exports) {
  module.exports = { makeRng, buildVocab, charToIndex, inputDim, encode, padContextIndices, FFTests, sigmoid, FFLayer, l2normalize, softmax, FFNet, Trainer, generate };
}
</script>
