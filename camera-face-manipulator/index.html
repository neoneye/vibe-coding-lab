<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Face Manipulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #ddd;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
        }
        #status {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #fa0;
            font-size: 0.9rem;
        }
        .stage {
            --ar: 4 / 3;
            position: relative;
            aspect-ratio: var(--ar);
            /* As wide as fits, limited by either viewport axis;
               aspect-ratio derives the height, so it never distorts. */
            width: min(calc(100vw - 36px), calc((100vh - 36px) * var(--ar)));
        }
        canvas {
            display: block;
            border: 2px solid #333;
            border-radius: 8px;
            width: 100%;
            height: 100%;
        }
        .panel {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            min-width: 180px;
        }
        .panel h3 {
            font-size: 0.95rem;
            margin: 14px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
        }
        .panel h3:first-child { margin-top: 0; }
        .panel h3.eyes { color: #8f8; }
        .panel h3.nose { color: #8af; }
        .panel h3.mouth { color: #f88; }
        .panel h3.lag { color: #fa0; }
        .panel label.slider input[type="range"] {
            flex: 1;
            min-width: 80px;
        }
        .panel label.slider .val {
            min-width: 2ch;
            text-align: right;
            color: #fa0;
            font-variant-numeric: tabular-nums;
        }
        .panel select {
            background: #222;
            color: #ddd;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.85rem;
        }
        .panel label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .hint {
            color: #666;
            font-size: 0.8rem;
            margin-top: 14px;
            border-top: 1px solid #333;
            padding-top: 10px;
            line-height: 1.4;
        }
        kbd {
            background: #333;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div id="status">Loading face detection model...</div>
    <div class="stage">
        <canvas id="canvas" width="640" height="480"></canvas>
        <div class="panel">
            <h3>View</h3>
            <label><input type="checkbox" id="mirrorView" checked> Mirror (flip X)</label>
            <h3>Overlay</h3>
            <label><input type="checkbox" id="showOverlay"> Show L / R / nose / mouth</label>
            <h3 class="eyes">Eyes</h3>
            <label>Source
                <select id="eyeSource">
                    <option value="both" selected>Both</option>
                    <option value="left">Left</option>
                    <option value="right">Right</option>
                </select>
            </label>
            <label><input type="checkbox" id="eyeSwap" checked> Swap Left / Right</label>
            <label><input type="checkbox" id="eyeFlipX" checked> Flip X (mirror)</label>
            <label><input type="checkbox" id="eyeFlipY"> Flip Y</label>
            <h3 class="nose">Nose</h3>
            <label><input type="checkbox" id="noseFlipX"> Flip X (mirror)</label>
            <h3 class="mouth">Mouth</h3>
            <label><input type="checkbox" id="mouthFlipX" checked> Flip X (mirror)</label>
            <label><input type="checkbox" id="mouthFlipY"> Flip Y</label>
            <h3 class="lag">Lag (frames)</h3>
            <label class="slider">L eye <input type="range" id="delayL" min="1" max="30" value="1"><span class="val" id="delayLVal">1</span></label>
            <label class="slider">R eye <input type="range" id="delayR" min="1" max="30" value="1"><span class="val" id="delayRVal">1</span></label>
            <label class="slider">Mouth <input type="range" id="delayM" min="1" max="30" value="1"><span class="val" id="delayMVal">1</span></label>
            <div class="hint">
                Hold <kbd>Space</kbd> to see original
            </div>
        </div>
    </div>
    <video id="video" autoplay playsinline hidden></video>

    <script type="module">
    // MediaPipe face landmark indices
    const L_EYE = [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];
    const R_EYE = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];
    const LIPS  = [61,146,91,181,84,17,314,405,321,375,291,308,324,318,402,317,
                   14,87,178,88,95,78,191,80,81,82,13,312,311,310,415];
    const NOSE  = [1,2,98,327,168];

    const video    = document.getElementById('video');
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let spaceHeld = false;

    // Ring buffer of per-region crops from the last frames, so each
    // region can be pasted with its own delay (max 30 frames + current).
    const RING = 31;
    const ring = Array.from({ length: RING }, () => {
        const mk = () => {
            const c = document.createElement('canvas');
            return { c, ctx: c.getContext('2d') };
        };
        return { l: mk(), r: mk(), m: mk(), n: mk() };
    });
    let frameNo = 0;

    // ---- Helpers ----

    function bbox(lm, idx, W, H, pad) {
        let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
        for (const i of idx) {
            const px = lm[i].x * W, py = lm[i].y * H;
            if (px < x1) x1 = px;
            if (py < y1) y1 = py;
            if (px > x2) x2 = px;
            if (py > y2) y2 = py;
        }
        const x = Math.max(0, Math.floor(x1 - pad));
        const y = Math.max(0, Math.floor(y1 - pad));
        const w = Math.min(W - x, Math.ceil(x2 - x1 + pad * 2));
        const h = Math.min(H - y, Math.ceil(y2 - y1 + pad * 2));
        return { x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
    }

    function copyRegion(tc, tctx, src, b) {
        tc.width  = b.w;
        tc.height = b.h;
        tctx.drawImage(src, b.x, b.y, b.w, b.h, 0, 0, b.w, b.h);
    }

    function pasteRegion(dctx, src, b, fx, fy) {
        dctx.save();
        dctx.beginPath();
        dctx.ellipse(b.cx, b.cy, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
        dctx.clip();
        dctx.translate(b.cx, b.cy);
        dctx.scale(fx ? -1 : 1, fy ? -1 : 1);
        dctx.drawImage(src, -b.w / 2, -b.h / 2, b.w, b.h);
        dctx.restore();
    }

    function drawOverlay(lm, W, H) {
        ctx.lineWidth = 2;

        // Eyes
        ctx.strokeStyle = 'rgba(0,255,120,0.5)';
        for (const idx of [L_EYE, R_EYE]) {
            const b = bbox(lm, idx, W, H, 8);
            ctx.beginPath();
            ctx.ellipse(b.cx, b.cy, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Nose
        ctx.strokeStyle = 'rgba(100,180,255,0.4)';
        const nb = bbox(lm, NOSE, W, H, 5);
        ctx.beginPath();
        ctx.ellipse(nb.cx, nb.cy, nb.w / 2, nb.h / 2, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Mouth
        ctx.strokeStyle = 'rgba(255,100,100,0.5)';
        const mb = bbox(lm, LIPS, W, H, 5);
        ctx.beginPath();
        ctx.ellipse(mb.cx, mb.cy, mb.w / 2, mb.h / 2, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Labels
        ctx.font = '11px system-ui';
        ctx.fillStyle = 'rgba(0,255,120,0.6)';
        const lb = bbox(lm, L_EYE, W, H, 8);
        const rb = bbox(lm, R_EYE, W, H, 8);
        ctx.fillText('L', lb.cx - 4, lb.y - 4);
        ctx.fillText('R', rb.cx - 4, rb.y - 4);
        ctx.fillStyle = 'rgba(100,180,255,0.5)';
        ctx.fillText('nose', nb.cx - 12, nb.y - 4);
        ctx.fillStyle = 'rgba(255,100,100,0.6)';
        ctx.fillText('mouth', mb.cx - 14, mb.y - 4);
    }

    // ---- Init ----

    try {
        const { FaceLandmarker, FilesetResolver } = await import(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
        );

        const resolver = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );

        const faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
            baseOptions: {
                modelAssetPath:
                    "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        statusEl.textContent = "Starting camera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }
        });
        video.srcObject = stream;
        await video.play();

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        document.querySelector('.stage').style.setProperty(
            '--ar', `${video.videoWidth} / ${video.videoHeight}`);
        statusEl.style.display = 'none';

        // ---- Render loop ----

        let lastT = -1;

        function loop() {
            if (video.currentTime !== lastT) {
                lastT = video.currentTime;
                const W = canvas.width, H = canvas.height;

                // Draw video, mirrored unless camera view is selected
                const mirror = document.getElementById('mirrorView').checked;
                ctx.save();
                if (mirror) {
                    ctx.translate(W, 0);
                    ctx.scale(-1, 1);
                }
                ctx.drawImage(video, 0, 0, W, H);
                ctx.restore();

                // Detect face
                try {
                    const res = faceLandmarker.detectForVideo(video, performance.now());
                    if (res.faceLandmarks?.length > 0) {
                        // Landmarks must match the canvas orientation
                        const lm = res.faceLandmarks[0].map(p => ({
                            x: mirror ? 1 - p.x : p.x,
                            y: p.y,
                            z: p.z
                        }));

                        // Read settings
                        const eSrc  = document.getElementById('eyeSource').value;
                        const eSwap = document.getElementById('eyeSwap').checked;
                        const eFX   = document.getElementById('eyeFlipX').checked;
                        const eFY   = document.getElementById('eyeFlipY').checked;
                        const mFX   = document.getElementById('mouthFlipX').checked;
                        const mFY   = document.getElementById('mouthFlipY').checked;
                        const nFX   = document.getElementById('noseFlipX').checked;
                        const dL    = +document.getElementById('delayL').value;
                        const dR    = +document.getElementById('delayR').value;
                        const dM    = +document.getElementById('delayM').value;

                        const ePad = 18;
                        const lb = bbox(lm, L_EYE, W, H, ePad);
                        const rb = bbox(lm, R_EYE, W, H, ePad);
                        const mb = bbox(lm, LIPS, W, H, 12);
                        const nb = bbox(lm, NOSE, W, H, 10);

                        // Capture this frame's regions before pasting anything
                        const slot = ring[frameNo % RING];
                        copyRegion(slot.l.c, slot.l.ctx, canvas, lb);
                        copyRegion(slot.r.c, slot.r.ctx, canvas, rb);
                        copyRegion(slot.m.c, slot.m.ctx, canvas, mb);
                        copyRegion(slot.n.c, slot.n.ctx, canvas, nb);

                        // Paste delayed content at the current positions
                        // (clamped while history is still filling up)
                        const past = d => ring[Math.max(0, frameNo - d) % RING];
                        const srcL = past(dL), srcR = past(dR), srcM = past(dM);

                        // Holding Space shows the original camera feed:
                        // keep capturing history, but skip all pasting.
                        if (!spaceHeld) {
                            // Nose first so the eyes and mouth draw on top of it.
                            // No lag slider; flip the current frame's crop.
                            if (nFX) {
                                pasteRegion(ctx, slot.n.c, nb, true, false);
                            }

                            // Pick which eye feeds each position: a single
                            // source eye for both, or (with swap) the opposite
                            const leftCrop  = eSrc === 'left'  ? srcL.l
                                            : eSrc === 'right' ? srcL.r
                                            : eSwap ? srcL.r : srcL.l;
                            const rightCrop = eSrc === 'left'  ? srcR.l
                                            : eSrc === 'right' ? srcR.r
                                            : eSwap ? srcR.l : srcR.r;
                            pasteRegion(ctx, leftCrop.c, lb, eFX, eFY);
                            pasteRegion(ctx, rightCrop.c, rb, eFX, eFY);
                            pasteRegion(ctx, srcM.m.c, mb, mFX, mFY);
                        }

                        frameNo++;

                        // ---- Overlay ----
                        if (document.getElementById('showOverlay').checked && !spaceHeld) {
                            drawOverlay(lm, W, H);
                        }
                    }
                } catch (_) {
                    // Face detection can fail when face is partially visible;
                    // ignore and keep showing the plain camera feed.
                }
            }
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

    } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
        console.error(err);
    }

    // ---- Slider readouts ----

    for (const id of ['delayL', 'delayR', 'delayM']) {
        const el = document.getElementById(id);
        const val = document.getElementById(id + 'Val');
        el.addEventListener('input', () => { val.textContent = el.value; });
    }

    // ---- Keyboard ----

    document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); spaceHeld = true; }
    });
    document.addEventListener('keyup', e => {
        if (e.code === 'Space') spaceHeld = false;
    });
    </script>
</body>
</html>
