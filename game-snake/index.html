<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake MCTS — port of SwiftSnakeEngine</title>
<style>
  :root {
    --bg: #1c1c1e;
    --panel: #2c2c2e;
    --text: #e5e5ea;
    --muted: #8e8e93;
    --p1: #34c759;
    --p2: #0a84ff;
  }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding: 10px;
  }
  #hud select, #hud button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid #3a3a3c;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 14px;
  }
  #hud button:hover { border-color: var(--muted); cursor: pointer; }
  #hud button.active { border-color: var(--p1); color: var(--p1); }
  #hud label { color: var(--muted); font-size: 13px; }
  #status {
    min-height: 22px;
    font-size: 14px;
    color: var(--muted);
    padding: 0 10px 6px;
  }
  #status .gameover { color: #ff453a; font-weight: 600; }
  #board { display: block; }
  #testreport {
    font-family: ui-monospace, monospace;
    white-space: pre-wrap;
    padding: 16px;
  }
</style>
</head>
<body>
<div id="hud">
  <label>Level <select id="levelSelect"></select></label>
  <label>Player 1 <select id="role1">
    <option value="human">Human (arrows)</option>
    <option value="bot">Bot — Monte Carlo 2</option>
    <option value="none">Off</option>
  </select></label>
  <label>Player 2 <select id="role2">
    <option value="human">Human (WASD)</option>
    <option value="bot" selected>Bot — Monte Carlo 2</option>
    <option value="none">Off</option>
  </select></label>
  <button id="btnRestart" title="Enter">Restart</button>
  <button id="btnUndo" title="Z">Undo</button>
  <button id="btnPause" title="Space">Pause</button>
  <button id="btnStep" title="single step (bots only)">Step</button>
  <button id="btnPath" title="P">Show AI path</button>
</div>
<div id="status"></div>
<canvas id="board"></canvas>

<script id="shared-code">
"use strict";
// Pure game engine + MCTS bot, ported from SwiftSnakeEngine (MIT, Simon Strandgaard).
// This block must not touch the DOM: it also runs inside a Web Worker and in Node (test.mjs).

// ---------------------------------------------------------------------------
// Test registry. Runs via `node test.mjs` or by opening index.html?test=1
// ---------------------------------------------------------------------------
const SnakeTests = {
  tests: [],
  add(name, fn) { this.tests.push({ name, fn }); },
  run(log = console.log, error = console.error) {
    let failures = 0;
    for (const { name, fn } of this.tests) {
      try { fn(); log(`ok - ${name}`); }
      catch (e) { failures++; error(`FAIL - ${name}: ${e.message}`); }
    }
    log(`${this.tests.length - failures}/${this.tests.length} passed`);
    return failures === 0;
  },
};
function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
function assertEq(actual, expected, msg) {
  const a = JSON.stringify(actual), e = JSON.stringify(expected);
  if (a !== e) throw new Error(`${msg || "assertEq"}: ${a} !== ${e}`);
}

SnakeTests.add("smoke", () => assertEq(1 + 1, 2));
</script>

<script>
"use strict";
// UI layer: rendering, input, worker, game loop. Built up in later tasks.
</script>
</body>
</html>
