<style>
  :root {

    padding: 10px;

    color: var(--muted);

    font-family: ui-monospace, monospace;
    white-space: pre-wrap;

<script id="shared-code">
"use strict";
// Pure game engine + MCTS bot, ported from SwiftSnakeEngine (MIT, Simon Strandgaard).
// This block must not touch the DOM: it also runs inside a Web Worker and in Node (test.mjs).

// ---------------------------------------------------------------------------
// Test registry. Runs via `node test.mjs` or by opening index.html?test=1
// ---------------------------------------------------------------------------
const SnakeTests = {
  tests: [],
  add(name, fn) { this.tests.push({ name, fn }); },
  run(log = console.log, error = console.error) {
    let failures = 0;
    for (const { name, fn } of this.tests) {
      try { fn(); log(`ok - ${name}`); }
      catch (e) { failures++; error(`FAIL - ${name}: ${e.message}`); }
    }
    log(`${this.tests.length - failures}/${this.tests.length} passed`);
    return failures === 0;
  },
};
function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
function assertEq(actual, expected, msg) {
  const a = JSON.stringify(actual), e = JSON.stringify(expected);
  if (a !== e) throw new Error(`${msg || "assertEq"}: ${a} !== ${e}`);
}

SnakeTests.add("smoke", () => assertEq(1 + 1, 2));

// ---------------------------------------------------------------------------
// LCRNG — port of EngineShared/Common/SeededGenerator.swift.
// Same constants as Swift, so a given seed produces the same raw sequence.
// ---------------------------------------------------------------------------
const U64_MASK = 0xFFFFFFFFFFFFFFFFn;
const LCRNG_MUL = 2862933555777941757n;
const LCRNG_ADD = 3037000493n;

class LCRNG {
  constructor(seed) { this.seed = BigInt(seed) & U64_MASK; }
  next() {
    this.seed = (LCRNG_MUL * this.seed + LCRNG_ADD) & U64_MASK;
    return this.seed;
  }
  // Derived helpers. Deterministic, but not bit-identical to Swift stdlib's
  // randomElement/shuffle — cross-language replay parity is a non-goal.
  randomInt(n) { return Number(this.next() % BigInt(n)); }
  pickIndex(arrayLength) { return this.randomInt(arrayLength); }
  shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = this.randomInt(i + 1);
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }
}

// ---------------------------------------------------------------------------
// Positions. Plain {x, y} objects, origin bottom-left as in Swift.
// ---------------------------------------------------------------------------
function posKey(p) { return `${p.x},${p.y}`; }
function posEq(a, b) { return a !== null && b !== null && a !== undefined && b !== undefined && a.x === b.x && a.y === b.y; }
function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function offsetBy(p, dx, dy) { return { x: p.x + dx, y: p.y + dy }; }
// Sort order matching Swift IntVec2 Comparable: by y, then by x.
function posCompare(a, b) { return a.y - b.y || a.x - b.x; }

// ---------------------------------------------------------------------------
// Fifo — port of EngineShared/Snake/SnakeFifo.swift, immutable flavor.
// `append` keeps capacity (drops from the front), `appendAndGrow` raises it.
// ---------------------------------------------------------------------------
const Fifo = {
  fromArray(array) { return { capacity: array.length, array: array.slice() }; },
  _purged(capacity, array) {
    const diff = array.length - capacity;
    return { capacity, array: diff >= 1 ? array.slice(diff) : array };
  },
  append(fifo, item) {
    return this._purged(fifo.capacity, [...fifo.array, item]);
  },
  appendAndGrow(fifo, item) {
    return this._purged(fifo.capacity + 1, [...fifo.array, item]);
  },
  map(fifo, transform) {
    return { capacity: fifo.capacity, array: fifo.array.map(transform) };
  },
};

SnakeTests.add("lcrng sequence from seed 0", () => {
  const rng = new LCRNG(0n);
  assertEq(rng.next().toString(), "3037000493");
  const expected2 = ((LCRNG_MUL * 3037000493n + LCRNG_ADD) & U64_MASK).toString();
  assertEq(rng.next().toString(), expected2);
});
SnakeTests.add("lcrng helpers are deterministic", () => {
  const a = new LCRNG(7n), b = new LCRNG(7n);
  assertEq(a.shuffle([1, 2, 3, 4, 5]), b.shuffle([1, 2, 3, 4, 5]));
  assertEq(a.randomInt(10), b.randomInt(10));
});
SnakeTests.add("fifo append keeps capacity, appendAndGrow grows", () => {
  const f0 = Fifo.fromArray([1, 2, 3]);
  assertEq(Fifo.append(f0, 4).array, [2, 3, 4]);
  assertEq(Fifo.appendAndGrow(f0, 4).array, [1, 2, 3, 4]);
  assertEq(f0.array, [1, 2, 3], "original untouched");
});

// ---------------------------------------------------------------------------
// SnakeHead — port of EngineShared/Snake/SnakeHead.swift + SnakeHeadDirection.swift
// ---------------------------------------------------------------------------
const ROTATED_CCW = { up: "left", left: "down", down: "right", right: "up" };
const ROTATED_CW = { up: "right", right: "down", down: "left", left: "up" };
const DIRECTION_DELTA = {
  up: { dx: 0, dy: 1 },
  down: { dx: 0, dy: -1 },
  left: { dx: -1, dy: 0 },
  right: { dx: 1, dy: 0 },
};

function headSimulateTick(head, movement) {
  if (movement === "dontMove") return head;
  let direction = head.direction;
  if (movement === "moveCCW") direction = ROTATED_CCW[direction];
  if (movement === "moveCW") direction = ROTATED_CW[direction];
  const d = DIRECTION_DELTA[direction];
  return { position: offsetBy(head.position, d.dx, d.dy), direction };
}

// Best movement to approach newPosition; null if it is behind the snake.
// Port of SnakeHead.moveToward(_:) — SnakeHead.swift:72-124.
function headMoveTowardPosition(head, newPosition) {
  const dx = head.position.x - newPosition.x;
  const dy = head.position.y - newPosition.y;
  const dxx = dx * dx, dyy = dy * dy;
  if (dxx === 0 && dyy === 0) return "dontMove";
  switch (head.direction) {
    case "up":
      if (dy < 0 && dyy >= dxx) return "moveForward";
      if (dx > 0) return "moveCCW";
      if (dx < 0) return "moveCW";
      break;
    case "down":
      if (dy > 0 && dyy >= dxx) return "moveForward";
      if (dx > 0) return "moveCW";
      if (dx < 0) return "moveCCW";
      break;
    case "left":
      if (dx > 0 && dxx >= dyy) return "moveForward";
      if (dy > 0) return "moveCCW";
      if (dy < 0) return "moveCW";
      break;
    case "right":
      if (dx < 0 && dxx >= dyy) return "moveForward";
      if (dy > 0) return "moveCW";
      if (dy < 0) return "moveCCW";
      break;
  }
  return null;
}

// Arrow-key style input: a direction. Reversal yields "dontMove".
function headMoveTowardDirection(head, direction) {
  const d = DIRECTION_DELTA[direction];
  return headMoveTowardPosition(head, offsetBy(head.position, d.dx, d.dy)) ?? "dontMove";
}

// ---------------------------------------------------------------------------
// SnakeBody — port of EngineShared/Snake/SnakeBody.swift.
// fifo.array runs tail-first; the last element is the head.
// Each part: { position, content } where content is "empty" | "food".
// ---------------------------------------------------------------------------
function bodyStateForTick(body, movement, act) {
  if (movement === "dontMove") return body;
  const newHead = headSimulateTick(body.head, movement);
  const part = { position: newHead.position, content: act === "eat" ? "food" : "empty" };
  const fifo = act === "eat" ? Fifo.appendAndGrow(body.fifo, part) : Fifo.append(body.fifo, part);
  return { fifo, head: newHead };
}

// Port of SnakeBody.create(position:headDirection:length:) — SnakeBody.swift:117-149.
// Starts `length` cells behind `position` and ticks forward, growing each step,
// then clears the stomach. Yields length+1 body parts like the Swift original.
function bodyCreate(position, headDirection, length) {
  const n = length;
  let dx = 0, dy = 0;
  if (headDirection === "up") dy = -n;
  if (headDirection === "down") dy = n;
  if (headDirection === "left") dx = n;
  if (headDirection === "right") dx = -n;
  const startPosition = offsetBy(position, dx, dy);
  let body = {
    fifo: Fifo._purged(1, [{ position: startPosition, content: "empty" }]),
    head: { position: startPosition, direction: headDirection },
  };
  for (let i = 0; i < n; i++) {
    body = bodyStateForTick(body, "moveForward", "eat");
  }
  return bodyClearStomach(body);
}

function bodyClearStomach(body) {
  return {
    fifo: Fifo.map(body.fifo, (p) => ({ position: p.position, content: "empty" })),
    head: body.head,
  };
}

function bodyPositionArray(body) { return body.fifo.array.map((p) => p.position); }
function bodyPositionSet(body) { return new Set(bodyPositionArray(body).map(posKey)); }
function bodyWithoutHeadPositionSet(body) {
  const arr = body.fifo.array;
  if (arr.length === 0) return new Set();
  return new Set(arr.slice(0, -1).map((p) => posKey(p.position)));
}
function bodyIsEatingItself(body) {
  return bodyWithoutHeadPositionSet(body).has(posKey(body.head.position));
}
function bodyLength(body) { return body.fifo.array.length; }

SnakeTests.add("head simulateTick", () => {
  const h = { position: { x: 5, y: 5 }, direction: "up" };
  assertEq(headSimulateTick(h, "moveForward"), { position: { x: 5, y: 6 }, direction: "up" });
  assertEq(headSimulateTick(h, "moveCCW"), { position: { x: 4, y: 5 }, direction: "left" });
  assertEq(headSimulateTick(h, "moveCW"), { position: { x: 6, y: 5 }, direction: "right" });
  assertEq(headSimulateTick(h, "dontMove"), h);
});
SnakeTests.add("head moveToward direction blocks reversal", () => {
  const h = { position: { x: 5, y: 5 }, direction: "up" };
  assertEq(headMoveTowardDirection(h, "down"), "dontMove");
  assertEq(headMoveTowardDirection(h, "left"), "moveCCW");
  assertEq(headMoveTowardDirection(h, "right"), "moveCW");
  assertEq(headMoveTowardDirection(h, "up"), "moveForward");
});
SnakeTests.add("body create extends backward from head", () => {
  const b = bodyCreate({ x: 5, y: 5 }, "right", 4);
  assertEq(b.head.position, { x: 5, y: 5 });
  assertEq(b.head.direction, "right");
  assertEq(bodyPositionArray(b), [{x:1,y:5},{x:2,y:5},{x:3,y:5},{x:4,y:5},{x:5,y:5}]);
});
SnakeTests.add("body eat grows, plain move keeps length", () => {
  const b = bodyCreate({ x: 5, y: 5 }, "right", 2);
  const grown = bodyStateForTick(b, "moveForward", "eat");
  assertEq(bodyLength(grown), bodyLength(b) + 1);
  assert(!bodyIsEatingItself(grown));
  const moved = bodyStateForTick(b, "moveForward", "doNothing");
  assertEq(bodyLength(moved), bodyLength(b));
  assertEq(moved.head.position, { x: 6, y: 5 });
});

// ---------------------------------------------------------------------------
// Level parsing — port of EngineShared/Level/SnakeLevel+Load.swift and
// SnakeLevelBuilder.swift. CSV rows are REVERSED so the origin is bottom-left.
// Cluster distances: per cluster, find the empty cell nearest the bounding-box
// center; BFS path length between those cells; adjacent cluster pairs are
// skipped (manhattan is more precise there); -1 = no route.
// BFS replaces Swift's A* (ComputeShortestPath) — only the path length is
// consumed, and BFS on an unweighted grid is exact.
// ---------------------------------------------------------------------------
function clusterPairKey(a, b) { return a < b ? `${a}-${b}` : `${b}-${a}`; }

function parseLevel(csvText) {
  const allRows = csvText.split("\n").map((line) => line.split(","));
  const id = allRows[0][0];
  const rows = allRows.slice(1).reverse();
  const height = rows.length;
  const width = rows[0].length;
  if (height < 3 || width < 3) throw new Error("level too small");

  const wallSet = new Set();
  const clusters = new Map(); // posKey -> cluster id (unassigned cells default to 0)
  let initialFoodPosition = { x: 0, y: 0 };
  let player1Body = null;
  let player2Body = null;

  for (let y = 0; y < height; y++) {
    if (rows[y].length !== width) throw new Error("inconsistent column count");
    for (let x = 0; x < width; x++) {
      const position = { x, y };
      for (const token of rows[y][x].split(" ").filter(Boolean)) {
        const c0 = token[0];
        if (c0 === "W") {
          wallSet.add(posKey(position));
        } else if (c0 === "F") {
          initialFoodPosition = position;
        } else if (c0 === "P") {
          const direction = { U: "up", L: "left", D: "down", R: "right" }[token[2]] ?? "right";
          const length = parseInt(token[3], 10) || 2;
          const body = bodyCreate(position, direction, length);
          if (token[1] === "1") player1Body = body;
          if (token[1] === "2") player2Body = body;
        } else if (c0 === "C") {
          clusters.set(posKey(position), parseInt(token.slice(1), 10));
        }
      }
    }
  }

  // Empty positions in the same order Swift builds them: y outer, x inner.
  const emptyPositionArray = [];
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      if (!wallSet.has(`${x},${y}`)) emptyPositionArray.push({ x, y });
    }
  }
  const emptyPositionSet = new Set(emptyPositionArray.map(posKey));

  const level = {
    id,
    size: { x: width, y: height },
    wallSet,
    clusters,
    emptyPositionArray,
    emptyPositionSet,
    initialFoodPosition,
    player1Body,
    player2Body,
    distanceBetweenClusters: new Map(),
  };
  level.distanceBetweenClusters = computeDistancesBetweenClusters(level);
  return level;
}

function levelClusterAt(level, position) { return level.clusters.get(posKey(position)) ?? 0; }
function levelIsWall(level, position) {
  const { x, y } = position;
  if (x < 0 || y < 0 || x >= level.size.x || y >= level.size.y) return true;
  return level.wallSet.has(posKey(position));
}

function bfsPathLength(level, start, target) {
  if (posEq(start, target)) return 0;
  const visited = new Set([posKey(start)]);
  let frontier = [start];
  let distance = 0;
  while (frontier.length > 0) {
    distance++;
    const next = [];
    for (const p of frontier) {
      for (const d of Object.values(DIRECTION_DELTA)) {
        const q = offsetBy(p, d.dx, d.dy);
        const k = posKey(q);
        if (visited.has(k) || !level.emptyPositionSet.has(k)) continue;
        if (posEq(q, target)) return distance;
        visited.add(k);
        next.push(q);
      }
    }
    frontier = next;
  }
  return -1; // no route
}

function computeDistancesBetweenClusters(level) {
  const result = new Map();
  // Bounding box per cluster over empty cells (cluster 0 included, as in Swift).
  const boxes = new Map();
  for (const p of level.emptyPositionArray) {
    const c = levelClusterAt(level, p);
    const box = boxes.get(c);
    if (!box) boxes.set(c, { minX: p.x, maxX: p.x, minY: p.y, maxY: p.y });
    else {
      box.minX = Math.min(box.minX, p.x); box.maxX = Math.max(box.maxX, p.x);
      box.minY = Math.min(box.minY, p.y); box.maxY = Math.max(box.maxY, p.y);
    }
  }
  if (boxes.size < 2) return result;

  // Representative cell per cluster: empty cell nearest the box center.
  const centers = new Map();
  for (const [c, box] of boxes) {
    centers.set(c, { x: Math.floor((box.minX + box.maxX) / 2), y: Math.floor((box.minY + box.maxY) / 2) });
  }
  const nearestCell = new Map();
  const nearestDist = new Map();
  for (const p of level.emptyPositionArray) {
    const c = levelClusterAt(level, p);
    const d = manhattan(p, centers.get(c));
    if (d < (nearestDist.get(c) ?? Infinity)) {
      nearestDist.set(c, d);
      nearestCell.set(c, p);
    }
  }

  // Adjacent cluster pairs (touching via 4-neighbour empty cells) are skipped.
  const adjacent = new Set();
  for (const p of level.emptyPositionArray) {
    const c = levelClusterAt(level, p);
    for (const d of Object.values(DIRECTION_DELTA)) {
      const q = offsetBy(p, d.dx, d.dy);
      if (!level.emptyPositionSet.has(posKey(q))) continue;
      const c2 = levelClusterAt(level, q);
      if (c2 !== c) adjacent.add(clusterPairKey(c, c2));
    }
  }

  const clusterIds = [...boxes.keys()].sort((a, b) => a - b);
  for (const c0 of clusterIds) {
    for (const c1 of clusterIds) {
      if (c0 >= c1) continue;
      const key = clusterPairKey(c0, c1);
      if (adjacent.has(key) || result.has(key)) continue;
      const pathLength = bfsPathLength(level, nearestCell.get(c0), nearestCell.get(c1));
      // Swift stores plannedPath.count (cells incl. endpoints); BFS returns edges.
      result.set(key, pathLength < 0 ? -1 : pathLength + 1);
    }
  }
  return result;
}

// Port of SnakeLevel.estimateDistance — SnakeLevel.swift:64-84.
function levelEstimateDistance(level, position0, position1) {
  const c0 = levelClusterAt(level, position0);
  const c1 = levelClusterAt(level, position1);
  if (c0 === c1) return manhattan(position0, position1);
  const distance = level.distanceBetweenClusters.get(clusterPairKey(c0, c1));
  if (distance === undefined) return manhattan(position0, position1); // neighbouring clusters
  if (distance < 0) return Infinity; // no route
  return distance * 10;
}

const levelCache = new Map();
function getLevel(name) {
  if (!levelCache.has(name)) levelCache.set(name, parseLevel(LEVEL_CSV[name]));
  return levelCache.get(name);
}
const LEVEL_NAMES = Object.keys(LEVEL_CSV);

SnakeTests.add("level 0 parses", () => {
  const lv = getLevel("Level 0");
  assertEq(lv.size, { x: 9, y: 9 });
  // P1R4 is on csv grid row 1 (0-based, below the wall row) ⇒ y = 9-1-1 = 7... rows
  // exclude the UUID header, so grid row index 1 maps to y = height-1-1.
  assertEq(lv.player1Body.head.direction, "right");
  assertEq(lv.player1Body.head.position, { x: 6, y: 7 });
  assertEq(lv.player2Body.head.direction, "left");
  assertEq(lv.player2Body.head.position, { x: 2, y: 1 });
  assertEq(lv.initialFoodPosition, { x: 4, y: 4 });
  assert(lv.wallSet.has("0,0"));
  assert(!lv.wallSet.has("4,4"));
  assertEq(lv.emptyPositionArray.length, 7 * 7);
});
SnakeTests.add("all 12 levels parse", () => {
  assertEq(LEVEL_NAMES.length, 12);
  for (const name of LEVEL_NAMES) {
    const lv = getLevel(name);
    assert(lv.size.x >= 3 && lv.size.y >= 3, name);
    assert(lv.emptyPositionArray.length > 0, name);
    assert(lv.player1Body !== null, `${name} has player1`);
    assert(lv.player2Body !== null, `${name} has player2`);
  }
});
SnakeTests.add("estimateDistance: same cluster manhattan, cross-cluster scaled", () => {
  const lv0 = getLevel("Level 0"); // no clusters → manhattan everywhere
  assertEq(levelEstimateDistance(lv0, { x: 1, y: 1 }, { x: 4, y: 5 }), 7);
  const lv5 = getLevel("Level 5"); // clusters C1..C9
  assert(lv5.distanceBetweenClusters.size > 0, "level 5 has cluster distances");
  // C8 (left corridor) to C4 (right corridor) are non-adjacent: scaled distance
  const d = levelEstimateDistance(lv5, { x: 1, y: 8 }, { x: 17, y: 8 });
  assert(Number.isFinite(d) && d > manhattan({ x: 1, y: 8 }, { x: 17, y: 8 }), `got ${d}`);
});

// Player — port of EngineShared/Snake/SnakePlayer.swift.
// Pure data so it serializes to the worker. Deviation from Swift: the bot's
// search tree lives in the worker (keyed by player), not on the player object;
// only plannedMovement/plannedPath cross the boundary (stored as botPlannedPath).
// ---------------------------------------------------------------------------
function playerCreate(id, role, snakeBody) {
  return {
    id, // "player1" | "player2"
    isInstalled: role !== "none",
    role, // "human" | "botMonteCarlo" | "botHybrid" | "none"
    snakeBody,
    pendingMovement: "dontMove",
    pendingAct: "doNothing",
    causesOfDeath: [],
    botPlannedPath: [],
  };
}
function playerIsAlive(p) { return p.isInstalled && p.causesOfDeath.length === 0; }
function playerIsAliveAndHuman(p) { return playerIsAlive(p) && p.role === "human"; }
function playerIsBot(p) { return p.role === "botMonteCarlo" || p.role === "botHybrid"; }
function playerUpdate(p, changes) { return { ...p, ...changes }; }
function playerKill(p, causeOfDeath) {
  if (p.causesOfDeath.includes(causeOfDeath)) return p;
  return { ...p, causesOfDeath: [...p.causesOfDeath, causeOfDeath] };
}
function playerClearPending(p) { return { ...p, pendingMovement: "dontMove", pendingAct: "doNothing" }; }

// ---------------------------------------------------------------------------
// GameState — port of EngineShared/Snake/SnakeGameState.swift (+Create).
// Immutable; foodRngSeed is a decimal string so it survives JSON/postMessage.
// ---------------------------------------------------------------------------
function gameStateCreate(levelName, role1, role2) {
  const level = getLevel(levelName);
  return {
    levelName,
    foodPosition: level.initialFoodPosition,
    player1: playerCreate("player1", role1, level.player1Body),
    player2: playerCreate("player2", role2, level.player2Body),
    foodRngSeed: "0",
    numberOfSteps: 0,
  };
}
function gsLevel(gs) { return getLevel(gs.levelName); }
function gsUpdate(gs, changes) { return { ...gs, ...changes }; }
function gsUpdatePlayer(gs, playerKey, player) { return { ...gs, [playerKey]: player }; }
function gsClearPendingForHumans(gs) {
  const clear = (p) => (p.role === "human" ? playerClearPending(p) : p);
  return { ...gs, player1: clear(gs.player1), player2: clear(gs.player2) };
}

// ---------------------------------------------------------------------------
// Collision detection — port of EngineShared/Snake/SnakeCollisionDetector.swift.
// Speculatively ticks both bodies with their pending movements, then checks in
// the Swift order: wall → head-to-head (mutual death) → head into opponent →
// self-eat → food-eaten flags.
// ---------------------------------------------------------------------------
function runCollisionDetector(level, foodPosition, player1, player2) {
  const tick = (p) =>
    bodyStateForTick(p.snakeBody, playerIsAlive(p) ? p.pendingMovement : "dontMove", "doNothing");
  const body1 = tick(player1);
  const body2 = tick(player2);
  const r = {
    player1Alive: playerIsAlive(player1),
    player2Alive: playerIsAlive(player2),
    player1EatsFood: false,
    player2EatsFood: false,
    collisionType1: "noCollision",
    collisionType2: "noCollision",
  };
  if (!player1.isInstalled && !player2.isInstalled) return r;
  if (!r.player1Alive && !r.player2Alive) return r;

  if (player1.isInstalled && r.player1Alive && levelIsWall(level, body1.head.position)) {
    r.player1Alive = false; r.collisionType1 = "collisionWithWall";
  }
  if (player2.isInstalled && r.player2Alive && levelIsWall(level, body2.head.position)) {
    r.player2Alive = false; r.collisionType2 = "collisionWithWall";
  }
  if (!r.player1Alive && !r.player2Alive) return r;

  if (player1.isInstalled && player2.isInstalled && r.player1Alive && r.player2Alive
      && posEq(body1.head.position, body2.head.position)) {
    r.player1Alive = false; r.collisionType1 = "collisionWithOpponent";
    r.player2Alive = false; r.collisionType2 = "collisionWithOpponent";
    return r;
  }

  if (player1.isInstalled && player2.isInstalled) {
    const positions1 = bodyPositionSet(body1);
    const positions2 = bodyPositionSet(body2);
    if (r.player1Alive && positions2.has(posKey(body1.head.position))) {
      r.player1Alive = false; r.collisionType1 = "collisionWithOpponent";
    }
    if (r.player2Alive && positions1.has(posKey(body2.head.position))) {
      r.player2Alive = false; r.collisionType2 = "collisionWithOpponent";
    }
  }
  if (!r.player1Alive && !r.player2Alive) return r;

  if (player1.isInstalled && r.player1Alive && bodyIsEatingItself(body1)) {
    r.player1Alive = false; r.collisionType1 = "collisionWithItself";
  }
  if (player2.isInstalled && r.player2Alive && bodyIsEatingItself(body2)) {
    r.player2Alive = false; r.collisionType2 = "collisionWithItself";
  }
  if (!r.player1Alive && !r.player2Alive) return r;

  if (foodPosition) {
    if (player1.isInstalled && r.player1Alive && posEq(body1.head.position, foodPosition)) r.player1EatsFood = true;
    if (player2.isInstalled && r.player2Alive && posEq(body2.head.position, foodPosition)) r.player2EatsFood = true;
  }
  return r;
}

// Port of SnakeGameState.detectCollision() — SnakeCollisionDetector.swift:183-229.
function detectCollision(gs) {
  const alive1 = playerIsAlive(gs.player1);
  const alive2 = playerIsAlive(gs.player2);
  if (!alive1 && !alive2) return gs;
  const r = runCollisionDetector(gsLevel(gs), gs.foodPosition, gs.player1, gs.player2);
  let out = gs;
  if (alive1 && !r.player1Alive) out = gsUpdatePlayer(out, "player1", playerKill(out.player1, r.collisionType1));
  if (alive2 && !r.player2Alive) out = gsUpdatePlayer(out, "player2", playerKill(out.player2, r.collisionType2));
  if (r.player1EatsFood) {
    out = gsUpdate(out, { foodPosition: null });
    out = gsUpdatePlayer(out, "player1", playerUpdate(out.player1, { pendingAct: "eat" }));
  }
  if (r.player2EatsFood) {
    out = gsUpdate(out, { foodPosition: null });
    out = gsUpdatePlayer(out, "player2", playerUpdate(out.player2, { pendingAct: "eat" }));
  }
  return out;
}

// ---------------------------------------------------------------------------
// Food placement — port of EngineShared/Snake/SnakeFoodGenerator.swift.
// Deterministic via the seed carried in the game state.
// ---------------------------------------------------------------------------
function placeNewFood(gs) {
  if (gs.foodPosition) return gs;
  const taken = new Set();
  if (gs.player1.isInstalled) for (const k of bodyPositionSet(gs.player1.snakeBody)) taken.add(k);
  if (gs.player2.isInstalled) for (const k of bodyPositionSet(gs.player2.snakeBody)) taken.add(k);
  const candidates = gsLevel(gs).emptyPositionArray.filter((p) => !taken.has(posKey(p)));
  const rng = new LCRNG(BigInt(gs.foodRngSeed));
  if (candidates.length === 0) {
    let out = gsUpdate(gs, { foodRngSeed: rng.seed.toString() });
    out = gsUpdatePlayer(out, "player1", playerKill(out.player1, "noMoreFood"));
    out = gsUpdatePlayer(out, "player2", playerKill(out.player2, "noMoreFood"));
    return out;
  }
  const position = candidates[rng.pickIndex(candidates.length)];
  return gsUpdate(gs, { foodPosition: position, foodRngSeed: rng.seed.toString() });
}

// ---------------------------------------------------------------------------
// Stuck-in-a-loop detection — port of EngineShared/Snake/StuckSnakeDetector.swift.
// Repeated body state: score += 2; fresh state: score -= 1; stuck at score >= 5.
// Only bots are killed by this (humans find it annoying — Swift comment).
// ---------------------------------------------------------------------------
class StuckDetector {
  constructor() { this.history = []; this._rebuild(); }
  _rebuild() {
    this.seen = new Set();
    this.score = 0;
    this.isStuck = false;
    for (const key of this.history) this._appendKey(key);
  }
  _appendKey(key) {
    if (!this.seen.has(key)) {
      this.seen.add(key);
      this.score = this.score > 1 ? this.score - 1 : 0;
      return;
    }
    this.score += 2;
    if (this.score >= 5) this.isStuck = true;
  }
  append(body) {
    const key = JSON.stringify([bodyPositionArray(body), body.head.direction]);
    this.history.push(key);
    this._appendKey(key);
  }
  undo() {
    if (this.history.length === 0) return;
    this.history.pop();
    this._rebuild();
  }
  reset() { this.history = []; this._rebuild(); }
  killBotIfStuckInLoop(player) {
    if (!playerIsAlive(player) || !playerIsBot(player)) return player;
    this.append(player.snakeBody);
    return this.isStuck ? playerKill(player, "stuckInALoop") : player;
  }
}

// ---------------------------------------------------------------------------
// Human-input helpers — ports of SnakeGameState+PreventHumanCollisions.swift
// and +IsWaitingForHumanInput.swift. A human movement that would collide is
// converted to dontMove, so an illegal keypress just keeps the snake waiting.
// ---------------------------------------------------------------------------
function preventHumanCollisions(gs) {
  let out = gs;
  for (const key of ["player1", "player2"]) {
    const p = out[key];
    if (!playerIsAliveAndHuman(p) || p.pendingMovement === "dontMove") continue;
    const r = runCollisionDetector(gsLevel(out), out.foodPosition, out.player1, out.player2);
    const alive = key === "player1" ? r.player1Alive : r.player2Alive;
    if (!alive) out = gsUpdatePlayer(out, key, playerUpdate(p, { pendingMovement: "dontMove" }));
  }
  return out;
}
function isWaitingForHumanInput(gs) {
  return (playerIsAliveAndHuman(gs.player1) && gs.player1.pendingMovement === "dontMove")
      || (playerIsAliveAndHuman(gs.player2) && gs.player2.pendingMovement === "dontMove");
}

// --- test helper -----------------------------------------------------------
function createGameStateForTest({ levelName = "Level 0", p1, p2, food } = {}) {
  let gs = gameStateCreate(levelName, p1?.role ?? "human", p2?.role ?? "human");
  const place = (key, spec) => {
    if (!spec) return;
    let player = gs[key];
    if (spec.pos) player = playerUpdate(player, { snakeBody: bodyCreate(spec.pos, spec.dir, spec.len ?? 2) });
    if (spec.move) player = playerUpdate(player, { pendingMovement: spec.move });
    gs = gsUpdatePlayer(gs, key, player);
  };
  place("player1", p1);
  place("player2", p2);
  if (food !== undefined) gs = gsUpdate(gs, { foodPosition: food });
  return gs;
}

SnakeTests.add("stuck detector kills bot repeating states", () => {
  const detector = new StuckDetector();
  let player = playerCreate("player1", "botMonteCarlo", bodyCreate({ x: 4, y: 4 }, "right", 2));
  // Cycle through the same 4 body states until flagged stuck.
  const states = [];
  let b = player.snakeBody;
  for (const mv of ["moveCW", "moveCW", "moveCW", "moveCW"]) {
    b = bodyStateForTick(b, mv, "doNothing");
    states.push(b);
  }
  let killed = null;
  for (let round = 0; round < 5 && !killed; round++) {
    for (const body of states) {
      const result = detector.killBotIfStuckInLoop(playerUpdate(player, { snakeBody: body }));
      if (!playerIsAlive(result)) { killed = result; break; }
    }
  }

// ---------------------------------------------------------------------------
// GameEnvironment — port of EngineShared/Environment/GameEnvironmentInteractive.swift.
// Bot moves are injected from outside (the worker) via setPendingMovement;
// the Swift computeNextBotMovement step happens asynchronously in the UI layer.
// ---------------------------------------------------------------------------
class GameEnvironment {
  constructor(initialGameState) {
    this.initialGameState = initialGameState;
    this.gameState = initialGameState;
    this.previousGameStates = [];
    this.stuck1 = new StuckDetector();
    this.stuck2 = new StuckDetector();
  }

  reset() {
    this.stuck1.reset();
    this.stuck2.reset();
    this.previousGameStates = [];
    this.gameState = placeNewFood(this.initialGameState);
    return this.gameState;
  }

  undo() {
    let gs = this.previousGameStates.pop();
    if (!gs) return null;
    gs = gsClearPendingForHumans(gs);
    gs = placeNewFood(gs);
    this.stuck1.undo();
    this.stuck2.undo();
    this.gameState = gs;
    return gs;
  }

  // "reachedTheEnd" | "stepRequiresHumanInput" | "stepAutonomous"
  get stepControlMode() {
    let botCount = 0, nonBotCount = 0;
    for (const p of [this.gameState.player1, this.gameState.player2]) {
      if (!playerIsAlive(p)) continue;
      if (playerIsBot(p)) botCount++; else nonBotCount++;
    }
    if (botCount + nonBotCount === 0) return "reachedTheEnd";
    return nonBotCount > 0 ? "stepRequiresHumanInput" : "stepAutonomous";
  }

  // action: { player1: movement, player2: movement }
  step(action) {
    const oldGameState = this.gameState;
    let gs = gsUpdate(oldGameState, { numberOfSteps: oldGameState.numberOfSteps + 1 });

    for (const key of ["player1", "player2"]) {
      const p = gs[key];
      if (playerIsAliveAndHuman(p)) {
        if (action[key] === "dontMove") return oldGameState; // human action required
        gs = gsUpdatePlayer(gs, key, playerUpdate(p, { pendingMovement: action[key] }));
      }
    }

    gs = detectCollision(gs);

    let collisionCheckAfterEating = false;
    for (const [key, stuck] of [["player1", this.stuck1], ["player2", this.stuck2]]) {
      let p = gs[key];
      if (!playerIsAlive(p)) continue;
      const opponent = gs[key === "player1" ? "player2" : "player1"];
      if (p.pendingAct === "eat") collisionCheckAfterEating = true;
      p = playerUpdate(p, { snakeBody: bodyStateForTick(p.snakeBody, p.pendingMovement, p.pendingAct) });
      p = playerClearPending(p);
      // Stuck-loop kill is skipped when the opponent is a living human (Swift line 124):
      // a human opponent legitimately forces repetitive defensive play.
      if (!playerIsAliveAndHuman(opponent)) p = stuck.killBotIfStuckInLoop(p);
      gs = gsUpdatePlayer(gs, key, p);
    }

    // When one player eats and grows, the other player's head can now overlap
    // the 1-cell-longer tail — GameEnvironmentInteractive.swift:148-167.
    if (collisionCheckAfterEating && playerIsAlive(gs.player1) && playerIsAlive(gs.player2)) {
      const positions1 = bodyPositionSet(gs.player1.snakeBody);
      const positions2 = bodyPositionSet(gs.player2.snakeBody);
      if (positions2.has(posKey(gs.player1.snakeBody.head.position))) {
        gs = gsUpdatePlayer(gs, "player1", playerKill(oldGameState.player1, "collisionWithOpponent"));
      }
      if (positions1.has(posKey(gs.player2.snakeBody.head.position))) {
        gs = gsUpdatePlayer(gs, "player2", playerKill(oldGameState.player2, "collisionWithOpponent"));
      }
    }

    gs = placeNewFood(gs);

    this.previousGameStates.push(oldGameState);
    this.gameState = gs;
    return gs;
  }

  setPendingMovement(playerKey, movement, plannedPath) {
    const p = this.gameState[playerKey];
    this.gameState = gsUpdatePlayer(this.gameState, playerKey, playerUpdate(p, {
      pendingMovement: movement,
      botPlannedPath: plannedPath ?? p.botPlannedPath,
    }));
    return this.gameState;
  }
}

// ---------------------------------------------------------------------------
// SnakeBot6 "Monte Carlo 2" — port of EngineShared/Bot/SnakeBot6.swift.
// A deterministic Monte-Carlo tree search over alternating move nodes and
// simulated food drops. The tree is kept between ticks and the subtree
// matching what actually happened is reattached under a fresh root.
// Node kinds: root, leaf, food, foodChoice, move, moveChoice, kill.
// ---------------------------------------------------------------------------
function makeNode(kind, props = {}) {
  return { kind, parent: null, isBest: false, ...props };
}

function nodeChildren(node) {
  switch (node.kind) {
    case "food": case "move": return node.choices;
    case "leaf": return [];
    default: return node.child ? [node.child] : [];
  }
}

function forEachNode(root, fn) {
  const stack = [root];
  while (stack.length > 0) {
    const node = stack.pop();
    fn(node);
    stack.push(...nodeChildren(node));
  }
}

// Scenario utility ordering — SnakeBot6.swift:502-544 (`mycompare`).
// True when lhs is the better scenario:
// survival > longer move sequence > more foods eaten > shorter food distance.
function scenarioCompare(lhs, rhs) {
  if (lhs.certainDeath && !rhs.certainDeath) return false;
  if (!lhs.certainDeath && rhs.certainDeath) return true;
  if (lhs.movements.length !== rhs.movements.length) return lhs.movements.length > rhs.movements.length;
  if (lhs.numberOfFoodsEaten !== rhs.numberOfFoodsEaten) return lhs.numberOfFoodsEaten > rhs.numberOfFoodsEaten;
  return lhs.distanceToFood < rhs.distanceToFood;
}

// Port of BuildTreeVisitor — SnakeBot6.swift:552-1114.
class TreeBuilder {
  constructor(level, player, oppositePlayer, foodPosition, seed) {
    this.level = level;
    this.player = [player, oppositePlayer];
    this.foodPosition = foodPosition;
    this.numberOfMoves = [0, 0];
    this.numberOfFoodsEaten = 0;
    this.movements = [];
    this.scenarios = [];
    this.rng = new LCRNG(seed);
  }

  bestScenario() {
    if (this.scenarios.length === 0) return null;
    return this.scenarios.reduce((best, s) => (scenarioCompare(s, best) ? s : best));
  }

  appendScenario(node, certainDeath) {
    this.scenarios.push({
      destinationNode: node,
      movements: [...this.movements],
      certainDeath,
      numberOfFoodsEaten: this.numberOfFoodsEaten,
      distanceToFood: this.foodPosition
        ? levelEstimateDistance(this.level, this.player[0].snakeBody.head.position, this.foodPosition)
        : Infinity,
    });
  }

  visit(node) {
    switch (node.kind) {
      case "root": return this.processChildNode(node, 0); // player A moves first
      case "leaf": return this.appendScenario(node, false);
      case "food": return this.visitFood(node);
      case "foodChoice": return this.visitFoodChoice(node);
      case "move": return this.visitMove(node);
      case "moveChoice": return this.visitMoveChoice(node);
      case "kill": return this.visitKill(node);
      default: throw new Error(`unknown node kind ${node.kind}`);
    }
  }

  // Simulated food drop. Branching limit tables ported verbatim from
  // SnakeBot6.swift:660-716 — wide early (16 drops at the start of a
  // 1-player game), narrowing with depth and with foods already eaten.
  visitFood(node) {
    const originalNumberOfFoodsEaten = this.numberOfFoodsEaten;
    const newNumberOfFoodsEaten = originalNumberOfFoodsEaten + 1;
    const isTwoPlayer = this.player[1].isInstalled;

    const taken = new Set();
    for (const p of this.player) {
      if (!p.isInstalled) continue;
      for (const k of bodyPositionSet(p.snakeBody)) taken.add(k);
    }

    let limit = 6;
    const numberOfMoves = this.numberOfMoves[0];
    if (originalNumberOfFoodsEaten <= 1) {
      if (numberOfMoves <= 3) limit = 16;
      else if (numberOfMoves <= 4) limit = 6;
      else if (numberOfMoves <= 5) limit = 4;
      else if (numberOfMoves <= 6) limit = 3;
      else limit = 2;
    } else if (originalNumberOfFoodsEaten <= 2) limit = 6;
    else if (originalNumberOfFoodsEaten <= 3) limit = 4;
    else if (originalNumberOfFoodsEaten <= 4) limit = 3;
    else if (originalNumberOfFoodsEaten <= 6) limit = 2;
    else limit = 1;
    if (isTwoPlayer) {
      if (originalNumberOfFoodsEaten <= 1) limit = numberOfMoves <= 3 ? 6 : 3;
      else limit = numberOfMoves <= 3 ? 2 : 1;
    }

    const newChoices = [];
    // Keep previous-iteration choices that are still reachable.
    for (const choice of node.choices) {
      const k = posKey(choice.position);
      if (!this.level.emptyPositionSet.has(k) || taken.has(k)) continue;
      newChoices.push(choice);
      taken.add(k);
    }
    // Fill with seeded-random picks from the sorted free positions, so the
    // bot is deterministic (Swift trades speed for reproducibility here).
    const freePositions = this.level.emptyPositionArray
      .filter((p) => !taken.has(posKey(p)))
      .sort(posCompare);
    while (newChoices.length < limit && freePositions.length > 0) {
      const index = this.rng.pickIndex(freePositions.length);
      const choice = makeNode("foodChoice", { position: freePositions[index], child: null });
      choice.parent = node;
      newChoices.push(choice);
      freePositions.splice(index, 1);
    }
    newChoices.sort((a, b) => posCompare(a.position, b.position));
    node.choices = newChoices;

    for (const choice of newChoices) {
      this.numberOfFoodsEaten = newNumberOfFoodsEaten;
      this.visit(choice);
    }
    this.numberOfFoodsEaten = originalNumberOfFoodsEaten;
  }

  visitFoodChoice(node) {
    const originalFoodPosition = this.foodPosition;
    this.foodPosition = node.position;
    this.processChildNode(node, 0); // after eating, player A moves first
    this.foodPosition = originalFoodPosition;
  }

  // Expansion — SnakeBot6.swift:781-884. Wall moves are pruned outright; the
  // previously-best child is always revisited; the rest are shuffled and
  // capped at 3/2/1 branches by depth.
  visitMove(node) {
    const playerId = node.playerId;
    const originalNumberOfMoves = this.numberOfMoves[playerId];
    const newNumberOfMoves = originalNumberOfMoves + 1;
    this.numberOfMoves[playerId] = newNumberOfMoves;
    try {
      if (node.needsExploringPermanentObstacles) {
        node.needsExploringPermanentObstacles = false;
        const currentHead = this.player[playerId].snakeBody.head;
        node.choices = [];
        for (const movement of ["moveCCW", "moveForward", "moveCW"]) {
          const newHead = headSimulateTick(currentHead, movement);
          if (!this.level.emptyPositionSet.has(posKey(newHead.position))) continue;
          const choice = makeNode("moveChoice", { playerId, movement, position: newHead.position, child: null });
          choice.parent = node;
          node.choices.push(choice);
        }
      }

      const bestNode = node.choices.find((c) => c.isBest);
      let nonBest = node.choices.filter((c) => !c.isBest);
      const limit = newNumberOfMoves < 3 ? 3 : newNumberOfMoves < 5 ? 2 : 1;
      this.rng.shuffle(nonBest);
      nonBest = nonBest.slice(0, limit);

      if (bestNode) this.visit(bestNode);
      for (const choice of nonBest) this.visit(choice);
    } finally {
      this.numberOfMoves[playerId] = originalNumberOfMoves;
    }
  }

  // Simulate one move — SnakeBot6.swift:886-1012.
  visitMoveChoice(node) {
    const playerId = node.playerId;
    const originalPlayer = this.player[playerId];
    const originalFoodPosition = this.foodPosition;
    const originalMovements = this.movements;
    if (playerId === 0) this.movements = [...this.movements, node.movement];
    try {
      const originalSnakeBody = originalPlayer.snakeBody;

      const killVia = (cause) => {
        // Reuse an existing KillNode subtree, otherwise replace the child.
        let killNode = node.child && node.child.kind === "kill" ? node.child : null;
        if (!killNode) {
          killNode = makeNode("kill", { playerId, cause, child: null });
          node.child = killNode;
          killNode.parent = node;
        }
        killNode.cause = cause;
        killNode.playerId = playerId;
        this.visit(killNode);
      };

      if (posEq(node.position, originalFoodPosition)) {
        const newSnakeBody = bodyStateForTick(originalSnakeBody, node.movement, "eat");
        this.player[playerId] = playerUpdate(originalPlayer, { snakeBody: newSnakeBody });
        this.foodPosition = null;
        if (bodyIsEatingItself(newSnakeBody)) return killVia("collisionWithSelf");
        let foodNode = node.child && node.child.kind === "food" ? node.child : null;
        if (!foodNode) {
          foodNode = makeNode("food", { choices: [] });
          node.child = foodNode;
          foodNode.parent = node;
        }
        return this.visit(foodNode);
      }

      const newSnakeBody = bodyStateForTick(originalSnakeBody, node.movement, "doNothing");
      if (bodyIsEatingItself(newSnakeBody)) {
        this.player[playerId] = playerUpdate(originalPlayer, { snakeBody: newSnakeBody });
        this.foodPosition = null; // faithful to Swift (line 971)
        return killVia("collisionWithSelf");
      }

      const opponentPlayerId = this.nextInstalledPlayerId(playerId);
      if (opponentPlayerId !== playerId) {
        const opponent = this.player[opponentPlayerId];
        if (bodyPositionSet(opponent.snakeBody).has(posKey(node.position))) {
          // Swift always replaces with a fresh KillNode here (line 997).
          const killNode = makeNode("kill", { playerId, cause: "collisionWithOpponent", child: null });
          node.child = killNode;
          killNode.parent = node;
          return this.visit(killNode);
        }
      }

      this.player[playerId] = playerUpdate(originalPlayer, { snakeBody: newSnakeBody });
      this.foodPosition = originalFoodPosition;
      this.processChildNode(node, this.nextAlivePlayerId(playerId));
    } finally {
      this.player[playerId] = originalPlayer;
      this.foodPosition = originalFoodPosition;
      this.movements = originalMovements;
    }
  }

  visitKill(node) {
    // Player 0 dead → certain-death scenario, stop simulating.
    // Player 1 dead → still a (non-fatal) outcome for player 0.
    this.appendScenario(node, node.playerId === 0);
  }

  nextInstalledPlayerId(playerId) {
    if (!this.player[1].isInstalled) return 0;
    return (playerId + 1) % 2;
  }

  nextAlivePlayerId(playerId) {
    if (!this.player[1].isInstalled) return 0;
    let id = (playerId + 1) % 2;
    if (playerIsAlive(this.player[id])) return id;
    id = (id + 1) % 2;
    if (playerIsAlive(this.player[id])) return id;
    return 0;
  }

  // SnakeBot6.swift:1080-1113. Depth limit: deep (37) single-player,
  // narrow (17) in two-player games where each ply costs twice as much.
  processChildNode(node, playerId) {
    if (node.child && node.child.kind !== "leaf") return this.visit(node.child);
    const limit = this.player[1].isInstalled ? 17 : 37;
    const child = this.numberOfMoves[playerId] < limit
      ? makeNode("move", { playerId, choices: [], needsExploringPermanentObstacles: true })
      : makeNode("leaf");
    node.child = child;
    child.parent = node;
    this.visit(child);
  }
}

class Bot6 {
  constructor(iteration = 0, plannedMovement = "dontMove", plannedPath = [], previousRoot = null) {
    this.iteration = iteration;
    this.plannedMovement = plannedMovement;
    this.plannedPath = plannedPath;
    this.previousRoot = previousRoot;
  }

  // Port of SnakeBot6.compute — SnakeBot6.swift:33-251. Returns a NEW Bot6.
  compute(level, player, oppositePlayer, foodPosition) {
    if (!playerIsAlive(player)) return new Bot6();

    const root = makeNode("root", { child: null });

    // Reattach the subtree matching what actually happened since last tick.
    if (this.previousRoot) {
      let subtree = this.previousRoot.child;
      for (const [moveNodePlayerId, p] of [[0, player], [1, oppositePlayer]]) {
        if (subtree && subtree.kind === "move" && subtree.playerId === moveNodePlayerId) {
          const findKey = posKey(p.snakeBody.head.position);
          const match = subtree.choices.find((c) => posKey(c.position) === findKey);
          subtree = match ? match.child : null;
        }
      }
      if (subtree && subtree.kind === "food") {
        if (foodPosition) {
          // Pick the simulated food drop nearest the actual food.
          let best = null, bestDistance = Infinity;
          for (const choice of subtree.choices) {
            const d = levelEstimateDistance(level, choice.position, foodPosition);
            if (d < bestDistance) { bestDistance = d; best = choice; }
          }
          subtree = best && best.child && best.child.kind === "move" ? best.child : null;
        } else {
          subtree = null;
        }
      }
      if (subtree) {
        root.child = subtree;
        subtree.parent = root;
      }
    }

    const seed = BigInt(this.iteration * 100);
    const builder = new TreeBuilder(level, player, oppositePlayer, foodPosition, seed);
    builder.visit(root);

    // Best-node flags steered this build; clear them and re-flag the new best
    // path so the NEXT iteration prioritizes it.
    forEachNode(root, (n) => { n.isBest = false; });

    const scenario = builder.bestScenario();
    if (!scenario) {
      return new Bot6(this.iteration + 1, "moveForward", [], null);
    }
    for (let n = scenario.destinationNode; n; n = n.parent) n.isBest = true;

    const bestMovement = scenario.movements[0] ?? "moveForward";
    let head = player.snakeBody.head;
    const plannedPath = [head.position];
    for (const movement of scenario.movements) {
      head = headSimulateTick(head, movement);
      plannedPath.push(head.position);
    }
    return new Bot6(this.iteration + 1, bestMovement, plannedPath, root);
  }
}

// --- bot tests ---------------------------------------------------------------
// Maps a role string to the class implementing it (worker + tests + tournament).
function botForRole(role) {
  if (role === "botMonteCarlo") return new Bot6();
  if (role === "botHybrid") return new HybridBot();
  return null;
}

function runBotGame({ levelName = "Level 0", role1 = "botMonteCarlo", role2 = "none", twoPlayer = false, ticks }) {
  if (twoPlayer && role2 === "none") role2 = "botMonteCarlo";
  const env = new GameEnvironment(gameStateCreate(levelName, role1, role2));
  env.reset();
  const bots = { player1: botForRole(role1), player2: botForRole(role2) };
  const movements = [];
  for (let i = 0; i < ticks; i++) {
    if (env.stepControlMode === "reachedTheEnd") break;
    const gs = env.gameState;
    const action = { player1: "dontMove", player2: "dontMove" };
    for (const [key, opp] of [["player1", "player2"], ["player2", "player1"]]) {
      if (!playerIsBot(gs[key]) || !playerIsAlive(gs[key])) continue;
      bots[key] = bots[key].compute(gsLevel(gs), gs[key], gs[opp], gs.foodPosition);
      action[key] = bots[key].plannedMovement;
      env.setPendingMovement(key, action[key], bots[key].plannedPath);
    }
    env.step(action);
    movements.push(action.player1);
  }
  return { env, bots, movements };
}

SnakeTests.add("bot is deterministic", () => {
  const a = runBotGame({ ticks: 15 });
  const b = runBotGame({ ticks: 15 });
  assertEq(a.movements, b.movements);
  assertEq(a.env.gameState.player1.snakeBody, b.env.gameState.player1.snakeBody);
});
SnakeTests.add("bot plannedPath is contiguous from head", () => {
  const gs = gameStateCreate("Level 0", "botMonteCarlo", "none");
  const bot = new Bot6().compute(gsLevel(gs), gs.player1, gs.player2, gs.foodPosition);
  const path = bot.plannedPath;
  assert(path.length >= 2, `path too short: ${path.length}`);
  assertEq(path[0], gs.player1.snakeBody.head.position);
  for (let i = 1; i < path.length; i++) {
    assertEq(manhattan(path[i - 1], path[i]), 1, `path gap at ${i}`);
  }
});
SnakeTests.add("bot survives and eats on Level 0 single player", () => {
  const { env } = runBotGame({ ticks: 60 });
  const p1 = env.gameState.player1;
  assert(playerIsAlive(p1), `bot died: ${p1.causesOfDeath}`);
  assert(bodyLength(p1.snakeBody) > bodyLength(getLevel("Level 0").player1Body),
    "bot ate at least one food");
});
SnakeTests.add("bot avoids certain death", () => {
  // Head at (1,4) facing left: forward is the wall at x=0. CCW/CW survive.
  let gs = createGameStateForTest({
    p1: { pos: { x: 1, y: 4 }, dir: "left", len: 2, },
    food: { x: 7, y: 7 },
  });
  gs = gsUpdatePlayer(gs, "player1", playerUpdate(gs.player1, { role: "botMonteCarlo" }));
  gs = gsUpdatePlayer(gs, "player2", playerUpdate(playerCreate("player2", "none", gs.player2.snakeBody), {}));
  const bot = new Bot6().compute(gsLevel(gs), gs.player1, gs.player2, gs.foodPosition);

SnakeTests.add("role plumbing accepts both bot types", () => {
  const gs = gameStateCreate("Level 0", "botHybrid", "botMonteCarlo");
  assert(playerIsBot(gs.player1) && playerIsBot(gs.player2));
  assert(!playerIsAliveAndHuman(gs.player1));
  const env = new GameEnvironment(gs);
  env.reset();
  assertEq(env.stepControlMode, "stepAutonomous");
});
SnakeTests.add("bot works in two-player mode", () => {
  const { env } = runBotGame({ twoPlayer: true, ticks: 10 });
  assertEq(env.gameState.numberOfSteps, 10);
  // Both bots produced paths; no crash. Survival isn't asserted at tick 10 —
  // but on Level 0 with 10 ticks neither bot should have died.
  assert(playerIsAlive(env.gameState.player1), `p1 died: ${env.gameState.player1.causesOfDeath}`);
  assert(playerIsAlive(env.gameState.player2), `p2 died: ${env.gameState.player2.causesOfDeath}`);
});

// ---------------------------------------------------------------------------
// Path/space toolkit for the Hybrid bot. All searches are timing-aware: a
// snake body cell counts as passable if it will have vacated by the time the
// head arrives there. Cells are visited once (a snake cannot wait in place),
// which is the standard approximation — it is exactly what makes flood fill
// meaningful for trap detection.
// ---------------------------------------------------------------------------

// Map posKey → step at which the cell becomes free. fifo.array is tail-first,
// so index i vacates at step i+1; pending growth delays every vacation.
// frozen=true marks a dead snake: an obstacle that never vacates.
function vacateMap(body, growth = 0, frozen = false) {
  const map = new Map();
  body.fifo.array.forEach((part, i) => {
    const step = frozen ? Infinity : i + 1 + growth;
    const key = posKey(part.position);
    map.set(key, Math.max(map.get(key) ?? 0, step));
  });
  return map;
}

function passableAt(level, vacateMaps, pos, step) {
  const key = posKey(pos);
  if (!level.emptyPositionSet.has(key)) return false;
  for (const map of vacateMaps) {
    if ((map.get(key) ?? 0) > step) return false;
  }
  return true;
}

// BFS from start (arrival step 0) to target. Returns [start..target] or null.
function bfsPath(level, vacateMaps, start, target) {
  if (posEq(start, target)) return [start];
  const visited = new Map([[posKey(start), null]]); // posKey → parent posKey
  const positions = new Map([[posKey(start), start]]);
  let frontier = [start];
  let step = 0;
  while (frontier.length > 0) {
    step++;
    const next = [];
    for (const p of frontier) {
      for (const d of Object.values(DIRECTION_DELTA)) {
        const q = offsetBy(p, d.dx, d.dy);
        const qk = posKey(q);
        if (visited.has(qk) || !passableAt(level, vacateMaps, q, step)) continue;
        visited.set(qk, posKey(p));
        positions.set(qk, q);
        if (posEq(q, target)) {
          const path = [];
          for (let k = qk; k !== null; k = visited.get(k)) path.push(positions.get(k));
          return path.reverse();
        }
        next.push(q);
      }
    }
    frontier = next;
  }
  return null;
}

// Number of cells reachable from start (start itself not counted).
function floodFillCount(level, vacateMaps, start) {
  const visited = new Set([posKey(start)]);
  let frontier = [start];
  let step = 0;
  let count = 0;
  while (frontier.length > 0) {
    step++;
    const next = [];
    for (const p of frontier) {
      for (const d of Object.values(DIRECTION_DELTA)) {
        const q = offsetBy(p, d.dx, d.dy);
        const qk = posKey(q);
        if (visited.has(qk) || !passableAt(level, vacateMaps, q, step)) continue;
        visited.add(qk);
        count++;
        next.push(q);
      }
    }
    frontier = next;
  }
  return count;
}

// Can the head still reach the snake's own tail cell? The escape criterion:
// while the tail is reachable the snake can always keep following it.
function tailReachable(level, body, growth, otherVacateMaps) {
  const tail = body.fifo.array[0].position;
  const maps = [vacateMap(body, growth), ...otherVacateMaps];
  return bfsPath(level, maps, body.head.position, tail) !== null;
}

SnakeTests.add("toolkit: vacate timing on own body", () => {
  // bodyCreate(.., right, 4) occupies x=1..5 at y=5; tail (1,5) frees at step 1.
  const body = bodyCreate({ x: 5, y: 5 }, "right", 4);
  const lv = getLevel("Level 0");
  const maps = [vacateMap(body, 0)];
  assert(!passableAt(lv, maps, { x: 4, y: 5 }, 1), "mid-body blocked early");
  assert(passableAt(lv, maps, { x: 4, y: 5 }, 4), "mid-body free once vacated");
  assert(passableAt(lv, maps, { x: 1, y: 5 }, 1), "tail frees next step");
  assert(!passableAt(lv, maps, { x: 0, y: 5 }, 9), "wall never passable");
});
SnakeTests.add("toolkit: bfsPath routes around the body in time", () => {
  const body = bodyCreate({ x: 5, y: 5 }, "right", 4);
  const lv = getLevel("Level 0");
  const path = bfsPath(lv, [vacateMap(body, 0)], body.head.position, { x: 1, y: 5 });
  assert(path, "tail is reachable");
  assertEq(path[0], { x: 5, y: 5 });
  assertEq(path[path.length - 1], { x: 1, y: 5 });
  for (let i = 1; i < path.length; i++) assertEq(manhattan(path[i - 1], path[i]), 1);
  assert(tailReachable(lv, body, 0, []));
});
SnakeTests.add("toolkit: flood fill sees through a vacating body but not a frozen one", () => {
  // Snake spans the full row y=5 (x=1..7): the board is split while it stands.
  const body = bodyCreate({ x: 7, y: 5 }, "right", 6);
  const lv = getLevel("Level 0");
  const north = { x: 4, y: 7 };
  const aliveCount = floodFillCount(lv, [vacateMap(body, 0)], north);
  const frozenCount = floodFillCount(lv, [vacateMap(body, 0, true)], north);
  assert(frozenCount < aliveCount, `frozen ${frozenCount} < alive ${aliveCount}`);
  assertEq(frozenCount, 13, "north pocket: 2 rows x 7 minus start");
});
</script>

<script>
"use strict";
// UI layer: rendering, input, worker, game loop.

// --------------------------------------------------------------------------
// Web Worker hosting the MCTS bot. Source = the shared-code script block plus
// glue, loaded via a Blob URL so the page works when opened from file://.
// The bots' search trees live here across ticks (tree reuse); after undo the
// tree simply fails to match and is rebuilt, same as Swift's failed-reuse path.
// --------------------------------------------------------------------------
const WORKER_GLUE = `
const bots = { player1: null, player2: null }; // { role, bot }
self.onmessage = (e) => {
  const msg = e.data;
  if (msg.type === "reset") {
    bots.player1 = null;
    bots.player2 = null;
    return;
  }
  if (msg.type === "compute") {
    const level = getLevel(msg.levelName);
    if (!bots[msg.playerKey] || bots[msg.playerKey].role !== msg.role) {
      bots[msg.playerKey] = { role: msg.role, bot: botForRole(msg.role) };
    }
    const entry = bots[msg.playerKey];
    entry.bot = entry.bot.compute(level, msg.player, msg.oppositePlayer, msg.foodPosition);
    const bot = entry.bot;
    self.postMessage({
      type: "result",
      playerKey: msg.playerKey,
      serial: msg.serial,
      movement: bot.plannedMovement,
      plannedPath: bot.plannedPath,
    });
  }
};
`;

function createBotWorker(onResult) {
  const source = document.getElementById("shared-code").textContent + "\n" + WORKER_GLUE;
  const worker = new Worker(URL.createObjectURL(new Blob([source], { type: "text/javascript" })));
  worker.onmessage = (e) => onResult(e.data);
  worker.onerror = (e) => {
    console.error("bot worker error:", e.message);
    statusEl.innerHTML = `<span class="gameover">Bot worker failed: ${e.message ?? "unknown error"}</span>`;
  };
  return worker;
}

// --------------------------------------------------------------------------
// App state
// --------------------------------------------------------------------------
const PLAYER_COLOR = { player1: "#34c759", player2: "#0a84ff" };
const DEAD_COLOR = "#5a5a5e";
const AUTO_STEP_MS = 150; // pacing for bot-vs-bot games; JS computes are fast

const app = {
  env: null,
  showPath: true,
  paused: false,
  requestSerial: 0,
  inflight: { player1: null, player2: null }, // serial of in-flight compute
  pendingHuman: { player1: "dontMove", player2: "dontMove" },
  stepOnceRequested: false,
  lastStepTime: 0,
  gameOverMessage: null,
};

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");
const worker = createBotWorker(onBotResult);

// --------------------------------------------------------------------------
// Game lifecycle
// --------------------------------------------------------------------------
function newGame() {
  const levelName = document.getElementById("levelSelect").value;
  const role1 = document.getElementById("role1").value;
  const role2 = document.getElementById("role2").value;
  app.env = new GameEnvironment(gameStateCreate(levelName, role1, role2));
  app.env.reset();
  app.requestSerial++;
  app.inflight = { player1: null, player2: null };
  app.pendingHuman = { player1: "dontMove", player2: "dontMove" };
  app.stepOnceRequested = false;
  app.gameOverMessage = null;
  app.paused = false;
  worker.postMessage({ type: "reset" });
  requestBotMoves();
  render();
  updateStatus();
  updateButtons();
}

function requestBotMoves() {
  const gs = app.env.gameState;
  for (const [key, opp] of [["player1", "player2"], ["player2", "player1"]]) {
    const p = gs[key];
    if (!playerIsBot(p) || !playerIsAlive(p) || p.pendingMovement !== "dontMove") continue;
    if (app.inflight[key] !== null) continue;
    app.inflight[key] = app.requestSerial;
    worker.postMessage({
      type: "compute",
      serial: app.requestSerial,
      playerKey: key,
      role: p.role,
      levelName: gs.levelName,
      player: p,
      oppositePlayer: gs[opp],
      foodPosition: gs.foodPosition,
    });
  }
  updateStatus();
}

function onBotResult(msg) {
  if (msg.type !== "result") return;
  if (app.inflight[msg.playerKey] !== msg.serial) return; // stale (undo/restart)
  app.inflight[msg.playerKey] = null;
  app.env.setPendingMovement(msg.playerKey, msg.movement, msg.plannedPath);
  render();
  updateStatus();
  tryStep();
}

function botsAreReady() {
  for (const key of ["player1", "player2"]) {
    const p = app.env.gameState[key];
    if (playerIsBot(p) && playerIsAlive(p) && p.pendingMovement === "dontMove") return false;
  }
  return true;
}

function tryStep() {
  const env = app.env;
  if (!env || app.gameOverMessage) return;
  if (env.stepControlMode === "reachedTheEnd") return finishGame();
  if (!botsAreReady()) return;

  if (env.stepControlMode === "stepRequiresHumanInput") {
    // Port of IngameViewModel.step_humanVsAny: apply the humans' last
    // keypresses, suppress moves that would collide, and only step when no
    // living human is left waiting.
    let gs = env.gameState;
    for (const key of ["player1", "player2"]) {
      if (playerIsAliveAndHuman(gs[key]) && app.pendingHuman[key] !== "dontMove") {
        gs = gsUpdatePlayer(gs, key, playerUpdate(gs[key], { pendingMovement: app.pendingHuman[key] }));
      }
    }
    gs = preventHumanCollisions(gs);
    if (isWaitingForHumanInput(gs)) { updateStatus(); return; }
    const action = { player1: gs.player1.pendingMovement, player2: gs.player2.pendingMovement };
    app.pendingHuman = { player1: "dontMove", player2: "dontMove" };
    env.step(action);
    afterStep();
    return;
  }

  // Bots-only: auto-step with pacing, or single-step while paused.
  if (app.paused && !app.stepOnceRequested) return;
  const elapsed = Date.now() - app.lastStepTime;
  if (!app.stepOnceRequested && elapsed < AUTO_STEP_MS) {
    setTimeout(tryStep, AUTO_STEP_MS - elapsed);
    return;
  }
  app.stepOnceRequested = false;
  app.lastStepTime = Date.now();
  env.step({ player1: "dontMove", player2: "dontMove" });
  afterStep();
}

function afterStep() {
  render();
  if (app.env.stepControlMode === "reachedTheEnd") return finishGame();
  requestBotMoves();
  updateStatus();
}

function finishGame() {
  if (app.gameOverMessage) return;
  const gs = app.env.gameState;
  const causeText = {
    collisionWithWall: "hit a wall",
    collisionWithItself: "ran into itself",
    collisionWithOpponent: "ran into the opponent",
    stuckInALoop: "got stuck in a loop",
    noMoreFood: "ran out of food",
  };
  const parts = [];
  const dead = [];
  for (const [key, label] of [["player1", "Player 1"], ["player2", "Player 2"]]) {
    const p = gs[key];
    if (p.isInstalled && p.causesOfDeath.length > 0) {
      dead.push(key);
      parts.push(`${label} ${p.causesOfDeath.map((c) => causeText[c] ?? c).join(" and ")}`);
    }
  }
  const bothNoMoreFood = dead.length === 2
    && gs.player1.causesOfDeath.includes("noMoreFood")
    && gs.player2.causesOfDeath.includes("noMoreFood");
  let message;
  if (bothNoMoreFood || (dead.length === 1 && gs[dead[0]].causesOfDeath.includes("noMoreFood") && !gs[dead[0] === "player1" ? "player2" : "player1"].isInstalled)) {
    message = "All food eaten — game complete!";
  } else {
    const winner = ["player1", "player2"].find((k) => playerIsAlive(gs[k]) && gs[k].isInstalled);
    const installedCount = ["player1", "player2"].filter((k) => gs[k].isInstalled).length;
    const ending = winner ? `. ${winner === "player1" ? "Player 1" : "Player 2"} wins!`
      : installedCount === 2 ? ". Draw." : ". Game over.";
    message = parts.join(". ") + ending;
  }
  app.gameOverMessage = message;
  render();
  updateStatus();
}

// --------------------------------------------------------------------------
// Undo / pause / path toggle
// --------------------------------------------------------------------------
function doUndo() {
  if (!app.env) return;
  app.paused = true; // Swift undo() stops auto-stepping
  const gs = app.env.undo();
  if (!gs) { updateButtons(); return; }
  app.requestSerial++; // drop in-flight computes from the undone future
  app.inflight = { player1: null, player2: null };
  app.pendingHuman = { player1: "dontMove", player2: "dontMove" };
  app.gameOverMessage = null;
  // The restored state usually still carries the bots' pending movements and
  // planned paths (as in Swift); only the very first state needs a recompute.
  requestBotMoves();
  render();
  updateStatus();
  updateButtons();
}

function togglePause() {
  if (!app.env || app.env.stepControlMode !== "stepAutonomous") return;
  app.paused = !app.paused;
  updateButtons();
  updateStatus();
  if (!app.paused) tryStep();
}

function singleStep() {
  if (!app.env || app.env.stepControlMode !== "stepAutonomous") return;
  app.paused = true;
  app.stepOnceRequested = true;
  updateButtons();
  tryStep();
}

function togglePath() {
  app.showPath = !app.showPath;
  updateButtons();
  render();
}

// --------------------------------------------------------------------------
// Music. Starts on the first interaction (browsers block autoplay with sound).
// --------------------------------------------------------------------------
const music = new Audio("neoneye-snake-1.mp3");
music.loop = true;
let musicOn = true;

function kickMusic() {
  if (musicOn && music.paused) music.play().catch(() => {});
}

function toggleMusic() {
  musicOn = !musicOn;
  if (musicOn) music.play().catch(() => {}); else music.pause();
  updateButtons();
}

// --------------------------------------------------------------------------
// Rendering
// --------------------------------------------------------------------------
function tileSize(level) {
  const maxW = window.innerWidth - 24;
  const maxH = window.innerHeight - document.getElementById("hud").offsetHeight - 60;
  return Math.max(8, Math.floor(Math.min(maxW / level.size.x, maxH / level.size.y)));
}

function render() {
  if (!app.env) return;
  const gs = app.env.gameState;
  const level = gsLevel(gs);
  const tile = tileSize(level);
  canvas.width = level.size.x * tile;
  canvas.height = level.size.y * tile;
  // Grid y is bottom-up; canvas y is top-down.
  const cx = (p) => p.x * tile + tile / 2;
  const cy = (p) => (level.size.y - 1 - p.y) * tile + tile / 2;

  ctx.fillStyle = "#101012";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < level.size.y; y++) {
    for (let x = 0; x < level.size.x; x++) {
      const p = { x, y };
      if (level.wallSet.has(posKey(p))) {
        ctx.fillStyle = "#3a3a40";
        ctx.fillRect(p.x * tile, (level.size.y - 1 - y) * tile, tile, tile);
      } else {
        ctx.fillStyle = (x + y) % 2 === 0 ? "#1c1c1e" : "#202024";
        ctx.fillRect(p.x * tile, (level.size.y - 1 - y) * tile, tile, tile);
      }
    }
  }

  if (gs.foodPosition) {
    ctx.fillStyle = "#ff453a";
    ctx.beginPath();
    ctx.arc(cx(gs.foodPosition), cy(gs.foodPosition), tile * 0.32, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const key of ["player1", "player2"]) {
    const p = gs[key];
    if (!p.isInstalled) continue;
    drawSnake(p, playerIsAlive(p) ? PLAYER_COLOR[key] : DEAD_COLOR, tile, cx, cy);
  }

  if (app.showPath) {
    for (const key of ["player1", "player2"]) {
      const p = gs[key];
      if (!playerIsBot(p) || !playerIsAlive(p)) continue;
      drawPlannedPath(p.botPlannedPath, gs.foodPosition, PLAYER_COLOR[key], tile, cx, cy);
    }
  }
}

function drawSnake(player, color, tile, cx, cy) {
  const positions = bodyPositionArray(player.snakeBody);
  if (positions.length === 0) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = tile * 0.62;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(cx(positions[0]), cy(positions[0]));
  for (let i = 1; i < positions.length; i++) ctx.lineTo(cx(positions[i]), cy(positions[i]));
  if (positions.length === 1) ctx.lineTo(cx(positions[0]) + 0.1, cy(positions[0]));
  ctx.stroke();
  // Food still in the stomach bulges the body.
  ctx.fillStyle = color;
  for (const part of player.snakeBody.fifo.array) {
    if (part.content !== "food") continue;
    ctx.beginPath();
    ctx.arc(cx(part.position), cy(part.position), tile * 0.42, 0, Math.PI * 2);
    ctx.fill();
  }
  // Eye marks the head.
  const head = player.snakeBody.head;
  ctx.fillStyle = "#101012";
  ctx.beginPath();
  ctx.arc(cx(head.position), cy(head.position), tile * 0.12, 0, Math.PI * 2);
  ctx.fill();
}

// Port of AppShared/IngameView/PlannedPathView.swift: the segment leading to
// the food is high confidence (thick, bright); anything past the simulated
// food pickup is speculative (thin, 30% opacity).
function drawPlannedPath(path, foodPosition, color, tile, cx, cy) {
  if (!path || path.length < 2) return;
  let highConfidenceCount = 0;
  for (let i = 0; i < path.length; i++) {
    if (foodPosition && posEq(path[i], foodPosition)) { highConfidenceCount = i; break; }
  }
  const leftEnd = Math.min(highConfidenceCount + 1, path.length);
  const rightBegin = Math.min(highConfidenceCount, path.length);
  const stroke = (positions, width, alpha, cap) => {
    if (positions.length < 2) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = cap;
    ctx.lineJoin = cap === "round" ? "round" : "miter";
    ctx.beginPath();
    ctx.moveTo(cx(positions[0]), cy(positions[0]));
    for (let i = 1; i < positions.length; i++) ctx.lineTo(cx(positions[i]), cy(positions[i]));
    ctx.stroke();
    ctx.restore();
  };
  stroke(path.slice(rightBegin), 1, 0.3, "square");                       // low confidence
  stroke(path.slice(0, leftEnd), Math.max(tile * 0.3, 1), 1, "round");    // high confidence
}

// --------------------------------------------------------------------------
// Status + buttons
// --------------------------------------------------------------------------
function updateStatus() {
  if (!app.env) return;
  const gs = app.env.gameState;
  const bits = [`Step ${gs.numberOfSteps}`];
  for (const [key, label] of [["player1", "P1"], ["player2", "P2"]]) {
    if (gs[key].isInstalled) bits.push(`${label} length ${bodyLength(gs[key].snakeBody)}`);
  }
  if (app.gameOverMessage) {
    statusEl.innerHTML = `${bits.join(" · ")} · <span class="gameover">${app.gameOverMessage}</span> Press Enter to restart.`;
    return;
  }
  const thinking = app.inflight.player1 !== null || app.inflight.player2 !== null;
  if (thinking) bits.push("AI thinking…");
  else if (app.env.stepControlMode === "stepRequiresHumanInput") bits.push("waiting for input");
  else if (app.paused) bits.push("paused");
  statusEl.textContent = bits.join(" · ");
}

function updateButtons() {
  document.getElementById("btnPause").textContent = app.paused ? "Resume" : "Pause";
  document.getElementById("btnPath").classList.toggle("active", app.showPath);
  document.getElementById("btnMusic").classList.toggle("active", musicOn);
  const autonomous = app.env && app.env.stepControlMode === "stepAutonomous";
  document.getElementById("btnPause").disabled = !autonomous;
  document.getElementById("btnStep").disabled = !autonomous;
}

// --------------------------------------------------------------------------
// Input
// --------------------------------------------------------------------------
const KEY_DIRECTION_P1 = { ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right" };
const KEY_DIRECTION_P2 = { w: "up", s: "down", a: "left", d: "right" };

document.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
  if (key in KEY_DIRECTION_P1 || key === " ") e.preventDefault();
  kickMusic();

  if (key === "Enter") return newGame();
  if (key === "m") return toggleMusic();
  if (key === "z") return doUndo();
  if (key === " ") return togglePause();
  if (key === "p") return togglePath();
  if (!app.env || app.gameOverMessage) return;

  const route = (playerKey, direction) => {
    const p = app.env.gameState[playerKey];
    if (!playerIsAliveAndHuman(p)) return;
    app.pendingHuman[playerKey] = headMoveTowardDirection(p.snakeBody.head, direction);
    tryStep();
  };
  if (key in KEY_DIRECTION_P1) route("player1", KEY_DIRECTION_P1[key]);
  if (key in KEY_DIRECTION_P2) route("player2", KEY_DIRECTION_P2[key]);
});

document.getElementById("btnRestart").addEventListener("click", newGame);
document.getElementById("btnUndo").addEventListener("click", doUndo);
document.getElementById("btnPause").addEventListener("click", togglePause);
document.getElementById("btnStep").addEventListener("click", singleStep);
document.getElementById("btnPath").addEventListener("click", togglePath);
document.getElementById("btnMusic").addEventListener("click", toggleMusic);
document.addEventListener("click", kickMusic);
document.getElementById("levelSelect").addEventListener("change", newGame);
document.getElementById("role1").addEventListener("change", newGame);
document.getElementById("role2").addEventListener("change", newGame);
window.addEventListener("resize", render);

// --------------------------------------------------------------------------
// Boot
// --------------------------------------------------------------------------
for (const name of LEVEL_NAMES) {
  const option = document.createElement("option");
  option.value = name;
  option.textContent = name;
  document.getElementById("levelSelect").appendChild(option);
}

if (new URLSearchParams(location.search).get("test") === "1") {
  document.getElementById("hud").style.display = "none";
  canvas.style.display = "none";
  const report = document.createElement("div");
  report.id = "testreport";
  document.body.appendChild(report);
  const lines = [];
  const ok = SnakeTests.run((s) => lines.push(s), (s) => lines.push(s));
  report.textContent = lines.join("\n");
  report.style.color = ok ? "#34c759" : "#ff453a";
} else {
  newGame();
}
</script>
