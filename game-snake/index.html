<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake MCTS — port of SwiftSnakeEngine</title>
<style>
  :root {
    --bg: #1c1c1e;
    --panel: #2c2c2e;
    --text: #e5e5ea;
    --muted: #8e8e93;
    --p1: #34c759;
    --p2: #0a84ff;
  }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding: 10px;
  }
  #hud select, #hud button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid #3a3a3c;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 14px;
  }
  #hud button:hover { border-color: var(--muted); cursor: pointer; }
  #hud button.active { border-color: var(--p1); color: var(--p1); }
  #hud label { color: var(--muted); font-size: 13px; }
  #status {
    min-height: 22px;
    font-size: 14px;
    color: var(--muted);
    padding: 0 10px 6px;
  }
  #status .gameover { color: #ff453a; font-weight: 600; }
  #board { display: block; }
  #testreport {
    font-family: ui-monospace, monospace;
    white-space: pre-wrap;
    padding: 16px;
  }
</style>
</head>
<body>
<div id="hud">
  <label>Level <select id="levelSelect"></select></label>
  <label>Player 1 <select id="role1">
    <option value="human">Human (arrows)</option>
    <option value="bot">Bot — Monte Carlo 2</option>
    <option value="none">Off</option>
  </select></label>
  <label>Player 2 <select id="role2">
    <option value="human">Human (WASD)</option>
    <option value="bot" selected>Bot — Monte Carlo 2</option>
    <option value="none">Off</option>
  </select></label>
  <button id="btnRestart" title="Enter">Restart</button>
  <button id="btnUndo" title="Z">Undo</button>
  <button id="btnPause" title="Space">Pause</button>
  <button id="btnStep" title="single step (bots only)">Step</button>
  <button id="btnPath" title="P">Show AI path</button>
</div>
<div id="status"></div>
<canvas id="board"></canvas>

<script id="shared-code">
"use strict";
// Pure game engine + MCTS bot, ported from SwiftSnakeEngine (MIT, Simon Strandgaard).
// This block must not touch the DOM: it also runs inside a Web Worker and in Node (test.mjs).

// ---------------------------------------------------------------------------
// Test registry. Runs via `node test.mjs` or by opening index.html?test=1
// ---------------------------------------------------------------------------
const SnakeTests = {
  tests: [],
  add(name, fn) { this.tests.push({ name, fn }); },
  run(log = console.log, error = console.error) {
    let failures = 0;
    for (const { name, fn } of this.tests) {
      try { fn(); log(`ok - ${name}`); }
      catch (e) { failures++; error(`FAIL - ${name}: ${e.message}`); }
    }
    log(`${this.tests.length - failures}/${this.tests.length} passed`);
    return failures === 0;
  },
};
function assert(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); }
function assertEq(actual, expected, msg) {
  const a = JSON.stringify(actual), e = JSON.stringify(expected);
  if (a !== e) throw new Error(`${msg || "assertEq"}: ${a} !== ${e}`);
}

SnakeTests.add("smoke", () => assertEq(1 + 1, 2));

// ---------------------------------------------------------------------------
// LCRNG — port of EngineShared/Common/SeededGenerator.swift.
// Same constants as Swift, so a given seed produces the same raw sequence.
// ---------------------------------------------------------------------------
const U64_MASK = 0xFFFFFFFFFFFFFFFFn;
const LCRNG_MUL = 2862933555777941757n;
const LCRNG_ADD = 3037000493n;

class LCRNG {
  constructor(seed) { this.seed = BigInt(seed) & U64_MASK; }
  next() {
    this.seed = (LCRNG_MUL * this.seed + LCRNG_ADD) & U64_MASK;
    return this.seed;
  }
  // Derived helpers. Deterministic, but not bit-identical to Swift stdlib's
  // randomElement/shuffle — cross-language replay parity is a non-goal.
  randomInt(n) { return Number(this.next() % BigInt(n)); }
  pickIndex(arrayLength) { return this.randomInt(arrayLength); }
  shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = this.randomInt(i + 1);
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }
}

// ---------------------------------------------------------------------------
// Positions. Plain {x, y} objects, origin bottom-left as in Swift.
// ---------------------------------------------------------------------------
function posKey(p) { return `${p.x},${p.y}`; }
function posEq(a, b) { return a !== null && b !== null && a !== undefined && b !== undefined && a.x === b.x && a.y === b.y; }
function manhattan(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function offsetBy(p, dx, dy) { return { x: p.x + dx, y: p.y + dy }; }
// Sort order matching Swift IntVec2 Comparable: by y, then by x.
function posCompare(a, b) { return a.y - b.y || a.x - b.x; }

// ---------------------------------------------------------------------------
// Fifo — port of EngineShared/Snake/SnakeFifo.swift, immutable flavor.
// `append` keeps capacity (drops from the front), `appendAndGrow` raises it.
// ---------------------------------------------------------------------------
const Fifo = {
  fromArray(array) { return { capacity: array.length, array: array.slice() }; },
  _purged(capacity, array) {
    const diff = array.length - capacity;
    return { capacity, array: diff >= 1 ? array.slice(diff) : array };
  },
  append(fifo, item) {
    return this._purged(fifo.capacity, [...fifo.array, item]);
  },
  appendAndGrow(fifo, item) {
    return this._purged(fifo.capacity + 1, [...fifo.array, item]);
  },
  map(fifo, transform) {
    return { capacity: fifo.capacity, array: fifo.array.map(transform) };
  },
};

SnakeTests.add("lcrng sequence from seed 0", () => {
  const rng = new LCRNG(0n);
  assertEq(rng.next().toString(), "3037000493");
  const expected2 = ((LCRNG_MUL * 3037000493n + LCRNG_ADD) & U64_MASK).toString();
  assertEq(rng.next().toString(), expected2);
});
SnakeTests.add("lcrng helpers are deterministic", () => {
  const a = new LCRNG(7n), b = new LCRNG(7n);
  assertEq(a.shuffle([1, 2, 3, 4, 5]), b.shuffle([1, 2, 3, 4, 5]));
  assertEq(a.randomInt(10), b.randomInt(10));
});
SnakeTests.add("fifo append keeps capacity, appendAndGrow grows", () => {
  const f0 = Fifo.fromArray([1, 2, 3]);
  assertEq(Fifo.append(f0, 4).array, [2, 3, 4]);
  assertEq(Fifo.appendAndGrow(f0, 4).array, [1, 2, 3, 4]);
  assertEq(f0.array, [1, 2, 3], "original untouched");
});

// ---------------------------------------------------------------------------
// SnakeHead — port of EngineShared/Snake/SnakeHead.swift + SnakeHeadDirection.swift
// ---------------------------------------------------------------------------
const ROTATED_CCW = { up: "left", left: "down", down: "right", right: "up" };
const ROTATED_CW = { up: "right", right: "down", down: "left", left: "up" };
const DIRECTION_DELTA = {
  up: { dx: 0, dy: 1 },
  down: { dx: 0, dy: -1 },
  left: { dx: -1, dy: 0 },
  right: { dx: 1, dy: 0 },
};

function headSimulateTick(head, movement) {
  if (movement === "dontMove") return head;
  let direction = head.direction;
  if (movement === "moveCCW") direction = ROTATED_CCW[direction];
  if (movement === "moveCW") direction = ROTATED_CW[direction];
  const d = DIRECTION_DELTA[direction];
  return { position: offsetBy(head.position, d.dx, d.dy), direction };
}

// Best movement to approach newPosition; null if it is behind the snake.
// Port of SnakeHead.moveToward(_:) — SnakeHead.swift:72-124.
function headMoveTowardPosition(head, newPosition) {
  const dx = head.position.x - newPosition.x;
  const dy = head.position.y - newPosition.y;
  const dxx = dx * dx, dyy = dy * dy;
  if (dxx === 0 && dyy === 0) return "dontMove";
  switch (head.direction) {
    case "up":
      if (dy < 0 && dyy >= dxx) return "moveForward";
      if (dx > 0) return "moveCCW";
      if (dx < 0) return "moveCW";
      break;
    case "down":
      if (dy > 0 && dyy >= dxx) return "moveForward";
      if (dx > 0) return "moveCW";
      if (dx < 0) return "moveCCW";
      break;
    case "left":
      if (dx > 0 && dxx >= dyy) return "moveForward";
      if (dy > 0) return "moveCCW";
      if (dy < 0) return "moveCW";
      break;
    case "right":
      if (dx < 0 && dxx >= dyy) return "moveForward";
      if (dy > 0) return "moveCW";
      if (dy < 0) return "moveCCW";
      break;
  }
  return null;
}

// Arrow-key style input: a direction. Reversal yields "dontMove".
function headMoveTowardDirection(head, direction) {
  const d = DIRECTION_DELTA[direction];
  return headMoveTowardPosition(head, offsetBy(head.position, d.dx, d.dy)) ?? "dontMove";
}

// ---------------------------------------------------------------------------
// SnakeBody — port of EngineShared/Snake/SnakeBody.swift.
// fifo.array runs tail-first; the last element is the head.
// Each part: { position, content } where content is "empty" | "food".
// ---------------------------------------------------------------------------
function bodyStateForTick(body, movement, act) {
  if (movement === "dontMove") return body;
  const newHead = headSimulateTick(body.head, movement);
  const part = { position: newHead.position, content: act === "eat" ? "food" : "empty" };
  const fifo = act === "eat" ? Fifo.appendAndGrow(body.fifo, part) : Fifo.append(body.fifo, part);
  return { fifo, head: newHead };
}

// Port of SnakeBody.create(position:headDirection:length:) — SnakeBody.swift:117-149.
// Starts `length` cells behind `position` and ticks forward, growing each step,
// then clears the stomach. Yields length+1 body parts like the Swift original.
function bodyCreate(position, headDirection, length) {
  const n = length;
  let dx = 0, dy = 0;
  if (headDirection === "up") dy = -n;
  if (headDirection === "down") dy = n;
  if (headDirection === "left") dx = n;
  if (headDirection === "right") dx = -n;
  const startPosition = offsetBy(position, dx, dy);
  let body = {
    fifo: Fifo._purged(1, [{ position: startPosition, content: "empty" }]),
    head: { position: startPosition, direction: headDirection },
  };
  for (let i = 0; i < n; i++) {
    body = bodyStateForTick(body, "moveForward", "eat");
  }
  return bodyClearStomach(body);
}

function bodyClearStomach(body) {
  return {
    fifo: Fifo.map(body.fifo, (p) => ({ position: p.position, content: "empty" })),
    head: body.head,
  };
}

function bodyPositionArray(body) { return body.fifo.array.map((p) => p.position); }
function bodyPositionSet(body) { return new Set(bodyPositionArray(body).map(posKey)); }
function bodyWithoutHeadPositionSet(body) {
  const arr = body.fifo.array;
  if (arr.length === 0) return new Set();
  return new Set(arr.slice(0, -1).map((p) => posKey(p.position)));
}
function bodyIsEatingItself(body) {
  return bodyWithoutHeadPositionSet(body).has(posKey(body.head.position));
}
function bodyLength(body) { return body.fifo.array.length; }

SnakeTests.add("head simulateTick", () => {
  const h = { position: { x: 5, y: 5 }, direction: "up" };
  assertEq(headSimulateTick(h, "moveForward"), { position: { x: 5, y: 6 }, direction: "up" });
  assertEq(headSimulateTick(h, "moveCCW"), { position: { x: 4, y: 5 }, direction: "left" });
  assertEq(headSimulateTick(h, "moveCW"), { position: { x: 6, y: 5 }, direction: "right" });
  assertEq(headSimulateTick(h, "dontMove"), h);
});
SnakeTests.add("head moveToward direction blocks reversal", () => {
  const h = { position: { x: 5, y: 5 }, direction: "up" };
  assertEq(headMoveTowardDirection(h, "down"), "dontMove");
  assertEq(headMoveTowardDirection(h, "left"), "moveCCW");
  assertEq(headMoveTowardDirection(h, "right"), "moveCW");
  assertEq(headMoveTowardDirection(h, "up"), "moveForward");
});
SnakeTests.add("body create extends backward from head", () => {
  const b = bodyCreate({ x: 5, y: 5 }, "right", 4);
  assertEq(b.head.position, { x: 5, y: 5 });
  assertEq(b.head.direction, "right");
  assertEq(bodyPositionArray(b), [{x:1,y:5},{x:2,y:5},{x:3,y:5},{x:4,y:5},{x:5,y:5}]);
});
SnakeTests.add("body eat grows, plain move keeps length", () => {
  const b = bodyCreate({ x: 5, y: 5 }, "right", 2);
  const grown = bodyStateForTick(b, "moveForward", "eat");
  assertEq(bodyLength(grown), bodyLength(b) + 1);
  assert(!bodyIsEatingItself(grown));
  const moved = bodyStateForTick(b, "moveForward", "doNothing");
  assertEq(bodyLength(moved), bodyLength(b));
  assertEq(moved.head.position, { x: 6, y: 5 });
});
SnakeTests.add("body detects eating itself", () => {
  // length-5 snake curls into itself: up, left, down → head lands on its body
  let b = bodyCreate({ x: 5, y: 5 }, "right", 5);
  b = bodyStateForTick(b, "moveCCW", "doNothing");   // up
  b = bodyStateForTick(b, "moveCCW", "doNothing");   // left
  b = bodyStateForTick(b, "moveCCW", "doNothing");   // down → onto own body
  assert(bodyIsEatingItself(b));
});
</script>

<script>
"use strict";
// UI layer: rendering, input, worker, game loop. Built up in later tasks.
</script>
</body>
</html>
