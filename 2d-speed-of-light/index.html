<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relativity of Simultaneity</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111827;
    color: #d1d5db;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: #0f172a;
    padding: 16px;
    overflow-y: auto;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  h1 {
    font-size: 15px;
    color: #f1f5f9;
    border-bottom: 1px solid #1e293b;
    padding-bottom: 10px;
    line-height: 1.4;
  }
  .group {
    background: #1e293b;
    border-radius: 8px;
    padding: 12px;
  }
  .group h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #64748b;
    margin-bottom: 10px;
  }
  .slider-row {
    margin-bottom: 4px;
  }
  .slider-row label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    color: #94a3b8;
  }
  .slider-row label span {
    color: #e2e8f0;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #6366f1;
    cursor: pointer;
  }
  .preset-btn {
    display: block;
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 6px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #cbd5e1;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .preset-btn:hover {
    background: #1e293b;
    border-color: #6366f1;
  }
  .preset-btn.active {
    border-color: #6366f1;
    background: #1e1b4b;
  }
  .preset-btn .preset-name {
    font-weight: 600;
    color: #e2e8f0;
  }
  .preset-btn .preset-desc {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(30,41,59,0.6);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #64748b; }
  .info-value { color: #e2e8f0; font-weight: 500; font-variant-numeric: tabular-nums; }
  .verdict {
    margin-top: 8px;
    padding: 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
  }
  .verdict.reversible {
    background: rgba(45,212,191,0.1);
    color: #2dd4bf;
    border: 1px solid rgba(45,212,191,0.3);
  }
  .verdict.absolute {
    background: rgba(245,158,11,0.1);
    color: #f59e0b;
    border: 1px solid rgba(245,158,11,0.3);
  }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .canvas-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .canvas-wrap canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .canvas-label {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #475569;
    pointer-events: none;
  }
  #banner {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #e2e8f0;
    pointer-events: none;
  }
  .divider {
    height: 1px;
    background: #1e293b;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Relativity of Simultaneity</h1>

  <div class="group">
    <h3>Observer Velocity</h3>
    <div class="slider-row">
      <label>v / c <span id="v-display">0.00</span></label>
      <input type="range" id="v-slider" min="-90" max="90" value="0" step="1">
    </div>
  </div>

  <div class="group">
    <h3>Presets</h3>
    <button class="preset-btn active" id="preset-simultaneous" onclick="applyPreset('simultaneous')">
      <div class="preset-name">Simultaneous</div>
      <div class="preset-desc">Same time in rest frame — but not for a moving observer</div>
    </button>
    <button class="preset-btn" id="preset-causal" onclick="applyPreset('causal')">
      <div class="preset-name">Causally Connected</div>
      <div class="preset-desc">Timelike separation — order can never be reversed</div>
    </button>
    <button class="preset-btn" id="preset-spacelike" onclick="applyPreset('spacelike')">
      <div class="preset-name">Spacelike Separated</div>
      <div class="preset-desc">Order flips depending on the observer's velocity</div>
    </button>
  </div>

  <div class="group">
    <h3>Info</h3>
    <div class="info-row">
      <span class="info-label">Interval s²</span>
      <span class="info-value" id="info-interval">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Separation</span>
      <span class="info-value" id="info-separation">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Rest frame</span>
      <span class="info-value" id="info-rest-order">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Moving frame</span>
      <span class="info-value" id="info-moving-order">—</span>
    </div>
    <div class="verdict reversible" id="verdict">—</div>
  </div>
</div>

<div id="main">
  <div class="canvas-wrap">
    <span class="canvas-label">Animated Scene</span>
    <span id="banner"></span>
    <canvas id="scene"></canvas>
  </div>
  <div class="divider"></div>
  <div class="canvas-wrap">
    <span class="canvas-label">Spacetime Diagram</span>
    <canvas id="diagram"></canvas>
  </div>
</div>

<script>
// --- State ---
const state = {
  v: 0,
  eventA: { x: -2, t: 3 },
  eventB: { x: 2, t: 3 },
  animTime: 0,
  lastTimestamp: null,
  activePreset: 'simultaneous',
  flashA: 0,
  flashB: 0,
};

const FLASH_DURATION = 0.3;
const ANIM_MAX_T = 6;

// --- DOM ---
const vSlider = document.getElementById('v-slider');
const vDisplay = document.getElementById('v-display');
const sceneCanvas = document.getElementById('scene');
const diagramCanvas = document.getElementById('diagram');
const sceneCtx = sceneCanvas.getContext('2d');
const diagCtx = diagramCanvas.getContext('2d');

// --- Colors ---
const COL = {
  bg: '#111827',
  axes: '#6b7280',
  grid: 'rgba(107,114,128,0.15)',
  eventA: '#ef4444',
  eventB: '#3b82f6',
  lightCone: '#eab308',
  primedAxes: '#a78bfa',
  spacelike: '#2dd4bf',
  timelike: '#f59e0b',
  simLineRest: 'rgba(107,114,128,0.4)',
  simLineMoving: 'rgba(167,139,250,0.4)',
  observerS: '#94a3b8',
  observerM: '#c084fc',
  timebar: '#334155',
  timebarFill: '#6366f1',
};

// --- Physics ---
function gamma(v) {
  return 1 / Math.sqrt(1 - v * v);
}

function lorentz(t, x, v) {
  const g = gamma(v);
  return { t: g * (t - v * x), x: g * (x - v * t) };
}

function interval(a, b) {
  const dx = b.x - a.x;
  const dt = b.t - a.t;
  return dx * dx - dt * dt;
}

function orderString(dt) {
  if (Math.abs(dt) < 1e-9) return 'Simultaneous';
  return dt > 0 ? 'A then B' : 'B then A';
}

// --- Presets ---
const presets = {
  simultaneous: { a: { x: -2, t: 3 }, b: { x: 2, t: 3 }, v: 0 },
  causal:       { a: { x: 0, t: 1 }, b: { x: 1, t: 4 }, v: 0 },
  spacelike:    { a: { x: -2, t: 2 }, b: { x: 2, t: 3 }, v: 50 },
};

function applyPreset(name) {
  const p = presets[name];
  state.eventA = { ...p.a };
  state.eventB = { ...p.b };
  state.v = p.v / 100;
  vSlider.value = p.v;
  state.activePreset = name;
  resetAnimation();
  updateInfo();

  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('preset-' + name).classList.add('active');
}

// --- Slider ---
vSlider.addEventListener('input', () => {
  state.v = parseInt(vSlider.value) / 100;
  resetAnimation();
  updateInfo();
});

function resetAnimation() {
  state.animTime = 0;
  state.lastTimestamp = null;
  state.flashA = 0;
  state.flashB = 0;
  vDisplay.textContent = state.v.toFixed(2);
}

// --- Info panel ---
function updateInfo() {
  const { eventA, eventB, v } = state;
  const s2 = interval(eventA, eventB);
  const dtRest = eventB.t - eventA.t;
  const aPrime = lorentz(eventA.t, eventA.x, v);
  const bPrime = lorentz(eventB.t, eventB.x, v);
  const dtMoving = bPrime.t - aPrime.t;

  document.getElementById('info-interval').textContent = s2.toFixed(2);

  let sepType, sepColor;
  if (Math.abs(s2) < 1e-9) {
    sepType = 'Lightlike';
    sepColor = COL.lightCone;
  } else if (s2 > 0) {
    sepType = 'Spacelike';
    sepColor = COL.spacelike;
  } else {
    sepType = 'Timelike';
    sepColor = COL.timelike;
  }
  const sepEl = document.getElementById('info-separation');
  sepEl.textContent = sepType;
  sepEl.style.color = sepColor;

  document.getElementById('info-rest-order').textContent = orderString(dtRest);
  document.getElementById('info-moving-order').textContent = orderString(dtMoving);

  const verdict = document.getElementById('verdict');
  if (s2 > 0) {
    verdict.textContent = 'Order CAN be reversed';
    verdict.className = 'verdict reversible';
  } else {
    verdict.textContent = 'Order is ABSOLUTE';
    verdict.className = 'verdict absolute';
  }

  // Banner
  const banner = document.getElementById('banner');
  const moStr = orderString(dtMoving);
  banner.textContent = 'Moving observer sees: ' + moStr;
}

// --- Canvas sizing ---
function resizeCanvases() {
  const wraps = document.querySelectorAll('.canvas-wrap');
  wraps.forEach(w => {
    const canvas = w.querySelector('canvas');
    const rect = w.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
  });
}
window.addEventListener('resize', () => { resizeCanvases(); });

// --- Drawing: Animated Scene ---
function drawScene(dt) {
  const W = sceneCanvas.width;
  const H = sceneCanvas.height;
  const ctx = sceneCtx;
  const dpr = devicePixelRatio;

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.scale(dpr, dpr);
  const w = W / dpr;
  const h = H / dpr;

  // Coordinate mapping: x in [-5, 5] -> pixel
  const margin = 40;
  const xMin = -5, xMax = 5;
  const mapX = (x) => margin + (x - xMin) / (xMax - xMin) * (w - 2 * margin);
  const groundY = h * 0.65;

  // Ground line
  ctx.strokeStyle = COL.axes;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin, groundY);
  ctx.lineTo(w - margin, groundY);
  ctx.stroke();

  // Tick marks
  ctx.fillStyle = '#475569';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  for (let x = -4; x <= 4; x++) {
    const px = mapX(x);
    ctx.beginPath();
    ctx.moveTo(px, groundY - 3);
    ctx.lineTo(px, groundY + 3);
    ctx.stroke();
    ctx.fillText(x.toString(), px, groundY + 15);
  }

  // Get current animation time in the moving frame
  const { v, eventA, eventB, animTime } = state;
  const aPrime = lorentz(eventA.t, eventA.x, v);
  const bPrime = lorentz(eventB.t, eventB.x, v);

  // Use moving frame times for animation
  const tMin = Math.min(aPrime.t, bPrime.t);
  const tMax = Math.max(aPrime.t, bPrime.t);
  const animTotalT = Math.max(ANIM_MAX_T, tMax + 1);

  // Observer S (stationary) at x=0
  drawObserver(ctx, mapX(0), groundY - 20, 'S', COL.observerS);

  // Observer M (moving) - position based on current time
  const mPos = v * animTime;
  if (mPos >= xMin && mPos <= xMax) {
    drawObserver(ctx, mapX(mPos), groundY - 20, 'M', COL.observerM);
  }

  // Event positions (in rest frame spatial coords)
  const evAx = mapX(eventA.x);
  const evBx = mapX(eventB.x);
  const evY = groundY - 60;

  // Draw event markers (small dots always visible)
  ctx.globalAlpha = 0.3;
  drawEventDot(ctx, evAx, evY, 5, COL.eventA);
  drawEventDot(ctx, evBx, evY, 5, COL.eventB);
  ctx.globalAlpha = 1;

  // Labels
  ctx.font = '12px system-ui';
  ctx.fillStyle = COL.eventA;
  ctx.textAlign = 'center';
  ctx.fillText('A', evAx, evY - 15);
  ctx.fillStyle = COL.eventB;
  ctx.fillText('B', evBx, evY - 15);

  // Flash events at their moving-frame times
  if (state.flashA > 0) {
    const progress = state.flashA / FLASH_DURATION;
    const radius = 5 + 20 * (1 - progress);
    ctx.globalAlpha = progress * 0.8;
    drawEventDot(ctx, evAx, evY, radius, COL.eventA);
    ctx.globalAlpha = 1;
    drawEventDot(ctx, evAx, evY, 6, COL.eventA);
  }
  if (state.flashB > 0) {
    const progress = state.flashB / FLASH_DURATION;
    const radius = 5 + 20 * (1 - progress);
    ctx.globalAlpha = progress * 0.8;
    drawEventDot(ctx, evBx, evY, radius, COL.eventB);
    ctx.globalAlpha = 1;
    drawEventDot(ctx, evBx, evY, 6, COL.eventB);
  }

  // Time bar at bottom
  const barY = h - 20;
  const barX = margin;
  const barW = w - 2 * margin;
  ctx.fillStyle = COL.timebar;
  ctx.fillRect(barX, barY, barW, 6);
  const frac = Math.min(animTime / animTotalT, 1);
  ctx.fillStyle = COL.timebarFill;
  ctx.fillRect(barX, barY, barW * frac, 6);

  // Time label
  ctx.fillStyle = '#64748b';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('t\' = ' + animTime.toFixed(1), barX, barY - 4);

  ctx.restore();
}

function drawObserver(ctx, x, y, label, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0f172a';
  ctx.font = 'bold 11px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.textBaseline = 'alphabetic';
}

function drawEventDot(ctx, x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

// --- Drawing: Spacetime Diagram ---
function drawDiagram() {
  const W = diagramCanvas.width;
  const H = diagramCanvas.height;
  const ctx = diagCtx;
  const dpr = devicePixelRatio;

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.scale(dpr, dpr);
  const w = W / dpr;
  const h = H / dpr;

  const margin = 40;
  const xMin = -5, xMax = 5;
  const tMin = -1, tMax = 6;

  const mapX = (x) => margin + (x - xMin) / (xMax - xMin) * (w - 2 * margin);
  const mapT = (t) => (h - margin) - (t - tMin) / (tMax - tMin) * (h - 2 * margin);

  // Grid
  ctx.strokeStyle = COL.grid;
  ctx.lineWidth = 1;
  for (let x = -4; x <= 4; x++) {
    ctx.beginPath();
    ctx.moveTo(mapX(x), mapT(tMin));
    ctx.lineTo(mapX(x), mapT(tMax));
    ctx.stroke();
  }
  for (let t = 0; t <= 6; t++) {
    ctx.beginPath();
    ctx.moveTo(mapX(xMin), mapT(t));
    ctx.lineTo(mapX(xMax), mapT(t));
    ctx.stroke();
  }

  // Rest frame axes
  ctx.strokeStyle = COL.axes;
  ctx.lineWidth = 1.5;
  // x-axis (t=0)
  ctx.beginPath();
  ctx.moveTo(mapX(xMin), mapT(0));
  ctx.lineTo(mapX(xMax), mapT(0));
  ctx.stroke();
  // t-axis (x=0)
  ctx.beginPath();
  ctx.moveTo(mapX(0), mapT(tMin));
  ctx.lineTo(mapX(0), mapT(tMax));
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('x', mapX(xMax) - 5, mapT(0) + 18);
  ctx.fillText('t', mapX(0) + 14, mapT(tMax) + 5);

  // Light cone from origin (45° lines)
  ctx.strokeStyle = COL.lightCone;
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  // x = t line
  ctx.beginPath();
  ctx.moveTo(mapX(-6), mapT(-6));
  ctx.lineTo(mapX(6), mapT(6));
  ctx.stroke();
  // x = -t line
  ctx.beginPath();
  ctx.moveTo(mapX(6), mapT(-6));
  ctx.lineTo(mapX(-6), mapT(6));
  ctx.stroke();
  ctx.setLineDash([]);

  // Moving frame axes (primed)
  const { v, eventA, eventB } = state;
  if (Math.abs(v) > 0.01) {
    ctx.strokeStyle = COL.primedAxes;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);

    // x'-axis: t = v*x (line of simultaneity through origin)
    const x1 = xMin, t1 = v * xMin;
    const x2 = xMax, t2 = v * xMax;
    ctx.beginPath();
    ctx.moveTo(mapX(x1), mapT(t1));
    ctx.lineTo(mapX(x2), mapT(t2));
    ctx.stroke();

    // t'-axis: x = v*t (worldline of moving observer)
    const ta = tMin, xa = v * tMin;
    const tb = tMax, xb = v * tMax;
    ctx.beginPath();
    ctx.moveTo(mapX(xa), mapT(ta));
    ctx.lineTo(mapX(xb), mapT(tb));
    ctx.stroke();

    ctx.setLineDash([]);

    // Primed axis labels
    ctx.fillStyle = COL.primedAxes;
    ctx.font = '12px system-ui';
    const labelOff = 14;
    // x' label at right end of x'-axis
    if (t2 >= tMin && t2 <= tMax) {
      ctx.fillText("x'", mapX(x2) - 5, mapT(t2) - 8);
    }
    // t' label at top of t'-axis
    if (xb >= xMin && xb <= xMax) {
      ctx.fillText("t'", mapX(xb) + labelOff, mapT(tb) + 5);
    }
  }

  // Lines of simultaneity through events
  // Rest frame: horizontal lines
  ctx.strokeStyle = COL.simLineRest;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  [eventA, eventB].forEach(ev => {
    ctx.beginPath();
    ctx.moveTo(mapX(xMin), mapT(ev.t));
    ctx.lineTo(mapX(xMax), mapT(ev.t));
    ctx.stroke();
  });
  ctx.setLineDash([]);

  // Moving frame: tilted lines of simultaneity through events
  if (Math.abs(v) > 0.01) {
    ctx.strokeStyle = COL.simLineMoving;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    [eventA, eventB].forEach(ev => {
      // Line of simultaneity in moving frame through event (x0, t0):
      // t - t0 = v * (x - x0)
      const x1 = xMin, t1_ = ev.t + v * (xMin - ev.x);
      const x2 = xMax, t2_ = ev.t + v * (xMax - ev.x);
      ctx.beginPath();
      ctx.moveTo(mapX(x1), mapT(t1_));
      ctx.lineTo(mapX(x2), mapT(t2_));
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // Connecting line between events
  const s2 = interval(eventA, eventB);
  const connColor = s2 > 0 ? COL.spacelike : COL.timelike;
  ctx.strokeStyle = connColor;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(mapX(eventA.x), mapT(eventA.t));
  ctx.lineTo(mapX(eventB.x), mapT(eventB.t));
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Event dots
  const dotR = 6;
  ctx.fillStyle = COL.eventA;
  ctx.beginPath();
  ctx.arc(mapX(eventA.x), mapT(eventA.t), dotR, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COL.eventB;
  ctx.beginPath();
  ctx.arc(mapX(eventB.x), mapT(eventB.t), dotR, 0, Math.PI * 2);
  ctx.fill();

  // Event labels
  ctx.font = 'bold 12px system-ui';
  ctx.textAlign = 'center';
  ctx.fillStyle = COL.eventA;
  ctx.fillText('A', mapX(eventA.x), mapT(eventA.t) - 12);
  ctx.fillStyle = COL.eventB;
  ctx.fillText('B', mapX(eventB.x), mapT(eventB.t) - 12);

  // Time indicator line (horizontal sweep)
  const aPrime = lorentz(eventA.t, eventA.x, v);
  const bPrime = lorentz(eventB.t, eventB.x, v);
  const tPrimeMin = Math.min(aPrime.t, bPrime.t);
  const tPrimeMax = Math.max(aPrime.t, bPrime.t);
  const animTotalT = Math.max(ANIM_MAX_T, tPrimeMax + 1);

  // Show current time as a moving simultaneity line in the moving frame
  if (state.animTime > 0) {
    // Line of simultaneity for current t' in moving frame, passing through x=v*t_rest
    // In rest frame: t = v*x + t_rest_of_simultaneous
    // We need the rest-frame line corresponding to moving-frame time t'_current
    // t'_current = gamma*(t - v*x), so t = t'_current/gamma + v*x
    const g = gamma(v);
    const tCurrentPrime = state.animTime;
    // This line in rest frame: t = (tCurrentPrime / g) + v * x
    ctx.strokeStyle = 'rgba(99,102,241,0.3)';
    ctx.lineWidth = 1;
    const sx1 = xMin, st1 = (tCurrentPrime / g) + v * xMin;
    const sx2 = xMax, st2 = (tCurrentPrime / g) + v * xMax;
    ctx.beginPath();
    ctx.moveTo(mapX(sx1), mapT(st1));
    ctx.lineTo(mapX(sx2), mapT(st2));
    ctx.stroke();
  }

  ctx.restore();
}

// --- Animation loop ---
function animate(timestamp) {
  if (state.lastTimestamp === null) state.lastTimestamp = timestamp;
  const dt = (timestamp - state.lastTimestamp) / 1000;
  state.lastTimestamp = timestamp;

  // Advance animation time
  const { v, eventA, eventB } = state;
  const aPrime = lorentz(eventA.t, eventA.x, v);
  const bPrime = lorentz(eventB.t, eventB.x, v);
  const tPrimeMax = Math.max(aPrime.t, bPrime.t);
  const animTotalT = Math.max(ANIM_MAX_T, tPrimeMax + 1);

  state.animTime += dt;
  if (state.animTime > animTotalT) {
    state.animTime = 0;
    state.flashA = 0;
    state.flashB = 0;
  }

  // Trigger flashes
  const prevTime = state.animTime - dt;
  if (prevTime < aPrime.t && state.animTime >= aPrime.t) {
    state.flashA = FLASH_DURATION;
  }
  if (prevTime < bPrime.t && state.animTime >= bPrime.t) {
    state.flashB = FLASH_DURATION;
  }

  // Decay flashes
  if (state.flashA > 0) state.flashA = Math.max(0, state.flashA - dt);
  if (state.flashB > 0) state.flashB = Math.max(0, state.flashB - dt);

  drawScene(dt);
  drawDiagram();
  requestAnimationFrame(animate);
}

// --- Init ---
resizeCanvases();
updateInfo();
requestAnimationFrame(animate);
</script>
