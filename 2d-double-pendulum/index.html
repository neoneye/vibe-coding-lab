<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Pendulum Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c8c8d0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: #12121a;
    padding: 16px;
    overflow-y: auto;
    border-right: 1px solid #2a2a3a;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  h1 {
    font-size: 16px;
    color: #e0e0f0;
    border-bottom: 1px solid #2a2a3a;
    padding-bottom: 8px;
  }
  .group {
    background: #1a1a28;
    border-radius: 8px;
    padding: 10px;
  }
  .group h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8888aa;
    margin-bottom: 8px;
  }
  .param {
    margin-bottom: 6px;
  }
  .param label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .param label span {
    color: #6e9fff;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: #2a2a3a;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6e9fff;
    cursor: pointer;
  }
  .buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  button {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #3a3a5a;
    background: #1e1e30;
    color: #c8c8d0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }
  button:hover { background: #2a2a44; }
  button.active { background: #3a4a6a; border-color: #6e9fff; }
  #main {
    flex: 1;
    position: relative;
  }
  #canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #info {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 11px;
    color: #8899bb;
    text-align: right;
    line-height: 1.6;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="sidebar">
  <h1>Double Pendulum</h1>

  <div class="group">
    <h3>Pendulum 1 (upper)</h3>
    <div class="param">
      <label>Mass <span id="v_m1">2.0</span> kg</label>
      <input type="range" id="m1" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="param">
      <label>Length <span id="v_l1">1.0</span></label>
      <input type="range" id="l1" min="0.3" max="2" step="0.05" value="1">
    </div>
    <div class="param">
      <label>Start angle <span id="v_a1">120</span>&deg;</label>
      <input type="range" id="a1" min="0" max="360" step="1" value="120">
    </div>
  </div>

  <div class="group">
    <h3>Pendulum 2 (lower)</h3>
    <div class="param">
      <label>Mass <span id="v_m2">2.0</span> kg</label>
      <input type="range" id="m2" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="param">
      <label>Length <span id="v_l2">1.0</span></label>
      <input type="range" id="l2" min="0.3" max="2" step="0.05" value="1">
    </div>
    <div class="param">
      <label>Start angle <span id="v_a2">150</span>&deg;</label>
      <input type="range" id="a2" min="0" max="360" step="1" value="150">
    </div>
  </div>

  <div class="group">
    <h3>Physics</h3>
    <div class="param">
      <label>Gravity <span id="v_g">9.81</span></label>
      <input type="range" id="g" min="1" max="30" step="0.1" value="9.81">
    </div>
    <div class="param">
      <label>Damping <span id="v_damp">0.000</span></label>
      <input type="range" id="damp" min="0" max="0.05" step="0.001" value="0">
    </div>
    <div class="param">
      <label>Elasticity <span id="v_elas">1.00</span></label>
      <input type="range" id="elas" min="0.5" max="1.5" step="0.01" value="1">
    </div>
    <div class="param">
      <label>Speed <span id="v_speed">1.0</span>x</label>
      <input type="range" id="speed" min="0.1" max="4" step="0.1" value="1">
    </div>
  </div>

  <div class="group">
    <h3>Spectrogram</h3>
    <div class="param">
      <label>Window <span id="v_hw">10.0</span>s</label>
      <input type="range" id="hw" min="3" max="60" step="0.5" value="10">
    </div>
  </div>

  <div class="group">
    <h3>Audio</h3>
    <div class="param">
      <label>Volume <span id="v_vol">0.4</span></label>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.4">
    </div>
    <div class="param">
      <label>Base note <span id="v_base">220</span> Hz</label>
      <input type="range" id="base" min="55" max="440" step="1" value="220">
    </div>
    <div class="param">
      <label>Reverb <span id="v_rev">0.4</span></label>
      <input type="range" id="rev" min="0" max="0.9" step="0.05" value="0.4">
    </div>
  </div>

  <div class="buttons">
    <button id="btnPause">Pause</button>
    <button id="btnReset">Reset</button>
  </div>
  <div class="buttons">
    <button id="btnTrail" class="active">Trail</button>
    <button id="btnSpectro" class="active">Spectrogram</button>
  </div>
  <div class="buttons">
    <button id="btnSound">Sound On</button>
  </div>
</div>

<div id="main">
  <canvas id="canvas"></canvas>
  <div id="info"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');

// State
let paused = false, showTrail = true, showSpectro = true;
let simTime = 0;
let th1, th2, w1, w2;
let trail = []; // for pendulum trail drawing
let angleHistory = []; // {t, a1, a2, w1, w2} for spectrogram
let W = 0, H = 0;

function params() {
  return {
    m1: parseFloat($('m1').value),
    m2: parseFloat($('m2').value),
    l1: parseFloat($('l1').value),
    l2: parseFloat($('l2').value),
    g: parseFloat($('g').value),
    damp: parseFloat($('damp').value),
    elas: parseFloat($('elas').value),
    speed: parseFloat($('speed').value),
    spectroWindow: parseFloat($('hw').value),
  };
}

// Slider display updates
document.querySelectorAll('input[type=range]').forEach(inp => {
  inp.addEventListener('input', () => {
    const v = $('v_' + inp.id);
    if (v) {
      const dec = inp.step.includes('.') ? inp.step.split('.')[1].length : 0;
      v.textContent = parseFloat(inp.value).toFixed(dec);
    }
  });
});

function resetSim() {
  th1 = parseFloat($('a1').value) * Math.PI / 180;
  th2 = parseFloat($('a2').value) * Math.PI / 180;
  w1 = 0; w2 = 0;
  simTime = 0;
  trail = [];
  angleHistory = [];
}
resetSim();

// Double pendulum equations of motion
function derivs(t1, t2, o1, o2, p) {
  const { m1, m2, l1, l2, g, damp, elas } = p;
  const L1 = l1 * elas, L2 = l2 * elas;
  const d = t2 - t1;
  const sd = Math.sin(d), cd = Math.cos(d);
  const M = m1 + m2;
  const den1 = M * L1 - m2 * L1 * cd * cd;
  const den2 = (L2 / L1) * den1;
  const do1 = (m2 * L1 * o1 * o1 * sd * cd
    + m2 * g * Math.sin(t2) * cd
    + m2 * L2 * o2 * o2 * sd
    - M * g * Math.sin(t1)) / den1 - damp * o1;
  const do2 = (-m2 * L2 * o2 * o2 * sd * cd
    + M * (g * Math.sin(t1) * cd - L1 * o1 * o1 * sd - g * Math.sin(t2))) / den2 - damp * o2;
  return [o1, o2, do1, do2];
}

// RK4
function step(dt, p) {
  const k1 = derivs(th1, th2, w1, w2, p);
  const k2 = derivs(th1+dt/2*k1[0], th2+dt/2*k1[1], w1+dt/2*k1[2], w2+dt/2*k1[3], p);
  const k3 = derivs(th1+dt/2*k2[0], th2+dt/2*k2[1], w1+dt/2*k2[2], w2+dt/2*k2[3], p);
  const k4 = derivs(th1+dt*k3[0], th2+dt*k3[1], w1+dt*k3[2], w2+dt*k3[3], p);
  th1 += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
  th2 += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
  w1  += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
  w2  += dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
}

// Normalize angle to [0, 360)
function normAngle(a) {
  return ((a * 180 / Math.PI) % 360 + 360) % 360;
}

// Resize
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// Buttons
$('btnPause').addEventListener('click', () => {
  paused = !paused;
  $('btnPause').textContent = paused ? 'Play' : 'Pause';
  $('btnPause').classList.toggle('active', paused);
});
$('btnReset').addEventListener('click', resetSim);
$('btnTrail').addEventListener('click', () => {
  showTrail = !showTrail;
  $('btnTrail').classList.toggle('active', showTrail);
});
$('btnSpectro').addEventListener('click', () => {
  showSpectro = !showSpectro;
  $('btnSpectro').classList.toggle('active', showSpectro);
});

// === Audio Synth ===
let audioCtx = null, soundOn = false;
let osc1, osc2, gain1, gain2, masterGain, panner, filter, convolver, reverbGain, dryGain;

const SCALE_RATIOS = [1, 9/8, 5/4, 3/2, 5/3, 2];

function quantizeToScale(freq, baseFreq) {
  let octave = 0, f = freq;
  while (f > baseFreq * 2) { f /= 2; octave++; }
  while (f < baseFreq) { f *= 2; octave--; }
  const ratio = f / baseFreq;
  let closest = SCALE_RATIOS[0], minDist = Math.abs(ratio - SCALE_RATIOS[0]);
  for (let i = 1; i < SCALE_RATIOS.length; i++) {
    const dist = Math.abs(ratio - SCALE_RATIOS[i]);
    if (dist < minDist) { minDist = dist; closest = SCALE_RATIOS[i]; }
  }
  return baseFreq * closest * Math.pow(2, octave);
}

function createReverb(actx, duration) {
  const rate = actx.sampleRate, len = rate * duration;
  const buf = actx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.5);
  }
  return buf;
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc1 = audioCtx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = 220;
  gain1 = audioCtx.createGain(); gain1.gain.value = 0; osc1.connect(gain1);
  osc2 = audioCtx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = 330;
  gain2 = audioCtx.createGain(); gain2.gain.value = 0; osc2.connect(gain2);
  filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800; filter.Q.value = 5;
  panner = audioCtx.createStereoPanner(); panner.pan.value = 0;
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.4;
  convolver = audioCtx.createConvolver(); convolver.buffer = createReverb(audioCtx, 2.5);
  reverbGain = audioCtx.createGain(); reverbGain.gain.value = 0.4;
  dryGain = audioCtx.createGain(); dryGain.gain.value = 0.7;
  gain1.connect(filter); gain2.connect(filter); filter.connect(panner);
  panner.connect(dryGain); panner.connect(convolver); convolver.connect(reverbGain);
  dryGain.connect(masterGain); reverbGain.connect(masterGain); masterGain.connect(audioCtx.destination);
  osc1.start(); osc2.start();
}

function updateAudio(p, L1, L2) {
  if (!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const baseFreq = parseFloat($('base').value);
  const vol = parseFloat($('vol').value);
  const rev = parseFloat($('rev').value);
  const normTh1 = (Math.sin(th1)+1)/2, normTh2 = (Math.sin(th2)+1)/2;
  const f1 = quantizeToScale(baseFreq*(0.5+normTh1*1.5), baseFreq);
  const f2 = quantizeToScale(baseFreq*1.5*(0.5+normTh2*1.5), baseFreq);
  osc1.frequency.setTargetAtTime(f1, t, 0.05);
  osc2.frequency.setTargetAtTime(f2, t, 0.05);
  gain1.gain.setTargetAtTime(Math.min(1,Math.abs(w1)/12)*0.5, t, 0.03);
  gain2.gain.setTargetAtTime(Math.min(1,Math.abs(w2)/12)*0.4, t, 0.03);
  filter.frequency.setTargetAtTime(200+Math.min((Math.abs(w1)+Math.abs(w2))/20,1)*3800, t, 0.04);
  const tipX = L1*Math.sin(th1)+L2*Math.sin(th2);
  panner.pan.setTargetAtTime(Math.max(-1,Math.min(1,tipX/(L1+L2))), t, 0.03);
  masterGain.gain.setTargetAtTime(vol, t, 0.05);
  reverbGain.gain.setTargetAtTime(rev, t, 0.05);
  dryGain.gain.setTargetAtTime(1-rev*0.5, t, 0.05);
}

$('btnSound').addEventListener('click', () => {
  if (!audioCtx) initAudio();
  soundOn = !soundOn;
  $('btnSound').textContent = soundOn ? 'Sound Off' : 'Sound On';
  $('btnSound').classList.toggle('active', soundOn);
  if (audioCtx) {
    if (soundOn) audioCtx.resume();
    else { gain1.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); gain2.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); }
  }
});

// === Spectrogram drawing ===
function drawSpectrogram(p) {
  const spectroH = Math.floor(H * 0.32);
  const spectroY = H - spectroH;
  const plotLeft = 40;
  const plotRight = W - 10;
  const plotTop = spectroY + 20;
  const plotBottom = H - 20;
  const plotW = plotRight - plotLeft;
  const plotH = plotBottom - plotTop;

  // Background
  ctx.fillStyle = '#0e0e18';
  ctx.fillRect(0, spectroY, W, spectroH);
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, spectroY);
  ctx.lineTo(W, spectroY);
  ctx.stroke();

  // Axes
  ctx.strokeStyle = '#2a2a44';
  ctx.lineWidth = 1;
  ctx.strokeRect(plotLeft, plotTop, plotW, plotH);

  // Y-axis labels (angle 0-360)
  ctx.fillStyle = '#556677';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let deg = 0; deg <= 360; deg += 90) {
    const y = plotBottom - (deg / 360) * plotH;
    ctx.fillText(deg + '\u00b0', plotLeft - 4, y);
    if (deg > 0 && deg < 360) {
      ctx.strokeStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(plotLeft, y);
      ctx.lineTo(plotRight, y);
      ctx.stroke();
    }
  }

  // X-axis: time
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const win = p.spectroWindow;
  const tEnd = simTime;
  const tStart = tEnd - win;

  // Time grid lines
  const timeStep = win <= 10 ? 1 : win <= 30 ? 5 : 10;
  const firstTick = Math.ceil(tStart / timeStep) * timeStep;
  for (let t = firstTick; t <= tEnd; t += timeStep) {
    const x = plotLeft + ((t - tStart) / win) * plotW;
    if (x < plotLeft || x > plotRight) continue;
    ctx.strokeStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.moveTo(x, plotTop);
    ctx.lineTo(x, plotBottom);
    ctx.stroke();
    ctx.fillStyle = '#556677';
    ctx.fillText(t.toFixed(0) + 's', x, plotBottom + 3);
  }

  // Title
  ctx.fillStyle = '#667788';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('Angle vs Time', plotLeft, spectroY + 4);

  // Legend
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff4444';
  ctx.fillText('\u25cf \u03b81', plotRight - 50, spectroY + 4);
  ctx.fillStyle = '#4488ff';
  ctx.fillText('\u25cf \u03b82', plotRight, spectroY + 4);

  if (angleHistory.length < 2) return;

  // Clip to plot area
  ctx.save();
  ctx.beginPath();
  ctx.rect(plotLeft, plotTop, plotW, plotH);
  ctx.clip();

  // Draw scatter dots with momentum-based brightness
  // Find max angular velocity for brightness scaling
  let maxW = 1;
  for (const pt of angleHistory) {
    const aw = Math.abs(pt.w1) + Math.abs(pt.w2);
    if (aw > maxW) maxW = aw;
  }

  for (const pt of angleHistory) {
    if (pt.t < tStart) continue;
    const x = plotLeft + ((pt.t - tStart) / win) * plotW;

    // Pendulum 1 - red, brightness from |w1|
    const b1 = 0.2 + 0.8 * Math.min(1, Math.abs(pt.w1) / (maxW * 0.5));
    const a1deg = pt.a1;
    const y1 = plotBottom - (a1deg / 360) * plotH;
    ctx.fillStyle = `rgba(${Math.round(255*b1)}, ${Math.round(60*b1)}, ${Math.round(40*b1)}, ${0.3 + b1 * 0.6})`;
    ctx.beginPath();
    ctx.arc(x, y1, 1.5 + b1, 0, Math.PI * 2);
    ctx.fill();

    // Pendulum 2 - blue, brightness from |w2|
    const b2 = 0.2 + 0.8 * Math.min(1, Math.abs(pt.w2) / (maxW * 0.5));
    const a2deg = pt.a2;
    const y2 = plotBottom - (a2deg / 360) * plotH;
    ctx.fillStyle = `rgba(${Math.round(50*b2)}, ${Math.round(130*b2)}, ${Math.round(255*b2)}, ${0.3 + b2 * 0.6})`;
    ctx.beginPath();
    ctx.arc(x, y2, 1.5 + b2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// Main loop
let lastTime = null;
function frame(ts) {
  requestAnimationFrame(frame);
  if (lastTime === null) { lastTime = ts; return; }
  const dtReal = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  const p = params();
  const L1 = p.l1 * p.elas;
  const L2 = p.l2 * p.elas;

  // Physics
  if (!paused) {
    const dtSim = dtReal * p.speed;
    const n = Math.max(1, Math.ceil(dtSim / 0.002));
    const h = dtSim / n;
    for (let i = 0; i < n; i++) {
      step(h, p);
      simTime += h;
    }
    const x2 = L1 * Math.sin(th1) + L2 * Math.sin(th2);
    const y2 = L1 * Math.cos(th1) + L2 * Math.cos(th2);
    const vx = L1 * w1 * Math.cos(th1) + L2 * w2 * Math.cos(th2);
    const vy = -L1 * w1 * Math.sin(th1) - L2 * w2 * Math.sin(th2);
    trail.push({ x: x2, y: y2, vx, vy, mom: Math.sqrt(vx*vx+vy*vy), t: simTime });

    // Record angles for spectrogram
    angleHistory.push({ t: simTime, a1: normAngle(th1), a2: normAngle(th2), w1, w2 });

    // Prune to window
    const cutoff = simTime - p.spectroWindow;
    while (trail.length > 0 && trail[0].t < cutoff) trail.shift();
    while (angleHistory.length > 0 && angleHistory[0].t < cutoff) angleHistory.shift();

    updateAudio(p, L1, L2);
  }

  // Clear
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  const pendH = showSpectro ? H * 0.65 : H;
  const cx = W / 2;
  const cy = pendH * 0.45;
  const scale = Math.min(W, pendH) / (2 * (L1 + L2) + 0.5) * 0.6;

  // --- Trail ---
  if (showTrail && trail.length > 1) {
    ctx.lineWidth = 1.5;
    for (let i = 1; i < trail.length; i++) {
      const pt = trail[i], prev = trail[i-1];
      const age = (simTime - pt.t) / p.spectroWindow;
      const alpha = Math.max(0, (1 - age) * 0.7);
      const hue = ((Math.atan2(pt.vy, pt.vx) / (2*Math.PI) + 1) % 1) * 360;
      ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
      ctx.beginPath();
      ctx.moveTo(cx + prev.x * scale, cy + prev.y * scale);
      ctx.lineTo(cx + pt.x * scale, cy + pt.y * scale);
      ctx.stroke();
    }
  }

  // --- Pendulum ---
  const x1 = L1 * Math.sin(th1);
  const y1 = L1 * Math.cos(th1);
  const x2 = x1 + L2 * Math.sin(th2);
  const y2 = y1 + L2 * Math.cos(th2);
  const sx1 = cx + x1 * scale, sy1 = cy + y1 * scale;
  const sx2 = cx + x2 * scale, sy2 = cy + y2 * scale;

  // Rods
  ctx.strokeStyle = '#8899aa';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(sx1, sy1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();

  // Pivot
  ctx.fillStyle = '#667788';
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fill();

  // Mass 1
  const r1 = 8 + p.m1 * 2.5;
  ctx.fillStyle = '#ee4444';
  ctx.shadowColor = '#ee4444';
  ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(sx1, sy1, r1, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 2; ctx.stroke();

  // Mass 2
  const r2 = 8 + p.m2 * 2.5;
  ctx.fillStyle = '#4488ff';
  ctx.shadowColor = '#4488ff';
  ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(sx2, sy2, r2, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#66aaff'; ctx.lineWidth = 2; ctx.stroke();

  // Info overlay
  const ke = 0.5*p.m1*(L1*w1)**2 + 0.5*p.m2*((L1*w1)**2 + (L2*w2)**2);
  $('info').innerHTML =
    `t = ${simTime.toFixed(1)}s<br>` +
    `\u03b81 = ${normAngle(th1).toFixed(1)}\u00b0<br>` +
    `\u03b82 = ${normAngle(th2).toFixed(1)}\u00b0<br>` +
    `KE \u2248 ${ke.toFixed(1)}`;

  // --- Spectrogram ---
  if (showSpectro) {
    drawSpectrogram(p);
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
