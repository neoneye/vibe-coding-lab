<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Square Packing Solver</title>
  <style>
    :root {
      --fg: #111;
      --muted: #666;
      --border: #ccc;
      --bg: #fff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 16px 0;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 8px 16px;
      background: none;
      border: 1px solid transparent;
      border-bottom: none;
      cursor: pointer;
      font: inherit;
      color: var(--muted);
    }
    .tab.active {
      color: var(--fg);
      border-color: var(--border);
      background: var(--bg);
      position: relative;
      top: 1px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: center;
      padding: 12px 0;
    }
    .controls.hidden { display: none; }
    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }
    .controls input[type="number"] {
      width: 64px;
      padding: 4px 6px;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .controls input[type="range"] {
      width: 160px;
    }
    .controls button {
      padding: 6px 14px;
      font: inherit;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
    }
    .controls button:hover { background: #f4f4f4; }
    canvas {
      display: block;
      width: 100%;
      height: 480px;
      border: 1px solid var(--border);
      background: var(--bg);
      margin: 12px 0;
    }
    .status {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: pre;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Square Packing Solver</h1>

    <div class="tabs">
      <button class="tab active" data-mode="min">Min container</button>
      <button class="tab" data-mode="max">Max squares</button>
    </div>

    <div class="controls" id="controls-min">
      <label>N: <input type="number" id="input-n" min="1" max="200" value="11"></label>
      <label><input type="radio" name="shape" value="square" checked> square</label>
      <label><input type="radio" name="shape" value="rect"> rect</label>
    </div>

    <div class="controls hidden" id="controls-max">
      <label>W: <input type="number" id="input-w" min="0.1" step="0.1" value="5"></label>
      <label>H: <input type="number" id="input-h" min="0.1" step="0.1" value="5"></label>
    </div>

    <div class="controls">
      <label>Speed: <input type="range" id="input-speed" min="0" max="100" value="50"></label>
      <button id="btn-run">Run</button>
      <button id="btn-stop">Stop</button>
      <button id="btn-reset">Reset</button>
    </div>

    <canvas id="canvas" width="680" height="480"></canvas>

    <div class="status" id="status">idle</div>
  </div>

  <script>
    'use strict';

    // === Tab toggle ===
    const tabs = document.querySelectorAll('.tab');
    const panelMin = document.getElementById('controls-min');
    const panelMax = document.getElementById('controls-max');
    function setMode(mode) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
      panelMin.classList.toggle('hidden', mode !== 'min');
      panelMax.classList.toggle('hidden', mode !== 'max');
    }
    tabs.forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));
  </script>
</body>
</html>
