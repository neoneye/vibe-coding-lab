<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scorched Earth</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="stage">
    <canvas id="canvas" width="960" height="600"></canvas>

    <!-- Title screen -->
    <div id="title" class="overlay">
        <h1>SCORCHED&nbsp;EARTH</h1>
        <p class="tagline">turn-based artillery &mdash; 0, 1 or 2 humans vs AI</p>
        <button id="btnToSetup" class="big">Start</button>
        <p class="hint">&larr; &rarr; angle &middot; &uarr; &darr; power &middot; Tab weapon &middot; Space fire</p>
    </div>

    <!-- Match setup -->
    <div id="setup" class="overlay hidden">
        <h2>Battle Setup</h2>
        <div class="presets">
            <button data-preset="1p">1P vs AI</button>
            <button data-preset="2p">2P Hotseat</button>
            <button data-preset="ai">AI Battle</button>
        </div>
        <div id="slots"></div>
        <div class="row">
            <label>Rounds:
                <select id="selRounds">
                    <option value="1">1</option>
                    <option value="3" selected>3</option>
                    <option value="5">5</option>
                </select>
            </label>
        </div>
        <div class="row">
            <button id="btnStart" class="big">Start Battle</button>
            <button id="btnBackTitle">Back</button>
        </div>
    </div>

    <!-- In-game HUD -->
    <div id="hud" class="hidden">
        <div class="hud-group" id="hudPlayer">
            <span id="hudFlag" class="flagchip"></span>
            <span id="hudName">—</span>
            <span id="hudHp"></span>
        </div>
        <div class="hud-group">
            <button class="hudbtn" id="btnAngleDown">&#9664;</button>
            <span class="hudval">Angle <b id="hudAngle">45</b>&deg;</span>
            <button class="hudbtn" id="btnAngleUp">&#9654;</button>
        </div>
        <div class="hud-group">
            <button class="hudbtn" id="btnPowerDown">&minus;</button>
            <span class="hudval">Power <b id="hudPower">60</b></span>
            <button class="hudbtn" id="btnPowerUp">+</button>
        </div>
        <div class="hud-group">
            <button class="hudbtn" id="btnWeaponPrev">&#9664;</button>
            <span class="hudval" id="hudWeapon">Baby Missile</span>
            <button class="hudbtn" id="btnWeaponNext">&#9654;</button>
        </div>
        <div class="hud-group">
            <button id="btnFire">FIRE</button>
        </div>
        <div class="hud-group">
            <span class="hudval" id="hudWind">Wind 0</span>
            <span class="hudval" id="hudRound"></span>
        </div>
    </div>

    <div id="banner" class="hidden"></div>

    <!-- Round end -->
    <div id="roundEnd" class="overlay hidden">
        <h2 id="roundEndTitle">Round over</h2>
        <table id="scoreTable"></table>
        <button id="btnNextRound" class="big">Next Round</button>
    </div>

    <!-- Match end -->
    <div id="matchEnd" class="overlay hidden">
        <h2 id="matchEndTitle">Winner</h2>
        <table id="finalTable"></table>
        <button id="btnPlayAgain" class="big">Play Again</button>
    </div>
</div>

<script src="js/countries.js"></script>
<script src="js/weapons.js"></script>
<script src="js/terrain.js"></script>
<script src="js/physics.js"></script>
<script src="js/ai.js"></script>
<script src="js/tank.js"></script>
<script src="js/projectile.js"></script>
<script src="js/audio.js"></script>
<script src="js/game.js"></script>
</body>
</html>
