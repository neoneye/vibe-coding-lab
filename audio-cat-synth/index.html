<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Synth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #e0d8e8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 24px 16px 8px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #d4a0d4;
  }

  header p {
    font-size: 0.85rem;
    color: #9a6a9a;
    margin-top: 4px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Visualizer */
  .viz-panel {
    background: #0a0a14;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 0;
    overflow: hidden;
    position: relative;
  }

  canvas#waveform {
    width: 100%;
    height: 120px;
    display: block;
  }

  .viz-label {
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 0.7rem;
    color: #4a4a7a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    flex: 1;
    padding: 16px;
    border-radius: 10px;
    border: 2px solid;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .action-btn.converse {
    background: linear-gradient(135deg, #6a2a6a, #8a3a8a);
    border-color: #aa4aaa;
    color: #ffd0ff;
  }

  .action-btn.converse:hover {
    background: linear-gradient(135deg, #7a3a7a, #9a4a9a);
    box-shadow: 0 0 20px rgba(170, 74, 170, 0.3);
  }

  .action-btn.stop {
    background: linear-gradient(135deg, #6a2a2a, #8a3a3a);
    border-color: #aa4a4a;
    color: #ffd0d0;
    flex: 0.3;
  }

  .action-btn.stop:hover {
    background: linear-gradient(135deg, #7a3a3a, #9a4a4a);
  }

  .action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .action-btn:active {
    transform: scale(0.98);
  }

  /* Cat columns */
  .cats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .cat-panel {
    background: #111420;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px;
  }

  .cat-panel.cat1 { border-color: #4a2a5a; }
  .cat-panel.cat2 { border-color: #2a4a5a; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a2e;
  }

  .cat-icon { font-size: 1.5rem; }

  .cat-name {
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .cat1 .cat-name { color: #c080d0; }
  .cat2 .cat-name { color: #80b0d0; }

  .cat-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-left: auto;
    background: #333;
    transition: all 0.3s;
  }

  .cat-indicator.active {
    box-shadow: 0 0 8px;
  }

  .cat1 .cat-indicator.active { background: #c080d0; box-shadow: 0 0 8px #c080d0; }
  .cat2 .cat-indicator.active { background: #80b0d0; box-shadow: 0 0 8px #80b0d0; }

  /* Preset row inside cat panel */
  .mood-row {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .mood-btn {
    flex: 1;
    padding: 6px 4px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    color: #7a7aaa;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mood-btn.active {
    background: #2a2a4a;
    border-color: #6a6aba;
    color: #c0c0e0;
  }

  .mood-btn:hover { border-color: #4a4a8a; }

  /* Slider controls */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .control {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .control label {
    font-size: 0.7rem;
    color: #8a8aaa;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .control label .val {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    color: #6a6a9a;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #1a1a2e;
    outline: none;
    cursor: pointer;
  }

  .cat1 input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #b070c0;
    border: 2px solid #d090e0;
    cursor: pointer;
  }

  .cat2 input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #70a0c0;
    border: 2px solid #90c0e0;
    cursor: pointer;
  }

  /* Phrase display */
  .phrase-display {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    min-height: 36px;
    padding: 8px;
    background: #0a0a14;
    border-radius: 6px;
    align-items: flex-end;
    margin-bottom: 8px;
  }

  .note-bar {
    width: 10px;
    min-height: 6px;
    border-radius: 2px 2px 0 0;
    transition: height 0.15s, opacity 0.1s;
    opacity: 0.5;
  }

  .note-bar.playing {
    opacity: 1;
    box-shadow: 0 0 6px rgba(200, 150, 255, 0.4);
  }

  /* Dialogue log */
  .panel {
    background: #111420;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px;
  }

  .panel-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #5a5a8a;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a2e;
  }

  .log {
    max-height: 140px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: #5a5a8a;
    padding: 8px;
    background: #0a0a14;
    border-radius: 8px;
  }

  .log div { padding: 2px 0; }
  .log .cat1-log { color: #c080d0; }
  .log .cat2-log { color: #80b0d0; }

  /* Conversation controls */
  .conv-panel {
    background: #111420;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px;
  }

  .conv-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .conv-controls label {
    font-size: 0.7rem;
    color: #8a8aaa;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .conv-controls .val {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    color: #6a6a9a;
  }

  .conv-controls input[type="range"] {
    width: 100px;
  }

  .conv-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #9a6aba;
    border: 2px solid #ba8ada;
    cursor: pointer;
  }

  footer {
    text-align: center;
    padding: 16px;
    font-size: 0.7rem;
    color: #3a3a5a;
  }

  @media (max-width: 600px) {
    .cats-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Cat Synth</h1>
  <p>Two cats having a heated conversation</p>
</header>

<div class="container">

  <!-- Waveform visualizer -->
  <div class="viz-panel">
    <span class="viz-label">waveform</span>
    <canvas id="waveform"></canvas>
  </div>

  <!-- Start / Stop conversation -->
  <div class="action-row">
    <button class="action-btn converse" id="converseBtn">Start Conversation</button>
    <button class="action-btn stop" id="stopBtn" disabled>Stop</button>
  </div>

  <!-- Conversation settings -->
  <div class="conv-panel">
    <div class="conv-controls">
      <label>Turns <span class="val" id="turnsVal">8</span>
        <input type="range" id="turns" min="2" max="20" value="8" step="1">
      </label>
      <label>Pause Between <span class="val" id="pauseVal">0.40 s</span>
        <input type="range" id="pause" min="0.1" max="1.5" value="0.4" step="0.05">
      </label>
      <label>Aggression <span class="val" id="aggroVal">0.50</span>
        <input type="range" id="aggro" min="0" max="1" value="0.5" step="0.05">
      </label>
    </div>
  </div>

  <!-- Two cat panels side by side -->
  <div class="cats-row">

    <!-- Cat 1 -->
    <div class="cat-panel cat1">
      <div class="cat-header">
        <span class="cat-icon">&#x1F408;</span>
        <span class="cat-name">Cat 1</span>
        <div class="cat-indicator" id="cat1Indicator"></div>
      </div>
      <div class="mood-row" id="mood1">
        <button class="mood-btn active" data-mood="hiss">Hiss</button>
        <button class="mood-btn" data-mood="growl">Growl</button>
        <button class="mood-btn" data-mood="yowl">Yowl</button>
        <button class="mood-btn" data-mood="spit">Spit</button>
      </div>
      <div class="phrase-display" id="phrase1"></div>
      <div class="controls-grid">
        <div class="control">
          <label>Pitch <span class="val" id="c1PitchVal"></span></label>
          <input type="range" id="c1Pitch" min="200" max="2000" value="800" step="10">
        </div>
        <div class="control">
          <label>Intensity <span class="val" id="c1IntensityVal"></span></label>
          <input type="range" id="c1Intensity" min="0.1" max="1" value="0.6" step="0.05">
        </div>
        <div class="control">
          <label>Duration <span class="val" id="c1DurationVal"></span></label>
          <input type="range" id="c1Duration" min="0.05" max="0.8" value="0.25" step="0.01">
        </div>
        <div class="control">
          <label>Noise <span class="val" id="c1NoiseVal"></span></label>
          <input type="range" id="c1Noise" min="0" max="1" value="0.5" step="0.05">
        </div>
        <div class="control">
          <label>Vibrato <span class="val" id="c1VibratoVal"></span></label>
          <input type="range" id="c1Vibrato" min="0" max="40" value="12" step="1">
        </div>
        <div class="control">
          <label>Volume <span class="val" id="c1VolumeVal"></span></label>
          <input type="range" id="c1Volume" min="0" max="1" value="0.5" step="0.01">
        </div>
      </div>
    </div>

    <!-- Cat 2 -->
    <div class="cat-panel cat2">
      <div class="cat-header">
        <span class="cat-icon">&#x1F408;&#x200D;&#x2B1B;</span>
        <span class="cat-name">Cat 2</span>
        <div class="cat-indicator" id="cat2Indicator"></div>
      </div>
      <div class="mood-row" id="mood2">
        <button class="mood-btn" data-mood="hiss">Hiss</button>
        <button class="mood-btn active" data-mood="growl">Growl</button>
        <button class="mood-btn" data-mood="yowl">Yowl</button>
        <button class="mood-btn" data-mood="spit">Spit</button>
      </div>
      <div class="phrase-display" id="phrase2"></div>
      <div class="controls-grid">
        <div class="control">
          <label>Pitch <span class="val" id="c2PitchVal"></span></label>
          <input type="range" id="c2Pitch" min="200" max="2000" value="500" step="10">
        </div>
        <div class="control">
          <label>Intensity <span class="val" id="c2IntensityVal"></span></label>
          <input type="range" id="c2Intensity" min="0.1" max="1" value="0.7" step="0.05">
        </div>
        <div class="control">
          <label>Duration <span class="val" id="c2DurationVal"></span></label>
          <input type="range" id="c2Duration" min="0.05" max="0.8" value="0.35" step="0.01">
        </div>
        <div class="control">
          <label>Noise <span class="val" id="c2NoiseVal"></span></label>
          <input type="range" id="c2Noise" min="0" max="1" value="0.6" step="0.05">
        </div>
        <div class="control">
          <label>Vibrato <span class="val" id="c2VibratoVal"></span></label>
          <input type="range" id="c2Vibrato" min="0" max="40" value="8" step="1">
        </div>
        <div class="control">
          <label>Volume <span class="val" id="c2VolumeVal"></span></label>
          <input type="range" id="c2Volume" min="0" max="1" value="0.5" step="0.01">
        </div>
      </div>
    </div>

  </div>

  <!-- Dialogue log -->
  <div class="panel">
    <div class="panel-title">Conversation Log</div>
    <div class="log" id="log"></div>
  </div>

</div>

<footer>Click "Start Conversation" to hear two cats argue</footer>

<script>
// ---- Audio context ----
let ctx = null;
let analyser = null;
let masterGain = null;

function ensureAudio() {
  if (ctx) return;
  ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  masterGain = ctx.createGain();
  masterGain.connect(analyser);
  analyser.connect(ctx.destination);
}

// ---- State ----
let isPlaying = false;
let conversationTimeout = null;
let activeMood = { cat1: 'hiss', cat2: 'growl' };

// ---- Mood definitions ----
const moods = {
  hiss: {
    name: 'Hiss',
    noteCount: [1, 3],
    noteStyle: 'hiss'
  },
  growl: {
    name: 'Growl',
    noteCount: [1, 3],
    noteStyle: 'growl'
  },
  yowl: {
    name: 'Yowl',
    noteCount: [2, 5],
    noteStyle: 'yowl'
  },
  spit: {
    name: 'Spit',
    noteCount: [1, 4],
    noteStyle: 'spit'
  }
};

// ---- Controls per cat ----
function getCatParams(catNum) {
  const c = catNum === 1 ? 'c1' : 'c2';
  return {
    pitch: parseFloat(document.getElementById(`${c}Pitch`).value),
    intensity: parseFloat(document.getElementById(`${c}Intensity`).value),
    duration: parseFloat(document.getElementById(`${c}Duration`).value),
    noise: parseFloat(document.getElementById(`${c}Noise`).value),
    vibrato: parseFloat(document.getElementById(`${c}Vibrato`).value),
    volume: parseFloat(document.getElementById(`${c}Volume`).value)
  };
}

// ---- Update slider labels ----
function updateLabels() {
  for (const c of ['c1', 'c2']) {
    const el = (id) => document.getElementById(id);
    el(`${c}PitchVal`).textContent = el(`${c}Pitch`).value + ' Hz';
    el(`${c}IntensityVal`).textContent = parseFloat(el(`${c}Intensity`).value).toFixed(2);
    el(`${c}DurationVal`).textContent = parseFloat(el(`${c}Duration`).value).toFixed(2) + ' s';
    el(`${c}NoiseVal`).textContent = parseFloat(el(`${c}Noise`).value).toFixed(2);
    el(`${c}VibratoVal`).textContent = el(`${c}Vibrato`).value + ' Hz';
    el(`${c}VolumeVal`).textContent = parseFloat(el(`${c}Volume`).value).toFixed(2);
  }
  document.getElementById('turnsVal').textContent = document.getElementById('turns').value;
  document.getElementById('pauseVal').textContent = parseFloat(document.getElementById('pause').value).toFixed(2) + ' s';
  document.getElementById('aggroVal').textContent = parseFloat(document.getElementById('aggro').value).toFixed(2);
}

// Bind all sliders
document.querySelectorAll('input[type="range"]').forEach(s => {
  s.addEventListener('input', updateLabels);
});
updateLabels();

// ---- Mood selectors ----
document.getElementById('mood1').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  document.querySelectorAll('#mood1 .mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeMood.cat1 = btn.dataset.mood;
});

document.getElementById('mood2').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  document.querySelectorAll('#mood2 .mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeMood.cat2 = btn.dataset.mood;
});

// ---- Phrase generation ----
function generatePhrase(mood, catParams, aggro) {
  const m = moods[mood];
  const len = randInt(m.noteCount[0], m.noteCount[1] + Math.floor(aggro * 2));
  const notes = [];

  for (let i = 0; i < len; i++) {
    switch (m.noteStyle) {
      case 'hiss': {
        // A real hiss: 1-3 sustained bursts of shaped noise
        notes.push({
          pitch: 0.7 + Math.random() * 0.3,
          durMul: 1.5 + Math.random() * 3.0, // long sustained hiss
          noiseMix: 0.95,
          glide: 0,
          accent: 0.7 + aggro * 0.5
        });
        break;
      }
      case 'growl': {
        // A real growl: sustained low rumble with vocal fry
        notes.push({
          pitch: 0.1 + Math.random() * 0.2,
          durMul: 2.0 + Math.random() * 3.0, // long sustained growl
          noiseMix: 0.3 + Math.random() * 0.2,
          glide: 0.05 + Math.random() * 0.1,
          accent: 0.6 + aggro * 0.6
        });
        break;
      }
      case 'yowl': {
        // Wide pitch sweeps, dramatic cat wail
        const up = Math.random() < 0.5;
        notes.push({
          pitch: up ? 0.2 + Math.random() * 0.3 : 0.6 + Math.random() * 0.4,
          durMul: 1.5 + Math.random() * 2.5,
          noiseMix: 0.2 + Math.random() * 0.2,
          glide: 0.5 + Math.random() * 0.5,
          accent: 0.8 + Math.random() * aggro
        });
        break;
      }
      case 'spit': {
        // Explosive short bursts
        notes.push({
          pitch: 0.6 + Math.random() * 0.4,
          durMul: 0.3 + Math.random() * 0.5,
          noiseMix: 0.9,
          glide: 0,
          accent: 1.2 + Math.random() * aggro
        });
        break;
      }
    }
  }
  return notes;
}

// ---- Noise buffer ----
let noiseBuffer = null;

function getNoiseBuffer() {
  if (noiseBuffer) return noiseBuffer;
  const len = ctx.sampleRate * 2;
  noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  return noiseBuffer;
}

// ---- Sound synthesis ----
// Synthesize a hiss: shaped white noise through high-pass + resonant peak
function synthHiss(t, dur, params, note) {
  const vol = params.volume * note.accent * 0.4;

  // Primary noise source
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = getNoiseBuffer();
  noiseSrc.loop = true;

  // High-pass filter: cuts everything below ~3-5kHz (air through teeth)
  const hiPass = ctx.createBiquadFilter();
  hiPass.type = 'highpass';
  hiPass.frequency.value = 3000 + params.pitch * 2;
  hiPass.Q.value = 0.5;

  // Resonant peak around 5-8kHz for sibilant quality
  const resonance = ctx.createBiquadFilter();
  resonance.type = 'peaking';
  resonance.frequency.value = 5000 + params.pitch * 3;
  resonance.gain.value = 8 + params.intensity * 8;
  resonance.Q.value = 1.5 + params.noise * 2;

  // Second resonant peak higher up for breathiness
  const resonance2 = ctx.createBiquadFilter();
  resonance2.type = 'peaking';
  resonance2.frequency.value = 8000 + params.pitch * 2;
  resonance2.gain.value = 4 + params.intensity * 4;
  resonance2.Q.value = 2;

  // Amplitude modulation for organic variation (slow random flutter)
  const amLfo = ctx.createOscillator();
  const amGain = ctx.createGain();
  amLfo.frequency.value = 3 + Math.random() * 5;
  amGain.gain.value = 0.15 + params.intensity * 0.15;
  amLfo.connect(amGain);

  // Envelope: fast attack, sustain, gradual decay
  const env = ctx.createGain();
  const attackTime = 0.02 + (1 - params.intensity) * 0.05;
  const decayTime = 0.1 + (1 - params.intensity) * 0.15;
  env.gain.setValueAtTime(0.0001, t);
  env.gain.exponentialRampToValueAtTime(vol, t + attackTime);
  // Slight swell in the middle
  env.gain.setValueAtTime(vol, t + dur * 0.3);
  env.gain.linearRampToValueAtTime(vol * (1 + params.intensity * 0.3), t + dur * 0.5);
  env.gain.linearRampToValueAtTime(vol * 0.7, t + dur - decayTime);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  // Connect: noise → hiPass → resonance → resonance2 → env → master
  noiseSrc.connect(hiPass);
  hiPass.connect(resonance);
  resonance.connect(resonance2);
  resonance2.connect(env);
  amLfo.connect(amGain);
  amGain.connect(env.gain);
  env.connect(masterGain);

  noiseSrc.start(t);
  noiseSrc.stop(t + dur + 0.1);
  amLfo.start(t);
  amLfo.stop(t + dur + 0.1);
}

// Synthesize a growl: irregular vocal fry with formant resonances and rumble
function synthGrowl(t, dur, params, note) {
  const vol = params.volume * note.accent * 0.4;
  // Cat growl fundamental: very low, 50-200 Hz
  const baseFreq = 50 + params.pitch * 0.08;

  // === LAYER 1: Irregular glottal pulse train ===
  // Use an AudioWorklet-style approach with a custom periodic wave
  // to create irregular pulse-like excitation
  const pulseOsc = ctx.createOscillator();
  // Custom waveform: pulse-like with lots of harmonics (glottal source)
  const real = new Float32Array(32);
  const imag = new Float32Array(32);
  real[0] = 0;
  for (let i = 1; i < 32; i++) {
    // Decaying harmonic series simulates glottal pulse
    real[i] = 1.0 / i;
    imag[i] = (i % 2 === 0) ? 0.5 / i : 0;
  }
  const pulseWave = ctx.createPeriodicWave(real, imag);
  pulseOsc.setPeriodicWave(pulseWave);
  pulseOsc.frequency.setValueAtTime(baseFreq, t);
  // Wandering pitch for organic feel
  const drift1 = baseFreq * (0.92 + Math.random() * 0.16);
  const drift2 = baseFreq * (0.88 + Math.random() * 0.24);
  pulseOsc.frequency.linearRampToValueAtTime(drift1, t + dur * 0.4);
  pulseOsc.frequency.linearRampToValueAtTime(drift2, t + dur * 0.8);
  pulseOsc.frequency.linearRampToValueAtTime(baseFreq * (0.9 + Math.random() * 0.1), t + dur);

  // === LAYER 2: Second detuned voice for roughness ===
  const pulseOsc2 = ctx.createOscillator();
  pulseOsc2.setPeriodicWave(pulseWave);
  // Slightly detuned - creates beating/roughness
  const detune = baseFreq * (1.01 + Math.random() * 0.03);
  pulseOsc2.frequency.setValueAtTime(detune, t);
  pulseOsc2.frequency.linearRampToValueAtTime(detune * 0.95, t + dur);
  const voice2Gain = ctx.createGain();
  voice2Gain.gain.value = 0.7;

  // === LAYER 3: Sub-bass rumble ===
  const subOsc = ctx.createOscillator();
  subOsc.type = 'sine';
  subOsc.frequency.setValueAtTime(baseFreq * 0.5, t);
  subOsc.frequency.linearRampToValueAtTime(baseFreq * 0.48, t + dur);
  const subGain = ctx.createGain();
  subGain.gain.value = 0.4;

  // === AM MODULATION: Multiple irregular modulators ===
  // Primary fry modulator - slightly irregular
  const fryRate1 = 25 + params.vibrato * 1.5 + Math.random() * 15;
  const fry1 = ctx.createOscillator();
  fry1.type = 'sawtooth'; // Asymmetric for more natural fry
  fry1.frequency.setValueAtTime(fryRate1, t);
  fry1.frequency.setValueAtTime(fryRate1 * 1.1, t + dur * 0.15);
  fry1.frequency.setValueAtTime(fryRate1 * 0.85, t + dur * 0.4);
  fry1.frequency.setValueAtTime(fryRate1 * 1.15, t + dur * 0.6);
  fry1.frequency.setValueAtTime(fryRate1 * 0.9, t + dur * 0.85);
  fry1.frequency.setValueAtTime(fryRate1 * 0.95, t + dur);
  const fry1Depth = ctx.createGain();
  fry1Depth.gain.value = 0.3 + params.intensity * 0.35;

  // Secondary modulator at inharmonic rate for chaos
  const fryRate2 = fryRate1 * 1.37 + Math.random() * 8;
  const fry2 = ctx.createOscillator();
  fry2.type = 'triangle';
  fry2.frequency.setValueAtTime(fryRate2, t);
  fry2.frequency.linearRampToValueAtTime(fryRate2 * (0.7 + Math.random() * 0.6), t + dur);
  const fry2Depth = ctx.createGain();
  fry2Depth.gain.value = 0.15 + params.intensity * 0.15;

  // Slow intensity wavering
  const slowMod = ctx.createOscillator();
  slowMod.type = 'sine';
  slowMod.frequency.value = 2 + Math.random() * 3;
  const slowModDepth = ctx.createGain();
  slowModDepth.gain.value = 0.1 + params.intensity * 0.1;

  // AM node: base gain modulated by all three LFOs
  const amNode = ctx.createGain();
  amNode.gain.value = 0.4;
  fry1.connect(fry1Depth);
  fry1Depth.connect(amNode.gain);
  fry2.connect(fry2Depth);
  fry2Depth.connect(amNode.gain);
  slowMod.connect(slowModDepth);
  slowModDepth.connect(amNode.gain);

  // === DISTORTION: Aggressive waveshaping ===
  const distortion = ctx.createWaveShaper();
  const curveLen = 512;
  const curve = new Float32Array(curveLen);
  const amt = 8 + params.intensity * 25;
  for (let i = 0; i < curveLen; i++) {
    const x = (i / (curveLen / 2)) - 1;
    // Hard clipping with asymmetric curve
    curve[i] = Math.tanh(x * amt) * 0.8 + Math.sin(x * amt * 0.5) * 0.2;
  }
  distortion.curve = curve;
  distortion.oversample = '2x';

  // === FORMANT FILTERS: Simulate cat throat resonances ===
  // Cats have formant-like resonances around 300-600 Hz and 1500-3000 Hz
  const formant1 = ctx.createBiquadFilter();
  formant1.type = 'peaking';
  formant1.frequency.value = 250 + params.pitch * 0.2;
  formant1.gain.value = 8;
  formant1.Q.value = 3;

  const formant2 = ctx.createBiquadFilter();
  formant2.type = 'peaking';
  formant2.frequency.value = 600 + params.pitch * 0.3;
  formant2.gain.value = 6;
  formant2.Q.value = 4;

  const formant3 = ctx.createBiquadFilter();
  formant3.type = 'peaking';
  formant3.frequency.value = 2000 + params.pitch * 0.5;
  formant3.gain.value = 3;
  formant3.Q.value = 2;

  // Cut harsh highs
  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 3000 + params.intensity * 2000;
  lpf.Q.value = 0.7;

  // === NOISE: Low-frequency rumble and breath ===
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = getNoiseBuffer();
  noiseSrc.loop = true;
  const noiseLp = ctx.createBiquadFilter();
  noiseLp.type = 'lowpass';
  noiseLp.frequency.value = 400 + params.pitch * 0.2;
  noiseLp.Q.value = 2;
  const noiseLevel = ctx.createGain();
  noiseLevel.gain.value = params.noise * 0.25;

  // === CONNECT EVERYTHING ===
  // Voice mix → distortion
  const voiceMix = ctx.createGain();
  voiceMix.gain.value = 1.0;
  pulseOsc.connect(voiceMix);
  pulseOsc2.connect(voice2Gain);
  voice2Gain.connect(voiceMix);
  subOsc.connect(subGain);
  subGain.connect(voiceMix);

  // Voice → distortion → formants → AM → envelope
  voiceMix.connect(distortion);
  distortion.connect(formant1);
  formant1.connect(formant2);
  formant2.connect(formant3);
  formant3.connect(lpf);
  lpf.connect(amNode);

  // Noise → AM
  noiseSrc.connect(noiseLp);
  noiseLp.connect(noiseLevel);
  noiseLevel.connect(amNode);

  // Envelope
  const env = ctx.createGain();
  const attackTime = 0.06 + (1 - params.intensity) * 0.12;
  const decayTime = 0.15 + (1 - params.intensity) * 0.15;
  env.gain.setValueAtTime(0.0001, t);
  env.gain.exponentialRampToValueAtTime(vol, t + attackTime);
  // Slight swell in middle for menace
  env.gain.linearRampToValueAtTime(vol * 1.15, t + dur * 0.4);
  env.gain.linearRampToValueAtTime(vol * 1.05, t + dur * 0.7);
  env.gain.setValueAtTime(vol * 0.9, t + dur - decayTime);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  amNode.connect(env);
  env.connect(masterGain);

  // Start all sources
  pulseOsc.start(t); pulseOsc.stop(t + dur + 0.1);
  pulseOsc2.start(t); pulseOsc2.stop(t + dur + 0.1);
  subOsc.start(t); subOsc.stop(t + dur + 0.1);
  fry1.start(t); fry1.stop(t + dur + 0.1);
  fry2.start(t); fry2.stop(t + dur + 0.1);
  slowMod.start(t); slowMod.stop(t + dur + 0.1);
  noiseSrc.start(t); noiseSrc.stop(t + dur + 0.1);
}

// Synthesize a yowl: tonal sweep with vibrato and some noise
function synthYowl(t, dur, params, note, prevFreq) {
  const vol = params.volume * note.accent * 0.3;
  const baseFreq = 200 + params.pitch * 0.8;
  const targetFreq = baseFreq * (0.5 + note.pitch * 1.5);
  const startFreq = prevFreq
    ? prevFreq + (targetFreq - prevFreq) * (1 - note.glide)
    : targetFreq * (1 + (Math.random() - 0.5) * 0.5);

  // Main voice
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(Math.max(80, startFreq), t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(80, targetFreq), t + dur * 0.6);
  osc.frequency.exponentialRampToValueAtTime(Math.max(80, targetFreq * 0.85), t + dur);

  // Vibrato
  const vibLfo = ctx.createOscillator();
  const vibGain = ctx.createGain();
  vibLfo.frequency.value = 5 + params.vibrato * 0.3;
  vibGain.gain.value = targetFreq * 0.04 * params.intensity;
  vibLfo.connect(vibGain);
  vibGain.connect(osc.frequency);

  // Harmonics
  const osc2 = ctx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(Math.max(80, startFreq * 2), t);
  osc2.frequency.exponentialRampToValueAtTime(Math.max(80, targetFreq * 2), t + dur * 0.6);
  const h2Gain = ctx.createGain();
  h2Gain.gain.value = 0.15;

  // Slight noise
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = getNoiseBuffer();
  noiseSrc.loop = true;
  const noiseBp = ctx.createBiquadFilter();
  noiseBp.type = 'bandpass';
  noiseBp.frequency.value = targetFreq * 3;
  noiseBp.Q.value = 2;
  const noiseLevel = ctx.createGain();
  noiseLevel.gain.value = params.noise * 0.15;

  const env = ctx.createGain();
  env.gain.setValueAtTime(0.0001, t);
  env.gain.exponentialRampToValueAtTime(vol, t + 0.03);
  env.gain.setValueAtTime(vol, t + dur * 0.7);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  osc.connect(env);
  osc2.connect(h2Gain);
  h2Gain.connect(env);
  noiseSrc.connect(noiseBp);
  noiseBp.connect(noiseLevel);
  noiseLevel.connect(env);
  env.connect(masterGain);

  osc.start(t); osc.stop(t + dur + 0.1);
  osc2.start(t); osc2.stop(t + dur + 0.1);
  vibLfo.start(t); vibLfo.stop(t + dur + 0.1);
  noiseSrc.start(t); noiseSrc.stop(t + dur + 0.1);

  return targetFreq;
}

// Synthesize a spit: explosive transient noise burst
function synthSpit(t, dur, params, note) {
  const vol = params.volume * note.accent * 0.5;

  // Noise burst
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = getNoiseBuffer();
  noiseSrc.loop = true;

  // Wideband filter with high-frequency emphasis
  const hiPass = ctx.createBiquadFilter();
  hiPass.type = 'highpass';
  hiPass.frequency.value = 2000 + params.pitch;

  const peak = ctx.createBiquadFilter();
  peak.type = 'peaking';
  peak.frequency.value = 4000 + params.pitch * 2;
  peak.gain.value = 10;
  peak.Q.value = 1;

  // Very sharp envelope: instant attack, fast decay
  const env = ctx.createGain();
  env.gain.setValueAtTime(0.0001, t);
  env.gain.exponentialRampToValueAtTime(vol, t + 0.005);
  env.gain.exponentialRampToValueAtTime(vol * 0.3, t + 0.02);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  noiseSrc.connect(hiPass);
  hiPass.connect(peak);
  peak.connect(env);
  env.connect(masterGain);

  noiseSrc.start(t);
  noiseSrc.stop(t + dur + 0.1);
}

function playCatPhrase(phrase, catNum, onDone, overrideMood) {
  ensureAudio();
  if (ctx.state === 'suspended') ctx.resume();

  const params = getCatParams(catNum);
  const moodKey = overrideMood || activeMood[catNum === 1 ? 'cat1' : 'cat2'];

  masterGain.gain.setValueAtTime(1.0, ctx.currentTime);

  let t = ctx.currentTime + 0.05;
  let prevFreq = null;
  const noteTimings = [];
  const phraseEl = document.getElementById(`phrase${catNum}`);

  phrase.forEach((note, i) => {
    const dur = params.duration * note.durMul;

    switch (moodKey) {
      case 'hiss':
        synthHiss(t, dur, params, note);
        break;
      case 'growl':
        synthGrowl(t, dur, params, note);
        break;
      case 'yowl':
        prevFreq = synthYowl(t, dur, params, note, prevFreq);
        break;
      case 'spit':
        synthSpit(t, dur, params, note);
        break;
    }

    noteTimings.push({ time: t, index: i, dur: dur });
    const gap = 0.03 + Math.random() * 0.06;
    t += dur + gap;
  });

  // Animate phrase display
  const catIndicator = document.getElementById(`cat${catNum}Indicator`);
  catIndicator.classList.add('active');

  function animateNotes() {
    if (!isPlaying) {
      renderCatPhrase(phraseEl, phrase, -1, catNum);
      catIndicator.classList.remove('active');
      return;
    }
    const now = ctx.currentTime;
    let activeIdx = -1;
    for (const nt of noteTimings) {
      if (now >= nt.time && now < nt.time + nt.dur) activeIdx = nt.index;
    }
    renderCatPhrase(phraseEl, phrase, activeIdx, catNum);
    if (now < t) {
      requestAnimationFrame(animateNotes);
    } else {
      renderCatPhrase(phraseEl, phrase, -1, catNum);
      catIndicator.classList.remove('active');
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(animateNotes);

  return t - ctx.currentTime;
}

// ---- Phrase display ----
function renderCatPhrase(container, phrase, playingIdx, catNum) {
  container.innerHTML = '';
  const hueBase = catNum === 1 ? 280 : 200;
  phrase.forEach((note, i) => {
    const bar = document.createElement('div');
    bar.className = 'note-bar' + (i === playingIdx ? ' playing' : '');
    const h = 6 + note.pitch * 40 + note.accent * 8;
    bar.style.height = h + 'px';
    bar.style.opacity = i === playingIdx ? '1' : '0.5';
    const hue = hueBase + note.pitch * 30;
    const lightness = 30 + note.noiseMix * 20;
    bar.style.background = `linear-gradient(0deg, hsl(${hue},50%,${lightness}%), hsl(${hue},60%,${lightness + 15}%))`;
    container.appendChild(bar);
  });
}

// ---- Dialogue log ----
const logEl = document.getElementById('log');
let turnCount = 0;

function logPhrase(catNum, phrase) {
  turnCount++;
  const symbols = ['_', '.', '~', '^', '*', "'", '"', '`', '!'];
  const contour = phrase.map(n => {
    const h = Math.round(n.pitch * 8);
    return symbols[Math.min(h, 8)];
  }).join('');
  const moodName = activeMood[catNum === 1 ? 'cat1' : 'cat2'];
  const div = document.createElement('div');
  div.className = `cat${catNum}-log`;
  div.textContent = `Cat ${catNum} [${moodName}] #${turnCount}: ${contour}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

// ---- Conversation engine ----
function startConversation() {
  ensureAudio();
  isPlaying = true;

  const totalTurns = parseInt(document.getElementById('turns').value);
  const pauseBetween = parseFloat(document.getElementById('pause').value);
  const aggro = parseFloat(document.getElementById('aggro').value);
  let turn = 0;

  document.getElementById('converseBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  function nextTurn() {
    if (!isPlaying || turn >= totalTurns) {
      stopConversation();
      return;
    }

    const catNum = (turn % 2 === 0) ? 1 : 2;
    const moodKey = activeMood[catNum === 1 ? 'cat1' : 'cat2'];

    // As aggression increases, moods may escalate
    let effectiveMood = moodKey;
    if (aggro > 0.7 && Math.random() < aggro - 0.5) {
      const escalated = ['hiss', 'spit', 'yowl'];
      effectiveMood = escalated[randInt(0, escalated.length - 1)];
    }

    const phrase = generatePhrase(effectiveMood, getCatParams(catNum), aggro);
    renderCatPhrase(document.getElementById(`phrase${catNum}`), phrase, -1, catNum);
    logPhrase(catNum, phrase);

    const dur = playCatPhrase(phrase, catNum, () => {
      turn++;
      // Reactive pause: higher aggro = shorter pauses, also varies randomly
      const reactPause = pauseBetween * (0.5 + Math.random()) * (1 - aggro * 0.4);
      conversationTimeout = setTimeout(nextTurn, reactPause * 1000);
    }, effectiveMood);
  }

  nextTurn();
}

function stopConversation() {
  isPlaying = false;
  if (conversationTimeout) {
    clearTimeout(conversationTimeout);
    conversationTimeout = null;
  }
  document.getElementById('converseBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('cat1Indicator').classList.remove('active');
  document.getElementById('cat2Indicator').classList.remove('active');
}

// ---- Button handlers ----
document.getElementById('converseBtn').addEventListener('click', startConversation);
document.getElementById('stopBtn').addEventListener('click', stopConversation);

// ---- Waveform visualizer ----
const canvas = document.getElementById('waveform');
const canvasCtx = canvas.getContext('2d');

function drawWaveform() {
  requestAnimationFrame(drawWaveform);

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
  }

  const w = canvas.width;
  const h = canvas.height;
  canvasCtx.fillStyle = '#0a0a14';
  canvasCtx.fillRect(0, 0, w, h);

  if (!analyser) {
    canvasCtx.strokeStyle = '#1a1a3a';
    canvasCtx.lineWidth = dpr;
    canvasCtx.beginPath();
    canvasCtx.moveTo(0, h / 2);
    canvasCtx.lineTo(w, h / 2);
    canvasCtx.stroke();
    return;
  }

  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);

  // Center line
  canvasCtx.strokeStyle = '#1a1a2a';
  canvasCtx.lineWidth = dpr;
  canvasCtx.beginPath();
  canvasCtx.moveTo(0, h / 2);
  canvasCtx.lineTo(w, h / 2);
  canvasCtx.stroke();

  // Waveform - purple/blue gradient
  canvasCtx.strokeStyle = '#b070d0';
  canvasCtx.lineWidth = 2 * dpr;
  canvasCtx.beginPath();
  const sliceWidth = w / bufLen;
  let x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) canvasCtx.moveTo(x, y);
    else canvasCtx.lineTo(x, y);
    x += sliceWidth;
  }
  canvasCtx.stroke();

  // Glow
  canvasCtx.strokeStyle = 'rgba(176, 112, 208, 0.2)';
  canvasCtx.lineWidth = 6 * dpr;
  canvasCtx.beginPath();
  x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) canvasCtx.moveTo(x, y);
    else canvasCtx.lineTo(x, y);
    x += sliceWidth;
  }
  canvasCtx.stroke();
}

drawWaveform();

// ---- Utility ----
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
