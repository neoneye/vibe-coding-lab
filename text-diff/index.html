<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Tool</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  min-height: 100vh;
}

header {
  padding: 16px 24px;
  background: #181825;
  border-bottom: 1px solid #313244;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #cba6f7;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-left: auto;
}

button {
  background: #313244;
  color: #cdd6f4;
  border: 1px solid #45475a;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}

button:hover { background: #45475a; }

button.primary {
  background: #cba6f7;
  color: #1e1e2e;
  border-color: #cba6f7;
  font-weight: 600;
}

button.primary:hover { background: #b4befe; border-color: #b4befe; }

.view-toggle {
  display: flex;
  border: 1px solid #45475a;
  border-radius: 6px;
  overflow: hidden;
}

.view-toggle button {
  border: none;
  border-radius: 0;
  border-right: 1px solid #45475a;
}

.view-toggle button:last-child { border-right: none; }
.view-toggle button.active { background: #585b70; color: #fff; }

/* Input area */
.input-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  height: calc(100vh - 56px);
}

.input-area.hidden { display: none; }

.input-pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid #313244;
}

.input-pane:last-child { border-right: none; }

.pane-header {
  padding: 8px 12px;
  background: #181825;
  border-bottom: 1px solid #313244;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #a6adc8;
}

.pane-header label {
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 4px;
  background: #313244;
  transition: background 0.15s;
  font-size: 12px;
}

.pane-header label:hover { background: #45475a; }
.pane-header input[type="file"] { display: none; }
.pane-header .filename { color: #a6e3a1; font-weight: 500; }

textarea {
  flex: 1;
  background: #1e1e2e;
  color: #cdd6f4;
  border: none;
  padding: 12px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  outline: none;
  tab-size: 4;
}

textarea::placeholder { color: #585b70; }

/* Diff output */
.diff-area {
  height: calc(100vh - 56px);
  overflow: hidden;
}

.diff-area.hidden { display: none; }

/* Side-by-side view */
.side-by-side {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100%;
}

.side-by-side.hidden { display: none; }

.diff-pane {
  overflow: auto;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.6;
}

.diff-pane-left { border-right: 1px solid #313244; }

/* Unified view */
.unified-view {
  height: 100%;
  overflow: auto;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.6;
}

.unified-view.hidden { display: none; }

/* Diff lines */
table.diff-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.diff-table td {
  padding: 0 12px;
  white-space: pre-wrap;
  word-wrap: break-word;
  vertical-align: top;
}

.diff-table .line-num {
  width: 50px;
  min-width: 50px;
  max-width: 50px;
  text-align: right;
  color: #585b70;
  padding: 0 8px;
  user-select: none;
  font-size: 12px;
  border-right: 1px solid #313244;
}

.diff-table .line-content {
  padding: 0 12px;
}

/* Line-level colors */
.line-added {
  background: rgba(166, 227, 161, 0.1);
}

.line-removed {
  background: rgba(243, 139, 168, 0.1);
}

.line-changed-old {
  background: rgba(243, 139, 168, 0.1);
}

.line-changed-new {
  background: rgba(166, 227, 161, 0.1);
}

/* Character-level highlight */
.char-added {
  background: rgba(166, 227, 161, 0.35);
  color: #a6e3a1;
  border-radius: 2px;
}

.char-removed {
  background: rgba(243, 139, 168, 0.35);
  color: #f38ba8;
  border-radius: 2px;
}

/* Separator for skipped lines */
.diff-separator td {
  background: #181825;
  color: #585b70;
  text-align: center;
  padding: 4px 0;
  font-size: 12px;
  border-top: 1px solid #313244;
  border-bottom: 1px solid #313244;
}

/* Unified extras */
.unified-line-added .line-content { color: #a6e3a1; }
.unified-line-removed .line-content { color: #f38ba8; }
.unified-prefix {
  width: 20px;
  min-width: 20px;
  max-width: 20px;
  text-align: center;
  color: #585b70;
  user-select: none;
}

.unified-line-added .unified-prefix { color: #a6e3a1; }
.unified-line-removed .unified-prefix { color: #f38ba8; }

/* Stats bar */
.stats-bar {
  padding: 6px 16px;
  background: #181825;
  border-bottom: 1px solid #313244;
  font-size: 12px;
  color: #a6adc8;
  display: flex;
  gap: 16px;
}

.stats-bar .added { color: #a6e3a1; }
.stats-bar .removed { color: #f38ba8; }
.stats-bar .changed { color: #fab387; }

/* Sync scrolling indicator */
.scroll-sync-label {
  font-size: 12px;
  color: #a6adc8;
  display: flex;
  align-items: center;
  gap: 4px;
}

.scroll-sync-label input { accent-color: #cba6f7; }

/* Drop zone styling */
textarea.drag-over {
  background: #252540;
  border: 2px dashed #cba6f7;
}
</style>
</head>
<body>

<header>
  <h1>Text Diff</h1>
  <div class="controls">
    <div class="view-toggle" id="viewToggle" style="display:none;">
      <button class="active" data-view="side">Side by Side</button>
      <button data-view="unified">Unified</button>
    </div>
    <label class="scroll-sync-label" id="syncLabel" style="display:none;">
      <input type="checkbox" id="syncScroll" checked> Sync scroll
    </label>
    <button class="primary" id="diffBtn">Compare</button>
    <button id="swapBtn">Swap</button>
    <button id="clearBtn">Clear</button>
  </div>
</header>

<div class="input-area" id="inputArea">
  <div class="input-pane">
    <div class="pane-header">
      <span>Original</span>
      <label>Load file<input type="file" id="fileA" accept=".txt,.md,.json,.html,.htm,.py,.js,.ts,.css,.xml,.yaml,.yml,.toml,.cfg,.ini,.sh,.bash,.zsh,.rb,.go,.rs,.java,.c,.cpp,.h,.hpp,.cs,.swift,.kt,.sql,.r,.lua,.pl,.php,.jsx,.tsx,.vue,.svelte,.csv,.log,.env,.gitignore,.dockerfile,.tf"></label>
      <span class="filename" id="nameA"></span>
    </div>
    <textarea id="textA" placeholder="Paste or drop original text here..." spellcheck="false"></textarea>
  </div>
  <div class="input-pane">
    <div class="pane-header">
      <span>Modified</span>
      <label>Load file<input type="file" id="fileB" accept=".txt,.md,.json,.html,.htm,.py,.js,.ts,.css,.xml,.yaml,.yml,.toml,.cfg,.ini,.sh,.bash,.zsh,.rb,.go,.rs,.java,.c,.cpp,.h,.hpp,.cs,.swift,.kt,.sql,.r,.lua,.pl,.php,.jsx,.tsx,.vue,.svelte,.csv,.log,.env,.gitignore,.dockerfile,.tf"></label>
      <span class="filename" id="nameB"></span>
    </div>
    <textarea id="textB" placeholder="Paste or drop modified text here..." spellcheck="false"></textarea>
  </div>
</div>

<div class="diff-area hidden" id="diffArea">
  <div class="stats-bar" id="statsBar"></div>
  <div class="side-by-side" id="sideView">
    <div class="diff-pane diff-pane-left" id="paneLeft"></div>
    <div class="diff-pane diff-pane-right" id="paneRight"></div>
  </div>
  <div class="unified-view hidden" id="unifiedView"></div>
</div>

<script>
// ── Myers diff (line-level) ──
function myersDiff(a, b) {
  const n = a.length, m = b.length;
  if (n + m === 0) return [];

  const max = n + m;
  const vSize = 2 * max + 1;
  const v = new Int32Array(vSize);
  v.fill(-1);
  const vs = [];

  v[max + 1] = 0;

  for (let d = 0; d <= max; d++) {
    const newV = new Int32Array(v);
    for (let k = -d; k <= d; k += 2) {
      let x;
      if (k === -d || (k !== d && v[max + k - 1] < v[max + k + 1])) {
        x = v[max + k + 1];
      } else {
        x = v[max + k - 1] + 1;
      }
      let y = x - k;
      while (x < n && y < m && a[x] === b[y]) { x++; y++; }
      newV[max + k] = x;
      if (x >= n && y >= m) {
        vs.push(newV);
        return backtrack(vs, max, n, m, a, b);
      }
    }
    vs.push(newV);
    v.set(newV);
  }
  return [];
}

function backtrack(vs, max, n, m, a, b) {
  const moves = [];
  let x = n, y = m;

  for (let d = vs.length - 1; d > 0; d--) {
    const v = vs[d];
    const vp = vs[d - 1];
    const k = x - y;
    let prevK;
    if (k === -(d) || (k !== d && vp[max + k - 1] < vp[max + k + 1])) {
      prevK = k + 1;
    } else {
      prevK = k - 1;
    }
    const prevX = vp[max + prevK];
    const prevY = prevX - prevK;

    while (x > prevX + (prevK < k ? 1 : 0) && y > prevY + (prevK < k ? 0 : 1)) {
      x--; y--;
      moves.push({ type: 'equal', aIdx: x, bIdx: y });
    }

    if (d > 0) {
      if (prevK < k) {
        // deletion
        x--;
        moves.push({ type: 'delete', aIdx: x });
      } else {
        // insertion
        y--;
        moves.push({ type: 'insert', bIdx: y });
      }
    }
    x = prevX;
    y = prevY;
  }

  while (x > 0 && y > 0) {
    x--; y--;
    moves.push({ type: 'equal', aIdx: x, bIdx: y });
  }

  moves.reverse();
  return moves;
}

// ── Character-level diff for changed lines ──
function charDiff(oldStr, newStr) {
  const o = [...oldStr], n = [...newStr];
  const ol = o.length, nl = n.length;

  if (ol === 0) return { old: [], new: n.map(c => ({ ch: c, type: 'added' })) };
  if (nl === 0) return { old: o.map(c => ({ ch: c, type: 'removed' })), new: [] };

  // Simple DP LCS for character diff
  const max = ol + nl;
  const vSize = 2 * max + 1;
  const v = new Int32Array(vSize).fill(-1);
  const vs = [];
  v[max + 1] = 0;

  for (let d = 0; d <= max; d++) {
    const nv = new Int32Array(v);
    for (let k = -d; k <= d; k += 2) {
      let x;
      if (k === -d || (k !== d && v[max + k - 1] < v[max + k + 1])) {
        x = v[max + k + 1];
      } else {
        x = v[max + k - 1] + 1;
      }
      let y = x - k;
      while (x < ol && y < nl && o[x] === n[y]) { x++; y++; }
      nv[max + k] = x;
      if (x >= ol && y >= nl) {
        vs.push(nv);
        return buildCharResult(vs, max, ol, nl, o, n);
      }
    }
    vs.push(nv);
    v.set(nv);
  }
  return { old: o.map(c => ({ ch: c, type: 'removed' })), new: n.map(c => ({ ch: c, type: 'added' })) };
}

function buildCharResult(vs, max, ol, nl, o, n) {
  const ops = [];
  let x = ol, y = nl;

  for (let d = vs.length - 1; d > 0; d--) {
    const vp = vs[d - 1];
    const k = x - y;
    let prevK;
    if (k === -d || (k !== d && vp[max + k - 1] < vp[max + k + 1])) {
      prevK = k + 1;
    } else {
      prevK = k - 1;
    }
    const prevX = vp[max + prevK];
    const prevY = prevX - prevK;

    while (x > prevX + (prevK < k ? 1 : 0) && y > prevY + (prevK < k ? 0 : 1)) {
      x--; y--;
      ops.push({ type: 'equal', oIdx: x, nIdx: y });
    }
    if (prevK < k) { x--; ops.push({ type: 'delete', oIdx: x }); }
    else { y--; ops.push({ type: 'insert', nIdx: y }); }
    x = prevX; y = prevY;
  }
  while (x > 0 && y > 0) { x--; y--; ops.push({ type: 'equal', oIdx: x, nIdx: y }); }
  while (x > 0) { x--; ops.push({ type: 'delete', oIdx: x }); }
  while (y > 0) { y--; ops.push({ type: 'insert', nIdx: y }); }

  ops.reverse();

  const oldRes = [], newRes = [];
  for (const op of ops) {
    if (op.type === 'equal') {
      oldRes.push({ ch: o[op.oIdx], type: 'equal' });
      newRes.push({ ch: n[op.nIdx], type: 'equal' });
    } else if (op.type === 'delete') {
      oldRes.push({ ch: o[op.oIdx], type: 'removed' });
    } else {
      newRes.push({ ch: n[op.nIdx], type: 'added' });
    }
  }
  return { old: oldRes, new: newRes };
}

// ── Build diff groups ──
function buildGroups(moves, aLines, bLines) {
  // Collapse consecutive same-type moves, pair adjacent del/ins as "changed"
  const raw = [];
  let i = 0;
  while (i < moves.length) {
    const m = moves[i];
    if (m.type === 'equal') {
      raw.push({ type: 'equal', aIdx: m.aIdx, bIdx: m.bIdx });
      i++;
    } else if (m.type === 'delete') {
      // Collect consecutive deletes
      const dels = [];
      while (i < moves.length && moves[i].type === 'delete') {
        dels.push(moves[i].aIdx);
        i++;
      }
      // Collect consecutive inserts right after
      const ins = [];
      while (i < moves.length && moves[i].type === 'insert') {
        ins.push(moves[i].bIdx);
        i++;
      }
      if (ins.length > 0) {
        raw.push({ type: 'changed', aIdxs: dels, bIdxs: ins });
      } else {
        raw.push({ type: 'removed', aIdxs: dels });
      }
    } else if (m.type === 'insert') {
      const ins = [];
      while (i < moves.length && moves[i].type === 'insert') {
        ins.push(moves[i].bIdx);
        i++;
      }
      raw.push({ type: 'added', bIdxs: ins });
    }
  }
  return raw;
}

// ── Render helpers ──
function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderCharHighlight(chars) {
  let html = '';
  let inSpan = false;
  let currentType = null;

  for (const { ch, type } of chars) {
    if (type !== currentType) {
      if (inSpan) html += '</span>';
      inSpan = false;
      if (type === 'added') {
        html += '<span class="char-added">';
        inSpan = true;
      } else if (type === 'removed') {
        html += '<span class="char-removed">';
        inSpan = true;
      }
      currentType = type;
    }
    html += esc(ch);
  }
  if (inSpan) html += '</span>';
  return html || '&nbsp;';
}

// ── Main diff + render ──
function computeAndRender() {
  const textA = document.getElementById('textA').value;
  const textB = document.getElementById('textB').value;
  const aLines = textA.split('\n');
  const bLines = textB.split('\n');

  const moves = myersDiff(aLines, bLines);
  const groups = buildGroups(moves, aLines, bLines);

  // Stats
  let added = 0, removed = 0, changed = 0;
  for (const g of groups) {
    if (g.type === 'added') added += g.bIdxs.length;
    else if (g.type === 'removed') removed += g.aIdxs.length;
    else if (g.type === 'changed') changed += Math.max(g.aIdxs.length, g.bIdxs.length);
  }

  document.getElementById('statsBar').innerHTML =
    `<span class="added">+${added} added</span>` +
    `<span class="removed">-${removed} removed</span>` +
    `<span class="changed">~${changed} changed</span>` +
    `<span>${aLines.length} / ${bLines.length} lines</span>`;

  renderSideBySide(groups, aLines, bLines);
  renderUnified(groups, aLines, bLines);

  document.getElementById('inputArea').classList.add('hidden');
  document.getElementById('diffArea').classList.remove('hidden');
  document.getElementById('viewToggle').style.display = '';
  document.getElementById('syncLabel').style.display = '';
}

function renderSideBySide(groups, aLines, bLines) {
  let leftHtml = '<table class="diff-table">';
  let rightHtml = '<table class="diff-table">';

  for (const g of groups) {
    if (g.type === 'equal') {
      leftHtml += lineRow(g.aIdx + 1, esc(aLines[g.aIdx]), '');
      rightHtml += lineRow(g.bIdx + 1, esc(bLines[g.bIdx]), '');
    } else if (g.type === 'removed') {
      for (const idx of g.aIdxs) {
        leftHtml += lineRow(idx + 1, esc(aLines[idx]), 'line-removed');
        rightHtml += lineRow('', '&nbsp;', '');
      }
    } else if (g.type === 'added') {
      for (const idx of g.bIdxs) {
        leftHtml += lineRow('', '&nbsp;', '');
        rightHtml += lineRow(idx + 1, esc(bLines[idx]), 'line-added');
      }
    } else if (g.type === 'changed') {
      const maxLen = Math.max(g.aIdxs.length, g.bIdxs.length);
      for (let i = 0; i < maxLen; i++) {
        const aIdx = g.aIdxs[i];
        const bIdx = g.bIdxs[i];
        if (aIdx !== undefined && bIdx !== undefined) {
          const cd = charDiff(aLines[aIdx], bLines[bIdx]);
          leftHtml += lineRow(aIdx + 1, renderCharHighlight(cd.old), 'line-changed-old');
          rightHtml += lineRow(bIdx + 1, renderCharHighlight(cd.new), 'line-changed-new');
        } else if (aIdx !== undefined) {
          leftHtml += lineRow(aIdx + 1, esc(aLines[aIdx]), 'line-removed');
          rightHtml += lineRow('', '&nbsp;', '');
        } else {
          leftHtml += lineRow('', '&nbsp;', '');
          rightHtml += lineRow(bIdx + 1, esc(bLines[bIdx]), 'line-added');
        }
      }
    }
  }

  leftHtml += '</table>';
  rightHtml += '</table>';

  document.getElementById('paneLeft').innerHTML = leftHtml;
  document.getElementById('paneRight').innerHTML = rightHtml;
}

function renderUnified(groups, aLines, bLines) {
  let html = '<table class="diff-table">';

  for (const g of groups) {
    if (g.type === 'equal') {
      html += unifiedRow(g.aIdx + 1, g.bIdx + 1, ' ', esc(aLines[g.aIdx]), '');
    } else if (g.type === 'removed') {
      for (const idx of g.aIdxs) {
        html += unifiedRow(idx + 1, '', '-', esc(aLines[idx]), 'unified-line-removed line-removed');
      }
    } else if (g.type === 'added') {
      for (const idx of g.bIdxs) {
        html += unifiedRow('', idx + 1, '+', esc(bLines[idx]), 'unified-line-added line-added');
      }
    } else if (g.type === 'changed') {
      // Show old lines first, then new
      for (let i = 0; i < g.aIdxs.length; i++) {
        const aIdx = g.aIdxs[i];
        const bIdx = g.bIdxs[i];
        if (bIdx !== undefined) {
          const cd = charDiff(aLines[aIdx], bLines[bIdx]);
          html += unifiedRow(aIdx + 1, '', '-', renderCharHighlight(cd.old), 'unified-line-removed line-changed-old');
        } else {
          html += unifiedRow(aIdx + 1, '', '-', esc(aLines[aIdx]), 'unified-line-removed line-removed');
        }
      }
      for (let i = 0; i < g.bIdxs.length; i++) {
        const bIdx = g.bIdxs[i];
        const aIdx = g.aIdxs[i];
        if (aIdx !== undefined) {
          const cd = charDiff(aLines[aIdx], bLines[bIdx]);
          html += unifiedRow('', bIdx + 1, '+', renderCharHighlight(cd.new), 'unified-line-added line-changed-new');
        } else {
          html += unifiedRow('', bIdx + 1, '+', esc(bLines[bIdx]), 'unified-line-added line-added');
        }
      }
    }
  }

  html += '</table>';
  document.getElementById('unifiedView').innerHTML = html;
}

function lineRow(num, content, cls) {
  return `<tr class="${cls}"><td class="line-num">${num}</td><td class="line-content">${content}</td></tr>`;
}

function unifiedRow(numA, numB, prefix, content, cls) {
  return `<tr class="${cls}"><td class="line-num">${numA}</td><td class="line-num">${numB}</td><td class="unified-prefix">${prefix}</td><td class="line-content">${content}</td></tr>`;
}

// ── UI wiring ──
document.getElementById('diffBtn').addEventListener('click', () => {
  const btn = document.getElementById('diffBtn');
  if (btn.textContent === 'Compare') {
    computeAndRender();
    btn.textContent = 'Edit';
  } else {
    document.getElementById('inputArea').classList.remove('hidden');
    document.getElementById('diffArea').classList.add('hidden');
    document.getElementById('viewToggle').style.display = 'none';
    document.getElementById('syncLabel').style.display = 'none';
    btn.textContent = 'Compare';
  }
});

document.getElementById('swapBtn').addEventListener('click', () => {
  const a = document.getElementById('textA');
  const b = document.getElementById('textB');
  const tmp = a.value;
  a.value = b.value;
  b.value = tmp;
  const na = document.getElementById('nameA');
  const nb = document.getElementById('nameB');
  const tn = na.textContent;
  na.textContent = nb.textContent;
  nb.textContent = tn;
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('textA').value = '';
  document.getElementById('textB').value = '';
  document.getElementById('nameA').textContent = '';
  document.getElementById('nameB').textContent = '';
  document.getElementById('inputArea').classList.remove('hidden');
  document.getElementById('diffArea').classList.add('hidden');
  document.getElementById('viewToggle').style.display = 'none';
  document.getElementById('syncLabel').style.display = 'none';
  document.getElementById('diffBtn').textContent = 'Compare';
});

// File loading
function loadFile(inputId, textId, nameId) {
  document.getElementById(inputId).addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    document.getElementById(nameId).textContent = file.name;
    const reader = new FileReader();
    reader.onload = (e) => { document.getElementById(textId).value = e.target.result; };
    reader.readAsText(file);
  });
}
loadFile('fileA', 'textA', 'nameA');
loadFile('fileB', 'textB', 'nameB');

// Drag-and-drop on textareas
['textA', 'textB'].forEach((id, i) => {
  const el = document.getElementById(id);
  const nameId = i === 0 ? 'nameA' : 'nameB';
  el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => { el.classList.remove('drag-over'); });
  el.addEventListener('drop', (e) => {
    e.preventDefault();
    el.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) {
      document.getElementById(nameId).textContent = file.name;
      const reader = new FileReader();
      reader.onload = (ev) => { el.value = ev.target.result; };
      reader.readAsText(file);
    }
  });
});

// View toggle
document.getElementById('viewToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#viewToggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const view = btn.dataset.view;
  document.getElementById('sideView').classList.toggle('hidden', view !== 'side');
  document.getElementById('unifiedView').classList.toggle('hidden', view !== 'unified');
});

// Sync scroll for side-by-side
const paneL = document.getElementById('paneLeft');
const paneR = document.getElementById('paneRight');
let syncing = false;

function syncHandler(source, target) {
  return () => {
    if (syncing || !document.getElementById('syncScroll').checked) return;
    syncing = true;
    target.scrollTop = source.scrollTop;
    target.scrollLeft = source.scrollLeft;
    syncing = false;
  };
}

paneL.addEventListener('scroll', syncHandler(paneL, paneR));
paneR.addEventListener('scroll', syncHandler(paneR, paneL));

// Keyboard shortcut: Ctrl/Cmd+Enter to compare
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('diffBtn').click();
  }
});

// Preload with the page's own source code and a modified version
(function () {
  const src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  // Create a "modified" version with a handful of realistic edits
  const modified = src
    .replace('<title>Text Diff Tool</title>', '<title>Text Diff Tool v2</title>')
    .replace('background: #1e1e2e;', 'background: #1a1a2e;')
    .replace('padding: 16px 24px;', 'padding: 12px 20px;')
    .replace('font-size: 18px;', 'font-size: 20px;')
    .replace('font-weight: 600;\n  color: #cba6f7;\n}', 'font-weight: 700;\n  color: #cba6f7;\n  letter-spacing: -0.5px;\n}')
    .replace('border-radius: 6px;\n  cursor: pointer;', 'border-radius: 8px;\n  cursor: pointer;')
    .replace("transition: background 0.15s;", "transition: all 0.2s ease;")
    .replace("button:hover { background: #45475a; }", "button:hover { background: #45475a; transform: translateY(-1px); }");
  document.getElementById('textA').value = src;
  document.getElementById('textB').value = modified;
  document.getElementById('nameA').textContent = 'index.html (original)';
  document.getElementById('nameB').textContent = 'index.html (modified)';
  computeAndRender();
  document.getElementById('diffBtn').textContent = 'Edit';
})();
</script>
