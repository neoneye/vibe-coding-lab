<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Puzzle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a2e; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; flex-direction: column; }
#message { font-size: 36px; text-shadow: 0 0 20px rgba(255,255,255,0.5); display: none; }
#controls-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: #556; font-size: 13px; }
</style>
</head>
<body>
<div id="hud">
  <div id="message"></div>
  <div id="controls-hint">Arrow keys: Tilt | Space: Jump | R: Restart</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── Scene Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

// ── Lighting ──
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

// ── Input ──
const keys = { left: false, right: false, up: false, down: false, space: false, r: false };

window.addEventListener('keydown', e => {
  switch (e.code) {
    case 'ArrowLeft':  keys.left = true; break;
    case 'ArrowRight': keys.right = true; break;
    case 'ArrowUp':    keys.up = true; break;
    case 'ArrowDown':  keys.down = true; break;
    case 'Space':      keys.space = true; e.preventDefault(); break;
    case 'KeyR':       keys.r = true; break;
  }
});

window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'ArrowLeft':  keys.left = false; break;
    case 'ArrowRight': keys.right = false; break;
    case 'ArrowUp':    keys.up = false; break;
    case 'ArrowDown':  keys.down = false; break;
    case 'Space':      keys.space = false; break;
    case 'KeyR':       keys.r = false; break;
  }
});

// ── Physics State ──
const physics = {
  velocity: new THREE.Vector3(0, 0, 0),
  grounded: false,
  tiltX: 0,      // current world tilt on X axis (forward/back)
  tiltZ: 0,      // current world tilt on Z axis (left/right)
  gravity: -60,
  maxTilt: 0.40,  // ~23 degrees in radians
  tiltSpeed: 0.02,
  tiltDamping: 0.92,
  friction: 0.98,
  jumpForce: 16,
  fallThreshold: -20
};

// ── Eyeball ──
const ballRadius = 0.5;

// Eyeball group
const ball = new THREE.Group();
ball.position.set(0, 0.75, 0);

// White of the eye
const eyeGeo = new THREE.SphereGeometry(ballRadius, 24, 24);
const eyeMat = new THREE.MeshPhongMaterial({
  color: 0xf0e8e0,
  specular: 0xffffff,
  shininess: 80
});
const eyeMesh = new THREE.Mesh(eyeGeo, eyeMat);
eyeMesh.castShadow = true;
ball.add(eyeMesh);

// Iris (colored disc on the surface)
const irisRadius = 0.22;
const irisGeo = new THREE.CircleGeometry(irisRadius, 24);
const irisMat = new THREE.MeshPhongMaterial({
  color: 0x2266aa,
  specular: 0x4488cc,
  shininess: 40,
  side: THREE.DoubleSide
});
const iris = new THREE.Mesh(irisGeo, irisMat);
iris.position.set(0, 0, ballRadius * 1.01);
ball.add(iris);

// Pupil (smaller black disc)
const pupilGeo = new THREE.CircleGeometry(0.1, 20);
const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
const pupil = new THREE.Mesh(pupilGeo, pupilMat);
pupil.position.set(0, 0, ballRadius * 1.02);
ball.add(pupil);

// Red veins (thin lines on the eyeball)
const veinMat = new THREE.LineBasicMaterial({ color: 0xcc4444, transparent: true, opacity: 0.4 });
for (let i = 0; i < 6; i++) {
  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(
      Math.cos(i * 1.05 + 0.5) * 0.15,
      Math.sin(i * 1.05 + 0.5) * 0.15,
      ballRadius * 0.6
    ),
    new THREE.Vector3(
      Math.cos(i * 1.05 + 0.3) * 0.35,
      Math.sin(i * 1.05 + 0.3) * 0.35,
      ballRadius * 0.85
    ),
    new THREE.Vector3(
      Math.cos(i * 1.05) * 0.48,
      Math.sin(i * 1.05) * 0.48,
      ballRadius * 0.15
    )
  );
  const veinGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(8));
  const vein = new THREE.Line(veinGeo, veinMat);
  ball.add(vein);
}

// ── Eyelids (pac-man style sphere caps) ──
const lidMat = new THREE.MeshPhongMaterial({
  color: 0xd4a88c,
  specular: 0x442222,
  shininess: 20,
  side: THREE.DoubleSide
});

const lidR = ballRadius * 1.03;

// Lid alignment group — orients lids to always close over the iris
const lidAlign = new THREE.Group();
ball.add(lidAlign);

// Top eyelid: upper hemisphere that rotates down to cover front
const topLidPivot = new THREE.Group();
const topLidGeo = new THREE.SphereGeometry(lidR, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2);
const topLid = new THREE.Mesh(topLidGeo, lidMat);
topLidPivot.add(topLid);
topLidPivot.visible = false;
lidAlign.add(topLidPivot);

// Bottom eyelid: lower hemisphere that rotates up to cover front
const botLidPivot = new THREE.Group();
const botLidGeo = new THREE.SphereGeometry(lidR, 24, 12, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
const botLid = new THREE.Mesh(botLidGeo, lidMat);
botLidPivot.add(botLid);
botLidPivot.visible = false;
lidAlign.add(botLidPivot);

// Blink state
const blink = {
  nextBlinkIn: Infinity,  // don't blink until first keypress
  blinkPhase: 'none',    // 'none', 'closing', 'closed', 'opening'
  blinkTime: 0,          // time within current blink phase
  closeDuration: 0.12,
  closedDuration: 0.06,
  openDuration: 0.15,
  lidProgress: 0,        // 0 = open, 1 = closed
  startDelay: 0          // delay before game starts (for blink to play)
};

function triggerBlink() {
  if (blink.blinkPhase === 'none') {
    blink.blinkPhase = 'closing';
    blink.blinkTime = 0;
  }
}

function scheduleNextBlink() {
  blink.nextBlinkIn = 3 + (Math.random() * 4 - 2);
}

function updateEyeStare() {
  // Direction from ball center to camera, in world space
  const ballWorld = new THREE.Vector3();
  ball.getWorldPosition(ballWorld);
  const worldDir = camera.position.clone().sub(ballWorld).normalize();

  // Convert direction to ball's local space
  const localDir = worldDir.clone();
  const worldQuat = ball.getWorldQuaternion(new THREE.Quaternion());
  localDir.applyQuaternion(worldQuat.clone().invert());

  // Position iris and pupil on sphere surface toward camera
  iris.position.copy(localDir).multiplyScalar(ballRadius * 1.01);
  pupil.position.copy(localDir).multiplyScalar(ballRadius * 1.02);

  // Orient discs to face outward: rotate default (0,0,1) normal to match localDir
  const faceQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), localDir);
  iris.quaternion.copy(faceQuat);
  pupil.quaternion.copy(faceQuat);

  // Ensure lids are fully hidden
  topLidPivot.visible = false;
  botLidPivot.visible = false;
  blink.lidProgress = 0;
  blink.blinkPhase = 'none';
}

function updateBlink(dt) {
  // Blink countdown
  if (blink.blinkPhase === 'none') {
    blink.nextBlinkIn -= dt;
    if (blink.nextBlinkIn <= 0) {
      triggerBlink();
    }
  }

  // Animate blink
  if (blink.blinkPhase === 'closing') {
    blink.blinkTime += dt;
    blink.lidProgress = Math.min(1, blink.blinkTime / blink.closeDuration);
    if (blink.blinkTime >= blink.closeDuration) {
      blink.blinkPhase = 'closed';
      blink.blinkTime = 0;
    }
  } else if (blink.blinkPhase === 'closed') {
    blink.blinkTime += dt;
    blink.lidProgress = 1;
    if (blink.blinkTime >= blink.closedDuration) {
      blink.blinkPhase = 'opening';
      blink.blinkTime = 0;
    }
  } else if (blink.blinkPhase === 'opening') {
    blink.blinkTime += dt;
    blink.lidProgress = Math.max(0, 1 - blink.blinkTime / blink.openDuration);
    if (blink.blinkTime >= blink.openDuration) {
      blink.blinkPhase = 'none';
      blink.lidProgress = 0;
      scheduleNextBlink();
    }
  }

  // Orient lids to always align with the iris
  const irisDir = iris.position.clone().normalize();
  const lidAlignQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), irisDir);
  lidAlign.quaternion.copy(lidAlignQuat);

  // Apply lid position — pac-man jaw rotation
  const openAngle = Math.PI / 2;
  if (blink.lidProgress > 0) {
    topLidPivot.visible = true;
    botLidPivot.visible = true;
    // Top lid: rotates from -openAngle (open) toward 0 (closed, covering iris)
    topLidPivot.rotation.set(-openAngle * (1 - blink.lidProgress), 0, 0);
    // Bottom lid: rotates from +openAngle (open) toward 0 (closed)
    botLidPivot.rotation.set(openAngle * (1 - blink.lidProgress), 0, 0);
  } else {
    topLidPivot.visible = false;
    botLidPivot.visible = false;
  }
}

// ── Wet Trail ──
const trailMarks = [];
const maxTrailMarks = 120;
const trailGeo = new THREE.CircleGeometry(0.3, 8);
const trailMatTemplate = new THREE.MeshBasicMaterial({
  color: 0x88aacc,
  transparent: true,
  opacity: 0.35,
  depthWrite: false
});
let trailTimer = 0;

// ── World Group (tilts as a unit) ──
const world = new THREE.Group();
scene.add(world);
world.add(ball);

// ── Level Data ──
const levelData = {
  platforms: [
    { x: 0, y: 0, z: 0, w: 6, h: 0.5, d: 6, bumpers: ['left','right','front','back'] },
    { x: 0, y: 0, z: -8, w: 1.5, h: 0.5, d: 6, bumpers: [] },
    { x: 0, y: 0, z: -15, w: 5, h: 0.5, d: 5, bumpers: ['left','right'] },
    { x: 3, y: 0, z: -21, w: 1.5, h: 0.5, d: 7, bumpers: [] },
    { x: 6, y: 0, z: -27, w: 6, h: 0.5, d: 6, bumpers: ['left','right','front','back'] },
  ],
  gears: [
    { x: -1.5, y: 0.25, z: -15, radius: 0.8, speed: 2.0 },
    { x: 1.5, y: 0.25, z: -15, radius: 0.8, speed: -2.0 },
    { x: 4.5, y: 0.25, z: -26, radius: 0.7, speed: 3.0 },
  ],
  start: { x: 0, y: 0.75, z: 0 },
  goal: { x: 6, y: 0.5, z: -27 }
};

// ── Build Level Geometry ──
const platformMat1 = new THREE.MeshPhongMaterial({
  color: 0x4477aa,
  flatShading: true,
  specular: 0x222244,
  shininess: 10
});
const platformMat2 = new THREE.MeshPhongMaterial({
  color: 0x336699,
  flatShading: true,
  specular: 0x222244,
  shininess: 10
});

const bumperMat = new THREE.MeshPhongMaterial({
  color: 0x44bb44,
  flatShading: true,
  specular: 0x226622,
  shininess: 20
});

const platforms = []; // store for collision

levelData.platforms.forEach((p, i) => {
  // Platform box
  const geo = new THREE.BoxGeometry(p.w, p.h, p.d);
  const mesh = new THREE.Mesh(geo, i % 2 === 0 ? platformMat1 : platformMat2);
  mesh.position.set(p.x, p.y, p.z);
  mesh.receiveShadow = true;
  mesh.castShadow = true;
  world.add(mesh);

  // Store collision data
  platforms.push({
    mesh,
    minX: p.x - p.w / 2, maxX: p.x + p.w / 2,
    topY: p.y + p.h / 2,
    minZ: p.z - p.d / 2, maxZ: p.z + p.d / 2,
    w: p.w, h: p.h, d: p.d,
    bumpers: p.bumpers
  });

  // Bumpers (thin raised edges)
  const bumperH = 0.4;
  const bumperW = 0.2;
  const sides = {
    left:  { pos: [p.x - p.w/2 + bumperW/2, p.y + p.h/2 + bumperH/2, p.z], size: [bumperW, bumperH, p.d] },
    right: { pos: [p.x + p.w/2 - bumperW/2, p.y + p.h/2 + bumperH/2, p.z], size: [bumperW, bumperH, p.d] },
    front: { pos: [p.x, p.y + p.h/2 + bumperH/2, p.z + p.d/2 - bumperW/2], size: [p.w, bumperH, bumperW] },
    back:  { pos: [p.x, p.y + p.h/2 + bumperH/2, p.z - p.d/2 + bumperW/2], size: [p.w, bumperH, bumperW] },
  };

  p.bumpers.forEach(side => {
    const s = sides[side];
    const bGeo = new THREE.BoxGeometry(s.size[0], s.size[1], s.size[2]);
    const bMesh = new THREE.Mesh(bGeo, bumperMat);
    bMesh.position.set(s.pos[0], s.pos[1], s.pos[2]);
    bMesh.castShadow = true;
    world.add(bMesh);
  });

  // Edge highlight
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x6699cc, transparent: true, opacity: 0.3 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  wireframe.position.copy(mesh.position);
  world.add(wireframe);
});

// ── Goal Marker ──
const goalGeo = new THREE.CylinderGeometry(0.3, 0.5, 1.5, 6);
const goalMat = new THREE.MeshPhongMaterial({
  color: 0xffdd44,
  emissive: 0xffaa00,
  emissiveIntensity: 0.5,
  flatShading: true
});
const goalMesh = new THREE.Mesh(goalGeo, goalMat);
goalMesh.position.set(levelData.goal.x, levelData.goal.y + 0.75, levelData.goal.z);
goalMesh.castShadow = true;
world.add(goalMesh);

// Goal light
const goalLight = new THREE.PointLight(0xffdd44, 1, 8);
goalLight.position.set(levelData.goal.x, levelData.goal.y + 2, levelData.goal.z);
world.add(goalLight);

// ── Void plane (visual only) ──
const voidGeo = new THREE.PlaneGeometry(200, 200);
const voidMat = new THREE.MeshBasicMaterial({ color: 0x050515, transparent: true, opacity: 0.8 });
const voidPlane = new THREE.Mesh(voidGeo, voidMat);
voidPlane.rotation.x = -Math.PI / 2;
voidPlane.position.y = -25;
world.add(voidPlane);

// ── Grinding Gears ──
const gearMat = new THREE.MeshPhongMaterial({
  color: 0x666666,
  specular: 0x999999,
  shininess: 60,
  flatShading: true
});
const gearTeethMat = new THREE.MeshPhongMaterial({
  color: 0x888888,
  specular: 0xaaaaaa,
  shininess: 40,
  flatShading: true
});
const gearBloodMat = new THREE.MeshPhongMaterial({
  color: 0x881111,
  specular: 0x440000,
  shininess: 20,
  flatShading: true
});

const gears = [];

levelData.gears.forEach(g => {
  const gearGroup = new THREE.Group();
  gearGroup.position.set(g.x, g.y, g.z);

  // Main gear disc
  const discGeo = new THREE.CylinderGeometry(g.radius, g.radius, 0.15, 16);
  const disc = new THREE.Mesh(discGeo, gearMat);
  disc.castShadow = true;
  gearGroup.add(disc);

  // Gear teeth
  const teethCount = 10;
  for (let i = 0; i < teethCount; i++) {
    const angle = (i / teethCount) * Math.PI * 2;
    const toothGeo = new THREE.BoxGeometry(0.18, 0.2, 0.12);
    const tooth = new THREE.Mesh(toothGeo, gearTeethMat);
    tooth.position.set(
      Math.cos(angle) * (g.radius + 0.08),
      0,
      Math.sin(angle) * (g.radius + 0.08)
    );
    tooth.rotation.y = -angle;
    tooth.castShadow = true;
    gearGroup.add(tooth);
  }

  // Blood stains on gear
  for (let i = 0; i < 4; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * g.radius * 0.7;
    const stainGeo = new THREE.CircleGeometry(0.06 + Math.random() * 0.08, 6);
    const stain = new THREE.Mesh(stainGeo, gearBloodMat);
    stain.position.set(Math.cos(angle) * dist, 0.08, Math.sin(angle) * dist);
    stain.rotation.x = -Math.PI / 2;
    gearGroup.add(stain);
  }

  // Axle
  const axleGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8);
  const axle = new THREE.Mesh(axleGeo, gearMat);
  axle.position.y = -0.15;
  gearGroup.add(axle);

  world.add(gearGroup);
  gears.push({ group: gearGroup, data: g });
});

// ── Splat Particles ──
const splatParticles = [];
const splatGeo = new THREE.SphereGeometry(0.08, 6, 6);
const splatColors = [0xcc0000, 0x990000, 0xff2222, 0xf0e8e0, 0x880000];

function spawnSplat(pos) {
  for (let i = 0; i < 30; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: splatColors[Math.floor(Math.random() * splatColors.length)],
      transparent: true,
      opacity: 1.0
    });
    const size = 0.05 + Math.random() * 0.12;
    const geo = new THREE.SphereGeometry(size, 5, 5);
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      Math.random() * 6 + 2,
      (Math.random() - 0.5) * 8
    );
    p.userData.vel = vel;
    p.userData.age = 0;
    p.userData.maxAge = 1.5 + Math.random();
    world.add(p);
    splatParticles.push(p);
  }
  // Blood splat on surface
  for (let i = 0; i < 8; i++) {
    const splatMark = new THREE.Mesh(
      new THREE.CircleGeometry(0.15 + Math.random() * 0.3, 8),
      new THREE.MeshBasicMaterial({ color: 0x880000, transparent: true, opacity: 0.7, depthWrite: false })
    );
    splatMark.rotation.x = -Math.PI / 2;
    splatMark.position.set(
      pos.x + (Math.random() - 0.5) * 1.5,
      pos.y - ballRadius + 0.03,
      pos.z + (Math.random() - 0.5) * 1.5
    );
    splatMark.userData.age = 0;
    splatMark.userData.maxAge = 4.0;
    world.add(splatMark);
    splatParticles.push(splatMark);
  }
}

function updateSplatParticles(dt) {
  for (let i = splatParticles.length - 1; i >= 0; i--) {
    const p = splatParticles[i];
    p.userData.age += dt;
    if (p.userData.vel) {
      p.userData.vel.y += physics.gravity * 0.5 * dt;
      p.position.x += p.userData.vel.x * dt;
      p.position.y += p.userData.vel.y * dt;
      p.position.z += p.userData.vel.z * dt;
    }
    const life = 1 - p.userData.age / p.userData.maxAge;
    p.material.opacity = Math.max(0, life);
    if (p.userData.age >= p.userData.maxAge) {
      world.remove(p);
      p.material.dispose();
      p.geometry.dispose();
      splatParticles.splice(i, 1);
    }
  }
}

// ── Physics Update ──
function updatePhysics(dt) {
  // Clamp dt to avoid physics explosions on tab-switch
  dt = Math.min(dt, 0.05);

  // ── Tilt ──
  if (keys.up)    physics.tiltX -= physics.tiltSpeed;
  if (keys.down)  physics.tiltX += physics.tiltSpeed;
  if (keys.left)  physics.tiltZ += physics.tiltSpeed;
  if (keys.right) physics.tiltZ -= physics.tiltSpeed;

  // Damping when keys not pressed
  if (!keys.up && !keys.down)  physics.tiltX *= physics.tiltDamping;
  if (!keys.left && !keys.right) physics.tiltZ *= physics.tiltDamping;

  // Clamp tilt
  physics.tiltX = Math.max(-physics.maxTilt, Math.min(physics.maxTilt, physics.tiltX));
  physics.tiltZ = Math.max(-physics.maxTilt, Math.min(physics.maxTilt, physics.tiltZ));

  // Apply tilt to world group
  world.rotation.x = physics.tiltX;
  world.rotation.z = physics.tiltZ;

  // ── Gravity (affected by tilt) ──
  // Tilt creates a horizontal gravity component
  const gravX = Math.sin(physics.tiltZ) * physics.gravity * 0.5;
  const gravZ = Math.sin(physics.tiltX) * -physics.gravity * 0.5;

  physics.velocity.x += gravX * dt;
  physics.velocity.z += gravZ * dt;
  physics.velocity.y += physics.gravity * dt;

  // ── Friction ──
  if (physics.grounded) {
    physics.velocity.x *= physics.friction;
    physics.velocity.z *= physics.friction;
  }

  // ── Jump ──
  if (keys.space && physics.grounded) {
    physics.velocity.y = physics.jumpForce;
    physics.grounded = false;
    keys.space = false; // consume the press
  }

  // ── Move Ball ──
  ball.position.x += physics.velocity.x * dt;
  ball.position.y += physics.velocity.y * dt;
  ball.position.z += physics.velocity.z * dt;

  // ── Visual spin (quaternion-based for correct multi-axis rolling) ──
  const spinSpeed = 2;
  const spinX = physics.velocity.z * dt * spinSpeed;
  const spinZ = -physics.velocity.x * dt * spinSpeed;
  const spinQuat = new THREE.Quaternion();
  spinQuat.setFromEuler(new THREE.Euler(spinX, 0, spinZ, 'XYZ'));
  ball.quaternion.premultiply(spinQuat);

  // ── Wet trail ──
  trailTimer += dt;
  if (physics.grounded && trailTimer > 0.03) {
    trailTimer = 0;
    const mark = new THREE.Mesh(trailGeo, trailMatTemplate.clone());
    mark.rotation.x = -Math.PI / 2;
    mark.position.set(ball.position.x, ball.position.y - ballRadius + 0.02, ball.position.z);
    mark.userData.age = 0;
    mark.userData.maxAge = 3.0;
    world.add(mark);
    trailMarks.push(mark);
    // Remove oldest if too many
    if (trailMarks.length > maxTrailMarks) {
      const old = trailMarks.shift();
      world.remove(old);
      old.material.dispose();
    }
  }
  // Fade trail marks
  for (let i = trailMarks.length - 1; i >= 0; i--) {
    const m = trailMarks[i];
    m.userData.age += dt;
    m.material.opacity = 0.35 * (1 - m.userData.age / m.userData.maxAge);
    if (m.userData.age >= m.userData.maxAge) {
      world.remove(m);
      m.material.dispose();
      trailMarks.splice(i, 1);
    }
  }

  // ── Collision Detection ──
  physics.grounded = false;

  for (const plat of platforms) {
    // Check if ball is within platform XZ bounds (with ball radius margin)
    const onPlatX = ball.position.x + ballRadius > plat.minX && ball.position.x - ballRadius < plat.maxX;
    const onPlatZ = ball.position.z + ballRadius > plat.minZ && ball.position.z - ballRadius < plat.maxZ;

    if (onPlatX && onPlatZ) {
      // Landing on top
      const topY = plat.topY + ballRadius;
      if (ball.position.y <= topY && ball.position.y > topY - 1.0 && physics.velocity.y <= 0) {
        ball.position.y = topY;
        physics.velocity.y = 0;
        physics.grounded = true;
      }
    }

    // ── Bumper Collisions ──
    if (ball.position.y > plat.topY && ball.position.y < plat.topY + 0.9) {
      const bumperBounce = 0.6;

      if (plat.bumpers.includes('left') && onPlatZ) {
        const edge = plat.minX + 0.2;
        if (ball.position.x - ballRadius < edge && ball.position.x > plat.minX - ballRadius) {
          ball.position.x = edge + ballRadius;
          physics.velocity.x = Math.abs(physics.velocity.x) * bumperBounce;
        }
      }
      if (plat.bumpers.includes('right') && onPlatZ) {
        const edge = plat.maxX - 0.2;
        if (ball.position.x + ballRadius > edge && ball.position.x < plat.maxX + ballRadius) {
          ball.position.x = edge - ballRadius;
          physics.velocity.x = -Math.abs(physics.velocity.x) * bumperBounce;
        }
      }
      if (plat.bumpers.includes('front') && onPlatX) {
        const edge = plat.maxZ - 0.2;
        if (ball.position.z + ballRadius > edge && ball.position.z < plat.maxZ + ballRadius) {
          ball.position.z = edge - ballRadius;
          physics.velocity.z = -Math.abs(physics.velocity.z) * bumperBounce;
        }
      }
      if (plat.bumpers.includes('back') && onPlatX) {
        const edge = plat.minZ + 0.2;
        if (ball.position.z - ballRadius < edge && ball.position.z > plat.minZ - ballRadius) {
          ball.position.z = edge + ballRadius;
          physics.velocity.z = Math.abs(physics.velocity.z) * bumperBounce;
        }
      }
    }
  }

  // ── Fall Detection ──
  if (ball.position.y < physics.fallThreshold) {
    return 'fell';
  }

  // ── Gear Collision ──
  for (const gear of gears) {
    const gdx = ball.position.x - gear.data.x;
    const gdz = ball.position.z - gear.data.z;
    const gDist = Math.sqrt(gdx * gdx + gdz * gdz);
    const hitRadius = gear.data.radius + ballRadius * 0.6;
    if (gDist < hitRadius && ball.position.y < gear.data.y + 1.2) {
      return 'splat';
    }
  }

  // ── Goal Detection ──
  const dx = ball.position.x - levelData.goal.x;
  const dz = ball.position.z - levelData.goal.z;
  if (Math.sqrt(dx * dx + dz * dz) < 1.2 && physics.grounded) {
    return 'goal';
  }

  return null;
}

// ── Camera Follow ──
const cameraOffset = new THREE.Vector3(0, 8, 12);
const cameraLookOffset = new THREE.Vector3(0, 0, -2);
const cameraLerp = 0.05;

function updateCamera() {
  // Get ball world position (accounts for world group tilt)
  const ballWorld = new THREE.Vector3();
  ball.getWorldPosition(ballWorld);

  // Target position: behind and above the ball
  const target = ballWorld.clone().add(cameraOffset);
  camera.position.lerp(target, cameraLerp);

  // Look at the ball (slightly ahead)
  const lookTarget = ballWorld.clone().add(cameraLookOffset);
  camera.lookAt(lookTarget);
}

// ── Game State ──
let gameState = 'READY'; // READY, PLAYING, WIN, GAMEOVER

const messageEl = document.getElementById('message');
const controlsEl = document.getElementById('controls-hint');

function showMessage(text, color) {
  messageEl.style.display = 'block';
  messageEl.style.color = color || '#fff';
  messageEl.textContent = text;
}

function hideMessage() {
  messageEl.style.display = 'none';
}

function resetBall() {
  ball.visible = true;
  ball.position.set(levelData.start.x, levelData.start.y, levelData.start.z);
  physics.velocity.set(0, 0, 0);
  physics.tiltX = 0;
  physics.tiltZ = 0;
  physics.grounded = false;
  world.rotation.x = 0;
  world.rotation.z = 0;
  // Clear trail
  for (const m of trailMarks) {
    world.remove(m);
    m.material.dispose();
  }
  trailMarks.length = 0;
  // Clear splat particles
  for (const p of splatParticles) {
    world.remove(p);
    p.material.dispose();
    p.geometry.dispose();
  }
  splatParticles.length = 0;
}

function startGame() {
  gameState = 'PLAYING';
  hideMessage();
  resetBall();
  // Keep iris/pupil facing camera (preserve stare orientation)
  scheduleNextBlink();
}

function winGame() {
  gameState = 'WIN';
  showMessage('You Win! Press R to restart', '#44ff44');
  physics.velocity.set(0, 0, 0);
}

function gameOver() {
  gameState = 'GAMEOVER';
  showMessage('Game Over! Press R to restart', '#ff4444');
}

// Initial state
showMessage('Press any key to start', '#aaaaff');

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Game Loop ──
let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const dt = lastTime ? (time - lastTime) / 1000 : 0.016;
  lastTime = time;

  goalMesh.rotation.y += 0.02;

  // Spin gears
  for (const gear of gears) {
    gear.group.rotation.y += gear.data.speed * dt;
  }

  // Update splat particles
  updateSplatParticles(dt);

  if (gameState === 'READY') {
    // Stare at camera, no blinking
    updateEyeStare();
  } else {
    // Blink only during gameplay
    updateBlink(dt);
  }

  if (gameState === 'READY') {
    // Wait for any key
    const anyKey = keys.left || keys.right || keys.up || keys.down || keys.space;
    if (anyKey && !blink.startDelay) {
      triggerBlink();
      blink.startDelay = 0.3; // delay start so blink is visible
    }
    if (blink.startDelay > 0) {
      blink.startDelay -= dt;
      updateBlink(dt);
      if (blink.startDelay <= 0) {
        blink.startDelay = 0;
        startGame();
      }
    }
  }

  if (gameState === 'PLAYING') {
    const result = updatePhysics(dt);
    if (result === 'fell') gameOver();
    if (result === 'goal') winGame();
    if (result === 'splat') {
      spawnSplat(ball.position.clone());
      ball.visible = false;
      gameState = 'GAMEOVER';
      showMessage('SPLAT! Press R to restart', '#cc0000');
    }
  }

  if ((gameState === 'WIN' || gameState === 'GAMEOVER') && keys.r) {
    keys.r = false;
    gameState = 'READY';
    resetBall();
    showMessage('Press any key to start', '#aaaaff');
  }

  updateCamera();
  renderer.render(scene, camera);
}
animate(0);
</script>
