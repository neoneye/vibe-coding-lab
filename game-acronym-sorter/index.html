<title>Acronym Sorter - C64 Edition</title>
<style>
@font-face {
  font-family: 'C64';
  src: url('data:application/font-woff;base64,') format('woff');
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #40318d;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  font-family: monospace;
  overflow: hidden;
}
canvas {
  image-rendering: pixelated;
  border: 8px solid #7869c4;
}

</head>
<body>
<canvas id="game" width="480" height="424"></canvas>

const ctx = canvas.getContext('2d');

// Active level data (set on game start)
let currentLevel = 0;
let expertMode = false;
let ACRONYMS = LEVELS[0].items;

// Music
const music = new Audio('acronym_sorter.mp3');
music.loop = true;
let musicOn = false;
function toggleMusic() {
  musicOn = !musicOn;
  if (musicOn) { music.play(); } else { music.pause(); }
}

const BASKET_START_W = 110;
const BASKET_MIN_W = 40;
const BASKET_SHRINK = 2;
// Basket category cycle — set from active level
let BASKET_CATS = LEVELS[0].cats;
const BASKETS = [
  { sx: 20,  vx: 0, w: BASKET_START_W, catIdx: 0 },
  { sx: 185, vx: 0, w: BASKET_START_W, catIdx: 1 },
  { sx: 350, vx: 0, w: BASKET_START_W, catIdx: 2 },
];
// Helper to get category info for a basket
function basketCat(b) { return BASKET_CATS[((b.catIdx % 3) + 3) % 3]; }

const ROPE_LENGTHS = [40, 55, 45]; // ropes: 0→1, 1→2, 2→0 (wrapping)
const ROPE_STIFFNESS = 0.03;
const ROPE_DAMPING = 0.97;
const W = 480; // screen wrap width (matches canvas)

// Shortest signed distance on a wrapping axis
function wrapDist(from, to) {
  let d = to - from;
  if (d > W / 2) d -= W;
  if (d < -W / 2) d += W;
  return d;
}

// Wrap a position into [0, W)
function wrapX(x) {
  return ((x % W) + W) % W;
}

// Game state
let score = 0;
let lives = 5;
let level = 1;
let gameState = 'title'; // title, picking, playing, gameover
let fallingItems = [];
let spawnTimer = 0;
let spawnInterval = 90;
let particles = [];
let flashMsg = '';
let flashTimer = 0;
let combo = 0;
let bestCombo = 0;
let frameCount = 0;
let highScore = parseInt(localStorage.getItem('lolsorter_hi') || '0');
let meaningText = '';
let meaningTimer = 0;
let meaningColor = C64.white;
let successAnims = [];  // rising score popups

// Conveyor belt
const BELT_Y = 60;
const BASKET_Y = 336;

// Belt movement state
let beltVelocity = 0;     // current velocity (pixels per frame)
const BELT_ACCEL = 0.15;  // acceleration per frame when key held
const BELT_FRICTION = 0.94; // friction multiplier each frame
const BELT_MAX_SPEED = 3; // max belt speed

// Keyboard state
const keysDown = {};
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    keysDown[e.key] = true;
  }
  if (gameState === 'title') {
    gameState = 'picking';
    return;
  }
  if (gameState === 'gameover') {
    gameState = 'picking';
    return;
  }
  if (gameState === 'picking') {
    if (e.key === 'ArrowLeft') {
      currentLevel = (currentLevel - 1 + LEVELS.length) % LEVELS.length;
    } else if (e.key === 'ArrowRight') {
      currentLevel = (currentLevel + 1) % LEVELS.length;
    } else if (e.key === 'Enter' || e.key === ' ') {
      startLevel(currentLevel);
    } else if (e.key >= '1' && e.key <= '3') {
      startLevel(parseInt(e.key) - 1);
    } else if (e.key === 'e' || e.key === 'E') {
      expertMode = !expertMode;
    } else if (e.key === 'm' || e.key === 'M') {
      toggleMusic();
    }
    return;
  }
  // During gameplay
  if (e.key === 'Escape') {
    gameState = 'picking';
    return;
  }
  if (e.key === 'm' || e.key === 'M') {
    toggleMusic();
  }
});
window.addEventListener('keyup', (e) => {
  keysDown[e.key] = false;
});

function spawnItem() {
  const def = ACRONYMS[Math.floor(Math.random() * ACRONYMS.length)];
  const itemW = Math.max(def.text.length * 14 + 16, 50);
  const margin = 10;
  const halfW = itemW / 2;
  const cx = margin + halfW + Math.random() * (canvas.width - margin * 2 - itemW);
  fallingItems.push({
    text: def.text,
    cat: def.cat,
    points: def.points,
    meaning: def.meaning,
    x: cx - halfW,
    y: -20,
    vy: 0.5 + level * 0.08,
    w: itemW,
    h: 28,
  });
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 30 + Math.random() * 20,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

function addExplosion(x, y) {
  const colors = [C64.red, C64.orange, C64.yellow, C64.lightRed, C64.white];
  for (let i = 0; i < 40; i++) {
    const angle = (Math.PI * 2 * i) / 40 + Math.random() * 0.3;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 40 + Math.random() * 30,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 3 + Math.random() * 4,
    });
  }
}

function addSuccessParticles(x, y, color) {
  // Fountain of sparkles shooting upward
  const colors = [color, C64.white, C64.yellow];
  for (let i = 0; i < 20; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: x + (Math.random() - 0.5) * 20,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 35 + Math.random() * 25,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 3,
    });
  }
  // Star shapes — small crosses
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 40,
      y: y - Math.random() * 30,
      vx: (Math.random() - 0.5) * 2,
      vy: -1 - Math.random() * 2,
      life: 40 + Math.random() * 20,
      color: C64.white,
      size: 4 + Math.random() * 3,
      star: true,
    });
  }
}

function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawText(text, x, y, color, size) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size || 14}px monospace`;
  ctx.fillText(text, Math.round(x), Math.round(y));
}

function drawTextCenter(text, y, color, size) {
  ctx.font = `bold ${size || 14}px monospace`;
  const w = ctx.measureText(text).width;
  drawText(text, (canvas.width - w) / 2, y, color, size);
}


function drawWheel(cx, cy, radius, rotAngle) {
  const spokeCount = 4;
  const angle = rotAngle;
  // Outer rim
  ctx.beginPath();
  ctx.arc(Math.round(cx), Math.round(cy), radius, 0, Math.PI * 2);
  ctx.fillStyle = C64.grey;
  ctx.fill();
  // Inner hub
  ctx.beginPath();
  ctx.arc(Math.round(cx), Math.round(cy), radius - 2, 0, Math.PI * 2);
  ctx.fillStyle = C64.darkGrey;
  ctx.fill();
  // Spokes
  ctx.strokeStyle = C64.lightGrey;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < spokeCount; i++) {
    const a = angle + (Math.PI * 2 * i) / spokeCount;
    ctx.beginPath();
    ctx.moveTo(Math.round(cx), Math.round(cy));
    ctx.lineTo(Math.round(cx + Math.cos(a) * (radius - 1)), Math.round(cy + Math.sin(a) * (radius - 1)));
    ctx.stroke();
  }
  // Center dot
  ctx.beginPath();
  ctx.arc(Math.round(cx), Math.round(cy), 1.5, 0, Math.PI * 2);
  ctx.fillStyle = C64.lightGrey;
  ctx.fill();
}

function drawBasketAt(bx, by, b) {
  const bc = basketCat(b);
  const wallW = 3;
  const h = 50;
  const wheelRadius = 7;
  const wheelY = by + h + wheelRadius;
  const rotAngle = b.sx * 0.08;
  // Darken the bucket color for the interior
  const hex = bc.color;
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const bl = parseInt(hex.slice(5, 7), 16);
  const innerColor = `rgb(${r >> 3},${g >> 3},${bl >> 3})`;
  // Wheels (draw behind bucket)
  drawWheel(bx + 14, wheelY, wheelRadius, rotAngle);
  drawWheel(bx + b.w - 14, wheelY, wheelRadius, rotAngle);
  // Axle bar connecting to bucket
  drawPixelRect(bx + 12, by + h, 3, wheelRadius, C64.grey);
  drawPixelRect(bx + b.w - 15, by + h, 3, wheelRadius, C64.grey);
  // Left wall
  drawPixelRect(bx, by, wallW, h, bc.color);
  // Right wall
  drawPixelRect(bx + b.w - wallW, by, wallW, h, bc.color);
  // Bottom wall
  drawPixelRect(bx, by + h - wallW, b.w, wallW, bc.color);
  // Inner area (open top)
  drawPixelRect(bx + wallW, by, b.w - wallW * 2, h - wallW, innerColor);
  // Label
  ctx.font = 'bold 12px monospace';
  const tw = ctx.measureText(bc.label).width;
  drawText(bc.label, bx + (b.w - tw) / 2, by + 28, bc.color, 12);
}

function drawBasket(b) {
  const by = BASKET_Y;
  const sx = b.sx;
  drawBasketAt(sx, by, b);
  // Draw wrapped copy if partially off either edge
  if (sx + b.w > W) drawBasketAt(sx - W, by, b);
  if (sx < 0) drawBasketAt(sx + W, by, b);
}

function itemColor(cat) {
  const found = BASKET_CATS.find(c => c.cat === cat);
  return found ? found.color : C64.grey;
}

function drawItem(item) {
  const bgColor = expertMode ? C64.darkGrey : itemColor(item.cat);
  drawPixelRect(item.x, item.y, item.w, item.h, bgColor);
  drawPixelRect(item.x + 2, item.y + 2, item.w - 4, item.h - 4, C64.black);
  ctx.font = 'bold 14px monospace';
  const tw = ctx.measureText(item.text).width;
  drawText(item.text, item.x + (item.w - tw) / 2, item.y + 19, C64.white, 14);
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < canvas.height; y += 3) {
    ctx.fillRect(0, y, canvas.width, 1);
  }
}

function drawTitle() {
  ctx.fillStyle = C64.blue;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const flicker = Math.sin(frameCount * 0.05) * 0.3 + 0.7;

  drawTextCenter('*** ACRONYM SORTER ***', 80, C64.lightBlue, 24);
  drawTextCenter('C64 EDITION', 110, C64.cyan, 16);

  drawTextCenter('SORT THE ACRONYMS INTO', 160, C64.lightGrey, 13);
  drawTextCenter('THE CORRECT BASKETS!', 178, C64.lightGrey, 13);

  drawTextCenter('MISS BUCKET = BOOM! HALF SCORE!', 210, C64.orange, 13);
  drawTextCenter('ARROW KEYS MOVE THE BELT', 228, C64.grey, 13);

  if (highScore > 0) {
    drawTextCenter(`HIGH SCORE: ${highScore}`, 260, C64.yellow, 14);
  }

  ctx.globalAlpha = flicker;
  drawTextCenter('PRESS ANY KEY', 310, C64.white, 16);
  ctx.globalAlpha = 1;

  drawScanlines();
}

function drawLevelPicker() {
  ctx.fillStyle = C64.blue;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawTextCenter('ACRONYM SORTER', 30, C64.lightBlue, 22);
  drawTextCenter('SELECT LEVEL', 52, C64.grey, 13);

  const boxW = 140;
  const boxH = 110;
  const gap = 10;
  const totalW = boxW * 3 + gap * 2;
  const startX = (canvas.width - totalW) / 2;

  for (let i = 0; i < LEVELS.length; i++) {
    const lv = LEVELS[i];
    const bx = startX + i * (boxW + gap);
    const by = 80;

    // Box border
    const selected = i === currentLevel;
    const borderColor = selected ? C64.white : C64.grey;
    drawPixelRect(bx, by, boxW, boxH, borderColor);
    drawPixelRect(bx + 2, by + 2, boxW - 4, boxH - 4, C64.black);

    // Level number
    drawTextCenter(`${i + 1}`, by + 22, C64.yellow, 18);

    // Level name — draw centered within the box
    ctx.font = 'bold 11px monospace';
    const nw = ctx.measureText(lv.name).width;
    drawText(lv.name, bx + (boxW - nw) / 2, by + 45, C64.white, 11);

    // Category colors
    const dotY = by + 65;
    const dotSize = 12;
    const dotGap = 6;
    const dotsW = lv.cats.length * dotSize + (lv.cats.length - 1) * dotGap;
    const dotStartX = bx + (boxW - dotsW) / 2;
    for (let c = 0; c < lv.cats.length; c++) {
      drawPixelRect(dotStartX + c * (dotSize + dotGap), dotY, dotSize, dotSize, lv.cats[c].color);
    }

    // Category labels
    const lblY = by + 88;
    for (let c = 0; c < lv.cats.length; c++) {
      ctx.font = 'bold 8px monospace';
      const lbl = lv.cats[c].label;
      const lw = ctx.measureText(lbl).width;
      const cx = dotStartX + c * (dotSize + dotGap) + dotSize / 2;
      drawText(lbl, cx - lw / 2, lblY, lv.cats[c].color, 8);
    }

    // Selection indicator
    if (selected) {
      const flicker = Math.sin(frameCount * 0.1) > 0;
      if (flicker) {
        drawPixelRect(bx, by + boxH + 4, boxW, 3, C64.white);
      }
    }
  }

  // Expert mode toggle
  const expertLabel = `EXPERT: ${expertMode ? 'ON' : 'OFF'}`;
  const expertColor = expertMode ? C64.yellow : C64.grey;
  drawTextCenter(expertLabel, 220, expertColor, 14);
  drawTextCenter('(NO COLOR HINTS)', 236, expertMode ? C64.orange : C64.darkGrey, 10);

  // Music toggle
  const musicLabel = `MUSIC: ${musicOn ? 'ON' : 'OFF'}`;
  drawTextCenter(musicLabel, 256, musicOn ? C64.lightGreen : C64.grey, 14);

  // Instructions
  drawTextCenter('LEFT/RIGHT SELECT  ENTER START  E EXPERT  M MUSIC', 278, C64.lightGrey, 9);


  drawScanlines();
}

function drawHUD() {
  // Top bar
  drawPixelRect(0, 0, canvas.width, 30, C64.darkGrey);
  drawText(`SCORE: ${score}`, 10, 20, C64.yellow, 14);
  drawText(`LIVES: ${'*'.repeat(lives)}`, 170, 20, C64.lightRed, 14);
  drawText(`LVL: ${level}`, 350, 20, C64.cyan, 14);
  drawText('ESC', 440, 20, C64.grey, 10);
  if (combo > 1) {
    drawText(`x${combo}`, 430, 20, C64.lightGreen, 14);
  }
  if (expertMode) {
    drawText('EXPERT', 410, 20, C64.orange, 10);
  }
}

function drawGameOver() {
  ctx.fillStyle = C64.black;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawTextCenter('GAME OVER', 100, C64.lightRed, 28);
  drawTextCenter(`FINAL SCORE: ${score}`, 160, C64.yellow, 18);
  drawTextCenter(`BEST COMBO: x${bestCombo}`, 190, C64.lightGreen, 14);

  if (score >= highScore && score > 0) {
    const flicker = Math.sin(frameCount * 0.1) > 0;
    if (flicker) drawTextCenter('*** NEW HIGH SCORE! ***', 230, C64.cyan, 16);
  }

  const flicker2 = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = flicker2;
  drawTextCenter('PRESS ANY KEY', 300, C64.white, 16);
  ctx.globalAlpha = 1;

  drawScanlines();
}

function checkBasketDrop(item) {
  for (const b of BASKETS) {
    const bc = basketCat(b);
    const sx = b.sx;
    const itemCenterX = item.x + item.w / 2;
    // Check hit at primary position and wrapped copy
    const hit = (itemCenterX > sx && itemCenterX < sx + b.w) ||
                (itemCenterX > sx - W && itemCenterX < sx + b.w - W) ||
                (itemCenterX > sx + W && itemCenterX < sx + b.w + W);
    if (hit) {
      if (item.cat === bc.cat) {
        // Correct basket!
        combo++;
        if (combo > bestCombo) bestCombo = combo;
        const multiplier = Math.min(combo, 5);
        const pts = Math.abs(item.points) * multiplier;
        score += pts;
        const label = `+${pts}` + (combo > 1 ? ` x${combo}` : '');
        flashMsg = label + (combo > 1 ? ' COMBO!' : item.text === 'LOL' ? ' LOL!!!' : '!');
        flashTimer = 45;
        const cx = item.x + item.w / 2;
        successAnims.push({ x: cx, y: BASKET_Y - 10, text: label, life: 60, color: bc.color });
        addSuccessParticles(cx, BASKET_Y, bc.color);
        meaningText = `${item.text} = ${item.meaning}`;
        meaningTimer = 120;
        meaningColor = bc.color;
        b.w = Math.max(BASKET_MIN_W, b.w - BASKET_SHRINK);
        // Level up every 300 points
        const newLevel = Math.floor(score / 500) + 1;
        if (newLevel > level) {
          level = newLevel;
          spawnInterval = Math.max(50, 90 - level * 3);
          flashMsg = `LEVEL ${level}!`;
          flashTimer = 60;
        }
      } else {
        // Wrong basket
        combo = 0;
        lives--;
        const penalty = 20;
        score = Math.max(0, score - penalty);
        flashMsg = `WRONG! -${penalty}`;
        flashTimer = 45;
        addParticles(item.x + item.w / 2, BASKET_Y, C64.red, 10);
      }
      return true;
    }
  }
  return false;
}

function update() {
  frameCount++;
  if (gameState !== 'playing') return;

  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnItem();
  }

  // Update falling items
  for (let i = fallingItems.length - 1; i >= 0; i--) {
    const item = fallingItems[i];
    item.y += item.vy;

    // Check if item overlaps a bucket (bucket top at BASKET_Y, 50px tall)
    if (!item.caught && item.y + item.h >= BASKET_Y && item.y < BASKET_Y + 50) {
      const landed = checkBasketDrop(item);
      if (landed) {
        fallingItems.splice(i, 1);
        continue;
      }
    }

    // Hit the bottom of the screen - explosion!
    if (item.y + item.h >= canvas.height) {
      combo = 0;
      const halfScore = Math.floor(score / 2);
      const lost = score - halfScore;
      score = halfScore;
      flashMsg = `BOOM! SCORE HALVED! -${lost}`;
      flashTimer = 60;
      addExplosion(item.x + item.w / 2, canvas.height - 10);
      fallingItems.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (flashTimer > 0) flashTimer--;
  if (meaningTimer > 0) meaningTimer--;

  // Update rising score popups
  for (let i = successAnims.length - 1; i >= 0; i--) {
    successAnims[i].y -= 1;
    successAnims[i].life--;
    if (successAnims[i].life <= 0) successAnims.splice(i, 1);
  }

  // Belt momentum
  if (keysDown['ArrowLeft'])  beltVelocity -= BELT_ACCEL;
  if (keysDown['ArrowRight']) beltVelocity += BELT_ACCEL;
  beltVelocity *= BELT_FRICTION;
  if (Math.abs(beltVelocity) > BELT_MAX_SPEED) {
    beltVelocity = Math.sign(beltVelocity) * BELT_MAX_SPEED;
  }
  if (Math.abs(beltVelocity) < 0.01) beltVelocity = 0;

  // Only the lead wagon gets belt velocity
  // Pulling left: leftmost leads. Pulling right: rightmost leads.
  const sorted = [...BASKETS].sort((a, b) => a.sx - b.sx);
  const lead = beltVelocity <= 0 ? sorted[0] : sorted[sorted.length - 1];
  lead.vx += beltVelocity * 0.5;
  lead.sx += beltVelocity;

  // Elastic ropes in a loop: 0→1, 1→2, 2→0
  const ropePairs = [[0, 1], [1, 2], [2, 0]];
  for (let r = 0; r < ropePairs.length; r++) {
    const a = BASKETS[ropePairs[r][0]];
    const b = BASKETS[ropePairs[r][1]];
    // Gap from right edge of a to left edge of b, with wrapping
    const gap = wrapDist(a.sx + a.w, b.sx);
    const stretch = gap - ROPE_LENGTHS[r];
    const force = stretch * ROPE_STIFFNESS;
    a.vx += force;
    b.vx -= force;
  }

  // Apply velocities with damping, then wrap positions
  for (const b of BASKETS) {
    b.vx *= ROPE_DAMPING;
    b.sx += b.vx;
    b.sx = wrapX(b.sx);
  }

  // Collision: prevent overlap using wrap-aware distance
  for (const [i, j] of ropePairs) {
    const a = BASKETS[i];
    const b = BASKETS[j];
    const gap = wrapDist(a.sx + a.w, b.sx);
    if (gap < 0) {
      // Overlap — push apart
      const push = -gap * 0.5;
      a.sx = wrapX(a.sx - push);
      b.sx = wrapX(b.sx + push);
      const tmpV = a.vx;
      a.vx = b.vx * 0.5;
      b.vx = tmpV * 0.5;
    }
  }

  if (lives <= 0) {
    gameState = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('lolsorter_hi', String(highScore));
    }
  }
}

function draw() {
  if (gameState === 'title') { drawTitle(); return; }
  if (gameState === 'picking') { drawLevelPicker(); return; }
  if (gameState === 'gameover') { drawGameOver(); return; }

  // Background
  ctx.fillStyle = C64.blue;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Conveyor belt lines (scroll with middle basket)
  ctx.fillStyle = C64.darkGrey;
  for (let x = -20; x < canvas.width + 20; x += 20) {
    const offset = ((BASKETS[1].sx * 2) % 20 + 20) % 20;
    ctx.fillRect(x + offset, BELT_Y - 2, 12, 4);
  }

  // Elastic ropes between all baskets (loop: 0→1, 1→2, 2→0)
  const ropeY = BASKET_Y + 25;
  const ropeDraw = [[0, 1], [1, 2], [2, 0]];
  ctx.strokeStyle = C64.brown;
  ctx.lineWidth = 2;
  for (const [i, j] of ropeDraw) {
    const a = BASKETS[i];
    const b = BASKETS[j];
    const x1 = a.sx + a.w;
    const gap = wrapDist(x1, b.sx);
    const x2 = x1 + gap;
    const sag = Math.max(0, Math.abs(gap) * 0.15);
    // Draw rope at primary position and shifted copies so it's always visible
    for (const shift of [-W, 0, W]) {
      const sx1 = x1 + shift;
      const sx2 = x2 + shift;
      // Skip if entirely off-screen
      const minX = Math.min(sx1, sx2);
      const maxX = Math.max(sx1, sx2);
      if (maxX < -20 || minX > W + 20) continue;
      ctx.beginPath();
      ctx.moveTo(Math.round(sx1), Math.round(ropeY));
      ctx.quadraticCurveTo(Math.round((sx1 + sx2) / 2), Math.round(ropeY + sag), Math.round(sx2), Math.round(ropeY));
      ctx.stroke();
    }
  }

  // Baskets
  BASKETS.forEach(drawBasket);

  // Items
  fallingItems.forEach(drawItem);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    if (p.star) {
      // Draw a small cross/star
      const s = p.size;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.round(p.x - s / 2), Math.round(p.y - 1), s, 2);
      ctx.fillRect(Math.round(p.x - 1), Math.round(p.y - s / 2), 2, s);
    } else {
      drawPixelRect(p.x, p.y, p.size, p.size, p.color);
    }
  });
  ctx.globalAlpha = 1;

  // Rising score popups
  successAnims.forEach(a => {
    ctx.globalAlpha = a.life / 60;
    const scale = 14 + (1 - a.life / 60) * 4;
    drawTextCenter(a.text, a.y, a.color, scale);
  });
  ctx.globalAlpha = 1;

  // Flash message
  if (flashTimer > 0) {
    const alpha = flashTimer / 45;
    ctx.globalAlpha = alpha;
    const isNeg = flashMsg.includes('WRONG') || flashMsg.includes('BOOM');
    drawTextCenter(flashMsg, 200, isNeg ? C64.lightRed : C64.yellow, 20);
    ctx.globalAlpha = 1;
  }

  // Bottom banner
  const bannerY = 400;
  const bannerH = 24;
  drawPixelRect(0, bannerY, canvas.width, bannerH, C64.darkGrey);
  drawPixelRect(0, bannerY, canvas.width, 1, C64.grey);
  if (meaningTimer > 0) {
    const alpha = Math.min(meaningTimer / 20, 1);
    ctx.globalAlpha = alpha;
    drawTextCenter(meaningText, bannerY + 16, meaningColor, 12);
    ctx.globalAlpha = 1;
  }

  // HUD
  drawHUD();
  drawScanlines();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function resetGame() {
  score = 0;
  lives = 5;
  level = 1;
  combo = 0;
  bestCombo = 0;
  fallingItems = [];
  particles = [];
  spawnTimer = 0;
  spawnInterval = 90;
  flashMsg = '';
  flashTimer = 0;
  frameCount = 0;
  beltVelocity = 0;
  meaningText = '';
  meaningTimer = 0;
  successAnims = [];
  BASKETS[0].sx = 20;  BASKETS[0].vx = 0; BASKETS[0].w = BASKET_START_W; BASKETS[0].catIdx = 0;
  BASKETS[1].sx = 185; BASKETS[1].vx = 0; BASKETS[1].w = BASKET_START_W; BASKETS[1].catIdx = 1;
  BASKETS[2].sx = 350; BASKETS[2].vx = 0; BASKETS[2].w = BASKET_START_W; BASKETS[2].catIdx = 2;
}

function startLevel(idx) {
  currentLevel = idx;
  ACRONYMS = LEVELS[idx].items;
  BASKET_CATS = LEVELS[idx].cats;
  resetGame();
  gameState = 'playing';
}

// Input handling — click/tap
function onClick(e) {
  if (gameState === 'title') {
    gameState = 'picking';
    return;
  }
  if (gameState === 'gameover') {
    gameState = 'picking';
    return;
  }
  if (gameState === 'picking') {
    // Check if a level box was clicked
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const mx = (clientX - rect.left) * scaleX;
    const boxW = 140;
    const gap = 10;
    const totalW = boxW * 3 + gap * 2;
    const startX = (canvas.width - totalW) / 2;
    for (let i = 0; i < 3; i++) {
      const bx = startX + i * (boxW + gap);
      if (mx >= bx && mx <= bx + boxW) {
        startLevel(i);
        return;
      }
    }
  }
}
canvas.addEventListener('mousedown', onClick);
canvas.addEventListener('touchstart', onClick, { passive: false });

// Scale canvas to fit
function resize() {
  const maxW = window.innerWidth - 32;
  const maxH = window.innerHeight - 32;
  const scale = Math.min(maxW / canvas.width, maxH / canvas.height, 2);
  canvas.style.width = (canvas.width * scale) + 'px';
  canvas.style.height = (canvas.height * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

gameLoop();
</script>
</body>
