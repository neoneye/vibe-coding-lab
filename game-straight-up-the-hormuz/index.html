<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Straight up the Hormuz</title>
<style>
:root {
  --bg: #070f1c;
  --panel: #0e1a2e;
  --panel-edge: #1d3150;
  --tile: #16283f;
  --tile-alt: #14243a;
  --tile-hover: #233b5e;
  --tile-revealed: #0b1828;
  --line: #274568;
  --ink: #cfe0f4;
  --ink-dim: #7e93b3;
  --amber: #e8a33d;
  --red: #e05252;
  --cyan: #4fc3d9;
  --green: #62c370;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: radial-gradient(120% 100% at 50% 0%, #0c1a2f 0%, var(--bg) 60%);
  color: var(--ink);
  font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
  min-height: 100vh;
}
#app { max-width: 1180px; margin: 0 auto; padding: 14px; }

/* ---------- header ---------- */
#topbar { display: flex; align-items: center; gap: 14px; }
#topbar .hero-ship { width: 64px; height: 32px; color: var(--amber); flex: none; }
h1 { font-size: 1.35rem; letter-spacing: 0.1em; margin: 0; text-transform: uppercase; font-weight: 800; }
.subtitle { color: var(--ink-dim); font-size: 0.72rem; margin: 2px 0 0; letter-spacing: 0.18em; text-transform: uppercase; }
.classified {
  margin-left: auto; border: 2px solid var(--red); color: var(--red);
  padding: 2px 10px; font-weight: 800; letter-spacing: 0.25em; font-size: 0.72rem;
  transform: rotate(-5deg); opacity: 0.85; border-radius: 3px; text-transform: uppercase;
}
.stripe {
  height: 7px; margin: 10px 0 14px; border-radius: 2px; opacity: 0.75;
  background: repeating-linear-gradient(-45deg, var(--amber) 0 12px, #131c2c 12px 24px);
}

/* ---------- icons ---------- */
.ic { width: 62%; height: 62%; pointer-events: none; }
svg { pointer-events: none; }

/* ---------- overlays (start / game over) ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(4, 9, 18, 0.92);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.overlay.hidden { display: none; }
.overlay .card {
  background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 12px;
  max-width: 560px; padding: 28px 32px; box-shadow: 0 18px 60px rgba(0,0,0,0.6);
  border-top: 6px solid var(--amber);
}
.overlay h2 { margin: 0 0 4px; font-size: 1.7rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; }
.overlay h2 .ic { width: 30px; height: 30px; }
.overlay h2.won .ic { color: var(--amber); }
.overlay h2.lost .ic { color: var(--red); }
.overlay .brief { color: var(--ink-dim); line-height: 1.55; white-space: pre-line; }
.overlay .verdict { color: var(--ink); line-height: 1.5; margin: 10px 0 4px; }
.legend { display: flex; gap: 18px; margin-top: 14px; color: var(--ink-dim); font-size: 0.8rem; flex-wrap: wrap; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend .ic { width: 17px; height: 17px; }
.legend .l-ship { color: var(--red); } .legend .l-mine { color: #ff9b6b; } .legend .l-oil { color: var(--amber); }
.diff-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.diff-buttons button, .overlay .replay {
  background: #16294a; color: var(--ink); border: 1px solid var(--panel-edge);
  border-radius: 8px; padding: 12px 16px; font-size: 1rem; cursor: pointer; text-align: left;
}
.diff-buttons button:hover, .overlay .replay:hover { background: #1e3a66; border-color: var(--amber); }
.diff-buttons small { display: block; color: var(--ink-dim); margin-top: 2px; }
.stats-table { margin: 14px 0 6px; width: 100%; border-collapse: collapse; font-size: 0.9rem; }
.stats-table td { padding: 3px 0; color: var(--ink-dim); }
.stats-table td:last-child { text-align: right; color: var(--ink); font-variant-numeric: tabular-nums; }

/* ---------- layout ---------- */
#game { display: grid; grid-template-columns: 240px minmax(320px, 1fr) 280px; gap: 14px; align-items: start; }
.panel { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 10px; padding: 14px; }
.panel h3 {
  margin: 0 0 8px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--amber); opacity: 0.9;
}
.panel h3::before { content: "// "; color: var(--ink-dim); }

/* ---------- oil gauge ---------- */
#oil-gauge { margin-bottom: 16px; }
#oil-bar { height: 14px; border-radius: 3px; background: #0a1424; overflow: hidden; border: 1px solid var(--panel-edge); }
#oil-fill { height: 100%; width: 100%; background: var(--amber); transition: width 0.3s, background 0.3s; }
#oil-gauge.low #oil-fill { background: #d97a2c; }
#oil-gauge.critical #oil-fill { background: var(--red); }
#oil-label { font-size: 0.95rem; margin-top: 5px; font-variant-numeric: tabular-nums; }
#oil-gauge.critical #oil-label { color: var(--red); }

/* ---------- fleet ---------- */
#fleet { margin-bottom: 16px; }
.ship-row { display: flex; align-items: center; gap: 7px; margin: 7px 0; font-size: 0.83rem; }
.ship-row .ship-ic { width: 26px; height: 13px; color: var(--ink-dim); flex: none; }
.ship-row.sunk .ship-ic { color: var(--red); }
.ship-row .name { flex: 1; }
.ship-row .segs { display: flex; gap: 2px; }
.seg { width: 12px; height: 12px; background: #24405f; border: 1px solid #33557d; }
.seg:first-child { border-radius: 6px 0 0 6px; }
.seg:last-child { border-radius: 0 6px 6px 0; }
.seg.hit { background: var(--red); border-color: #ff8f8f; }
.ship-row.sunk .name { text-decoration: line-through; color: var(--ink-dim); }
.ship-row.sunk .seg { background: #57201f; border-color: #6b2a28; }

/* ---------- abilities ---------- */
#abilities button {
  display: flex; align-items: center; gap: 9px; width: 100%; margin: 6px 0; padding: 9px 10px;
  background: #16294a; color: var(--ink); border: 1px solid var(--panel-edge);
  border-radius: 8px; font-size: 0.9rem; cursor: pointer; text-align: left;
}
#abilities button .ic { width: 19px; height: 19px; flex: none; color: var(--cyan); }
#abilities button:hover:not(:disabled) { background: #1e3a66; border-color: var(--amber); }
#abilities button:disabled { opacity: 0.45; cursor: not-allowed; }
#abilities button.armed { outline: 2px solid var(--cyan); background: #143c4d; }
#abilities button small { color: var(--ink-dim); }
#orientation-row { display: none; gap: 6px; margin: 6px 0; }
#orientation-row.visible { display: flex; }
#orientation-row button { flex: 1; justify-content: center; margin: 0; padding: 6px; }
#orientation-row button.active { outline: 2px solid var(--amber); }
#emp-banner { display: none; align-items: center; gap: 8px; margin-top: 8px; padding: 8px; border-radius: 8px; background: #3d2a10; color: var(--amber); font-size: 0.82rem; }
#emp-banner.visible { display: flex; }
#emp-banner .ic { width: 16px; height: 16px; flex: none; }
#mode-hint { color: var(--cyan); font-size: 0.8rem; min-height: 2.2em; margin-top: 8px; }
#new-game { margin-top: 10px; background: none; border: none; color: var(--ink-dim); cursor: pointer; font-size: 0.78rem; text-decoration: underline; }

/* ---------- board + coordinates ---------- */
#board-frame {
  display: grid; grid-template-columns: 22px minmax(0, 1fr); grid-template-rows: 22px minmax(0, 1fr);
  width: min(100%, 640px); margin: 0 auto;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
#col-labels { grid-column: 2; display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); }
#row-labels { grid-row: 2; display: grid; grid-template-rows: repeat(10, minmax(0, 1fr)); }
#col-labels span, #row-labels span {
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; color: var(--amber); opacity: 0.65; letter-spacing: 0.05em;
}
#board-wrap { position: relative; grid-column: 2; grid-row: 2; }
#board {
  display: grid;
  grid-template-columns: repeat(10, minmax(0, 1fr));
  grid-template-rows: repeat(10, minmax(0, 1fr));
  gap: 1px; padding: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  aspect-ratio: 1; touch-action: manipulation;
}
#board button {
  position: relative; border: 0; border-radius: 0; padding: 0;
  min-width: 0; min-height: 0; overflow: hidden;
  background: var(--tile); color: var(--ink); cursor: crosshair;
  display: flex; align-items: center; justify-content: center;
}
#board button.alt { background: var(--tile-alt); }
#board button:hover:not(.revealed) { background: var(--tile-hover); box-shadow: inset 0 0 0 2px var(--amber); }
#board button.revealed { background: var(--tile-revealed); cursor: default; }
#board button.preview { box-shadow: inset 0 0 0 2px var(--amber); z-index: 1; }
#board button .num { font-weight: 700; font-size: clamp(0.65rem, 2.2vw, 1.05rem); line-height: 1; }
#board button.flagged { color: var(--amber); }
#board button.hit { background: #3c1414; color: #ff8a5c; }
#board button.sunkcell { background: #57201f; color: #ffb08f; }
#board button.minecell { background: #2c1b10; color: #ff9b6b; }
#board button.minecell.m-emp { color: #ffe08a; }
#board button.minecell.m-oilfire { color: #ff7a4d; }
#board button.oilcell { background: #2c2410; color: var(--amber); }
#board button.oilcell.burned { filter: grayscale(0.7); }
.n1 { color: #6ea8ff; } .n2 { color: var(--green); } .n3 { color: #ff7a6e; } .n4 { color: #c58bff; }
.n5 { color: var(--amber); } .n6 { color: var(--cyan); } .n7 { color: #ff9ecf; } .n8 { color: #ffffff; }

/* greyed-out top-down wreck silhouette, shown after the rainbow swirl */
#board button.wrecked { background: #222b39; }
.ship-wreck { position: absolute; pointer-events: none; z-index: 2; }
.ship-wreck svg { position: absolute; opacity: 0.92; }
@keyframes wreck-in { from { opacity: 0; } to { opacity: 0.92; } }
.ship-wreck svg { animation: wreck-in 0.6s ease-out; }

.recon-zone {
  position: absolute; border: 2px dashed rgba(79, 195, 217, 0.55);
  pointer-events: none; z-index: 2;
}
.recon-zone .tag {
  position: absolute; top: 0; left: 0;
  background: rgba(8, 24, 34, 0.92); color: var(--cyan);
  font-size: 0.6rem; padding: 1px 5px; white-space: nowrap;
  display: flex; align-items: center; gap: 3px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.recon-zone .tag svg { width: 11px; height: 11px; }

/* ---------- log ---------- */
#log-panel { max-height: 660px; display: flex; flex-direction: column; }
#log { list-style: none; margin: 0; padding: 0; overflow-y: auto; font-size: 0.8rem; line-height: 1.45; }
#log li { display: flex; gap: 7px; padding: 5px 2px; border-bottom: 1px solid #182a45; color: var(--ink-dim); }
#log li:first-child { color: var(--ink); }
#log li .log-ic { width: 15px; height: 15px; flex: none; margin-top: 2px; color: var(--ink-dim); }
#log li:first-child .log-ic { color: var(--amber); }
#log li .t { color: var(--ink-dim); font-size: 0.68rem; margin-right: 2px; font-variant-numeric: tabular-nums; font-family: ui-monospace, Menlo, monospace; margin-top: 2px; }

/* ---------- animations ---------- */
@keyframes tile-pop { from { transform: scale(0.55); opacity: 0.2; } to { transform: scale(1); opacity: 1; } }
#board button.revealed { animation: tile-pop 0.16s ease-out; }

@keyframes hit-flash { 0%, 100% { filter: none; } 35% { filter: brightness(2.6) saturate(2.2); } }
#board button.anim-hit { animation: hit-flash 0.55s ease-out; }

@keyframes board-shake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-7px, 3px); }
  40% { transform: translate(6px, -4px); }
  60% { transform: translate(-5px, -2px); }
  80% { transform: translate(4px, 3px); }
}
#board.anim-shake { animation: board-shake 0.4s ease-out; }

/* rainbow victory swirl on sunk ships: spinning colour wheel per cell,
   staggered along the hull so the colours sweep by one by one */
#board button .ic, #board button .num { position: relative; z-index: 2; }
#board button .swirl {
  position: absolute; inset: -65%; z-index: 1; border-radius: 50%;
  pointer-events: none; opacity: 0;
  background: conic-gradient(from 0deg,
    #ff4040, #ff9e2c, #ffe93b, #58dc5a, #3bc7e8, #5a6cff, #b44fff, #ff4040);
  animation: rainbow-spin 0.8s linear infinite, rainbow-fade 2.6s ease-in-out forwards;
}
@keyframes rainbow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes rainbow-fade { 0% { opacity: 0; } 12% { opacity: 0.9; } 75% { opacity: 0.85; } 100% { opacity: 0; } }

@keyframes gauge-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
#oil-gauge.critical #oil-fill { animation: gauge-pulse 1.1s ease-in-out infinite; }

@keyframes burn-flicker { 0%, 100% { opacity: 0.55; } 50% { opacity: 0.9; } }
#board button.oilcell.burned { animation: burn-flicker 2.4s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

@media (max-width: 980px) {
  #game { grid-template-columns: 1fr; }
  #log-panel { max-height: 240px; }
}
</style>
</head>

<script id="hormuz-logic">
'use strict';
(function () {
  const SHIPS = [
    { name: 'Carrier', size: 5 },
    { name: 'Battleship', size: 4 },
    { name: 'Cruiser', size: 3 },
    { name: 'Submarine', size: 3 },
    { name: 'Destroyer', size: 2 },
  ];
  const DIFFICULTIES = {
    easy: { oil: 60, mines: 12, oilFields: 8 },
    normal: { oil: 50, mines: 16, oilFields: 6 },
    straightUp: { oil: 40, mines: 20, oilFields: 5 },
  };
  const SIZE = 10;
  // variant mines per difficulty; remaining mines are 'standard'
  const VARIANT_MIX = { easy: 1, normal: 2, straightUp: 2 };

  function makeCell() {
    return { content: 'water', shipIndex: null, mineType: null, number: 0, revealed: false, flagged: false, burned: false };
  }

  function shuffle(arr, rng) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function createGame(difficultyKey, rng = Math.random) {
    const diff = DIFFICULTIES[difficultyKey];
    if (!diff) throw new Error('unknown difficulty: ' + difficultyKey);
    const cells = Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, makeCell));

    // place ships as straight lines, no overlap, retry random spots;
    // orientations pre-assigned so every fleet has at least one of each
    const ships = SHIPS.map(s => ({ name: s.name, size: s.size, cells: [], hits: 0, sunk: false }));
    const orientations = [true, false];
    while (orientations.length < ships.length) orientations.push(rng() < 0.5);
    shuffle(orientations, rng);
    for (let i = 0; i < ships.length; i++) {
      const ship = ships[i];
      const horizontal = orientations[i];
      for (;;) {
        const r = Math.floor(rng() * (horizontal ? SIZE : SIZE - ship.size + 1));
        const c = Math.floor(rng() * (horizontal ? SIZE - ship.size + 1 : SIZE));
        const spots = [];
        for (let k = 0; k < ship.size; k++) spots.push(horizontal ? [r, c + k] : [r + k, c]);
        if (spots.some(([rr, cc]) => cells[rr][cc].content !== 'water')) continue;
        for (const [rr, cc] of spots) {
          cells[rr][cc].content = 'ship';
          cells[rr][cc].shipIndex = i;
        }
        ship.cells = spots;
        break;
      }
    }

    // scatter mines and oil fields on remaining water
    const free = [];
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      if (cells[r][c].content === 'water') free.push([r, c]);
    }
    shuffle(free, rng);
    const perVariant = VARIANT_MIX[difficultyKey];
    const mineTypes = [];
    for (const t of ['depth', 'oilfire', 'emp']) for (let k = 0; k < perVariant; k++) mineTypes.push(t);
    while (mineTypes.length < diff.mines) mineTypes.push('standard');
    shuffle(mineTypes, rng);
    for (let k = 0; k < diff.mines; k++) {
      const [r, c] = free.pop();
      cells[r][c].content = 'mine';
      cells[r][c].mineType = mineTypes[k];
    }
    for (let k = 0; k < diff.oilFields; k++) {
      const [r, c] = free.pop();
      cells[r][c].content = 'oil';
    }

    // adjacency numbers on water cells
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      if (cells[r][c].content !== 'water') continue;
      let n = 0;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const cell = (cells[r + dr] || [])[c + dc];
        if (cell && cell.content !== 'water') n++;
      }
      cells[r][c].number = n;
    }

    return {
      size: SIZE,
      difficulty: difficultyKey,
      oil: diff.oil,
      empRemaining: 0,
      status: 'playing',
      cells,
      ships,
      stats: { shots: 0, minesHit: 0, oilGained: 0, oilSpent: 0 },
      reconZones: [],
    };
  }

  function inBounds(r, c) {
    return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
  }

  function checkEnd(state, events) {
    if (state.ships.every(s => s.sunk)) {
      state.status = 'won';
      events.push({ type: 'won' });
    } else if (state.oil <= 0) {
      state.status = 'lost';
      events.push({ type: 'lost' });
    }
  }

  // flood-reveal the connected zero region around a just-revealed zero cell;
  // a zero cell's neighbours are always water, so this only touches water
  function flood(state, r0, c0, events) {
    const stack = [[r0, c0]];
    const seen = new Set([r0 + ',' + c0]);
    let count = 0;
    while (stack.length) {
      const [r, c] = stack.pop();
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const rr = r + dr, cc = c + dc;
        if (!inBounds(rr, cc) || seen.has(rr + ',' + cc)) continue;
        seen.add(rr + ',' + cc);
        const cell = state.cells[rr][cc];
        if (cell.revealed) continue;
        cell.revealed = true;
        cell.flagged = false;
        count++;
        if (cell.number === 0) stack.push([rr, cc]);
      }
    }
    if (count) events.push({ type: 'flood', count });
  }

  function mineEffect(state, r, c, events) {
    const type = state.cells[r][c].mineType;
    state.stats.minesHit++;
    if (type === 'depth') {
      state.oil = Math.max(0, state.oil - 5);
      events.push({ type: 'mine', r, c, mineType: 'depth', penalty: 5 });
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const rr = r + dr, cc = c + dc;
        if (inBounds(rr, cc)) resolveCell(state, rr, cc, events, { burnOil: true, detonateMines: false });
      }
    } else if (type === 'oilfire') {
      // burn the nearest unrevealed oil field (row-major on distance ties)
      let best = null, bestD = Infinity;
      for (let rr = 0; rr < SIZE; rr++) for (let cc = 0; cc < SIZE; cc++) {
        const t = state.cells[rr][cc];
        if (t.content === 'oil' && !t.revealed && !t.burned) {
          const d = (rr - r) ** 2 + (cc - c) ** 2;
          if (d < bestD) { bestD = d; best = [rr, cc]; }
        }
      }
      if (best) {
        const t = state.cells[best[0]][best[1]];
        t.burned = true;
        t.revealed = true;
        t.flagged = false;
        events.push({ type: 'mine', r, c, mineType: 'oilfire', target: best });
      } else {
        state.oil = Math.max(0, state.oil - 3);
        events.push({ type: 'mine', r, c, mineType: 'oilfire', penalty: 3, fallback: true });
      }
    } else if (type === 'emp') {
      state.empRemaining = 3;
      events.push({ type: 'mine', r, c, mineType: 'emp' });
    } else {
      state.oil = Math.max(0, state.oil - 3);
      events.push({ type: 'mine', r, c, mineType: 'standard', penalty: 3 });
    }
  }

  // reveal one cell's content; shared by direct shots, depth charges and
  // bombing runs. opts.burnOil: oil fields found burn instead of paying out.
  // opts.detonateMines === false: mines are exposed but do not go off.
  function resolveCell(state, r, c, events, opts = {}) {
    const cell = state.cells[r][c];
    if (cell.revealed) return;
    cell.revealed = true;
    cell.flagged = false;
    if (cell.content === 'water') {
      events.push({ type: 'number', r, c, value: cell.number });
      if (cell.number === 0) flood(state, r, c, events);
    } else if (cell.content === 'ship') {
      const ship = state.ships[cell.shipIndex];
      ship.hits++;
      events.push({ type: 'hit', r, c, ship: ship.name });
      if (ship.hits === ship.size) {
        ship.sunk = true;
        events.push({ type: 'sunk', ship: ship.name });
      }
    } else if (cell.content === 'oil') {
      if (cell.burned || opts.burnOil) {
        cell.burned = true;
        events.push({ type: 'oil', r, c, amount: 0, burned: true });
      } else {
        state.oil += 10;
        state.stats.oilGained += 10;
        events.push({ type: 'oil', r, c, amount: 10 });
      }
    } else if (cell.content === 'mine') {
      if (opts.detonateMines === false) {
        events.push({ type: 'mine', r, c, mineType: cell.mineType, dud: true });
      } else {
        mineEffect(state, r, c, events);
      }
    }
  }

  function reveal(state, r, c) {
    if (state.status !== 'playing') return [{ type: 'rejected', reason: 'not-playing' }];
    const cell = state.cells[r][c];
    if (cell.revealed) return [{ type: 'rejected', reason: 'revealed' }];
    if (state.oil < 1) return [{ type: 'rejected', reason: 'no-oil' }];
    state.oil -= 1;
    state.stats.oilSpent += 1;
    state.stats.shots += 1;
    if (state.empRemaining > 0) state.empRemaining--;
    const events = [];
    resolveCell(state, r, c, events);
    checkEnd(state, events);
    return events;
  }

  function toggleFlag(state, r, c) {
    if (state.status !== 'playing') return;
    const cell = state.cells[r][c];
    if (cell.revealed) return;
    cell.flagged = !cell.flagged;
  }

  function abilityGate(state, cost) {
    if (state.status !== 'playing') return { type: 'rejected', reason: 'not-playing' };
    if (state.empRemaining > 0) return { type: 'rejected', reason: 'emp' };
    if (state.oil < cost) return { type: 'rejected', reason: 'no-oil' };
    return null;
  }

  function recon(state, r, c) {
    const rejected = abilityGate(state, 3);
    if (rejected) return [rejected];
    state.oil -= 3;
    state.stats.oilSpent += 3;
    let ships = 0, mines = 0, oil = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const rr = r + dr, cc = c + dc;
      if (!inBounds(rr, cc)) continue;
      const content = state.cells[rr][cc].content;
      if (content === 'ship') ships++;
      else if (content === 'mine') mines++;
      else if (content === 'oil') oil++;
    }
    state.reconZones.push({ r, c, ships, mines, oil });
    const events = [{ type: 'recon', r, c, ships, mines, oil }];
    checkEnd(state, events);
    return events;
  }

  function bombingRun(state, orientation, r, c) {
    const rejected = abilityGate(state, 5);
    if (rejected) return [rejected];
    state.oil -= 5;
    state.stats.oilSpent += 5;
    const events = [{ type: 'bombing', orientation, r, c }];
    for (let k = -1; k <= 1; k++) {
      const rr = orientation === 'col' ? r + k : r;
      const cc = orientation === 'row' ? c + k : c;
      if (inBounds(rr, cc)) resolveCell(state, rr, cc, events);
    }
    checkEnd(state, events);
    return events;
  }

  globalThis.Hormuz = { SHIPS, DIFFICULTIES, createGame, reveal, toggleFlag, recon, bombingRun };
})();
</script>

  };

  const lastPick = {};
  function flavor(kind, data) {
    if (kind === 'sunk' && data && data.ship === 'Carrier') kind = 'sunk-carrier';
    const pool = POOLS[kind];
    if (!pool) return kind;
    let i = Math.floor(Math.random() * pool.length);
    if (pool.length > 1 && i === lastPick[kind]) i = (i + 1) % pool.length;
    lastPick[kind] = i;
    return pool[i](data || {});
  }

  function startGame(diff) {

  function setMode(m) {

  function onCellClick(r, c) {

    render(); // render first so animation classes added below survive

    // low-oil nagging, once per threshold crossing

      if (oilBefore >= 15 && state.oil < 15) addLog(flavor('lowoil15'), 'i-warn');
      if (oilBefore >= 8 && state.oil < 8) addLog(flavor('lowoil8'), 'i-warn');

    if (!state || state.status !== 'playing') return;

  }

  const MINE_LOG_ICON = { standard: 'i-mine', depth: 'i-depth', oilfire: 'i-fire', emp: 'i-emp' };

  function handleEvents(events) {
    for (const e of events) {
      switch (e.type) {
        case 'number': if (e.value > 0) addLog(flavor('number', e), 'i-wave'); break;
        case 'flood': addLog(flavor('flood', e), 'i-wave'); break;
        case 'hit': addLog(flavor('hit', e), 'i-hit'); flashCell(e.r, e.c, 'anim-hit'); break;
        case 'sunk': {
          addLog(flavor('sunk', e), 'i-skull');
          rainbowShip(e.ship);
          // once the swirl has played out, surface the wreck silhouette
          const ship = state.ships.find(s => s.name === e.ship);
          const st = state;
          setTimeout(() => {
            if (state !== st) return; // a new game started meanwhile
            wreckReady.add(e.ship);
            render();
          }, 2900 + (ship ? ship.size : 0) * 150);
          break;
        }
        case 'oil': addLog(flavor(e.amount > 0 ? 'oil' : 'oil-burned', e), e.amount > 0 ? 'i-oil' : 'i-fire'); break;
        case 'mine':
          if (e.dud) addLog(flavor('mine-dud', e), 'i-mine');
          else {
            addLog(flavor(e.fallback ? 'mine-oilfire-fallback' : 'mine-' + e.mineType, e), MINE_LOG_ICON[e.mineType]);
            shakeBoard();
          }
          break;
        case 'recon': addLog(flavor('recon', e), 'i-plane'); break;
        case 'bombing': addLog(flavor('bombing', e), 'i-bomb'); break;
        case 'won': addLog(flavor('won', e), 'i-star'); showGameOver(true); break;
        case 'lost': addLog(flavor('lost', e), 'i-skull'); showGameOver(false); break;
        case 'rejected': addLog(flavor('rejected-' + e.reason, e), 'i-warn'); break;
      }
    }
  }

  function addLog(text, iconId = 'i-wave') {
    const li = document.createElement('li');
    li.innerHTML = `<svg class="log-ic"><use href="#${iconId}"/></svg><span class="t">#${actionCounter}</span>`;
    li.appendChild(document.createTextNode(text));
    $('#log').prepend(li);
  }

  // rainbow swirl over every cell of a sunk ship, staggered stem-to-stern
  function rainbowShip(name) {
    const ship = state.ships.find(s => s.name === name);
    if (!ship) return;
    ship.cells.forEach(([r, c], k) => {
      const btn = cellButton(r, c);
      btn.querySelectorAll('.swirl').forEach(el => el.remove());
      const swirl = document.createElement('span');
      swirl.className = 'swirl';
      const delay = (k * 0.15) + 's';
      swirl.style.animationDelay = `${delay}, ${delay}`;
      btn.appendChild(swirl);
      setTimeout(() => swirl.remove(), 2700 + k * 150);
    });
  }

  function flashCell(r, c, cls) {
    const btn = cellButton(r, c);
    btn.classList.remove(cls);
    void btn.offsetWidth;
    btn.classList.add(cls);
  }

  function shakeBoard() {
    const board = $('#board');
    board.classList.remove('anim-shake');
    void board.offsetWidth;
    board.classList.add('anim-shake');
  }

  function cellButton(r, c) {
    return $('#board').children[r * SIZE + c];
  }

  // ---------- targeting previews ----------
  function previewCells(r, c) {
    const out = [];
    if (mode === 'recon') {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const rr = r + dr, cc = c + dc;
        if (rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE) out.push([rr, cc]);
      }
    } else if (mode === 'bomb') {
      for (let k = -1; k <= 1; k++) {
        const rr = bombOrientation === 'col' ? r + k : r;
        const cc = bombOrientation === 'row' ? c + k : c;
        if (rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE) out.push([rr, cc]);
      }
    } else {
      out.push([r, c]);
    }
    return out;
  }

  function updatePreview(r, c) {
    clearPreview();
    if (!state || state.status !== 'playing' || mode === 'shoot') return;
    for (const [rr, cc] of previewCells(r, c)) cellButton(rr, cc).classList.add('preview');
  }

  function clearPreview() {
    document.querySelectorAll('#board .preview').forEach(b => b.classList.remove('preview'));
  }

  // ---------- rendering ----------
  const MINE_ICON = { standard: 'i-mine', depth: 'i-depth', oilfire: 'i-fire', emp: 'i-emp' };

  function render() {
    if (!state) return;
    // oil gauge
    const startOil = H.DIFFICULTIES[state.difficulty].oil;
    const pct = Math.max(0, Math.min(100, (state.oil / startOil) * 100));
    $('#oil-fill').style.width = pct + '%';
    $('#oil-label').textContent = `${state.oil} bbl (started with ${startOil})`;
    $('#oil-gauge').className = state.oil < 8 ? 'critical' : state.oil < 15 ? 'low' : '';

    // fleet
    const fleet = $('#fleet');
    fleet.querySelectorAll('.ship-row').forEach(el => el.remove());
    for (const ship of state.ships) {
      const row = document.createElement('div');
      row.className = 'ship-row' + (ship.sunk ? ' sunk' : '');
      const segs = Array.from({ length: ship.size }, (_, i) =>
        `<span class="seg${i < ship.hits ? ' hit' : ''}"></span>`).join('');
      row.innerHTML = `${icon(ship.sunk ? 'i-skull' : 'i-ship', 'ship-ic')}<span class="name">${ship.name}</span><span class="segs">${segs}</span>`;
      fleet.appendChild(row);
    }

    // abilities
    const playing = state.status === 'playing';
    const emp = state.empRemaining > 0;
    $('#btn-recon').disabled = !playing || emp || state.oil < 3;
    $('#btn-bomb').disabled = !playing || emp || state.oil < 5;
    $('#btn-recon').classList.toggle('armed', mode === 'recon');
    $('#btn-bomb').classList.toggle('armed', mode === 'bomb');
    $('#orientation-row').classList.toggle('visible', mode === 'bomb');
    $('#btn-row').classList.toggle('active', bombOrientation === 'row');
    $('#btn-col').classList.toggle('active', bombOrientation === 'col');
    const empBanner = $('#emp-banner');
    empBanner.classList.toggle('visible', emp);
    if (emp) empBanner.innerHTML = `${icon('i-emp')} Comms fried — air wing grounded for ${state.empRemaining} more action${state.empRemaining === 1 ? '' : 's'}.`;
    $('#mode-hint').textContent =
      mode === 'recon' ? 'Recon armed: click the centre of a 3×3 area. Esc cancels.' :
      mode === 'bomb' ? `Bombing run armed (${bombOrientation === 'row' ? 'horizontal' : 'vertical'}): click the centre cell. Esc cancels.` : '';

    // board
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      const cell = state.cells[r][c];
      const btn = cellButton(r, c);
      let cls = (r + c) % 2 ? 'alt' : '';
      let html = '';
      if (!cell.revealed) {
        if (cell.flagged) { cls += ' flagged'; html = icon('i-flag'); }
      } else {
        cls += ' revealed';
        if (cell.content === 'water') {
          if (cell.number > 0) html = `<span class="num n${cell.number}">${cell.number}</span>`;
        } else if (cell.content === 'ship') {
          const ship = state.ships[cell.shipIndex];
          if (ship.sunk && wreckReady.has(ship.name)) {
            cls += ' wrecked'; // silhouette overlay carries the visuals
          } else {
            html = icon('i-hit');
            cls += ship.sunk ? ' hit sunkcell' : ' hit';
          }
        } else if (cell.content === 'mine') {
          html = icon(MINE_ICON[cell.mineType]);
          cls += ' minecell m-' + cell.mineType;
        } else if (cell.content === 'oil') {
          html = icon(cell.burned ? 'i-fire' : 'i-oil');
          cls += ' oilcell' + (cell.burned ? ' burned' : '');
          if (cell.burned) btn.title = 'Burned. Worth nothing. Like your performance review.';
        }
      }
      btn.className = cls.trim();
      btn.innerHTML = html;
    }

    // wreck silhouettes over sunk ships whose swirl has finished
    document.querySelectorAll('.ship-wreck').forEach(el => el.remove());
    const wrap = $('#board-wrap');
    for (const ship of state.ships) {
      if (!ship.sunk || !wreckReady.has(ship.name)) continue;
      const first = ship.cells[0], last = ship.cells[ship.cells.length - 1];
      const tl = cellButton(Math.min(first[0], last[0]), Math.min(first[1], last[1]));
      const br = cellButton(Math.max(first[0], last[0]), Math.max(first[1], last[1]));
      const x = tl.offsetLeft, y = tl.offsetTop;
      const w = br.offsetLeft + br.offsetWidth - x;
      const h = br.offsetTop + br.offsetHeight - y;
      const div = document.createElement('div');
      div.className = 'ship-wreck';
      div.style.left = x + 'px';
      div.style.top = y + 'px';
      div.style.width = w + 'px';
      div.style.height = h + 'px';
      const vertical = h > w;
      const svg = wreckSvg(ship.size);
      if (vertical) {
        // draw horizontally, then rotate into the vertical footprint
        svg.style.width = h + 'px';
        svg.style.height = w + 'px';
        svg.style.left = ((w - h) / 2) + 'px';
        svg.style.top = ((h - w) / 2) + 'px';
        svg.style.transform = 'rotate(90deg)';
      } else {
        svg.style.width = '100%';
        svg.style.height = '100%';
      }
      div.appendChild(svg);
      wrap.appendChild(div);
    }

    // recon overlays, positioned from live cell geometry
    document.querySelectorAll('.recon-zone').forEach(el => el.remove());
    for (const z of state.reconZones) {
      const r0 = Math.max(0, z.r - 1), c0 = Math.max(0, z.c - 1);
      const r1 = Math.min(SIZE - 1, z.r + 1), c1 = Math.min(SIZE - 1, z.c + 1);
      const tl = cellButton(r0, c0), br = cellButton(r1, c1);
      const div = document.createElement('div');
      div.className = 'recon-zone';
      div.style.left = tl.offsetLeft + 'px';
      div.style.top = tl.offsetTop + 'px';
      div.style.width = (br.offsetLeft + br.offsetWidth - tl.offsetLeft) + 'px';
      div.style.height = (br.offsetTop + br.offsetHeight - tl.offsetTop) + 'px';
      div.innerHTML = `<span class="tag"><svg><use href="#i-ship"/></svg>${z.ships} <svg><use href="#i-mine"/></svg>${z.mines} <svg><use href="#i-oil"/></svg>${z.oil}</span>`;
      wrap.appendChild(div);
    }
  }

  // top-down grey warship silhouette, drawn bow-right, n cells long
  function wreckSvg(n) {
    const L = n * 20, W = 20;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `0 0 ${L} ${W}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    const hull = '#66707f', deck = '#454f5e', detail = '#39424f';
    const bow = L - 2, bowStart = L - 0.6 * W;
    svg.innerHTML = `
      <path fill="${hull}" d="M5 4 H${bowStart} L${bow} 10 L${bowStart} 16 H5 Q2 16 2 13 V7 Q2 4 5 4 Z"/>
      <rect fill="${deck}" x="${L * 0.34}" y="6.5" width="${L * 0.3}" height="7" rx="2.5"/>
      <rect fill="${detail}" x="${L * 0.44}" y="8.2" width="${L * 0.1}" height="3.6" rx="1.4"/>
      <circle fill="${deck}" cx="${L * 0.18}" cy="10" r="3.2"/>
      <circle fill="${detail}" cx="${L * 0.18}" cy="10" r="1.5"/>
      <circle fill="${deck}" cx="${L * 0.78}" cy="10" r="3.2"/>
      <circle fill="${detail}" cx="${L * 0.78}" cy="10" r="1.5"/>
      <rect fill="${detail}" x="${L * 0.18}" y="9.2" width="${L * 0.09}" height="1.6"/>
      <rect fill="${detail}" x="${L * 0.78}" y="9.2" width="${L * 0.09}" height="1.6"/>`;
    return svg;
  }

  // ---------- game over ----------
  function showGameOver(won) {
    const s = state.stats;
    $('#go-title').innerHTML = won
      ? `${icon('i-star')} STRAIT CLEARED`
      : `${icon('i-skull')} OUT OF OIL`;
    $('#go-title').className = won ? 'won' : 'lost';
    $('#go-verdict').textContent = won
      ? 'The enemy fleet is now a series of interesting dive sites. Someone above your pay grade is already drafting their own medal citation.'
      : 'You ran a navy out of fuel in the middle of the world’s largest gas station. The court-martial will be catered.';
    $('#go-stats').innerHTML = `
      <tr><td>Shots fired</td><td>${s.shots}</td></tr>
      <tr><td>Mines found the hard way</td><td>${s.minesHit}</td></tr>
      <tr><td>Oil captured</td><td>${s.oilGained} bbl</td></tr>
      <tr><td>Oil burned</td><td>${s.oilSpent} bbl</td></tr>
      <tr><td>Ships sunk</td><td>${state.ships.filter(x => x.sunk).length} / 5</td></tr>`;
    // on a win, hold the overlay back so the last ship's rainbow swirl plays out
    setTimeout(() => $('#gameover').classList.remove('hidden'), won ? 2400 : 900);
  }

  buildDom();
})();
</script>
</body>
</html>
