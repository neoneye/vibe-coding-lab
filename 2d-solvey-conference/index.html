<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1927 Solvay Conference</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    color: #eee;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin: 24px 0 4px;
    font-size: 1.6rem;
    letter-spacing: 0.04em;
  }

  .subtitle {
    color: #aaa;
    font-size: 0.95rem;
    margin-bottom: 16px;
  }

  /* Segmented control */
  .segmented {
    display: inline-flex;
    background: #333;
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 16px;
    font-family: -apple-system, sans-serif;
  }

  .segmented button {
    background: none;
    border: none;
    color: #999;
    padding: 8px 20px;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    font-weight: 500;
  }

  .segmented button:hover {
    color: #ccc;
  }

  .segmented button.active {
    background: #555;
    color: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* Photo */
  .photo-container {
    position: relative;
    display: inline-block;
    max-width: 1200px;
    width: 95vw;
    margin-bottom: 32px;
  }

  .photo-container img {
    width: 100%;
    display: block;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    transition: filter 0.3s;
  }

  /* View modes on the image */
  .photo-container.mode-bw img {
    filter: grayscale(1);
  }
  .photo-container.mode-color img {
    filter: sepia(0.4) saturate(1.4) brightness(1.05);
  }
  .photo-container.mode-mask img {
    filter: grayscale(1) brightness(0.35);
  }

  /* Person overlays */
  .person {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    transition: box-shadow 0.2s, background 0.2s, opacity 0.3s;
    background: rgba(255, 200, 50, 0);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .person:hover {
    box-shadow: 0 0 0 3px rgba(255, 200, 50, 0.8), 0 0 16px rgba(255, 200, 50, 0.4);
    background: rgba(255, 200, 50, 0.15);
  }

  /* Tooltip */
  .person .tooltip {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.92);
    color: #fff;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 13px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    font-family: -apple-system, sans-serif;
    z-index: 10;
  }

  .person:hover .tooltip {
    opacity: 1;
  }

  /* Mask label inside the circle */
  .person .mask-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-family: -apple-system, sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    line-height: 1.15;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }

  /* Mask mode: show colored circles + labels */
  .photo-container.mode-mask .person {
    border: 2px solid rgba(255,255,255,0.6);
  }

  .photo-container.mode-mask .person .mask-label {
    opacity: 1;
  }

  /* Legend */
  .legend {
    max-width: 1200px;
    width: 95vw;
    margin-bottom: 40px;
    font-family: -apple-system, sans-serif;
  }

  .legend h2 {
    font-size: 1.1rem;
    margin-bottom: 12px;
    color: #ccc;
  }

  .row-label {
    font-size: 0.85rem;
    color: #888;
    margin: 12px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .legend-names {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
  }

  .legend-names a {
    color: #d4a843;
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.15s;
  }

  .legend-names a:hover {
    color: #f5d06b;
    text-decoration: underline;
  }
</style>
</head>
<body>

<h1>Fifth Solvay Conference, 1927</h1>
<p class="subtitle">Electrons and Photons &mdash; Brussels, Belgium &mdash; Click on any person to visit their Wikipedia page</p>

<div class="segmented" id="segmented">
  <button data-mode="bw" class="active">B&amp;W</button>
  <button data-mode="color">Color</button>
  <button data-mode="mask">Mask</button>
</div>

<div class="photo-container mode-bw" id="photo-container">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Solvay_conference_1927.jpg"
       alt="1927 Solvay Conference group photo" id="photo">
</div>

<div class="legend">
  <h2>Attendees</h2>

  <div class="row-label">Back row (standing)</div>
  <div class="legend-names" id="legend-back"></div>

  <div class="row-label">Middle row</div>
  <div class="legend-names" id="legend-middle"></div>

  <div class="row-label">Front row</div>
  <div class="legend-names" id="legend-front"></div>
</div>

<script>
// Each person: [name, wikipedia_slug, x%, y%, size%]
// x,y = center of face as percentage of image dimensions
// size = diameter of clickable circle as % of image width

const people = {
  back: [
    ["Auguste Piccard",       "Auguste_Piccard",                   7.0,  14.5, 5.5],
    ["Émile Henriot",         "Émile_Henriot_(chemist)",          14.0,  15.5, 5.5],
    ["Paul Ehrenfest",        "Paul_Ehrenfest",                   20.5,  14.0, 5.5],
    ["Édouard Herzen",        "Édouard_Herzen",                   27.0,  16.0, 5.5],
    ["Théophile de Donder",   "Théophile_de_Donder",              33.5,  14.5, 5.5],
    ["Erwin Schrödinger",     "Erwin_Schrödinger",                40.5,  14.0, 5.5],
    ["Jules-Émile Verschaffelt","Jules-Émile_Verschaffelt",       47.5,  13.0, 5.5],
    ["Wolfgang Pauli",        "Wolfgang_Pauli",                   55.0,  14.0, 5.5],
    ["Werner Heisenberg",     "Werner_Heisenberg",                62.0,  14.0, 5.5],
    ["Ralph Fowler",          "Ralph_Howard_Fowler",              69.0,  14.5, 5.5],
    ["Léon Brillouin",        "Léon_Brillouin",                   76.5,  14.0, 5.5],
  ],
  middle: [
    ["Peter Debye",           "Peter_Debye",                      7.5,  44.0, 6.0],
    ["Martin Knudsen",        "Martin_Knudsen",                  16.5,  43.0, 6.0],
    ["William Lawrence Bragg","William_Lawrence_Bragg",           25.0,  42.0, 6.0],
    ["Hendrik Kramers",       "Hendrik_Anthony_Kramers",         33.5,  42.5, 6.0],
    ["Paul Dirac",            "Paul_Dirac",                      42.0,  42.0, 6.0],
    ["Arthur Compton",        "Arthur_Compton",                   50.5,  42.0, 6.0],
    ["Louis de Broglie",      "Louis_de_Broglie",                59.0,  42.0, 6.0],
    ["Max Born",              "Max_Born",                         67.5,  42.0, 6.0],
    ["Niels Bohr",            "Niels_Bohr",                      76.5,  42.5, 6.0],
  ],
  front: [
    ["Irving Langmuir",       "Irving_Langmuir",                  8.5,  72.0, 6.5],
    ["Max Planck",            "Max_Planck",                      19.0,  72.5, 6.5],
    ["Marie Curie",           "Marie_Curie",                     30.5,  70.0, 6.5],
    ["Hendrik Lorentz",       "Hendrik_Lorentz",                 41.5,  69.0, 6.5],
    ["Albert Einstein",       "Albert_Einstein",                  52.0,  70.0, 6.5],
    ["Paul Langevin",         "Paul_Langevin",                   61.5,  70.0, 6.5],
    ["Charles-Eugène Guye",   "Charles-Eugène_Guye",             70.5,  71.0, 6.5],
    ["C.T.R. Wilson",         "Charles_Thomson_Rees_Wilson",      79.0,  72.0, 6.5],
    ["Owen Richardson",       "Owen_Willans_Richardson",          88.0,  72.5, 6.5],
  ]
};

// Distinct hue per person for mask mode
const rowColors = {
  back:   (i, n) => `hsla(${(i / n) * 360}, 75%, 55%, 0.55)`,
  middle: (i, n) => `hsla(${(i / n) * 360 + 15}, 80%, 50%, 0.55)`,
  front:  (i, n) => `hsla(${(i / n) * 360 + 30}, 70%, 60%, 0.55)`,
};

const container = document.getElementById('photo-container');

function wikiUrl(slug) {
  return `https://en.wikipedia.org/wiki/${slug}`;
}

function createOverlays() {
  for (const [row, list] of Object.entries(people)) {
    const legendEl = document.getElementById(`legend-${row}`);
    const colorFn = rowColors[row];

    list.forEach(([name, slug, cx, cy, size], i) => {
      const maskColor = colorFn(i, list.length);

      // Clickable circle overlay
      const a = document.createElement('a');
      a.href = wikiUrl(slug);
      a.target = '_blank';
      a.rel = 'noopener';
      a.className = 'person';
      a.dataset.maskColor = maskColor;
      a.style.left = `${cx - size / 2}%`;
      a.style.top = `${cy - size / 2}%`;
      a.style.width = `${size}%`;
      a.style.paddingBottom = `${size}%`;
      a.style.height = '0';
      a.title = name;

      // Tooltip (always visible on hover)
      const tooltip = document.createElement('span');
      tooltip.className = 'tooltip';
      tooltip.textContent = name;
      a.appendChild(tooltip);

      // Mask label (visible only in mask mode via CSS)
      const label = document.createElement('span');
      label.className = 'mask-label';
      // Use last name only to fit in circle
      const parts = name.split(' ');
      label.textContent = parts.length > 1 ? parts[parts.length - 1] : name;
      a.appendChild(label);

      container.appendChild(a);

      // Legend entry
      const la = document.createElement('a');
      la.href = wikiUrl(slug);
      la.target = '_blank';
      la.rel = 'noopener';
      la.textContent = name;
      legendEl.appendChild(la);
    });
  }
}

// Segmented control
const segmented = document.getElementById('segmented');
const buttons = segmented.querySelectorAll('button');

function setMode(mode) {
  container.className = `photo-container mode-${mode}`;
  buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  // Apply/remove mask colors
  const persons = container.querySelectorAll('.person');
  persons.forEach(p => {
    if (mode === 'mask') {
      p.style.background = p.dataset.maskColor;
    } else {
      p.style.background = '';
    }
  });
}

buttons.forEach(b => {
  b.addEventListener('click', () => setMode(b.dataset.mode));
});

createOverlays();
</script>
</body>
</html>
