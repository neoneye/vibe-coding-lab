<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1927 Solvay Conference</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    color: #eee;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 { margin: 24px 0 4px; font-size: 1.6rem; letter-spacing: 0.04em; }
  .subtitle { color: #aaa; font-size: 0.95rem; margin-bottom: 16px; }

  /* Segmented control */
  .segmented {
    display: inline-flex;
    background: #333;
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 16px;
    font-family: -apple-system, sans-serif;
  }
  .segmented button {
    background: none; border: none; color: #999;
    padding: 8px 20px; font-size: 0.9rem; cursor: pointer;
    border-radius: 6px; transition: all 0.2s; font-weight: 500;
  }
  .segmented button:hover { color: #ccc; }
  .segmented button.active {
    background: #555; color: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* Photo container */
  .photo-container {
    position: relative;
    display: inline-block;
    max-width: 1200px;
    width: 95vw;
    margin-bottom: 32px;
  }
  .photo-container img {
    width: 100%; display: block; border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    transition: filter 0.3s;
  }
  .photo-container.mode-bw img { filter: grayscale(1); }
  .photo-container.mode-color img { filter: sepia(0.4) saturate(1.4) brightness(1.05); }
  .photo-container.mode-mask img { filter: grayscale(1) brightness(0.3); }

  /* Mask overlay canvas */
  #maskOverlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 4px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .photo-container.mode-mask #maskOverlay { opacity: 1; }

  /* Tooltip */
  .hover-tooltip {
    position: absolute;
    background: rgba(0,0,0,0.92);
    color: #fff;
    padding: 5px 12px;
    border-radius: 4px;
    font: 13px/1.3 -apple-system, sans-serif;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
    transform: translate(-50%, -100%);
  }

  /* Legend */
  .legend {
    max-width: 1200px; width: 95vw; margin-bottom: 40px;
    font-family: -apple-system, sans-serif;
  }
  .legend h2 { font-size: 1.1rem; margin-bottom: 12px; color: #ccc; }
  .row-label {
    font-size: 0.85rem; color: #888; margin: 12px 0 6px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .legend-names { display: flex; flex-wrap: wrap; gap: 6px 16px; }
  .legend-names a {
    color: #d4a843; text-decoration: none; font-size: 0.9rem; transition: color 0.15s;
  }
  .legend-names a:hover { color: #f5d06b; text-decoration: underline; }
  .legend-names .id-badge {
    display: inline-block; width: 20px; height: 20px; border-radius: 4px;
    text-align: center; line-height: 20px; font-size: 11px; font-weight: 700;
    color: #fff; margin-right: 4px; vertical-align: middle;
  }
</style>
</head>
<body>

<h1>Fifth Solvay Conference, 1927</h1>
<p class="subtitle">Electrons and Photons &mdash; Brussels, Belgium &mdash; Click on any person to visit their Wikipedia page</p>

<div class="segmented" id="segmented">
  <button data-mode="bw" class="active">B&amp;W</button>
  <button data-mode="color">Color</button>
  <button data-mode="mask">Mask</button>
</div>

<div class="photo-container mode-bw" id="container">
  <img id="photo"
       src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Solvay_conference_1927.jpg"
       alt="1927 Solvay Conference group photo"
       crossorigin="anonymous">
  <canvas id="maskOverlay"></canvas>
  <div class="hover-tooltip" id="tooltip"></div>
</div>

<div class="legend">
  <h2>Attendees</h2>
  <div class="row-label">Back row (standing)</div>
  <div class="legend-names" id="legend-back"></div>
  <div class="row-label">Middle row</div>
  <div class="legend-names" id="legend-middle"></div>
  <div class="row-label">Front row</div>
  <div class="legend-names" id="legend-front"></div>
</div>

<script>
// --------------- DATA ---------------
// cx, cy = center of head as % of image width / height
// r = circle radius as % of image width
// Positions measured from the actual 3000×2171 photo

const people = [
  // Back row — 11 standing (IDs 1–11) — grid-measured from annotated crop
  { id:1,  name:"Auguste Piccard",          short:"Piccard",       wiki:"Auguste_Piccard",          row:"back",   cx:7.0,  cy:32.5, r:1.5 },
  { id:2,  name:"Émile Henriot",            short:"Henriot",       wiki:"Émile_Henriot_(chemist)",  row:"back",   cx:13.0, cy:35.5, r:1.5 },
  { id:3,  name:"Paul Ehrenfest",           short:"Ehrenfest",     wiki:"Paul_Ehrenfest",           row:"back",   cx:18.0, cy:34.0, r:1.5 },
  { id:4,  name:"Édouard Herzen",           short:"Herzen",        wiki:"Édouard_Herzen",           row:"back",   cx:23.0, cy:36.5, r:1.5 },
  { id:5,  name:"Théophile de Donder",      short:"de Donder",     wiki:"Théophile_de_Donder",      row:"back",   cx:29.0, cy:35.0, r:1.5 },
  { id:6,  name:"Erwin Schrödinger",        short:"Schrödinger",   wiki:"Erwin_Schrödinger",        row:"back",   cx:35.0, cy:35.0, r:1.5 },
  { id:7,  name:"Jules-Émile Verschaffelt", short:"Verschaffelt",  wiki:"Jules-Émile_Verschaffelt", row:"back",   cx:41.0, cy:33.5, r:1.5 },
  { id:8,  name:"Wolfgang Pauli",           short:"Pauli",         wiki:"Wolfgang_Pauli",           row:"back",   cx:48.0, cy:36.0, r:1.5 },
  { id:9,  name:"Werner Heisenberg",        short:"Heisenberg",    wiki:"Werner_Heisenberg",        row:"back",   cx:54.0, cy:34.0, r:1.5 },
  { id:10, name:"Ralph Fowler",             short:"Fowler",        wiki:"Ralph_Howard_Fowler",      row:"back",   cx:60.5, cy:36.0, r:1.5 },
  { id:11, name:"Léon Brillouin",           short:"Brillouin",     wiki:"Léon_Brillouin",           row:"back",   cx:66.5, cy:34.0, r:1.5 },

  // Middle row — 9 seated (IDs 12–20) — Haar cascade + grid for Debye/Knudsen
  { id:12, name:"Peter Debye",              short:"Debye",         wiki:"Peter_Debye",              row:"middle", cx:5.5,  cy:42.5, r:1.8 },
  { id:13, name:"Martin Knudsen",           short:"Knudsen",       wiki:"Martin_Knudsen",           row:"middle", cx:15.5, cy:42.0, r:1.8 },
  { id:14, name:"William Lawrence Bragg",   short:"Bragg",         wiki:"William_Lawrence_Bragg",   row:"middle", cx:24.2, cy:40.5, r:1.5 },
  { id:15, name:"Hendrik Kramers",          short:"Kramers",       wiki:"Hendrik_Anthony_Kramers",  row:"middle", cx:29.4, cy:43.4, r:1.7 },
  { id:16, name:"Paul Dirac",               short:"Dirac",         wiki:"Paul_Dirac",               row:"middle", cx:37.7, cy:42.9, r:1.7 },
  { id:17, name:"Arthur Compton",           short:"Compton",       wiki:"Arthur_Compton",           row:"middle", cx:46.8, cy:43.7, r:1.7 },
  { id:18, name:"Louis de Broglie",         short:"de Broglie",    wiki:"Louis_de_Broglie",         row:"middle", cx:54.3, cy:41.4, r:1.6 },
  { id:19, name:"Max Born",                 short:"Born",          wiki:"Max_Born",                 row:"middle", cx:62.8, cy:41.7, r:1.7 },
  { id:20, name:"Niels Bohr",               short:"Bohr",          wiki:"Niels_Bohr",               row:"middle", cx:70.7, cy:41.4, r:1.8 },

  // Front row — 9 seated in chairs (IDs 21–29) — exact Haar cascade detections
  { id:21, name:"Irving Langmuir",          short:"Langmuir",      wiki:"Irving_Langmuir",              row:"front", cx:6.1,  cy:49.9, r:1.7 },
  { id:22, name:"Max Planck",               short:"Planck",        wiki:"Max_Planck",                   row:"front", cx:14.9, cy:49.9, r:2.1 },
  { id:23, name:"Marie Curie",              short:"Curie",         wiki:"Marie_Curie",                  row:"front", cx:25.4, cy:50.6, r:1.8 },
  { id:24, name:"Hendrik Lorentz",          short:"Lorentz",       wiki:"Hendrik_Lorentz",              row:"front", cx:36.5, cy:50.5, r:2.1 },
  { id:25, name:"Albert Einstein",          short:"Einstein",      wiki:"Albert_Einstein",              row:"front", cx:48.4, cy:49.6, r:1.7 },
  { id:26, name:"Paul Langevin",            short:"Langevin",      wiki:"Paul_Langevin",                row:"front", cx:57.1, cy:49.9, r:1.7 },
  { id:27, name:"Charles-Eugène Guye",      short:"Guye",          wiki:"Charles-Eugène_Guye",          row:"front", cx:66.3, cy:50.8, r:1.9 },
  { id:28, name:"C.T.R. Wilson",            short:"Wilson",        wiki:"Charles_Thomson_Rees_Wilson",   row:"front", cx:77.3, cy:51.2, r:2.0 },
  { id:29, name:"Owen Richardson",          short:"Richardson",    wiki:"Owen_Willans_Richardson",       row:"front", cx:87.2, cy:51.8, r:1.9 },
];

const peopleById = {};
people.forEach(p => peopleById[p.id] = p);

function personColor(id) {
  return `hsl(${(id - 1) * (360 / 29)}, 65%, 50%)`;
}

// --------------- DOM ---------------
const container   = document.getElementById('container');
const photo       = document.getElementById('photo');
const maskOverlay = document.getElementById('maskOverlay');
const tooltipEl   = document.getElementById('tooltip');
const segmented   = document.getElementById('segmented');
const buttons     = segmented.querySelectorAll('button');

// Hidden canvas for hit detection
const hitCanvas = document.createElement('canvas');
const hitCtx    = hitCanvas.getContext('2d', { willReadFrequently: true });

// --------------- Drawing ---------------
function drawCircle(ctx, p, w, h) {
  const px = (p.cx / 100) * w;
  const py = (p.cy / 100) * h;
  const pr = (p.r / 100) * w;
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI * 2);
}

function buildHitCanvas(w, h) {
  hitCanvas.width = w;
  hitCanvas.height = h;
  hitCtx.fillStyle = '#000';
  hitCtx.fillRect(0, 0, w, h);
  people.forEach(p => {
    drawCircle(hitCtx, p, w, h);
    hitCtx.fillStyle = `rgb(${p.id},0,0)`;
    hitCtx.fill();
  });
}

function buildMaskOverlay(w, h) {
  maskOverlay.width = w;
  maskOverlay.height = h;
  const ctx = maskOverlay.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  people.forEach(p => {
    const hue = (p.id - 1) * (360 / 29);
    const px = (p.cx / 100) * w;
    const py = (p.cy / 100) * h;
    const pr = (p.r / 100) * w;

    // Filled circle
    drawCircle(ctx, p, w, h);
    ctx.fillStyle = `hsla(${hue}, 65%, 50%, 0.5)`;
    ctx.fill();

    // Border
    drawCircle(ctx, p, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = Math.max(1, w * 0.001);
    ctx.stroke();

    // ID number
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 4;

    const numSize = Math.round(pr * 0.9);
    ctx.font = `bold ${numSize}px -apple-system, sans-serif`;
    ctx.fillText(p.id, px, py - numSize * 0.2);

    // Short name below the number
    const nameSize = Math.round(pr * 0.5);
    ctx.font = `600 ${nameSize}px -apple-system, sans-serif`;
    ctx.fillText(p.short, px, py + numSize * 0.6);

    ctx.shadowBlur = 0;
  });
}

// --------------- Hit detection ---------------
function hitTest(e) {
  const rect = container.getBoundingClientRect();
  const rx = (e.clientX - rect.left) / rect.width;
  const ry = (e.clientY - rect.top) / rect.height;
  if (rx < 0 || rx > 1 || ry < 0 || ry > 1) return 0;
  const cx = Math.round(rx * hitCanvas.width);
  const cy = Math.round(ry * hitCanvas.height);
  return hitCtx.getImageData(cx, cy, 1, 1).data[0];
}

// --------------- Events ---------------
container.addEventListener('click', (e) => {
  const id = hitTest(e);
  if (id > 0 && peopleById[id]) {
    window.open(`https://en.wikipedia.org/wiki/${peopleById[id].wiki}`, '_blank');
  }
});

container.addEventListener('mousemove', (e) => {
  const id = hitTest(e);
  if (id > 0 && peopleById[id]) {
    const rect = container.getBoundingClientRect();
    tooltipEl.textContent = `${id}. ${peopleById[id].name}`;
    tooltipEl.style.opacity = '1';
    tooltipEl.style.left = `${e.clientX - rect.left}px`;
    tooltipEl.style.top = `${e.clientY - rect.top - 12}px`;
    container.style.cursor = 'pointer';
  } else {
    tooltipEl.style.opacity = '0';
    container.style.cursor = 'default';
  }
});

container.addEventListener('mouseleave', () => {
  tooltipEl.style.opacity = '0';
  container.style.cursor = 'default';
});

// --------------- Mode switching ---------------
function setMode(mode) {
  container.className = `photo-container mode-${mode}`;
  buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

buttons.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

// --------------- Legend ---------------
function buildLegend() {
  const buckets = { back: [], middle: [], front: [] };
  people.forEach(p => buckets[p.row].push(p));

  for (const [row, list] of Object.entries(buckets)) {
    const el = document.getElementById(`legend-${row}`);
    list.forEach(p => {
      const a = document.createElement('a');
      a.href = `https://en.wikipedia.org/wiki/${p.wiki}`;
      a.target = '_blank';
      a.rel = 'noopener';

      const badge = document.createElement('span');
      badge.className = 'id-badge';
      badge.style.background = personColor(p.id);
      badge.textContent = p.id;

      a.appendChild(badge);
      a.appendChild(document.createTextNode(p.name));
      el.appendChild(a);
    });
  }
}

// --------------- Init ---------------
function init() {
  const w = photo.naturalWidth;
  const h = photo.naturalHeight;
  buildHitCanvas(w, h);
  buildMaskOverlay(w, h);
  buildLegend();
}

if (photo.complete && photo.naturalWidth > 0) {
  init();
} else {
  photo.addEventListener('load', init);
}
</script>
</body>
</html>
