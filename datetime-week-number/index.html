<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week Numbers — Year Calendar</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #181b24;
    --panel-edge: #232734;
    --text: #d7dce6;
    --text-dim: #6b7385;
    --week-col: #8a93ab;
    --accent: #4da3ff;
    --accent-soft: rgba(77, 163, 255, 0.16);
    --today-bg: #4da3ff;
    --today-text: #0f1117;
    --hover-row: rgba(255, 255, 255, 0.07);
    --weekend: #9aa3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px 16px 48px;
  }
  header {
    max-width: 1100px;
    margin: 0 auto 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
  }
  .now-banner {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .now-banner .week-big {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .now-banner .date-line {
    font-size: 1rem;
    color: var(--text-dim);
  }
  nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  nav button {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    color: var(--text);
    font-size: 1rem;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  nav button:hover { border-color: var(--accent); color: var(--accent); }
  nav .year-label {
    font-size: 1.4rem;
    font-weight: 700;
    min-width: 80px;
    text-align: center;
  }
  .months {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }
  .month {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 12px;
    padding: 12px 14px 14px;
  }
  .month h2 {
    margin: 2px 0 10px;
    font-size: 1.05rem;
    font-weight: 700;
    text-align: center;
  }
  .month.current-month h2 { color: var(--accent); }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    text-align: center;
    font-size: 0.85rem;
    padding: 4px 0;
  }
  th {
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-bottom: 6px;
  }
  td.wk {
    color: var(--week-col);
    font-weight: 700;
    font-size: 0.78rem;
    border-right: 1px solid var(--panel-edge);
  }
  th.wk-head { border-right: 1px solid var(--panel-edge); }
  td.day { color: var(--text); }
  td.day.weekend { color: var(--weekend); font-style: normal; opacity: 0.75; }
  td.day.empty { color: transparent; }
  td.day.today {
    background: var(--today-bg);
    color: var(--today-text);
    font-weight: 800;
    border-radius: 6px;
  }
  tr.current-week td { background: var(--accent-soft); }
  tr.current-week td.wk { color: var(--accent); }
  tr.current-week td.day.today { background: var(--today-bg); }
  tr.week-row:hover td { background: var(--hover-row); }
  tr.week-row:hover td.wk { color: var(--accent); }
  tr.current-week:hover td { background: var(--accent-soft); }
  .legend {
    max-width: 1100px;
    margin: 18px auto 0;
    color: var(--text-dim);
    font-size: 0.82rem;
    text-align: center;
  }
  .legend .chip {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 3px;
    vertical-align: -1px;
    margin: 0 4px 0 14px;
  }
  .chip.c-today { background: var(--today-bg); }
  .chip.c-week { background: var(--accent-soft); border: 1px solid var(--accent); }
</style>
</head>
<body>

<header>
  <div class="now-banner">
    <span class="week-big" id="bannerWeek"></span>
    <span class="date-line" id="bannerDate"></span>
  </div>
  <nav>
    <button id="prevYear" title="Previous year">&#x2039;</button>
    <span class="year-label" id="yearLabel"></span>
    <button id="nextYear" title="Next year">&#x203A;</button>
    <button id="todayBtn">Today</button>
  </nav>
</header>

<div class="months" id="months"></div>

<div class="legend">
  ISO 8601 week numbers (weeks start Monday)
  <span class="chip c-today"></span>today
  <span class="chip c-week"></span>current week
</div>

<script>
'use strict';

// ISO 8601 week number: week 1 is the week containing the first Thursday
// of the year. Returns {week, year} since the ISO year can differ from the
// calendar year at the edges (e.g. Jan 1 can be week 52/53 of the prior year).
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7; // Mon=0 .. Sun=6
  d.setUTCDate(d.getUTCDate() - dayNum + 3); // nearest Thursday
  const isoYear = d.getUTCFullYear();
  const jan4 = new Date(Date.UTC(isoYear, 0, 4));
  const jan4DayNum = (jan4.getUTCDay() + 6) % 7;
  const week1Monday = new Date(jan4);
  week1Monday.setUTCDate(jan4.getUTCDate() - jan4DayNum);
  const week = Math.floor((d - week1Monday) / (7 * 24 * 3600 * 1000)) + 1;
  return { week, year: isoYear };
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate();
}

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DAY_HEADS = ['Mo','Tu','We','Th','Fr','Sa','Su'];

const today = new Date();
const todayIso = isoWeek(today);
let shownYear = today.getFullYear();

function buildMonth(year, month) {
  const div = document.createElement('div');
  div.className = 'month';
  if (year === today.getFullYear() && month === today.getMonth()) {
    div.classList.add('current-month');
  }

  const h2 = document.createElement('h2');
  h2.textContent = MONTH_NAMES[month];
  div.appendChild(h2);

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const wkHead = document.createElement('th');
  wkHead.className = 'wk-head';
  wkHead.textContent = 'Wk';
  headRow.appendChild(wkHead);
  for (const name of DAY_HEADS) {
    const th = document.createElement('th');
    th.textContent = name;
    headRow.appendChild(th);
  }
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  const firstOfMonth = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const lastOfMonth = new Date(year, month, daysInMonth);
  // Monday of the week containing the 1st.
  const startOffset = (firstOfMonth.getDay() + 6) % 7;
  let cursor = new Date(year, month, 1 - startOffset);

  while (cursor <= lastOfMonth) {
    const tr = document.createElement('tr');
    tr.className = 'week-row';
    const iso = isoWeek(cursor);
    const wkTd = document.createElement('td');
    wkTd.className = 'wk';
    wkTd.textContent = iso.week;
    tr.appendChild(wkTd);

    if (iso.week === todayIso.week && iso.year === todayIso.year) {
      tr.classList.add('current-week');
    }

    for (let i = 0; i < 7; i++) {
      const td = document.createElement('td');
      td.className = 'day';
      if (cursor.getMonth() === month) {
        td.textContent = cursor.getDate();
        const dow = cursor.getDay();
        if (dow === 0 || dow === 6) td.classList.add('weekend');
        if (sameDay(cursor, today)) td.classList.add('today');
      } else {
        td.classList.add('empty');
        td.textContent = '·';
      }
      tr.appendChild(td);
      cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() + 1);
    }
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  div.appendChild(table);
  return div;
}

function render() {
  document.getElementById('yearLabel').textContent = shownYear;
  const container = document.getElementById('months');
  container.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    container.appendChild(buildMonth(shownYear, m));
  }
}

document.getElementById('bannerWeek').textContent = 'Week ' + todayIso.week;
document.getElementById('bannerDate').textContent =
  today.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

document.getElementById('prevYear').addEventListener('click', () => { shownYear--; render(); });
document.getElementById('nextYear').addEventListener('click', () => { shownYear++; render(); });
document.getElementById('todayBtn').addEventListener('click', () => {
  shownYear = today.getFullYear();
  render();
  const cur = document.querySelector('.current-month');
  if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
});

render();
</script>
</body>
</html>
