<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Say - Amiga Speech</title>
<style>
  @font-face {
    font-family: 'Topaz';
    src: url('https://fonts.cdnfonts.com/css/amiga-topaz-13') format('woff2');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0055aa;
    font-family: 'Topaz', 'Courier New', monospace;
    font-size: 16px;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    image-rendering: pixelated;
  }

  /* Workbench 1.3 window */
  .wb-window {
    background: #0055aa;
    border: 2px solid #fff;
    width: 640px;
    max-width: 100%;
    position: relative;
  }

  .wb-titlebar {
    background: #fff;
    color: #0055aa;
    display: flex;
    align-items: center;
    height: 22px;
    padding: 0;
    user-select: none;
    cursor: default;
  }

  .wb-titlebar-gadget {
    width: 22px;
    height: 22px;
    border-right: 2px solid #0055aa;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }

  .wb-titlebar-gadget:hover {
    background: #ff8800;
    color: #fff;
  }

  .wb-titlebar-gadget-right {
    border-right: none;
    border-left: 2px solid #0055aa;
    margin-left: auto;
  }

  .wb-title-text {
    flex: 1;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 0 8px;
    white-space: nowrap;
    overflow: hidden;
  }

  .wb-content {
    padding: 12px;
  }

  /* Section labels */
  .wb-label {
    color: #ff8800;
    font-size: 14px;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  /* Example text list */
  .example-list {
    list-style: none;
    margin-bottom: 16px;
  }

  .example-list li {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
  }

  .example-item {
    background: #003377;
    border: 1px solid #4488cc;
    color: #fff;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    flex: 1;
    text-align: left;
    transition: none;
    letter-spacing: 0.5px;
  }

  .example-item:hover {
    background: #ff8800;
    color: #000;
    border-color: #ffaa33;
  }

  .example-item:active,
  .example-item.speaking {
    background: #ff8800;
    color: #fff;
    border-color: #ffcc66;
  }

  /* Textarea */
  .wb-textarea {
    width: 100%;
    height: 80px;
    background: #003377;
    border: 2px inset #4488cc;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    padding: 6px 8px;
    resize: vertical;
    outline: none;
    letter-spacing: 0.5px;
  }

  .wb-textarea::placeholder {
    color: #4488cc;
  }

  .wb-textarea:focus {
    border-color: #ff8800;
  }

  /* Buttons row */
  .button-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .wb-button {
    background: #fff;
    color: #0055aa;
    border: 2px outset #ccc;
    font-family: inherit;
    font-size: 14px;
    padding: 4px 16px;
    cursor: pointer;
    letter-spacing: 1px;
    font-weight: bold;
    min-width: 80px;
    text-align: center;
  }

  .wb-button:hover {
    background: #ff8800;
    color: #fff;
    border-color: #ffaa33;
  }

  .wb-button:active {
    border-style: inset;
  }

  .wb-button:disabled {
    background: #888;
    color: #444;
    border-color: #666;
    cursor: not-allowed;
  }

  /* Voice selector */
  .wb-select {
    background: #003377;
    border: 2px inset #4488cc;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    padding: 3px 6px;
    outline: none;
    cursor: pointer;
    width: 100%;
    margin-bottom: 8px;
  }

  .wb-select:focus {
    border-color: #ff8800;
  }

  .wb-select option {
    background: #003377;
    color: #fff;
  }

  /* Sliders */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .slider-label {
    color: #4488cc;
    font-size: 13px;
    min-width: 60px;
  }

  .slider-value {
    color: #ff8800;
    font-size: 13px;
    min-width: 32px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    accent-color: #ff8800;
    height: 16px;
    cursor: pointer;
  }

  /* Status bar */
  .wb-statusbar {
    background: #003377;
    border-top: 2px solid #fff;
    padding: 4px 8px;
    font-size: 13px;
    color: #4488cc;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 24px;
  }

  .status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #004400;
    border: 1px solid #4488cc;
    flex-shrink: 0;
  }

  .status-indicator.active {
    background: #00ff00;
    border-color: #00ff00;
    box-shadow: 0 0 4px #00ff00;
  }

  /* Separator */
  .wb-separator {
    border: none;
    border-top: 1px solid #4488cc;
    margin: 12px 0;
  }

  /* Scrollbar styling for Amiga feel */
  .wb-textarea::-webkit-scrollbar {
    width: 16px;
  }
  .wb-textarea::-webkit-scrollbar-track {
    background: #003377;
  }
  .wb-textarea::-webkit-scrollbar-thumb {
    background: #4488cc;
    border: 2px solid #003377;
  }
</style>
</head>
<body>

<div class="wb-window">
  <div class="wb-titlebar">
    <div class="wb-titlebar-gadget">&#9644;</div>
    <span class="wb-title-text">Say v1.0 - Amiga Speech Synthesizer</span>
    <div class="wb-titlebar-gadget wb-titlebar-gadget-right">&#9645;</div>
  </div>

  <div class="wb-content">

    <div class="wb-label">VOICE PRESET</div>
    <select id="voicePreset" class="wb-select">
      <option value="oldlady">Little Old Lady</option>
      <option value="narrator">Narrator (Amiga default)</option>
      <option value="sam">SAM (C64 original)</option>
      <option value="elf">Elf</option>
      <option value="littlerobot">Little Robot</option>
      <option value="stuffyguy">Stuffy Guy</option>
      <option value="et">Extra-Terrestrial</option>
      <option value="custom">Custom...</option>
    </select>

    <div id="customSliders" style="display:none;">
      <div class="slider-row">
        <span class="slider-label">Speed</span>
        <input type="range" id="speedSlider" min="20" max="180" step="1" value="82">
        <span class="slider-value" id="speedValue">82</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Pitch</span>
        <input type="range" id="pitchSlider" min="0" max="255" step="1" value="32">
        <span class="slider-value" id="pitchValue">32</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Mouth</span>
        <input type="range" id="mouthSlider" min="0" max="255" step="1" value="145">
        <span class="slider-value" id="mouthValue">145</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">Throat</span>
        <input type="range" id="throatSlider" min="0" max="255" step="1" value="145">
        <span class="slider-value" id="throatValue">145</span>
      </div>
    </div>

    <hr class="wb-separator">

    <div class="wb-label">EXAMPLE PHRASES</div>
    <ul class="example-list" id="exampleList">
      <li><button class="example-item" data-text="Hello, I am Amiga. Welcome to Workbench.">Hello, I am Amiga. Welcome to Workbench.</button></li>
      <li><button class="example-item" data-text="Insert disk in any drive.">Insert disk in any drive.</button></li>
      <li><button class="example-item" data-text="Guru Meditation error. Software failure.">Guru Meditation error. Software failure.</button></li>
      <li><button class="example-item" data-text="The Amiga computer is the most advanced personal computer ever made.">The Amiga is the most advanced personal computer ever made.</button></li>
      <li><button class="example-item" data-text="A five hundred, a thousand, a twelve hundred, a two thousand, a three thousand, a four thousand.">A500, A1000, A1200, A2000, A3000, A4000.</button></li>
      <li><button class="example-item" data-text="I can speak! I am alive! I am Amiga!">I can speak! I am alive! I am Amiga!</button></li>
      <li><button class="example-item" data-text="To be or not to be, that is the question.">To be or not to be, that is the question.</button></li>
      <li><button class="example-item" data-text="All your base are belong to us.">All your base are belong to us.</button></li>
      <li><button class="example-item" data-text="While Atari owners wait for their single-tasking toy to reboot, I am playing a mod, rendering a ray-trace, and downloading from a BBS. All at the same time. Sorry, Atari.">While Atari reboots, I multitask a mod, a ray-trace, and a BBS. Sorry, Atari.</button></li>
      <li><button class="example-item" data-text="Amstrad? You mean that thing with a built-in tape deck? How cute. I have dedicated graphics, sound, and blitter chips. Amstrad has a cassette player. We are not the same.">Amstrad? Cute tape deck. I have custom chips. We are not the same.</button></li>
    </ul>

    <hr class="wb-separator">

    <div class="wb-label">CUSTOM TEXT</div>
    <textarea id="customText" class="wb-textarea" placeholder="Type your text here...">Hello, I am Amiga. Welcome to Workbench.</textarea>
    <div class="button-row">
      <button class="wb-button" id="speakBtn" onclick="speakCustom()">SAY</button>
      <button class="wb-button" id="stopBtn" onclick="stopSpeech()" disabled>STOP</button>
      <button class="wb-button" id="saveBtn" onclick="saveAudio()">SAVE</button>
      <button class="wb-button" onclick="document.getElementById('customText').value=''">CLEAR</button>
    </div>
  </div>

  <div class="wb-statusbar">
    <div class="status-indicator" id="statusLed"></div>
    <span id="statusText">Ready.</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sam-js/dist/samjs.min.js"></script>
<script>
const voicePreset = document.getElementById('voicePreset');
const customSliders = document.getElementById('customSliders');
const speedSlider = document.getElementById('speedSlider');
const pitchSlider = document.getElementById('pitchSlider');
const mouthSlider = document.getElementById('mouthSlider');
const throatSlider = document.getElementById('throatSlider');
const speedValue = document.getElementById('speedValue');
const pitchValue = document.getElementById('pitchValue');
const mouthValue = document.getElementById('mouthValue');
const throatValue = document.getElementById('throatValue');
const statusLed = document.getElementById('statusLed');
const statusText = document.getElementById('statusText');
const speakBtn = document.getElementById('speakBtn');
const stopBtn = document.getElementById('stopBtn');
const customText = document.getElementById('customText');

let currentSource = null;
let audioCtx = null;

// Classic SAM voice presets
const PRESETS = {
  narrator:    { speed: 72,  pitch: 64,  mouth: 128, throat: 128 },
  sam:         { speed: 72,  pitch: 64,  mouth: 128, throat: 128 },
  elf:         { speed: 72,  pitch: 64,  mouth: 110, throat: 160 },
  littlerobot: { speed: 92,  pitch: 60,  mouth: 190, throat: 190 },
  stuffyguy:   { speed: 82,  pitch: 72,  mouth: 110, throat: 105 },
  oldlady:     { speed: 82,  pitch: 32,  mouth: 145, throat: 145 },
  et:          { speed: 100, pitch: 64,  mouth: 150, throat: 200 },
};

voicePreset.addEventListener('change', () => {
  const val = voicePreset.value;
  if (val === 'custom') {
    customSliders.style.display = 'block';
  } else {
    customSliders.style.display = 'none';
    const p = PRESETS[val];
    speedSlider.value = p.speed; speedValue.textContent = p.speed;
    pitchSlider.value = p.pitch; pitchValue.textContent = p.pitch;
    mouthSlider.value = p.mouth; mouthValue.textContent = p.mouth;
    throatSlider.value = p.throat; throatValue.textContent = p.throat;
  }
});

speedSlider.addEventListener('input', () => { speedValue.textContent = speedSlider.value; });
pitchSlider.addEventListener('input', () => { pitchValue.textContent = pitchSlider.value; });
mouthSlider.addEventListener('input', () => { mouthValue.textContent = mouthSlider.value; });
throatSlider.addEventListener('input', () => { throatValue.textContent = throatSlider.value; });

function getSamOptions() {
  return {
    speed: parseInt(speedSlider.value),
    pitch: parseInt(pitchSlider.value),
    mouth: parseInt(mouthSlider.value),
    throat: parseInt(throatSlider.value),
  };
}

function generateSamBuffer(text) {
  if (typeof SamJs === 'undefined') {
    statusText.textContent = 'Error: SAM.js not loaded. Check your connection.';
    return null;
  }
  const sam = new SamJs(getSamOptions());
  const cleaned = text.replace(/[\r\n]+/g, ' ').replace(/\s+/g, ' ').trim();
  const buf = sam.buf32(cleaned);
  if (!buf || buf.length === 0) {
    statusText.textContent = 'Error: SAM could not synthesize that text.';
    return null;
  }
  return buf;
}

// Low-pass filter to smooth SAM's harsh digital output
function applyLowPass(samples, sampleRate, cutoff) {
  const rc = 1.0 / (cutoff * 2 * Math.PI);
  const dt = 1.0 / sampleRate;
  const alpha = dt / (rc + dt);
  const out = new Float32Array(samples.length);
  out[0] = samples[0];
  for (let i = 1; i < samples.length; i++) {
    out[i] = out[i - 1] + alpha * (samples[i] - out[i - 1]);
  }
  return out;
}

function speak(text) {
  if (!text.trim()) return;
  stopSpeech();

  const raw = generateSamBuffer(text);
  if (!raw) return;

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const sampleRate = 22050;
  // Smooth the audio with a low-pass filter at 4kHz
  const buf = applyLowPass(raw, sampleRate, 4000);

  const audioBuffer = audioCtx.createBuffer(1, buf.length, sampleRate);
  audioBuffer.getChannelData(0).set(buf);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);

  statusLed.classList.add('active');
  statusText.textContent = 'Speaking: "' + text.substring(0, 50) + (text.length > 50 ? '...' : '') + '"';
  speakBtn.disabled = true;
  stopBtn.disabled = false;

  source.onended = () => {
    statusLed.classList.remove('active');
    statusText.textContent = 'Ready.';
    speakBtn.disabled = false;
    stopBtn.disabled = true;
    currentSource = null;
    document.querySelectorAll('.example-item').forEach(b => b.classList.remove('speaking'));
  };

  currentSource = source;
  source.start();
}

function speakCustom() {
  speak(customText.value);
}

function stopSpeech() {
  if (currentSource) {
    try { currentSource.stop(); } catch (e) {}
    currentSource = null;
  }
  statusLed.classList.remove('active');
  statusText.textContent = 'Stopped.';
  speakBtn.disabled = false;
  stopBtn.disabled = true;
  document.querySelectorAll('.example-item').forEach(b => b.classList.remove('speaking'));
}

// Example buttons
document.querySelectorAll('.example-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const text = btn.getAttribute('data-text');
    customText.value = text;
    document.querySelectorAll('.example-item').forEach(b => b.classList.remove('speaking'));
    btn.classList.add('speaking');
    speak(text);
  });
});

// WAV encoder
function encodeWAV(samples, sampleRate) {
  const numSamples = samples.length;
  const buffer = new ArrayBuffer(44 + numSamples * 2);
  const view = new DataView(buffer);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + numSamples * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, numSamples * 2, true);

  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

function saveAudio() {
  const text = customText.value.trim();
  if (!text) {
    statusText.textContent = 'Error: No text to save.';
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  statusLed.classList.add('active');
  statusText.textContent = 'Generating WAV...';

  const raw = generateSamBuffer(text);
  if (!raw) {
    saveBtn.disabled = false;
    statusLed.classList.remove('active');
    return;
  }

  // Apply same low-pass filter as playback
  const buf = applyLowPass(raw, 22050, 4000);
  const wavBlob = encodeWAV(buf, 22050);
  const url = URL.createObjectURL(wavBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'amiga-speech.wav';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  statusText.textContent = 'Saved: amiga-speech.wav';
  saveBtn.disabled = false;
  statusLed.classList.remove('active');
}

// Allow Ctrl+Enter / Cmd+Enter to speak from textarea
customText.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    speakCustom();
  }
});
</script>

</body>
</html>
