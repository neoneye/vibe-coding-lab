<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Periodic Table of Computer Science Algorithms</title>
<style>
body {
  background: #0f1115;
  color: #e8eaf0;
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 16px 20px 60px;
}
header h1 {
  margin: 4px 0 2px;
  font-size: 26px;
  letter-spacing: 0.5px;
}
header .subtitle {
  margin: 0 0 14px;
  font-size: 13px;
  opacity: 0.6;
}
.regions {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: flex-start;
}
.region {
  border: 1px solid hsl(var(--hue) 40% 35% / 0.6);
  border-radius: 10px;
  padding: 10px 12px 12px;
  background: hsl(var(--hue) 30% 12% / 0.35);
}
.region h2 {
  margin: 0 0 8px;
  font-size: 14px;
  font-weight: 600;
  color: hsl(var(--hue) 60% 70%);
}
.region h2 .blurb {
  font-size: 11px;
  font-weight: 400;
  opacity: 0.55;
  color: #e8eaf0;
  margin-left: 6px;
}
.region.gray { border-color: hsl(0 0% 45% / 0.6); background: hsl(0 0% 14% / 0.4); }
.region.gray h2 { color: hsl(0 0% 72%); }
.tiles {
  display: grid;
  grid-template-columns: repeat(auto-fill, 72px);
  gap: 6px;
}
.tile {
  width: 72px;
  height: 78px;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  background: hsl(var(--hue) 45% 16%);
  border: 1px solid hsl(var(--hue) 55% 42%);
  color: inherit;
  font-family: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2px 3px 3px;
  transition: transform 0.08s ease, opacity 0.15s ease;
}
.tile .num { position: absolute; top: 2px; left: 5px; font-size: 9px; opacity: 0.6; }
.tile .sym { font-size: 22px; font-weight: 700; margin-top: 12px; color: hsl(var(--hue) 70% 70%); }
.tile .name { font-size: 8.5px; text-align: center; line-height: 1.1; overflow: hidden; max-height: 19px; }
.tile .cx { font-size: 8px; opacity: 0.65; margin-top: auto; }
.tile:hover { transform: translateY(-2px); border-color: hsl(var(--hue) 80% 65%); z-index: 2; }
.tile.gray { background: hsl(0 0% 18%); border-color: hsl(0 0% 45%); }
.tile.gray .sym { color: hsl(0 0% 75%); }
.tile.gray:hover { border-color: hsl(0 0% 70%); }
.tile.dim { opacity: 0.18; }
.tile.hit { box-shadow: 0 0 0 2px hsl(var(--hue) 90% 65%); }
.tile.gray.hit { box-shadow: 0 0 0 2px hsl(0 0% 80%); }
#controls { margin: 0 0 16px; display: flex; flex-direction: column; gap: 8px; }
#search {
  background: #1a1f28;
  border: 1px solid #343c4a;
  color: #e8eaf0;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 14px;
  width: min(420px, 100%);
  box-sizing: border-box;
}
#search:focus { outline: none; border-color: #5a7bb0; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.chip-row .row-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.5; margin-right: 4px; }
.fchip {
  background: #1c212b;
  border: 1px solid #39404e;
  color: #cdd3de;
  border-radius: 12px;
  padding: 3px 11px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.fchip:hover { background: #262d39; }
.fchip.active { background: #31415e; border-color: #6f93cf; color: #fff; }
.fchip.cat { background: hsl(var(--hue) 45% 16%); border-color: hsl(var(--hue) 50% 40%); color: hsl(var(--hue) 65% 75%); }
.fchip.cat:hover { background: hsl(var(--hue) 48% 22%); }
.fchip.cat.active { background: hsl(var(--hue) 55% 30%); border-color: hsl(var(--hue) 80% 65%); color: #fff; }
.fchip.cat.gray { background: hsl(0 0% 18%); border-color: hsl(0 0% 42%); color: hsl(0 0% 75%); }
.fchip.cat.gray.active { background: hsl(0 0% 34%); border-color: hsl(0 0% 70%); color: #fff; }
#tooltip {
  position: fixed;
  z-index: 10;
  pointer-events: none;
  background: #1c2028;
  border: 1px solid #3a4150;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  box-shadow: 0 4px 14px rgb(0 0 0 / 0.5);
  display: none;
  max-width: 240px;
}
#tooltip .t-name { font-weight: 600; }
#tooltip .t-cx { opacity: 0.7; font-size: 11px; }
#card {
  background: #161a21;
  color: #e8eaf0;
  border: 1px solid hsl(var(--hue) 50% 45%);
  border-radius: 12px;
  padding: 0;
  width: min(620px, 92vw);
  max-height: 86vh;
}
#card::backdrop { background: rgb(0 0 0 / 0.6); }
.card-inner { padding: 18px 22px 20px; overflow-y: auto; max-height: 86vh; box-sizing: border-box; }
.card-head { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.card-symbox {
  width: 64px; height: 64px; flex: none;
  border-radius: 8px;
  background: hsl(var(--hue) 45% 18%);
  border: 1px solid hsl(var(--hue) 55% 45%);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700;
  color: hsl(var(--hue) 70% 70%);
  position: relative;
}
.card-symbox .num { position: absolute; top: 3px; left: 6px; font-size: 10px; opacity: 0.6; font-weight: 400; }
.card-title h3 { margin: 0; font-size: 21px; }
.card-cat {
  display: inline-block; margin-top: 4px;
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: hsl(var(--hue) 45% 22%);
  color: hsl(var(--hue) 65% 75%);
}
.card-nav { margin-left: auto; display: flex; gap: 6px; }
.card-nav button, .card-close {
  background: #232936; border: 1px solid #3a4150; color: #e8eaf0;
  border-radius: 6px; cursor: pointer; font-size: 14px; padding: 4px 10px;
}
.card-nav button:hover, .card-close:hover { background: #2e3645; }
.props {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 8px;
  margin: 12px 0;
}
.prop { background: #1c212b; border-radius: 6px; padding: 6px 9px; }
.prop .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.55; }
.prop .v { font-size: 13px; margin-top: 2px; }
.card-desc { font-size: 13.5px; line-height: 1.55; margin: 10px 0; }
.card-section h4 { margin: 14px 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; opacity: 0.6; }
.card-uses { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.5; }
.related-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  background: hsl(var(--chip-hue) 45% 20%);
  border: 1px solid hsl(var(--chip-hue) 55% 45%);
  color: hsl(var(--chip-hue) 70% 75%);
  border-radius: 12px; padding: 3px 10px; font-size: 12px; cursor: pointer;
}
.chip:hover { background: hsl(var(--chip-hue) 50% 27%); }
.chip.gray { background: hsl(0 0% 20%); border-color: hsl(0 0% 45%); color: hsl(0 0% 78%); }
#card pre {
  background: #0d1015; border: 1px solid #2a303c; border-radius: 8px;
  padding: 10px 12px; font-size: 12px; line-height: 1.45; overflow-x: auto;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
</style>
</head>
<body>
<header>
  <h1>Periodic Table of Computer Science Algorithms</h1>
  <p class="subtitle">Building blocks of computation — click an element for details. Inspired by the periodic table of chemical elements.</p>
</header>
<div id="controls">
  <input id="search" type="search" placeholder="Search algorithms… (name, symbol, category, complexity)">
  <div class="chip-row" id="class-chips"><span class="row-label">Complexity</span></div>
  <div class="chip-row" id="cat-chips"><span class="row-label">Category</span></div>
</div>
<main id="app"></main>

<div id="tooltip"><span class="t-name"></span><br><span class="t-cx"></span></div>

<dialog id="card">
  <div class="card-inner">
    <div class="card-head">
      <div class="card-symbox"><span class="num"></span><span class="card-sym"></span></div>
      <div class="card-title">
        <h3></h3>
        <span class="card-cat"></span>
      </div>
      <div class="card-nav">
        <button id="card-prev" title="Previous element">◀</button>
        <button id="card-next" title="Next element">▶</button>
        <button class="card-close" id="card-close" title="Close">✕</button>
      </div>
    </div>
    <div class="props">
      <div class="prop"><div class="k">Year</div><div class="v" data-f="year"></div></div>
      <div class="prop"><div class="k">Inventor</div><div class="v" data-f="inventor"></div></div>
      <div class="prop"><div class="k">Best time</div><div class="v" data-f="best"></div></div>
      <div class="prop"><div class="k">Average time</div><div class="v" data-f="average"></div></div>
      <div class="prop"><div class="k">Worst time</div><div class="v" data-f="worst"></div></div>
      <div class="prop"><div class="k">Space</div><div class="v" data-f="space"></div></div>
    </div>
    <p class="card-desc"></p>
    <div class="card-section"><h4>Typical uses</h4><ul class="card-uses"></ul></div>
    <div class="card-section" id="card-pseudo-section"><h4>Pseudocode</h4><pre id="card-pseudo"></pre></div>
    <div class="card-section"><h4>Related</h4><div class="related-chips"></div></div>
  </div>
</dialog>

<script id="shared-code">
"use strict";

const CLASSES = ["O(1)", "O(log n)", "O(n)", "O(n log n)", "O(n²)", "O(2ⁿ)", "varies"];

const CATEGORIES = {
  sorting:     { name: "Sorting",               hue: 4,   blurb: "Arranging items into order." },
  searching:   { name: "Searching",             hue: 28,  blurb: "Locating items in collections." },
  graphs:      { name: "Graphs",                hue: 48,  blurb: "Traversal, paths, connectivity, flow." },
  strings:     { name: "Strings",               hue: 88,  blurb: "Pattern matching and text processing." },
  dp:          { name: "Dynamic Programming",   hue: 140, blurb: "Optimal substructure + overlapping subproblems." },
  structures:  { name: "Data Structures",       hue: 175, blurb: "Ways to organize data for fast operations." },
  paradigms:   { name: "Paradigms",             hue: 205, blurb: "General strategies for designing algorithms." },
  math:        { name: "Math & Numeric",        hue: 235, blurb: "Number theory and numerical methods." },
  compression: { name: "Compression",           hue: 270, blurb: "Encoding data in fewer bits." },
  crypto:      { name: "Crypto & Hashing",      hue: 300, blurb: "Secrecy, integrity, and fingerprints." },
  ml:          { name: "ML & Optimization",     hue: 330, blurb: "Learning from data, searching solution spaces." },
  systems:     { name: "Concurrency & Systems", hue: 0, gray: true, blurb: "Coordinating work across threads and machines." },
};

const ELEMENTS = [
  {
    symbol: "Bu", name: "Bubble Sort", category: "sorting",
    year: "1956", inventor: "folklore",
    time: { best: "O(n)", average: "O(n²)", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "O(n²)",
    description: "Repeatedly steps through the list, comparing adjacent pairs and swapping them when out of order, so the largest remaining value bubbles to the end of each pass. Simple to teach, painful in practice.",
    uses: ["Teaching the concept of sorting", "Detecting nearly-sorted data with the early-exit variant"],
    related: ["In", "Se"],
    pseudocode: "bubbleSort(A):\n  repeat\n    swapped = false\n    for i = 1 .. len(A)-1:\n      if A[i-1] > A[i]:\n        swap A[i-1], A[i]\n        swapped = true\n  until not swapped",
  },
  {
    symbol: "In", name: "Insertion Sort", category: "sorting",
    year: "1946", inventor: "John Mauchly",
    time: { best: "O(n)", average: "O(n²)", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "O(n²)",
    description: "Builds the sorted array one item at a time by taking the next element and inserting it into its correct position among the already-sorted prefix, like sorting a hand of playing cards.",
    uses: ["Small arrays (often the base case inside quicksort and Timsort)", "Nearly-sorted data, where it runs in near-linear time"],
    related: ["Bu", "Se"],
    pseudocode: "insertionSort(A):\n  for i = 1 .. len(A)-1:\n    key = A[i]; j = i-1\n    while j >= 0 and A[j] > key:\n      A[j+1] = A[j]; j -= 1\n    A[j+1] = key",
  },
  {
    symbol: "Se", name: "Selection Sort", category: "sorting",
    year: "1956", inventor: "folklore",
    time: { best: "O(n²)", average: "O(n²)", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "O(n²)",
    description: "Repeatedly scans the unsorted suffix for its minimum element and swaps it into place. Always quadratic, but performs the minimum possible number of swaps, which matters when writes are expensive.",
    uses: ["Situations where swaps are costly (e.g. flash memory)", "Teaching invariants: sorted prefix grows one element per pass"],
    related: ["Bu", "In"],
    pseudocode: "selectionSort(A):\n  for i = 0 .. len(A)-2:\n    m = index of min(A[i..])\n    swap A[i], A[m]",
  },
  {
    symbol: "Sl", name: "Shell Sort", category: "sorting",
    year: "1959", inventor: "Donald Shell",
    time: { best: "O(n log n)", average: "depends on gaps", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "varies",
    description: "Generalizes insertion sort by first sorting elements that are a large gap apart, then shrinking the gap toward 1. Far-apart elements move long distances cheaply; the final pass is a fast insertion sort. Its exact complexity depends on the gap sequence and is still an open problem.",
    uses: ["Embedded systems wanting in-place sorting with small code size", "Medium-sized arrays without recursion"],
    related: ["In"],
    pseudocode: "shellSort(A):\n  for gap in [.., 121, 40, 13, 4, 1]:\n    for i = gap .. len(A)-1:\n      key = A[i]; j = i\n      while j >= gap and A[j-gap] > key:\n        A[j] = A[j-gap]; j -= gap\n      A[j] = key",
  },
  {
    symbol: "Me", name: "Merge Sort", category: "sorting",
    year: "1945", inventor: "John von Neumann",
    time: { best: "O(n log n)", average: "O(n log n)", worst: "O(n log n)" }, space: "O(n)",
    complexityClass: "O(n log n)",
    description: "Recursively splits the array in half, sorts each half, and merges the two sorted halves with a linear scan. Guaranteed n log n, stable, and the classic example of divide and conquer; the merge step also works on disk and tape.",
    uses: ["Stable sorting in standard libraries", "External sorting of data too large for memory", "Counting inversions"],
    related: ["Qs", "Tm", "Dc"],
    pseudocode: "mergeSort(A):\n  if len(A) <= 1: return A\n  L = mergeSort(left half)\n  R = mergeSort(right half)\n  return merge(L, R)   // interleave smallest-first",
  },
  {
    symbol: "Qs", name: "Quicksort", category: "sorting",
    year: "1959", inventor: "Tony Hoare",
    time: { best: "O(n log n)", average: "O(n log n)", worst: "O(n²)" }, space: "O(log n)",
    complexityClass: "O(n log n)",
    description: "Picks a pivot, partitions the array into elements below and above it, then recurses on both sides. In-place and cache-friendly, it is usually the fastest comparison sort in practice despite its quadratic worst case, which randomized pivots make vanishingly unlikely.",
    uses: ["General-purpose in-memory sorting", "Basis of quickselect for order statistics"],
    related: ["Me", "Qk", "Dc", "Rn"],
    pseudocode: "quicksort(A, lo, hi):\n  if lo >= hi: return\n  p = partition(A, lo, hi)  // pivot to final spot\n  quicksort(A, lo, p-1)\n  quicksort(A, p+1, hi)",

  {

    related: ["Qs", "Me", "He"],

    related: ["Ra", "Bk"],

  {
    symbol: "Ra", name: "Radix Sort", category: "sorting",

    complexityClass: "O(n)",
    description: "Sorts integers digit by digit, least significant first, using a stable sort (usually counting sort) for each of the d digit positions. Linear time for fixed-width keys; originally mechanized for punched-card tabulating machines.",
    uses: ["Sorting large sets of fixed-width integers or strings", "Suffix array construction"],
    related: ["Co", "Bk"],
    pseudocode: "radixSort(A, d):\n  for pos = least .. most significant digit:\n    A = countingSortByDigit(A, pos)   // stable",
  },
  {
    symbol: "Bk", name: "Bucket Sort", category: "sorting",
    year: "1956", inventor: "folklore",
    time: { best: "O(n+k)", average: "O(n+k)", worst: "O(n²)" }, space: "O(n+k)",
    complexityClass: "O(n)",
    description: "Scatters elements into k buckets by value range, sorts each small bucket (often with insertion sort), and concatenates. Expected linear time when input is roughly uniformly distributed across the range.",
    uses: ["Sorting uniformly distributed floats in [0,1)", "Histogram-style preprocessing"],
    related: ["Co", "Ra"],
    pseudocode: "bucketSort(A, k):\n  make k empty buckets\n  for x in A: bucket[floor(k*x/max)] .push(x)\n  sort each bucket; concatenate",
  },
  {
    symbol: "Tm", name: "Timsort", category: "sorting",
    year: "2002", inventor: "Tim Peters",
    time: { best: "O(n)", average: "O(n log n)", worst: "O(n log n)" }, space: "O(n)",
    complexityClass: "O(n log n)",

    uses: ["Standard library sorting (Python, Java, V8)", "Real-world data that is partially ordered"],
    related: ["Me", "In"],
    pseudocode: "timsort(A):\n  find runs (already sorted stretches)\n  extend runs < minrun via insertion sort\n  merge runs, keeping stack invariants",
  },
  {
    symbol: "Ls", name: "Linear Search", category: "searching",
    year: "ancient", inventor: "folklore",
    time: { best: "O(1)", average: "O(n)", worst: "O(n)" }, space: "O(1)",
    complexityClass: "O(n)",
    description: "Walks the collection from front to back until the target is found or the end is reached. Needs no preprocessing or ordering, and for tiny arrays it beats anything fancier.",
    uses: ["Unsorted or tiny collections", "Linked structures without random access"],
    related: ["Bs", "Ar", "Ll"],
    pseudocode: "linearSearch(A, x):\n  for i = 0 .. len(A)-1:\n    if A[i] == x: return i\n  return -1",

    related: ["Ls", "Te", "Ex", "Bt"],

  {
    symbol: "Te", name: "Ternary Search", category: "searching",

    description: "Splits the range at two interior points instead of one, discarding a third of it per step. Its real niche is finding the extremum of a unimodal function, where plain binary search does not directly apply.",

    related: ["Bs"],
    pseudocode: "ternarySearch(f, lo, hi):  // max of unimodal f\n  while hi - lo > eps:\n    m1 = lo + (hi-lo)/3; m2 = hi - (hi-lo)/3\n    if f(m1) < f(m2): lo = m1 else hi = m2\n  return lo",
  },
  {

    year: "1957", inventor: "W. W. Peterson",

  },
  {
    symbol: "Jp", name: "Jump Search", category: "searching",

    uses: ["CPU/OS page replacement approximations", "Database buffer pools, memcached/Redis eviction", "HTTP and CDN caches"],
    related: ["Ht", "Ll", "Mz"],
    pseudocode: "get(k):\n  if k in map: move node to front; return value\nput(k, v):\n  insert/update at front\n  if over capacity: drop list tail",
  },
  {
    symbol: "Ch", name: "Consistent Hashing", category: "systems",
    year: "1997", inventor: "David Karger et al.",
    time: { best: "O(1)", average: "O(log n)", worst: "O(log n)" }, space: "O(n)",
    complexityClass: "O(log n)",
    description: "Places servers and keys on a hash ring; each key belongs to the next server clockwise. Adding or removing a server moves only 1/n of the keys instead of nearly all of them, as naive hash-mod-n would.",
    uses: ["Distributed caches and databases (DynamoDB, Cassandra)", "Load balancer backend selection", "Sharding with minimal reshuffling"],
    related: ["Ht", "Sh", "Mp"],
    pseudocode: "lookup(key):\n  h = hash(key)\n  server = first node on ring with\n           position >= h (wrap around)",
  },
  {
    symbol: "Mp", name: "MapReduce", category: "systems",
    year: "2004", inventor: "Jeffrey Dean, Sanjay Ghemawat",
    time: { best: "O(n)", average: "O(n) distributed", worst: "varies" }, space: "O(n)",
    complexityClass: "O(n)",
    description: "Expresses batch computation as a map over records producing key-value pairs, a shuffle grouping by key, and a reduce per key — letting the framework handle distribution, locality, and machine failures across thousands of nodes.",
    uses: ["Building search indexes", "Log analysis at scale", "ETL pipelines (ancestor of Hadoop and Spark)"],
    related: ["Ch", "Me", "Ht"],
    pseudocode: "map(record) → list of (k, v)\nshuffle: group all v by k\nreduce(k, [v...]) → output\n\n// word count: map emits (word, 1)\n// reduce sums the 1s",
  },
  {
    symbol: "Rf", name: "Raft Consensus", category: "systems",
    year: "2014", inventor: "Diego Ongaro, John Ousterhout",
    time: { best: "O(1)", average: "O(n) messages", worst: "unbounded (liveness)" }, space: "O(log size)",
    complexityClass: "varies",
    description: "Keeps a replicated log consistent across servers despite crashes: an elected leader sequences all writes, and entries commit once a majority store them. Designed explicitly to be more understandable than Paxos — and it worked.",
    uses: ["etcd (Kubernetes), Consul, TiKV, CockroachDB", "Leader election", "Any replicated state machine"],
    related: ["Mp", "Ch"],
    pseudocode: "roles: follower → candidate → leader\n  timeout: follower becomes candidate,\n    requests votes; majority → leader\n  leader: appends entries to followers;\n    entry on majority → committed",
  },
  {
    symbol: "Pw", name: "Proof of Work", category: "systems",
    year: "2008", inventor: "Satoshi Nakamoto (Hashcash: Adam Back, 1997)",
    time: { best: "varies", average: "O(2^difficulty)", worst: "varies" }, space: "O(1)",
    complexityClass: "varies",
    description: "Open-membership consensus by making block proposals expensive: find a nonce whose block hash falls below a target, with the longest (heaviest-work) chain winning. Security rests on cumulative computation rather than knowing who the participants are.",
    uses: ["Bitcoin and blockchain consensus", "Spam and denial-of-service deterrence (Hashcash)", "Rate limiting without identity"],
    related: ["Sh", "Rf", "Ch"],
    pseudocode: "mine(header, target):\n  nonce = 0\n  while sha256(sha256(header + nonce)) > target:\n    nonce += 1\n  broadcast block",
  },
  {
    symbol: "Cd", name: "CRDT", category: "systems",
    year: "2011", inventor: "Marc Shapiro et al.",
    time: { best: "O(1)", average: "O(1) update", worst: "O(n) merge" }, space: "O(n)",
    complexityClass: "varies",
    description: "Conflict-free replicated data types let every replica accept writes independently and still converge: operations are designed to be commutative, associative, and idempotent, so merges need no coordination, locks, or consensus.",
    uses: ["Collaborative editors (Figma, multiplayer text)", "Offline-first and local-first apps", "Distributed counters, sets, and presence"],
    related: ["Rf", "Ch", "Ll"],
    pseudocode: "G-Counter (grow-only):\n  inc(): c[myReplica] += 1\n  value(): Σ c[r]\n  merge(other): c[r] = max(c[r], other.c[r]) ∀r",
  },
];

const DataTests = {
  run() {
    const errors = [];
    const symbols = new Set();
    const required = ["symbol", "name", "category", "year", "inventor", "time", "space", "complexityClass", "description", "uses", "related"];
    for (const el of ELEMENTS) {
      const id = el.symbol || el.name || "?";
      for (const f of required) {
        if (el[f] === undefined || el[f] === null || el[f] === "") errors.push(`${id}: missing ${f}`);
      }
      if (!/^[A-Z][a-z]?$/.test(el.symbol || "")) errors.push(`${id}: bad symbol`);
      if (symbols.has(el.symbol)) errors.push(`${id}: duplicate symbol`);
      symbols.add(el.symbol);
      if (!CATEGORIES[el.category]) errors.push(`${id}: unknown category ${el.category}`);
      if (!CLASSES.includes(el.complexityClass)) errors.push(`${id}: bad complexityClass ${el.complexityClass}`);
      if (!el.time || !el.time.best || !el.time.average || !el.time.worst) errors.push(`${id}: incomplete time`);
      if (!Array.isArray(el.uses) || el.uses.length === 0) errors.push(`${id}: uses empty`);
      if (!Array.isArray(el.related) || el.related.length === 0) errors.push(`${id}: related empty`);
      if (el.description && el.description.length < 60) errors.push(`${id}: description too short`);
    }
    for (const el of ELEMENTS) {
      for (const r of el.related || []) {
        if (!symbols.has(r)) errors.push(`${el.symbol}: related '${r}' does not exist`);
        if (r === el.symbol) errors.push(`${el.symbol}: self-reference in related`);
      }
    }
    if (ELEMENTS.length < 113) errors.push(`only ${ELEMENTS.length} elements, want >= 113`);
    const usedCats = new Set(ELEMENTS.map(e => e.category));
    for (const k of Object.keys(CATEGORIES)) {
      if (!usedCats.has(k)) errors.push(`category ${k} has no elements`);
    }
    for (const e of errors) console.error("FAIL: " + e);
    console.log(errors.length === 0 ? `PASS: ${ELEMENTS.length} elements valid` : `${errors.length} errors`);
    return errors.length === 0;
  },
};
</script>

<script>
"use strict";

const app = document.getElementById("app");
const bySymbol = {};
const byCategory = {};
ELEMENTS.forEach((el, i) => {
  el.num = i + 1;
  bySymbol[el.symbol] = el;
  (byCategory[el.category] ??= []).push(el);
});

function makeTile(el, cat) {
  const btn = document.createElement("button");
  btn.className = "tile" + (cat.gray ? " gray" : "");
  btn.dataset.symbol = el.symbol;
  btn.style.setProperty("--hue", cat.hue);
  const num = document.createElement("span");
  num.className = "num";
  num.textContent = el.num;
  const sym = document.createElement("span");
  sym.className = "sym";
  sym.textContent = el.symbol;
  const name = document.createElement("span");
  name.className = "name";
  name.textContent = el.name;
  const cx = document.createElement("span");
  cx.className = "cx";
  cx.textContent = el.complexityClass;
  btn.append(num, sym, name, cx);
  el.tileEl = btn;
  return btn;
}

const regionsDiv = document.createElement("div");
regionsDiv.className = "regions";
for (const [key, cat] of Object.entries(CATEGORIES)) {
  const section = document.createElement("section");
  section.className = "region" + (cat.gray ? " gray" : "");
  section.style.setProperty("--hue", cat.hue);
  const h2 = document.createElement("h2");
  h2.textContent = cat.name + " ";
  const blurb = document.createElement("span");
  blurb.className = "blurb";
  blurb.textContent = cat.blurb;
  h2.appendChild(blurb);
  const tiles = document.createElement("div");
  tiles.className = "tiles";
  for (const el of byCategory[key] || []) tiles.appendChild(makeTile(el, cat));
  section.append(h2, tiles);
  regionsDiv.appendChild(section);
}
app.appendChild(regionsDiv);
document.querySelector(".subtitle").textContent =
  `${ELEMENTS.length} building blocks of computation — click an element for details. Inspired by the periodic table of chemical elements.`;

// ---- tooltip ----
const tooltip = document.getElementById("tooltip");
regionsDiv.addEventListener("mouseover", (e) => {
  const tile = e.target.closest(".tile");
  if (!tile) return;
  const el = bySymbol[tile.dataset.symbol];
  tooltip.querySelector(".t-name").textContent = el.name;
  tooltip.querySelector(".t-cx").textContent = "average " + el.time.average;
  tooltip.style.display = "block";
  const r = tile.getBoundingClientRect();
  const tw = tooltip.offsetWidth;
  let x = r.left + r.width / 2 - tw / 2;
  x = Math.max(6, Math.min(x, window.innerWidth - tw - 6));
  let y = r.top - tooltip.offsetHeight - 8;
  if (y < 6) y = r.bottom + 8;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
});
regionsDiv.addEventListener("mouseout", (e) => {
  if (e.target.closest(".tile")) tooltip.style.display = "none";
});

// ---- detail card ----
const card = document.getElementById("card");
let currentEl = null;

function openCard(el) {
  currentEl = el;
  const cat = CATEGORIES[el.category];
  card.style.setProperty("--hue", cat.gray ? 0 : cat.hue);
  const symbox = card.querySelector(".card-symbox");
  symbox.classList.toggle("gray", Boolean(cat.gray));
  symbox.querySelector(".num").textContent = el.num;
  symbox.querySelector(".card-sym").textContent = el.symbol;
  card.querySelector(".card-title h3").textContent = el.name;
  const catChip = card.querySelector(".card-cat");
  catChip.textContent = cat.name;
  card.querySelector('[data-f="year"]').textContent = el.year;
  card.querySelector('[data-f="inventor"]').textContent = el.inventor;
  card.querySelector('[data-f="best"]').textContent = el.time.best;
  card.querySelector('[data-f="average"]').textContent = el.time.average;
  card.querySelector('[data-f="worst"]').textContent = el.time.worst;
  card.querySelector('[data-f="space"]').textContent = el.space;
  card.querySelector(".card-desc").textContent = el.description;
  const uses = card.querySelector(".card-uses");
  uses.replaceChildren(...el.uses.map((u) => {
    const li = document.createElement("li");
    li.textContent = u;
    return li;
  }));
  const pseudoSection = document.getElementById("card-pseudo-section");
  if (el.pseudocode) {
    pseudoSection.style.display = "";
    document.getElementById("card-pseudo").textContent = el.pseudocode;
  } else {
    pseudoSection.style.display = "none";
  }
  const chips = card.querySelector(".related-chips");
  chips.replaceChildren(...el.related.map((sym) => {
    const rel = bySymbol[sym];
    const rcat = CATEGORIES[rel.category];
    const chip = document.createElement("button");
    chip.className = "chip" + (rcat.gray ? " gray" : "");
    chip.style.setProperty("--chip-hue", rcat.hue);
    chip.textContent = `${rel.symbol} · ${rel.name}`;
    chip.addEventListener("click", () => openCard(rel));
    return chip;
  }));
  card.querySelector(".card-inner").scrollTop = 0;
  if (!card.open) card.showModal();
  history.replaceState(null, "", "#" + el.symbol);
}

function step(delta) {
  if (!currentEl) return;
  const i = (currentEl.num - 1 + delta + ELEMENTS.length) % ELEMENTS.length;
  openCard(ELEMENTS[i]);
}

regionsDiv.addEventListener("click", (e) => {
  const tile = e.target.closest(".tile");
  if (tile) openCard(bySymbol[tile.dataset.symbol]);
});
document.getElementById("card-prev").addEventListener("click", () => step(-1));
document.getElementById("card-next").addEventListener("click", () => step(1));
document.getElementById("card-close").addEventListener("click", () => card.close());
card.addEventListener("click", (e) => {
  if (e.target === card) card.close();
});
card.addEventListener("close", () => {
  history.replaceState(null, "", location.pathname + location.search);
});
document.addEventListener("keydown", (e) => {
  if (!card.open) return;
  if (e.key === "ArrowLeft") { e.preventDefault(); step(-1); }
  if (e.key === "ArrowRight") { e.preventDefault(); step(1); }
});

// ---- filters: search + complexity class + category, composed with AND ----
const state = { q: "", cls: null, cat: null };

function applyFilters() {
  const q = state.q.trim().toLowerCase();
  const anyFilter = Boolean(q || state.cls || state.cat);
  for (const el of ELEMENTS) {
    const matchQ = !q || el.name.toLowerCase().includes(q) || el.symbol.toLowerCase() === q
      || CATEGORIES[el.category].name.toLowerCase().includes(q)
      || el.complexityClass.toLowerCase().includes(q);
    const matchCls = !state.cls || el.complexityClass === state.cls;
    const matchCat = !state.cat || el.category === state.cat;
    const show = matchQ && matchCls && matchCat;
    el.tileEl.classList.toggle("dim", !show);
    el.tileEl.classList.toggle("hit", show && anyFilter);
  }
}

document.getElementById("search").addEventListener("input", (e) => {
  state.q = e.target.value;
  applyFilters();
});

function makeToggleRow(container, items, stateKey) {
  for (const item of items) {
    container.appendChild(item.chip);
    item.chip.addEventListener("click", () => {
      const on = state[stateKey] !== item.value;
      state[stateKey] = on ? item.value : null;
      for (const other of items) other.chip.classList.toggle("active", on && other === item);
      applyFilters();
    });
  }
}

makeToggleRow(
  document.getElementById("class-chips"),
  CLASSES.map((cls) => {
    const chip = document.createElement("button");
    chip.className = "fchip";
    chip.textContent = cls;
    return { chip, value: cls };
  }),
  "cls"
);

makeToggleRow(
  document.getElementById("cat-chips"),
  Object.entries(CATEGORIES).map(([key, cat]) => {
    const chip = document.createElement("button");
    chip.className = "fchip cat" + (cat.gray ? " gray" : "");
    chip.style.setProperty("--hue", cat.hue);
    chip.textContent = cat.name;
    return { chip, value: key };
  }),
  "cat"
);

// deep link: #Qs opens that element's card
const hashSym = location.hash.slice(1);
if (hashSym && bySymbol[hashSym]) openCard(bySymbol[hashSym]);
</script>
</body>
</html>
