<script id="shared-code">
"use strict";

const CLASSES = ["O(1)", "O(log n)", "O(n)", "O(n log n)", "O(n²)", "O(2ⁿ)", "varies"];

const CATEGORIES = {
  sorting:     { name: "Sorting",               hue: 4,   blurb: "Arranging items into order." },
  searching:   { name: "Searching",             hue: 28,  blurb: "Locating items in collections." },
  graphs:      { name: "Graphs",                hue: 48,  blurb: "Traversal, paths, connectivity, flow." },
  strings:     { name: "Strings",               hue: 88,  blurb: "Pattern matching and text processing." },
  dp:          { name: "Dynamic Programming",   hue: 140, blurb: "Optimal substructure + overlapping subproblems." },
  structures:  { name: "Data Structures",       hue: 175, blurb: "Ways to organize data for fast operations." },
  paradigms:   { name: "Paradigms",             hue: 205, blurb: "General strategies for designing algorithms." },
  math:        { name: "Math & Numeric",        hue: 235, blurb: "Number theory and numerical methods." },
  compression: { name: "Compression",           hue: 270, blurb: "Encoding data in fewer bits." },
  crypto:      { name: "Crypto & Hashing",      hue: 300, blurb: "Secrecy, integrity, and fingerprints." },
  ml:          { name: "ML & Optimization",     hue: 330, blurb: "Learning from data, searching solution spaces." },
  systems:     { name: "Concurrency & Systems", hue: 0, gray: true, blurb: "Coordinating work across threads and machines." },
};

const ELEMENTS = [
  {
    symbol: "Bu", name: "Bubble Sort", category: "sorting",
    year: "1956", inventor: "folklore",
    time: { best: "O(n)", average: "O(n²)", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "O(n²)",
    description: "Repeatedly steps through the list, comparing adjacent pairs and swapping them when out of order, so the largest remaining value bubbles to the end of each pass. Simple to teach, painful in practice.",
    uses: ["Teaching the concept of sorting", "Detecting nearly-sorted data with the early-exit variant"],
    related: ["In", "Se"],
    pseudocode: "bubbleSort(A):\n  repeat\n    swapped = false\n    for i = 1 .. len(A)-1:\n      if A[i-1] > A[i]:\n        swap A[i-1], A[i]\n        swapped = true\n  until not swapped",
  },
  {
    symbol: "In", name: "Insertion Sort", category: "sorting",
    year: "1946", inventor: "John Mauchly",
    time: { best: "O(n)", average: "O(n²)", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "O(n²)",
    description: "Builds the sorted array one item at a time by taking the next element and inserting it into its correct position among the already-sorted prefix, like sorting a hand of playing cards.",
    uses: ["Small arrays (often the base case inside quicksort and Timsort)", "Nearly-sorted data, where it runs in near-linear time"],
    related: ["Bu", "Se"],
    pseudocode: "insertionSort(A):\n  for i = 1 .. len(A)-1:\n    key = A[i]; j = i-1\n    while j >= 0 and A[j] > key:\n      A[j+1] = A[j]; j -= 1\n    A[j+1] = key",
  },
  {
    symbol: "Se", name: "Selection Sort", category: "sorting",
    year: "1956", inventor: "folklore",
    time: { best: "O(n²)", average: "O(n²)", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "O(n²)",
    description: "Repeatedly scans the unsorted suffix for its minimum element and swaps it into place. Always quadratic, but performs the minimum possible number of swaps, which matters when writes are expensive.",
    uses: ["Situations where swaps are costly (e.g. flash memory)", "Teaching invariants: sorted prefix grows one element per pass"],
    related: ["Bu", "In"],
    pseudocode: "selectionSort(A):\n  for i = 0 .. len(A)-2:\n    m = index of min(A[i..])\n    swap A[i], A[m]",
  },
  {
    symbol: "Sl", name: "Shell Sort", category: "sorting",
    year: "1959", inventor: "Donald Shell",
    time: { best: "O(n log n)", average: "depends on gaps", worst: "O(n²)" }, space: "O(1)",
    complexityClass: "varies",
    description: "Generalizes insertion sort by first sorting elements that are a large gap apart, then shrinking the gap toward 1. Far-apart elements move long distances cheaply; the final pass is a fast insertion sort. Its exact complexity depends on the gap sequence and is still an open problem.",
    uses: ["Embedded systems wanting in-place sorting with small code size", "Medium-sized arrays without recursion"],
    related: ["In"],
    pseudocode: "shellSort(A):\n  for gap in [.., 121, 40, 13, 4, 1]:\n    for i = gap .. len(A)-1:\n      key = A[i]; j = i\n      while j >= gap and A[j-gap] > key:\n        A[j] = A[j-gap]; j -= gap\n      A[j] = key",
  },
  {
    symbol: "Me", name: "Merge Sort", category: "sorting",
    year: "1945", inventor: "John von Neumann",
    time: { best: "O(n log n)", average: "O(n log n)", worst: "O(n log n)" }, space: "O(n)",
    complexityClass: "O(n log n)",
    description: "Recursively splits the array in half, sorts each half, and merges the two sorted halves with a linear scan. Guaranteed n log n, stable, and the classic example of divide and conquer; the merge step also works on disk and tape.",
    uses: ["Stable sorting in standard libraries", "External sorting of data too large for memory", "Counting inversions"],
    related: ["Qs", "Tm"],
    pseudocode: "mergeSort(A):\n  if len(A) <= 1: return A\n  L = mergeSort(left half)\n  R = mergeSort(right half)\n  return merge(L, R)   // interleave smallest-first",
  },
  {
    symbol: "Qs", name: "Quicksort", category: "sorting",
    year: "1959", inventor: "Tony Hoare",
    time: { best: "O(n log n)", average: "O(n log n)", worst: "O(n²)" }, space: "O(log n)",
    complexityClass: "O(n log n)",
    description: "Picks a pivot, partitions the array into elements below and above it, then recurses on both sides. In-place and cache-friendly, it is usually the fastest comparison sort in practice despite its quadratic worst case, which randomized pivots make vanishingly unlikely.",
    uses: ["General-purpose in-memory sorting", "Basis of quickselect for order statistics"],
    related: ["Me", "Hs"],
    pseudocode: "quicksort(A, lo, hi):\n  if lo >= hi: return\n  p = partition(A, lo, hi)  // pivot to final spot\n  quicksort(A, lo, p-1)\n  quicksort(A, p+1, hi)",
  },
  {
    symbol: "Hs", name: "Heapsort", category: "sorting",
    year: "1964", inventor: "J. W. J. Williams",
    time: { best: "O(n log n)", average: "O(n log n)", worst: "O(n log n)" }, space: "O(1)",
    complexityClass: "O(n log n)",
    description: "Builds a max-heap over the array, then repeatedly swaps the root (the maximum) to the end and sifts the new root down. Guaranteed n log n and in-place, at the cost of poor cache behavior compared with quicksort.",
    uses: ["Worst-case-sensitive systems (introsort falls back to it)", "Sorting with O(1) extra memory"],
    related: ["Qs", "Me"],
    pseudocode: "heapsort(A):\n  buildMaxHeap(A)\n  for end = len(A)-1 .. 1:\n    swap A[0], A[end]\n    siftDown(A, 0, end)",
  },
  {
    symbol: "Co", name: "Counting Sort", category: "sorting",
    year: "1954", inventor: "Harold Seward",
    time: { best: "O(n+k)", average: "O(n+k)", worst: "O(n+k)" }, space: "O(n+k)",
    complexityClass: "O(n)",
    description: "Counts how many times each key value occurs, computes prefix sums to find each key's final position, and places elements directly. Beats the n log n comparison bound by not comparing at all — it requires integer keys in a small range k.",
    uses: ["Sorting small-range integers (grades, bytes, ages)", "The stable digit pass inside radix sort"],
    related: ["Ra", "Bk"],
    pseudocode: "countingSort(A, k):\n  count[0..k] = 0\n  for x in A: count[x] += 1\n  prefix-sum count\n  for x in reversed(A):\n    out[count[x]-1] = x; count[x] -= 1",
  },
  {
    symbol: "Ra", name: "Radix Sort", category: "sorting",
    year: "1887", inventor: "Herman Hollerith",
    time: { best: "O(d·n)", average: "O(d·n)", worst: "O(d·n)" }, space: "O(n+k)",
    complexityClass: "O(n)",
    description: "Sorts integers digit by digit, least significant first, using a stable sort (usually counting sort) for each of the d digit positions. Linear time for fixed-width keys; originally mechanized for punched-card tabulating machines.",
    uses: ["Sorting large sets of fixed-width integers or strings", "Suffix array construction"],
    related: ["Co", "Bk"],
    pseudocode: "radixSort(A, d):\n  for pos = least .. most significant digit:\n    A = countingSortByDigit(A, pos)   // stable",
  },
  {
    symbol: "Bk", name: "Bucket Sort", category: "sorting",
    year: "1956", inventor: "folklore",
    time: { best: "O(n+k)", average: "O(n+k)", worst: "O(n²)" }, space: "O(n+k)",
    complexityClass: "O(n)",
    description: "Scatters elements into k buckets by value range, sorts each small bucket (often with insertion sort), and concatenates. Expected linear time when input is roughly uniformly distributed across the range.",
    uses: ["Sorting uniformly distributed floats in [0,1)", "Histogram-style preprocessing"],
    related: ["Co", "Ra"],
    pseudocode: "bucketSort(A, k):\n  make k empty buckets\n  for x in A: bucket[floor(k*x/max)] .push(x)\n  sort each bucket; concatenate",
  },
  {
    symbol: "Tm", name: "Timsort", category: "sorting",
    year: "2002", inventor: "Tim Peters",
    time: { best: "O(n)", average: "O(n log n)", worst: "O(n log n)" }, space: "O(n)",
    complexityClass: "O(n log n)",
    description: "A hybrid of merge sort and insertion sort that finds naturally occurring sorted runs, extends short ones with insertion sort, and merges runs with carefully tuned rules (galloping). Stable, adaptive, and the default sort in Python and Java.",
    uses: ["Standard library sorting (Python, Java, V8)", "Real-world data that is partially ordered"],
    related: ["Me", "In"],
    pseudocode: "timsort(A):\n  find runs (already sorted stretches)\n  extend runs < minrun via insertion sort\n  merge runs, keeping stack invariants",
  },
];

const DataTests = {
  run() {
    const errors = [];
    const symbols = new Set();
    const required = ["symbol", "name", "category", "year", "inventor", "time", "space", "complexityClass", "description", "uses", "related"];
    for (const el of ELEMENTS) {
      const id = el.symbol || el.name || "?";
      for (const f of required) {
        if (el[f] === undefined || el[f] === null || el[f] === "") errors.push(`${id}: missing ${f}`);
      }
      if (!/^[A-Z][a-z]?$/.test(el.symbol || "")) errors.push(`${id}: bad symbol`);
      if (symbols.has(el.symbol)) errors.push(`${id}: duplicate symbol`);
      symbols.add(el.symbol);
      if (!CATEGORIES[el.category]) errors.push(`${id}: unknown category ${el.category}`);
      if (!CLASSES.includes(el.complexityClass)) errors.push(`${id}: bad complexityClass ${el.complexityClass}`);
      if (!el.time || !el.time.best || !el.time.average || !el.time.worst) errors.push(`${id}: incomplete time`);
      if (!Array.isArray(el.uses) || el.uses.length === 0) errors.push(`${id}: uses empty`);
      if (!Array.isArray(el.related) || el.related.length === 0) errors.push(`${id}: related empty`);
      if (el.description && el.description.length < 60) errors.push(`${id}: description too short`);
    }
    for (const el of ELEMENTS) {
      for (const r of el.related || []) {
        if (!symbols.has(r)) errors.push(`${el.symbol}: related '${r}' does not exist`);
        if (r === el.symbol) errors.push(`${el.symbol}: self-reference in related`);
      }
    }
    for (const e of errors) console.error("FAIL: " + e);
    console.log(errors.length === 0 ? `PASS: ${ELEMENTS.length} elements valid` : `${errors.length} errors`);
    return errors.length === 0;
  },
};
</script>
