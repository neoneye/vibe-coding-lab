"use strict";

// Deterministic PRNG (mulberry32). Returns floats in [0, 1).
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0;
    a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Bit-faithful port of the C++ random_1d (Perlin-style integer hash).
// Math.imul reproduces 32-bit overflow semantics.
function random1d(x) {
  let s = Math.imul(71, x);
  s = (Math.imul(s, 8192) ^ s) | 0;
  const t = (Math.imul(s, (Math.imul(Math.imul(s, s), 15731) | 0) + 789221) + 1376312589) & 0x7fffffff;
  return 1.0 - t / 1073741824.0;
}

// BEGIN GENERATED PRESETS
const PRESETS = [];
// END GENERATED PRESETS

const IfsTests = {
  run() {
    const failures = [];
    const check = (name, cond) => {
      console.log((cond ? "PASS" : "FAIL") + " " + name);
      if (!cond) failures.push(name);
    };

    // --- PRNG ---
    {
      const a = mulberry32(42), b = mulberry32(42);
      let same = true, inRange = true;
      for (let i = 0; i < 1000; i++) {
        const va = a(), vb = b();
        if (va !== vb) same = false;
        if (va < 0 || va >= 1) inRange = false;
      }
      check("prng: deterministic for equal seeds", same);
      check("prng: values in [0,1)", inRange);
    }

    // --- random1d characterization ---
    {
      let ok = true;
      for (const x of [0, 1, 2, 100, -7, 12345]) {
        const v = random1d(x);
        if (!(v > -1.0000001 && v < 1.0000001) || !Number.isFinite(v)) ok = false;
        if (random1d(x) !== v) ok = false;
      }
      check("random1d: bounded and pure", ok);
      check("random1d: distinct values", random1d(1) !== random1d(2));
      check("random1d: pinned values",
        Math.abs(random1d(1) - -0.31882712710648775) < 1e-12 &&
        Math.abs(random1d(7) - 0.16649853717535734) < 1e-12 &&
        Math.abs(random1d(100) - 0.7281943624839187) < 1e-12);
    }

    console.log(failures.length === 0 ? "ALL TESTS PASSED" : failures.length + " FAILURES");
    return failures.length === 0;
  },
};
</script>
