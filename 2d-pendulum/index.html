<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendulum Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c8c8d0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: #12121a;
    padding: 16px;
    overflow-y: auto;
    border-right: 1px solid #2a2a3a;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  h1 {
    font-size: 16px;
    color: #e0e0f0;
    border-bottom: 1px solid #2a2a3a;
    padding-bottom: 8px;
  }
  .group {
    background: #1a1a28;
    border-radius: 8px;
    padding: 10px;
  }
  .group h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8888aa;
    margin-bottom: 8px;
  }
  .param {
    margin-bottom: 6px;
  }
  .param label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .param label span {
    color: #6e9fff;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    background: #2a2a3a;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6e9fff;
    cursor: pointer;
  }
  .buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  button {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #3a3a5a;
    background: #1e1e30;
    color: #c8c8d0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }
  button:hover { background: #2a2a44; }
  button.active { background: #3a4a6a; border-color: #6e9fff; }
  #main {
    flex: 1;
    position: relative;
  }
  #canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #info {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 11px;
    color: #8899bb;
    text-align: right;
    line-height: 1.6;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="sidebar">
  <h1 id="title">Double Pendulum</h1>

  <div class="buttons">
    <button id="btnDouble" class="active">Double</button>
    <button id="btnTriple">Triple</button>
  </div>

  <div class="group">
    <h3>Pendulum 1 (upper)</h3>
    <div class="param">
      <label>Mass <span id="v_m1">2.0</span> kg</label>
      <input type="range" id="m1" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="param">
      <label>Length <span id="v_l1">1.0</span></label>
      <input type="range" id="l1" min="0.3" max="2" step="0.05" value="1">
    </div>
    <div class="param">
      <label>Start angle <span id="v_a1">120</span>&deg;</label>
      <input type="range" id="a1" min="0" max="360" step="1" value="120">
    </div>
  </div>

  <div class="group">
    <h3 id="pend2Label">Pendulum 2 (lower)</h3>
    <div class="param">
      <label>Mass <span id="v_m2">2.0</span> kg</label>
      <input type="range" id="m2" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="param">
      <label>Length <span id="v_l2">1.0</span></label>
      <input type="range" id="l2" min="0.3" max="2" step="0.05" value="1">
    </div>
    <div class="param">
      <label>Start angle <span id="v_a2">150</span>&deg;</label>
      <input type="range" id="a2" min="0" max="360" step="1" value="150">
    </div>
  </div>

  <div class="group" id="pend3Group" style="display:none;">
    <h3>Pendulum 3 (lower)</h3>
    <div class="param">
      <label>Mass <span id="v_m3">2.0</span> kg</label>
      <input type="range" id="m3" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="param">
      <label>Length <span id="v_l3">1.0</span></label>
      <input type="range" id="l3" min="0.3" max="2" step="0.05" value="1">
    </div>
    <div class="param">
      <label>Start angle <span id="v_a3">180</span>&deg;</label>
      <input type="range" id="a3" min="0" max="360" step="1" value="180">
    </div>
  </div>

  <div class="group">
    <h3>Physics</h3>
    <div class="param">
      <label>Gravity <span id="v_g">9.81</span></label>
      <input type="range" id="g" min="1" max="30" step="0.1" value="9.81">
    </div>
    <div class="param">
      <label>Damping <span id="v_damp">0.000</span></label>
      <input type="range" id="damp" min="0" max="0.05" step="0.001" value="0">
    </div>
    <div class="param">
      <label>Elasticity <span id="v_elas">1.00</span></label>
      <input type="range" id="elas" min="0.5" max="1.5" step="0.01" value="1">
    </div>
    <div class="param">
      <label>Speed <span id="v_speed">1.0</span>x</label>
      <input type="range" id="speed" min="0.1" max="4" step="0.1" value="1">
    </div>
  </div>

  <div class="group">
    <h3>Spectrogram</h3>
    <div class="param">
      <label>Window <span id="v_hw">10.0</span>s</label>
      <input type="range" id="hw" min="3" max="60" step="0.5" value="10">
    </div>
  </div>

  <div class="group">
    <h3>Audio</h3>
    <div class="param">
      <label>Waveform</label>
      <div class="buttons" style="margin-top:2px;">
        <button id="btnWaveSine" class="active">Sine</button>
        <button id="btnWaveSaw">Saw</button>
        <button id="btnWaveSquare">Square</button>
      </div>
    </div>
    <div class="param">
      <label>Volume <span id="v_vol">0.4</span></label>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.4">
    </div>
    <div class="param">
      <label>Base note <span id="v_base">220</span> Hz</label>
      <input type="range" id="base" min="55" max="440" step="1" value="220">
    </div>
    <div class="param">
      <label>Reverb <span id="v_rev">0.4</span></label>
      <input type="range" id="rev" min="0" max="0.9" step="0.05" value="0.4">
    </div>
  </div>

  <div class="buttons">
    <button id="btnPause">Pause</button>
    <button id="btnReset">Reset</button>
  </div>
  <div class="buttons">
    <button id="btnTrail" class="active">Trail</button>
    <button id="btnSpectro" class="active">Spectrogram</button>
  </div>
  <div class="buttons">
    <button id="btnSound">Sound On</button>
  </div>
</div>

<div id="main">
  <canvas id="canvas"></canvas>
  <div id="info"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');

// State
let paused = false, showTrail = true, showSpectro = true;
let simTime = 0;
let numPendulums = 2;
let th = [], w = [];
let trail = [];
let angleHistory = [];
let W = 0, H = 0;

// Pendulum colors: red, blue, green
const PEND_COLORS = [
  { fill: '#ee4444', glow: '#ee4444', stroke: '#ff6666', rgb: [255, 60, 40] },
  { fill: '#4488ff', glow: '#4488ff', stroke: '#66aaff', rgb: [50, 130, 255] },
  { fill: '#44cc66', glow: '#44cc66', stroke: '#66ee88', rgb: [50, 200, 100] },
];

function params() {
  return {
    m: [parseFloat($('m1').value), parseFloat($('m2').value), parseFloat($('m3').value)],
    l: [parseFloat($('l1').value), parseFloat($('l2').value), parseFloat($('l3').value)],
    g: parseFloat($('g').value),
    damp: parseFloat($('damp').value),
    elas: parseFloat($('elas').value),
    speed: parseFloat($('speed').value),
    spectroWindow: parseFloat($('hw').value),
  };
}

// Slider display updates
document.querySelectorAll('input[type=range]').forEach(inp => {
  inp.addEventListener('input', () => {
    const v = $('v_' + inp.id);
    if (v) {
      const dec = inp.step.includes('.') ? inp.step.split('.')[1].length : 0;
      v.textContent = parseFloat(inp.value).toFixed(dec);
    }
  });
});

function resetSim() {
  th = []; w = [];
  for (let i = 0; i < numPendulums; i++) {
    th[i] = parseFloat($('a' + (i + 1)).value) * Math.PI / 180;
    w[i] = 0;
  }
  simTime = 0;
  trail = [];
  angleHistory = [];
}
resetSim();

// === Mode toggle ===
function setMode(n) {
  numPendulums = n;
  $('btnDouble').classList.toggle('active', n === 2);
  $('btnTriple').classList.toggle('active', n === 3);
  $('pend3Group').style.display = n === 3 ? '' : 'none';
  $('pend2Label').textContent = n === 3 ? 'Pendulum 2 (middle)' : 'Pendulum 2 (lower)';
  $('title').textContent = n === 3 ? 'Triple Pendulum' : 'Double Pendulum';
  resetSim();
}
$('btnDouble').addEventListener('click', () => setMode(2));
$('btnTriple').addEventListener('click', () => setMode(3));

// === General n-pendulum physics ===
// Solves M * alpha = f where M is the mass matrix
// M_ij = A_ij * cos(th_i - th_j), A_ij = sum_{k>=max(i,j)} m_k * L_i * L_j
// f_i = -sum_{j!=i} A_ij * sin(th_i - th_j) * w_j^2 - g * (sum_{k>=i} m_k) * L_i * sin(th_i) - damp * w_i
function computeAccelerations(thArr, wArr, p) {
  const n = thArr.length;
  const { g, damp, elas } = p;
  const m = p.m.slice(0, n);
  const L = p.l.slice(0, n).map(li => li * elas);

  const M = [], f = [];
  for (let i = 0; i < n; i++) {
    M[i] = [];
    for (let j = 0; j < n; j++) {
      let Aij = 0;
      for (let k = Math.max(i, j); k < n; k++) Aij += m[k];
      Aij *= L[i] * L[j];
      M[i][j] = Aij * Math.cos(thArr[i] - thArr[j]);
    }
    let fi = 0;
    for (let j = 0; j < n; j++) {
      if (j === i) continue;
      let Aij = 0;
      for (let k = Math.max(i, j); k < n; k++) Aij += m[k];
      Aij *= L[i] * L[j];
      fi -= Aij * Math.sin(thArr[i] - thArr[j]) * wArr[j] * wArr[j];
    }
    let mSum = 0;
    for (let k = i; k < n; k++) mSum += m[k];
    fi -= g * mSum * L[i] * Math.sin(thArr[i]);
    fi -= damp * wArr[i];
    f[i] = fi;
  }
  return solveLinear(M, f, n);
}

function solveLinear(M, f, n) {
  const A = [];
  for (let i = 0; i < n; i++) A[i] = [...M[i], f[i]];
  for (let col = 0; col < n; col++) {
    let maxRow = col, maxVal = Math.abs(A[col][col]);
    for (let row = col + 1; row < n; row++) {
      if (Math.abs(A[row][col]) > maxVal) { maxVal = Math.abs(A[row][col]); maxRow = row; }
    }
    [A[col], A[maxRow]] = [A[maxRow], A[col]];
    for (let row = col + 1; row < n; row++) {
      const fac = A[row][col] / A[col][col];
      for (let j = col; j <= n; j++) A[row][j] -= fac * A[col][j];
    }
  }
  const x = new Array(n);
  for (let i = n - 1; i >= 0; i--) {
    x[i] = A[i][n];
    for (let j = i + 1; j < n; j++) x[i] -= A[i][j] * x[j];
    x[i] /= A[i][i];
  }
  return x;
}

// RK4 integrator
function step(dt, p) {
  const n = numPendulums;
  function derivs(thA, wA) {
    const alpha = computeAccelerations(thA, wA, p);
    return { dth: wA.slice(), dw: alpha };
  }
  const k1 = derivs(th, w);
  const k2 = derivs(th.map((t, i) => t + dt / 2 * k1.dth[i]), w.map((v, i) => v + dt / 2 * k1.dw[i]));
  const k3 = derivs(th.map((t, i) => t + dt / 2 * k2.dth[i]), w.map((v, i) => v + dt / 2 * k2.dw[i]));
  const k4 = derivs(th.map((t, i) => t + dt * k3.dth[i]), w.map((v, i) => v + dt * k3.dw[i]));
  for (let i = 0; i < n; i++) {
    th[i] += dt / 6 * (k1.dth[i] + 2 * k2.dth[i] + 2 * k3.dth[i] + k4.dth[i]);
    w[i] += dt / 6 * (k1.dw[i] + 2 * k2.dw[i] + 2 * k3.dw[i] + k4.dw[i]);
  }
}

// Compute chain positions: [{x,y}] from pivot (index 0) to each mass
function getPositions(thArr, L) {
  const pos = [{ x: 0, y: 0 }];
  for (let i = 0; i < thArr.length; i++) {
    pos.push({
      x: pos[i].x + L[i] * Math.sin(thArr[i]),
      y: pos[i].y + L[i] * Math.cos(thArr[i])
    });
  }
  return pos;
}

function normAngle(a) {
  return ((a * 180 / Math.PI) % 360 + 360) % 360;
}

// Resize
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W; canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// Buttons
$('btnPause').addEventListener('click', () => {
  paused = !paused;
  $('btnPause').textContent = paused ? 'Play' : 'Pause';
  $('btnPause').classList.toggle('active', paused);
});
$('btnReset').addEventListener('click', resetSim);
$('btnTrail').addEventListener('click', () => {
  showTrail = !showTrail;
  $('btnTrail').classList.toggle('active', showTrail);
});
$('btnSpectro').addEventListener('click', () => {
  showSpectro = !showSpectro;
  $('btnSpectro').classList.toggle('active', showSpectro);
});

// === Audio Synth ===
let audioCtx = null, soundOn = false;
let waveType = 'sine';
let oscs = [], gains = [], masterGain, panner, filter, convolver, reverbGain, dryGain;

const SCALE_RATIOS = [1, 9/8, 5/4, 3/2, 5/3, 2];

function quantizeToScale(freq, baseFreq) {
  let octave = 0, f = freq;
  while (f > baseFreq * 2) { f /= 2; octave++; }
  while (f < baseFreq) { f *= 2; octave--; }
  const ratio = f / baseFreq;
  let closest = SCALE_RATIOS[0], minDist = Math.abs(ratio - SCALE_RATIOS[0]);
  for (let i = 1; i < SCALE_RATIOS.length; i++) {
    const dist = Math.abs(ratio - SCALE_RATIOS[i]);
    if (dist < minDist) { minDist = dist; closest = SCALE_RATIOS[i]; }
  }
  return baseFreq * closest * Math.pow(2, octave);
}

function createReverb(actx, duration) {
  const rate = actx.sampleRate, len = rate * duration;
  const buf = actx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  }
  return buf;
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const types = [waveType, waveType, waveType];
  const freqs = [220, 330, 440];
  oscs = []; gains = [];
  for (let i = 0; i < 3; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = types[i]; osc.frequency.value = freqs[i];
    const gain = audioCtx.createGain(); gain.gain.value = 0;
    osc.connect(gain);
    oscs.push(osc); gains.push(gain);
  }
  filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800; filter.Q.value = 5;
  panner = audioCtx.createStereoPanner(); panner.pan.value = 0;
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.4;
  convolver = audioCtx.createConvolver(); convolver.buffer = createReverb(audioCtx, 2.5);
  reverbGain = audioCtx.createGain(); reverbGain.gain.value = 0.4;
  dryGain = audioCtx.createGain(); dryGain.gain.value = 0.7;
  for (const g of gains) g.connect(filter);
  filter.connect(panner);
  panner.connect(dryGain); panner.connect(convolver); convolver.connect(reverbGain);
  dryGain.connect(masterGain); reverbGain.connect(masterGain); masterGain.connect(audioCtx.destination);
  for (const osc of oscs) osc.start();
}

function updateAudio(p, L) {
  if (!audioCtx || !soundOn) return;
  const t = audioCtx.currentTime;
  const baseFreq = parseFloat($('base').value);
  const vol = parseFloat($('vol').value);
  const rev = parseFloat($('rev').value);
  const n = numPendulums;
  const freqMult = [1, 1.5, 2];
  const gainMult = [0.5, 0.4, 0.3];
  for (let i = 0; i < 3; i++) {
    if (i < n) {
      const norm = (Math.sin(th[i]) + 1) / 2;
      const f = quantizeToScale(baseFreq * freqMult[i] * (0.5 + norm * 1.5), baseFreq);
      oscs[i].frequency.setTargetAtTime(f, t, 0.05);
      gains[i].gain.setTargetAtTime(Math.min(1, Math.abs(w[i]) / 12) * gainMult[i], t, 0.03);
    } else {
      gains[i].gain.setTargetAtTime(0, t, 0.03);
    }
  }
  let wSum = 0;
  for (let i = 0; i < n; i++) wSum += Math.abs(w[i]);
  filter.frequency.setTargetAtTime(200 + Math.min(wSum / (n * 10), 1) * 3800, t, 0.04);
  const totalLen = L.reduce((a, b) => a + b, 0);
  const pos = getPositions(th, L);
  const tipX = pos[n].x;
  panner.pan.setTargetAtTime(Math.max(-1, Math.min(1, tipX / totalLen)), t, 0.03);
  masterGain.gain.setTargetAtTime(vol, t, 0.05);
  reverbGain.gain.setTargetAtTime(rev, t, 0.05);
  dryGain.gain.setTargetAtTime(1 - rev * 0.5, t, 0.05);
}

$('btnSound').addEventListener('click', () => {
  if (!audioCtx) initAudio();
  soundOn = !soundOn;
  $('btnSound').textContent = soundOn ? 'Sound Off' : 'Sound On';
  $('btnSound').classList.toggle('active', soundOn);
  if (audioCtx) {
    if (soundOn) audioCtx.resume();
    else { for (const g of gains) g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); }
  }
});

// === Waveform selector ===
function setWaveType(type) {
  waveType = type;
  $('btnWaveSine').classList.toggle('active', type === 'sine');
  $('btnWaveSaw').classList.toggle('active', type === 'sawtooth');
  $('btnWaveSquare').classList.toggle('active', type === 'square');
  for (const osc of oscs) osc.type = type;
}
$('btnWaveSine').addEventListener('click', () => setWaveType('sine'));
$('btnWaveSaw').addEventListener('click', () => setWaveType('sawtooth'));
$('btnWaveSquare').addEventListener('click', () => setWaveType('square'));

// === Spectrogram drawing ===
function drawSpectrogram(p) {
  const n = numPendulums;
  const spectroH = Math.floor(H * 0.32);
  const spectroY = H - spectroH;
  const plotLeft = 40, plotRight = W - 10;
  const plotTop = spectroY + 20, plotBottom = H - 20;
  const plotW = plotRight - plotLeft, plotH = plotBottom - plotTop;

  ctx.fillStyle = '#0e0e18';
  ctx.fillRect(0, spectroY, W, spectroH);
  ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, spectroY); ctx.lineTo(W, spectroY); ctx.stroke();

  ctx.strokeStyle = '#2a2a44'; ctx.lineWidth = 1;
  ctx.strokeRect(plotLeft, plotTop, plotW, plotH);

  ctx.fillStyle = '#556677'; ctx.font = '10px sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let deg = 0; deg <= 360; deg += 90) {
    const y = plotBottom - (deg / 360) * plotH;
    ctx.fillText(deg + '\u00b0', plotLeft - 4, y);
    if (deg > 0 && deg < 360) {
      ctx.strokeStyle = '#1a1a2e'; ctx.beginPath();
      ctx.moveTo(plotLeft, y); ctx.lineTo(plotRight, y); ctx.stroke();
    }
  }

  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const win = p.spectroWindow;
  const tEnd = simTime, tStart = tEnd - win;
  const timeStep = win <= 10 ? 1 : win <= 30 ? 5 : 10;
  const firstTick = Math.ceil(tStart / timeStep) * timeStep;
  for (let t = firstTick; t <= tEnd; t += timeStep) {
    const x = plotLeft + ((t - tStart) / win) * plotW;
    if (x < plotLeft || x > plotRight) continue;
    ctx.strokeStyle = '#1a1a2e'; ctx.beginPath();
    ctx.moveTo(x, plotTop); ctx.lineTo(x, plotBottom); ctx.stroke();
    ctx.fillStyle = '#556677'; ctx.fillText(t.toFixed(0) + 's', x, plotBottom + 3);
  }

  ctx.fillStyle = '#667788'; ctx.font = '10px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('Angle vs Time', plotLeft, spectroY + 4);

  // Legend
  ctx.textAlign = 'right';
  const labels = ['\u03b81', '\u03b82', '\u03b83'];
  const legendColors = ['#ff4444', '#4488ff', '#44cc66'];
  for (let i = n - 1; i >= 0; i--) {
    ctx.fillStyle = legendColors[i];
    ctx.fillText('\u25cf ' + labels[i], plotRight - (n - 1 - i) * 50, spectroY + 4);
  }

  if (angleHistory.length < 2) return;

  ctx.save();
  ctx.beginPath(); ctx.rect(plotLeft, plotTop, plotW, plotH); ctx.clip();

  let maxW = 1;
  for (const pt of angleHistory) {
    let aw = 0;
    for (let i = 0; i < n; i++) aw += Math.abs(pt.ws[i]);
    if (aw > maxW) maxW = aw;
  }

  for (const pt of angleHistory) {
    if (pt.t < tStart) continue;
    const x = plotLeft + ((pt.t - tStart) / win) * plotW;
    for (let i = 0; i < n; i++) {
      const b = 0.2 + 0.8 * Math.min(1, Math.abs(pt.ws[i]) / (maxW * 0.5));
      const y = plotBottom - (pt.angles[i] / 360) * plotH;
      const [r, g, bl] = PEND_COLORS[i].rgb;
      ctx.fillStyle = `rgba(${Math.round(r * b)}, ${Math.round(g * b)}, ${Math.round(bl * b)}, ${0.3 + b * 0.6})`;
      ctx.beginPath(); ctx.arc(x, y, 1.5 + b, 0, Math.PI * 2); ctx.fill();
    }
  }

  ctx.restore();
}

// Main loop
let lastTime = null;
function frame(ts) {
  requestAnimationFrame(frame);
  if (lastTime === null) { lastTime = ts; return; }
  const dtReal = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  const p = params();
  const n = numPendulums;
  const L = p.l.slice(0, n).map(li => li * p.elas);

  // Physics
  if (!paused) {
    const dtSim = dtReal * p.speed;
    const steps = Math.max(1, Math.ceil(dtSim / 0.002));
    const h = dtSim / steps;
    for (let i = 0; i < steps; i++) {
      step(h, p);
      simTime += h;
    }
    const pos = getPositions(th, L);
    const tip = pos[n];
    // Velocity of tip
    let vx = 0, vy = 0;
    for (let i = 0; i < n; i++) {
      vx += L[i] * w[i] * Math.cos(th[i]);
      vy -= L[i] * w[i] * Math.sin(th[i]);
    }
    const mom = Math.sqrt(vx * vx + vy * vy);
    trail.push({ x: tip.x, y: tip.y, vx, vy, mom, t: simTime });

    angleHistory.push({ t: simTime, angles: th.map(normAngle), ws: w.slice() });

    const cutoff = simTime - p.spectroWindow;
    while (trail.length > 0 && trail[0].t < cutoff) trail.shift();
    while (angleHistory.length > 0 && angleHistory[0].t < cutoff) angleHistory.shift();

    updateAudio(p, L);
  }

  // Clear
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  const pendH = showSpectro ? H * 0.65 : H;
  const cx = W / 2;
  const cy = pendH * 0.45;
  const totalLen = L.reduce((a, b) => a + b, 0);
  const scale = Math.min(W, pendH) / (2 * totalLen + 0.5) * 0.6;

  // Trail
  if (showTrail && trail.length > 1) {
    ctx.lineWidth = 1.5;
    for (let i = 1; i < trail.length; i++) {
      const pt = trail[i], prev = trail[i - 1];
      const age = (simTime - pt.t) / p.spectroWindow;
      const alpha = Math.max(0, (1 - age) * 0.7);
      const hue = ((Math.atan2(pt.vy, pt.vx) / (2 * Math.PI) + 1) % 1) * 360;
      ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
      ctx.beginPath();
      ctx.moveTo(cx + prev.x * scale, cy + prev.y * scale);
      ctx.lineTo(cx + pt.x * scale, cy + pt.y * scale);
      ctx.stroke();
    }
  }

  // Pendulum
  const pos = getPositions(th, L);

  // Rods
  ctx.strokeStyle = '#8899aa'; ctx.lineWidth = 3;
  for (let i = 0; i < n; i++) {
    const from = pos[i], to = pos[i + 1];
    ctx.beginPath();
    ctx.moveTo(cx + from.x * scale, cy + from.y * scale);
    ctx.lineTo(cx + to.x * scale, cy + to.y * scale);
    ctx.stroke();
  }

  // Pivot
  ctx.fillStyle = '#667788';
  ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();

  // Masses
  for (let i = 0; i < n; i++) {
    const mx = cx + pos[i + 1].x * scale;
    const my = cy + pos[i + 1].y * scale;
    const r = 8 + p.m[i] * 2.5;
    const c = PEND_COLORS[i];
    ctx.fillStyle = c.fill;
    ctx.shadowColor = c.glow; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = c.stroke; ctx.lineWidth = 2; ctx.stroke();
  }

  // Info overlay
  let info = `t = ${simTime.toFixed(1)}s<br>`;
  for (let i = 0; i < n; i++) info += `\u03b8${i + 1} = ${normAngle(th[i]).toFixed(1)}\u00b0<br>`;
  let ke = 0;
  for (let i = 0; i < n; i++) {
    let vx = 0, vy = 0;
    for (let j = 0; j <= i; j++) { vx += L[j] * w[j] * Math.cos(th[j]); vy += L[j] * w[j] * Math.sin(th[j]); }
    ke += 0.5 * p.m[i] * (vx * vx + vy * vy);
  }
  info += `KE \u2248 ${ke.toFixed(1)}`;
  $('info').innerHTML = info;

  // Spectrogram
  if (showSpectro) drawSpectrogram(p);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
